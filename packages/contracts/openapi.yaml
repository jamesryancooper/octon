openapi: 3.1.0
info:
  title: Harmony Contracts — SpecKit
  version: 0.1.0
  description: >-
    Thin HTTP/MCP wrapper for SpecKit operations. Provides scaffold, validate,
    render, and diagram endpoints. Uses Harmony Core Comms metadata (run_id,
    idempotency_key, budget) and error taxonomy.
servers:
  - url: https://api.example.com
paths:
  /v1/speckit/init:
    post:
      summary: Scaffold SpecKit project/spec
      operationId: speckitInit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitRequest'
      responses:
        '201':
          description: Created spec scaffolding
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InitResponse'
        '400': { $ref: '#/components/responses/InvalidInput' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/Internal' }
  /v1/speckit/validate:
    post:
      summary: Validate SpecKit prerequisites and structure (specify check + repo layout)
      operationId: speckitValidate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateRequest'
      responses:
        '200':
          description: Validation report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateResponse'
        '400': { $ref: '#/components/responses/InvalidInput' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/Internal' }
  /v1/speckit/render:
    post:
      summary: Render/publish docs with Dockit
      operationId: speckitRender
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenderRequest'
      responses:
        '200':
          description: Rendered output with optional manifest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RenderResponse'
        '400': { $ref: '#/components/responses/InvalidInput' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/Internal' }
  /v1/speckit/diagram:
    post:
      summary: Emit diagrams from Architecture (Sketch)
      operationId: speckitDiagram
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiagramRequest'
      responses:
        '201':
          description: Diagrams generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiagramResponse'
        '400': { $ref: '#/components/responses/InvalidInput' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/Internal' }

  # FlowKit Runtime API
  /flows/run:
    post:
      summary: Execute a FlowKit flow
      description: >-
        Executes a LangGraph flow identified by flowName. The runtime dispatches
        to the appropriate flow handler (e.g., architecture_assessment, docs_glossary).
      operationId: flowkitRun
      tags:
        - FlowKit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FlowRunRequest'
      responses:
        '200':
          description: Flow executed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlowRunResponse'
        '400': { $ref: '#/components/responses/InvalidInput' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/Internal' }

  /healthz:
    get:
      summary: Health check endpoint
      description: Simple readiness endpoint used by FlowKit CLI to verify the runtime is available.
      operationId: healthz
      tags:
        - System
      responses:
        '200':
          description: Runtime is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
                required: [status]
components:
  responses:
    InvalidInput:
      description: Invalid input
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Internal:
      description: Internal error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    CoreBudget:
      type: object
      properties:
        seconds_max: { type: integer, minimum: 1 }
        calls_max: { type: integer, minimum: 1 }
      additionalProperties: false
    CoreMeta:
      type: object
      properties:
        run_id: { type: string }
        idempotency_key: { type: string }
        budget: { $ref: '#/components/schemas/CoreBudget' }
      additionalProperties: false
    InitRequest:
      type: object
      allOf:
        - $ref: '#/components/schemas/CoreMeta'
        - type: object
          properties:
            feature: { type: string }
            owner: { type: string }
            out_dir: { type: string }
          required: [feature, owner, out_dir]
          additionalProperties: false
    InitResponse:
      type: object
      properties:
        spec_dir: { type: string }
        files:
          type: array
          items: { type: string }
      required: [spec_dir]
      additionalProperties: false
    ValidateRequest:
      type: object
      allOf:
        - $ref: '#/components/schemas/CoreMeta'
        - type: object
          properties:
            path: { type: string }
          required: [path]
          additionalProperties: false
    ValidationError:
      type: object
      properties:
        path: { type: string }
        message: { type: string }
        code: { type: string }
      required: [message]
      additionalProperties: false
    ValidateResponse:
      type: object
      properties:
        valid: { type: boolean }
        errors:
          type: array
          items: { $ref: '#/components/schemas/ValidationError' }
      required: [valid]
      additionalProperties: false
    RenderRequest:
      type: object
      allOf:
        - $ref: '#/components/schemas/CoreMeta'
        - type: object
          properties:
            path: { type: string }
            publish: { type: boolean }
          required: [path]
          additionalProperties: false
    RenderResponse:
      type: object
      properties:
        manifest_uri: { type: string }
        pages:
          type: array
          items: { type: string }
      additionalProperties: false
    DiagramRequest:
      type: object
      allOf:
        - $ref: '#/components/schemas/CoreMeta'
        - type: object
          properties:
            path: { type: string }
          required: [path]
          additionalProperties: false
    DiagramResponse:
      type: object
      properties:
        files:
          type: array
          items: { type: string }
      additionalProperties: false
    ErrorEnvelope:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              enum: [
                InvalidInput,
                PreconditionFailed,
                NotFound,
                Conflict,
                QuotaExceeded,
                Unauthorized,
                Forbidden,
                Transient,
                Internal
              ]
            message: { type: string }
            details: { type: object }
            trace_id: { type: string }
            run_id: { type: string }
          required: [code, message]
          additionalProperties: true
      required: [error]
      additionalProperties: false

    # FlowKit Schemas
    FlowRunRequest:
      type: object
      description: Request payload for executing a FlowKit flow.
      properties:
        runId:
          type: string
          description: Client-provided run identifier for correlation.
        flowName:
          type: string
          description: Identifier of the flow to execute (e.g., "architecture_assessment", "docs_glossary").
          pattern: "^[a-z][a-z0-9_]*$"
        canonicalPromptPath:
          type: string
          description: Path to the canonical prompt markdown file (relative to workspace root).
        workflowManifestPath:
          type: string
          description: Path to the YAML workflow manifest.
        workflowEntrypoint:
          type: string
          description: Optional node ID to use as entrypoint (defaults to first step in manifest).
        workspaceRoot:
          type: string
          description: Workspace root for resolving relative paths (defaults to ".").
        params:
          type: object
          description: Optional flow-specific parameters.
          additionalProperties: true
      required: [runId, flowName, canonicalPromptPath, workflowManifestPath]
      additionalProperties: false

    FlowRunResponse:
      type: object
      description: Response from a FlowKit flow execution.
      properties:
        result:
          description: Flow-specific result payload (e.g., AlignmentReport, GlossaryReport).
        metadata:
          type: object
          description: Execution metadata for correlation and debugging.
          properties:
            flowName: { type: string }
            workflowManifestPath: { type: string }
            canonicalPromptPath: { type: string }
            repoRoot: { type: string }
          additionalProperties: true
        runtimeRunId:
          type: string
          description: Runtime-assigned run identifier.
        artifacts:
          type: array
          description: Paths to artifacts produced by the flow.
          items: { type: string }
      required: [result, metadata, runtimeRunId]
      additionalProperties: false
