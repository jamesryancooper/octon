version: 1
suite: Harmony-Docs-Glossary
description: >
  Extracts the most referenced Harmony documentation terms and emits a normalized glossary report.

canonical_prompt_path: assessment/glossary/docs-glossary.md

defaults:
  runner:
    model: gpt-5-mini
    temperature: 0
    max_tokens: 2000

glossary:
  docs_path: docs/harmony
  max_terms: 25
  min_term_length: 4

steps:
  - id: docs-glossary-collect
    name: Docs Glossary – Collect Terms
    prompt_path: assessment/glossary/actions/collect_terms.md
    meta:
      type: assessment
      mode: action
      action: collect_terms
      subject: glossary
      step_index: 1

  - id: docs-glossary-summarize
    name: Docs Glossary – Summarize
    depends_on: [docs-glossary-collect]
    prompt_path: assessment/glossary/actions/summarize_glossary.md
    meta:
      type: assessment
      mode: action
      action: summarize_glossary
      subject: glossary
      step_index: 2


