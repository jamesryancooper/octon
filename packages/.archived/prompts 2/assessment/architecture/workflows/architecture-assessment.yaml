version: 1
suite: Harmony-Architecture-Assessment-Actions
description: >
  Orchestrates the Harmony Architecture assessment as a sequence of action-specific prompts.

canonical_prompt_path: assessment/architecture/architecture-assessment.md

defaults:
  runner:
    model: gpt-5-thinking
    temperature: 0.2
    max_tokens: 8000

assessment:
  docs_path: docs/harmony/architecture
  expected_files:
    - docs/harmony/architecture/overview.md
    - docs/harmony/architecture/repository-blueprint.md
    - docs/harmony/architecture/monorepo-layout.md
    - docs/harmony/architecture/governance-model.md
    - docs/harmony/architecture/runtime-policy.md
    - docs/harmony/architecture/observability-requirements.md
    - docs/harmony/architecture/knowledge-plane.md
    - docs/harmony/architecture/kaizen-subsystem.md
    - docs/harmony/architecture/tooling-integration.md
    - docs/harmony/architecture/slices-vs-layers.md
  expected_cross_refs:
    docs/harmony/architecture/overview.md:
      - docs/harmony/architecture/repository-blueprint.md
      - docs/harmony/architecture/monorepo-layout.md
      - docs/harmony/architecture/governance-model.md
      - docs/harmony/architecture/runtime-policy.md
      - docs/harmony/architecture/observability-requirements.md
      - docs/harmony/architecture/knowledge-plane.md
      - docs/harmony/architecture/kaizen-subsystem.md
      - docs/harmony/architecture/tooling-integration.md
      - docs/harmony/architecture/slices-vs-layers.md
  thresholds:
    min_alignment_score_for_no_update: 90

steps:
  - id: architecture-inventory
    name: Architecture – Inventory
    prompt_path: assessment/architecture/actions/inventory.md
    meta:
      type: assessment
      mode: action
      action: inventory
      subject: architecture
      step_index: 1

  - id: architecture-analyze
    name: Architecture – Analyze
    depends_on: [architecture-inventory]
    prompt_path: assessment/architecture/actions/analyze.md
    meta:
      type: assessment
      mode: action
      action: analyze
      subject: architecture
      step_index: 2

  - id: architecture-map
    name: Architecture – Map
    depends_on: [architecture-analyze]
    prompt_path: assessment/architecture/actions/map.md
    meta:
      type: assessment
      mode: action
      action: map
      subject: architecture
      step_index: 3

  - id: architecture-detect-issues
    name: Architecture – Detect Issues
    depends_on: [architecture-map]
    prompt_path: assessment/architecture/actions/detect_issues.md
    meta:
      type: assessment
      mode: action
      action: detect_issues
      subject: architecture
      step_index: 4

  - id: architecture-align
    name: Architecture – Align
    depends_on: [architecture-detect-issues]
    prompt_path: assessment/architecture/actions/align.md
    meta:
      type: assessment
      mode: action
      action: align
      subject: architecture
      step_index: 5

  - id: architecture-edit
    name: Architecture – Edit
    depends_on: [architecture-align]
    prompt_path: assessment/architecture/actions/edit.md
    meta:
      type: assessment
      mode: action
      action: edit
      subject: architecture
      step_index: 6

  - id: architecture-validate
    name: Architecture – Validate
    depends_on: [architecture-edit]
    prompt_path: assessment/architecture/actions/validate.md
    meta:
      type: assessment
      mode: action
      action: validate
      subject: architecture
      step_index: 7

  - id: architecture-summarize
    name: Architecture – Summarize
    depends_on: [architecture-validate]
    prompt_path: assessment/architecture/actions/summarize.md
    meta:
      type: assessment
      mode: action
      action: summarize
      subject: architecture
      step_index: 8

  - id: architecture-declare-no-update
    name: Architecture – Declare No Update
    depends_on: [architecture-summarize]
    prompt_path: assessment/architecture/actions/declare_no_update.md
    meta:
      type: assessment
      mode: action
      action: declare_no_update
      subject: architecture
      step_index: 9
