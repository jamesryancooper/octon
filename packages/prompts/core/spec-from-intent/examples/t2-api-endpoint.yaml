# Example: T2 Spec for a new API endpoint
# This demonstrates the standard spec format for typical features

input:
  intent: "Add a GET /api/users/:id endpoint that returns user profile information including name, avatar, and bio. The endpoint should require authentication and not expose email or phone."
  tier: T2
  context:
    relevant_files:
      - path: "apps/api/src/routes/users.ts"
        summary: "Existing user routes - has list and create"
      - path: "packages/domain/src/user.ts"
        summary: "User domain model"
    patterns:
      - "hexagonal"
      - "repository-pattern"

output:
  title: "Add user profile endpoint"
  tier: T2
  description: |
    Add a new GET /api/users/:id endpoint that returns public profile information
    for a specific user. The endpoint requires authentication to prevent enumeration
    attacks but returns only public fields (name, avatar, bio) rather than sensitive
    information (email, phone, etc.).
    
    This follows the existing patterns in users.ts and uses the UserRepository
    for data access.
    
  surfaces:
    - api
    
  contracts:
    - path: "/api/users/:id"
      method: GET
      request_schema: null
      response_schema: UserProfile
      
  threat_summary: |
    Primary risks are IDOR (accessing other users' profiles) and information 
    disclosure (leaking sensitive fields). Mitigated by requiring authentication
    and returning only public fields. Rate limiting prevents enumeration.
    
  tests:
    unit: 4
    contract: 1
    e2e: 1
    
  flag: "feature.users.profile-endpoint"
  
  rollback: "Disable feature flag; endpoint returns 404. Promote prior preview if needed."

# Validation notes:
# - Surfaces correctly identifies this as API-only change
# - Contract uses proper path format with parameter
# - Threat summary covers the main risks (IDOR, info disclosure)
# - Test counts are reasonable for scope
# - Flag follows naming convention
# - Rollback is specific and actionable

