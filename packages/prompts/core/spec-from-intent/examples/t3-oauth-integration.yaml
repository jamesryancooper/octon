# Example: T3 Spec for OAuth integration
# This demonstrates the full spec format for high-risk changes

input:
  intent: "Add Google OAuth login support with session management. Users should be able to sign in with Google and have a session created."
  tier: T3
  context:
    relevant_files:
      - path: "apps/api/src/routes/auth.ts"
        summary: "Existing auth routes - currently only email/password"
      - path: "packages/domain/src/session.ts"
        summary: "Session domain model"
    patterns:
      - "hexagonal"
      - "repository-pattern"
      - "adapter-pattern"

output:
  title: "Google OAuth Login Integration"
  tier: T3
  description: |
    Implement Google OAuth 2.0 authentication flow allowing users to sign in
    using their Google account. This includes:
    
    - OAuth authorization redirect endpoint
    - OAuth callback handler with token exchange
    - Session creation with secure cookie storage
    - Account linking for existing users with matching email
    - New user creation for first-time Google sign-ins
    
    Security is paramount: we must prevent CSRF, validate all tokens server-side,
    and ensure sessions cannot be hijacked or fixated.
    
  surfaces:
    - api
    - auth
    - data
    
  data_classification:
    - field: "google_access_token"
      classification: SECRET
      handling: encryption
    - field: "google_refresh_token"
      classification: SECRET
      handling: encryption
    - field: "session_token"
      classification: AUTH
      handling: encryption
    - field: "user_email"
      classification: PII
      handling: audit_log
      
  contracts:
    - path: "/api/auth/google"
      method: GET
      auth_required: false
      rate_limit: "10/minute"
      request_schema: null
      response_schema: "RedirectResponse"
      error_schemas:
        - "RateLimitError"
        
    - path: "/api/auth/google/callback"
      method: GET
      auth_required: false
      rate_limit: "10/minute"
      request_schema: "OAuthCallbackQuery"
      response_schema: "AuthSuccessResponse"
      error_schemas:
        - "OAuthError"
        - "InvalidStateError"
        - "TokenExchangeError"
        
  stride:
    spoofing:
      risks:
        - "Attacker could forge OAuth callback with fake tokens"
        - "CSRF attack during OAuth flow"
        - "Session token theft via XSS"
      mitigations:
        - "Validate all tokens server-side with Google API"
        - "Use state parameter with cryptographic nonce"
        - "HttpOnly, Secure, SameSite=Strict cookies"
      tests:
        - "Reject callback with invalid state parameter"
        - "Reject callback with invalid/expired Google token"
        - "Verify session cookie attributes"
        
    tampering:
      risks:
        - "Token modification in transit"
        - "Session data manipulation"
      mitigations:
        - "TLS for all communication"
        - "Signed session tokens (JWT or encrypted cookie)"
      tests:
        - "Reject modified session tokens"
        - "Verify TLS is required for all auth endpoints"
        
    repudiation:
      risks:
        - "User denies performing actions"
      mitigations:
        - "Audit log all auth events with timestamps and IPs"
      tests:
        - "Verify auth events are logged"
        - "Verify logs include required fields"
        
    information_disclosure:
      risks:
        - "Token leakage in logs"
        - "Error messages revealing system details"
        - "Token exposure in URL history"
      mitigations:
        - "Never log tokens or secrets"
        - "Generic error messages to clients"
        - "Use POST for token exchange"
      tests:
        - "Verify tokens are not in any logs"
        - "Verify error responses don't leak internals"
        
    denial_of_service:
      risks:
        - "Auth endpoint flooding"
        - "Resource exhaustion during token validation"
      mitigations:
        - "Rate limiting on auth endpoints"
        - "Timeout on external API calls"
      tests:
        - "Verify rate limits are enforced"
        - "Verify timeouts prevent hangs"
        
    elevation_of_privilege:
      risks:
        - "Account takeover via email matching"
        - "Session fixation attack"
        - "Privilege escalation after auth"
      mitigations:
        - "Require email verification for account linking"
        - "Regenerate session ID on login"
        - "Validate permissions on every request"
      tests:
        - "Verify session ID changes on login"
        - "Verify cannot link to unverified email"
        - "Verify role checks on protected endpoints"
        
  slos:
    availability: 99.9
    p95_latency_ms: 800
    error_rate: 0.5
    
  observability:
    spans:
      - "auth.google.redirect"
      - "auth.google.callback"
      - "auth.google.token_exchange"
      - "auth.session.create"
    metrics:
      - "auth.google.attempts"
      - "auth.google.success"
      - "auth.google.failures"
      - "auth.session.created"
    logs:
      - "auth.login.started"
      - "auth.login.success"
      - "auth.login.failure"
      - "auth.session.created"
      
  tests:
    unit: 12
    contract: 4
    e2e: 3
    golden: 2
    
  flag: "feature.auth.google-oauth"
  
  rollback:
    immediate: "Disable feature flag - Google login button hidden, endpoints return 404"
    full: "Disable flag + promote prior preview. Existing sessions remain valid."
    
  migration: null
  
  human_review:
    spec_approved: false
    spec_approved_by: null
    spec_approved_at: null

# Validation notes:
# - All STRIDE categories thoroughly analyzed
# - Data classification covers all sensitive fields
# - Contracts include rate limits and error schemas
# - SLOs are within standard budgets (800ms accounts for Google API latency)
# - Observability covers all key events
# - Test counts appropriate for security-critical feature
# - Rollback is detailed with immediate and full options
# - Human review checkpoint included

