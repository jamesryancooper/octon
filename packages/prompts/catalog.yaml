# Harmony Prompt Library Catalog
# This file serves as the single source of truth for all prompts in the library.
# AI agents use this to discover available prompts and their capabilities.

version: "1.0.0"
last_updated: "2025-01-15"

# Default settings for all prompts
defaults:
  temperature: 0.2
  max_tokens: 4096
  model_tier_mapping:
    T1: "gpt-4o-mini"
    T2_draft: "gpt-4o-mini"
    T2_final: "gpt-4o"
    T3: "gpt-4o"

# Core workflow prompts - used in primary development flows
core_prompts:
  spec-from-intent:
    name: "Spec from Intent"
    description: "Generate a complete specification from a natural language feature description"
    version: "1.0.0"
    status: stable
    category: planning
    path: "./core/spec-from-intent"
    input_schema: "./schemas/spec-from-intent.input.json"
    output_schema: "./schemas/spec-from-intent.output.json"
    tier_support: [T1, T2, T3]
    metrics:
      success_rate: null  # Populated after first 100 uses
      human_override_rate: null
      avg_tokens: null
    changelog:
      - version: "1.0.0"
        date: "2025-01-15"
        changes: "Initial release with tiered output support"

  plan-from-spec:
    name: "Plan from Spec"
    description: "Generate an implementation plan with ordered tasks from a validated specification"
    version: "1.0.0"
    status: stable
    category: planning
    path: "./core/plan-from-spec"
    input_schema: "./schemas/plan-from-spec.input.json"
    output_schema: "./schemas/plan-from-spec.output.json"
    tier_support: [T1, T2, T3]
    metrics:
      success_rate: null
      human_override_rate: null
      avg_tokens: null
    changelog:
      - version: "1.0.0"
        date: "2025-01-15"
        changes: "Initial release with hexagonal architecture patterns"

  code-from-plan:
    name: "Code from Plan"
    description: "Generate implementation code following a plan with tests and documentation"
    version: "1.0.0"
    status: stable
    category: implementation
    path: "./core/code-from-plan"
    input_schema: "./schemas/code-from-plan.input.json"
    output_schema: "./schemas/code-from-plan.output.json"
    tier_support: [T1, T2, T3]
    metrics:
      success_rate: null
      human_override_rate: null
      avg_tokens: null
    changelog:
      - version: "1.0.0"
        date: "2025-01-15"
        changes: "Initial release with TypeScript focus"

  test-from-contract:
    name: "Test from Contract"
    description: "Generate comprehensive tests from OpenAPI contracts and schemas"
    version: "1.0.0"
    status: stable
    category: verification
    path: "./core/test-from-contract"
    input_schema: "./schemas/test-from-contract.input.json"
    output_schema: "./schemas/test-from-contract.output.json"
    tier_support: [T1, T2, T3]
    metrics:
      success_rate: null
      human_override_rate: null
      avg_tokens: null
    changelog:
      - version: "1.0.0"
        date: "2025-01-15"
        changes: "Initial release with unit, contract, and e2e test generation"

  threat-model-from-spec:
    name: "Threat Model from Spec"
    description: "Generate STRIDE threat analysis with mitigations from a specification"
    version: "1.0.0"
    status: stable
    category: security
    path: "./core/threat-model-from-spec"
    input_schema: "./schemas/threat-model-from-spec.input.json"
    output_schema: "./schemas/threat-model-from-spec.output.json"
    tier_support: [T2, T3]  # Not needed for T1
    metrics:
      success_rate: null
      human_override_rate: null
      avg_tokens: null
    changelog:
      - version: "1.0.0"
        date: "2025-01-15"
        changes: "Initial release with OWASP ASVS mapping"

# Prompt categories for organization and discovery
categories:
  planning:
    description: "Prompts for specification and planning phases"
    prompts: [spec-from-intent, plan-from-spec]
  
  implementation:
    description: "Prompts for code generation and modification"
    prompts: [code-from-plan]
  
  verification:
    description: "Prompts for testing and validation"
    prompts: [test-from-contract]
  
  security:
    description: "Prompts for security analysis and threat modeling"
    prompts: [threat-model-from-spec]

# Validation rules for prompt outputs
validation:
  # All outputs must be valid JSON/YAML
  format: strict
  
  # Schema validation is required
  schema_validation: required
  
  # Hallucination checks to run on all code-generating prompts
  hallucination_checks:
    - verify_imports_exist
    - verify_functions_exist
    - verify_types_exist
    - verify_file_paths

# Quality gates for prompt library
quality_gates:
  # Minimum success rate before promoting a prompt
  min_success_rate: 0.90
  
  # Maximum acceptable human override rate
  max_override_rate: 0.15
  
  # Require golden tests for all stable prompts
  require_golden_tests: true
  
  # Minimum number of golden test cases per prompt
  min_golden_tests: 3

