# Skills Registry
# Catalog for progressive disclosure - read this first, load skills on demand
#
# Routing: Agents read this registry to route skill invocations.
# Progressive disclosure: Load skill definitions only when needed.

schema_version: "1.1"
default: null

# Global routing rules
routing:
  # If true, only explicit /commands trigger skills (no trigger matching)
  explicit_command_required: false
  # How to handle ambiguous matches: "ask" | "first_match" | "most_specific"
  ambiguity_resolution: "ask"

# Available skills
# Each entry provides enough info for routing without loading full skill.md
skills:
  - id: research-synthesizer
    name: Research Synthesizer
    path: research-synthesizer/
    version: "1.0.0"
    summary: "Synthesize scattered research notes into coherent findings."
    commands:
      - /synthesize-research
    explicit_call_patterns:
      - "use skill: research-synthesizer"
    triggers:
      - "synthesize my research"
      - "consolidate findings"
      - "summarize research notes"
    inputs:
      - path: ".scratch/projects/<project>/"
        type: folder
      - path: "sources/<topic>/"
        type: folder
    outputs:
      - path: "outputs/drafts/<topic>-synthesis.md"
        type: markdown
        format: markdown
        determinism: stable
    requires:
      tools:
        - filesystem.read
        - filesystem.write.outputs
    depends_on: []

# Common pipelines (skill chains)
# Pipelines define sequences of skills where outputs flow to inputs
pipelines:
  - id: research-synthesis
    name: Research Synthesis Pipeline
    description: "Synthesize research project findings"
    use_case: "When you have a research project ready for consolidation"
    steps:
      - research-synthesizer
    inputs:
      - ".scratch/projects/<project>/"
    outputs:
      - "outputs/drafts/<project>-synthesis.md"
    invocation: "/synthesize-research .scratch/projects/<project>/"

  # Future pipelines (uncomment when skills are added):
