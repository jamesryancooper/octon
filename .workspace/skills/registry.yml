# Skills Registry (Workspace-Specific)
# Extends .harmony/skills/registry.yml with workspace-specific I/O configuration.
#
# Single Source of Truth:
#   - .harmony/skills/registry.yml: version, commands, parameters, requires.tools
#   - This file: input/output paths for all skills
#
# This file defines:
# - Input/output paths for inherited skills (skill_mappings)
# - Extended metadata for workspace-specific skills (skills)
# - Workspace-specific pipelines
#
# For Tier 1 discovery (id, name, summary, triggers), see manifest.yml
#
# Directory Structure:
# All operational categories follow the {category}/{skill-id}/ pattern:
#
#   configs/{skill-id}/       - Per-skill configuration overrides
#   resources/{skill-id}/     - Per-skill input resources (notes, docs, data)
#   runs/{skill-id}/{run-id}/ - Execution state (checkpoints, manifests) for session recovery
#   logs/{skill-id}/{run-id}.md - Execution logs
#
# This artifact-centric organization provides:
#   - Bounded top-level (6 entries regardless of skill count)
#   - Efficient cross-skill queries (ls logs/, ls runs/)
#   - Declarative permissions (Write(runs/*), Write(logs/*))
#
# I/O Schema:
#   path         - File path (supports {{placeholders}})
#   kind         - file | directory (default: file)
#   format       - markdown | json | yaml | text | binary
#   required     - true | false (for inputs, default: true)
#   determinism  - stable (same input = same output) | variable | unique
#   description  - Human-readable description
#
# Output Types:
#   - Deliverables: Final products written to .workspace/{category}/
#   - Execution State: Checkpoints and manifests written to runs/{skill-id}/{run-id}/ for session recovery

schema_version: "1.3"
extends: "../../.harmony/skills/registry.yml"
default: null

# Project-specific input/output mappings for inherited skills
#
# Placeholder Syntax: Use {{snake_case}} for path placeholders
# See docs/architecture/workspaces/skills/execution.md#placeholder-resolution
skill_mappings:
  synthesize-research:
    inputs:
      - path: "resources/synthesize-research/projects/{{project}}/"
        kind: directory
        required: true
        description: "Project folder containing research notes"
      - path: "resources/synthesize-research/{{topic}}/"
        kind: directory
        required: false
        description: "Additional source materials by topic"
    outputs:
      - name: synthesis_document
        path: "../../drafts/{{topic}}-synthesis.md"
        kind: file
        format: markdown
        determinism: stable
        description: "Consolidated findings document with themes and evidence"
      - name: run_log
        path: "logs/synthesize-research/{{run_id}}.md"
        kind: file
        format: markdown
        determinism: unique
        description: "Execution log capturing inputs, outputs, and processing notes"
      - name: log_index
        path: "logs/synthesize-research/index.yml"
        kind: file
        format: yaml
        determinism: variable
        description: "Index of all synthesize-research runs with metadata"
      - name: top_log_index
        path: "logs/index.yml"
        kind: file
        format: yaml
        determinism: variable
        description: "Top-level log index (cross-skill)"

  refine-prompt:
    inputs:
      - path: "resources/refine-prompt/prompts/"
        kind: directory
        required: false
        description: "Optional folder containing prompt source files"
    outputs:
      - name: refined_prompt
        path: "../../prompts/{{timestamp}}-refined.md"
        kind: file
        format: markdown
        determinism: stable
        description: "The refined, improved prompt ready for execution"
      - name: run_log
        path: "logs/refine-prompt/{{run_id}}.md"
        kind: file
        format: markdown
        determinism: unique
        description: "Execution log with input, context analyzed, and output summary"
      - name: log_index
        path: "logs/refine-prompt/index.yml"
        kind: file
        format: yaml
        determinism: variable
        description: "Index of all refine-prompt runs with metadata"
      - name: top_log_index
        path: "logs/index.yml"
        kind: file
        format: yaml
        determinism: variable
        description: "Top-level log index (cross-skill)"

  refactor:
    inputs: []
    outputs:
      - name: refactor_artifacts
        path: "runs/refactor/{{refactor_id}}/"
        kind: directory
        format: markdown
        determinism: unique
        description: "Refactor execution state (checkpoint, manifests, reports) for session recovery"
      - name: run_log
        path: "logs/refactor/{{refactor_id}}.md"
        kind: file
        format: markdown
        determinism: unique
        description: "Execution log for this refactor run"
      - name: log_index
        path: "logs/refactor/index.yml"
        kind: file
        format: yaml
        determinism: variable
        description: "Index of all refactor runs with metadata"
      - name: top_log_index
        path: "logs/index.yml"
        kind: file
        format: yaml
        determinism: variable
        description: "Top-level log index (cross-skill)"

  create-skill:
    inputs: []
    outputs:
      - name: skill_directory
        path: "../.harmony/skills/{{skill_name}}/"
        kind: directory
        description: "The created skill directory (deliverable)"
      - name: scaffold_artifacts
        path: "runs/create-skill/{{run_id}}/"
        kind: directory
        format: yaml
        determinism: unique
        description: "Execution state (checkpoint and summary) for session recovery"
      - name: run_log
        path: "logs/create-skill/{{run_id}}.md"
        kind: file
        format: markdown
        determinism: unique
        description: "Execution log for this skill creation"
      - name: skill_log_index
        path: "logs/create-skill/index.yml"
        kind: file
        format: yaml
        determinism: variable
        description: "Index of all create-skill runs with metadata"
      - name: top_log_index
        path: "logs/index.yml"
        kind: file
        format: yaml
        determinism: variable
        description: "Top-level log index (cross-skill)"

# Project-specific skills (not in .harmony/)
skills: []

# Project-specific pipelines
pipelines:
  - id: research-synthesis
    name: Research Synthesis Pipeline
    description: "Synthesize project findings"
    use_case: "When you have a project ready for consolidation"
    steps:
      - synthesize-research
    inputs:
      - path: "resources/synthesize-research/projects/{{project}}/"
        kind: directory
    outputs:
      - path: "../../drafts/{{project}}-synthesis.md"
        kind: file
        format: markdown
    invocation: "/synthesize-research resources/synthesize-research/projects/{{project}}/"

