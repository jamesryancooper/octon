schema_version: proposal-v1
proposal_id: continuous-stewardship-runtime-v3
title: Continuous Stewardship Runtime v3 for Long-Running Drop-In Governed Autonomy
summary: >-
  Defines the v3 stewardship layer that lets Octon remain available over time
  without creating an infinite agent loop. The proposal introduces Stewardship
  Programs, finite Stewardship Epochs, event-driven triggers, admission and idle
  decisions, renewal decisions, a stewardship ledger, stewardship-level evidence,
  stewardship-aware Decision Requests, and optional campaign coordination hooks.
