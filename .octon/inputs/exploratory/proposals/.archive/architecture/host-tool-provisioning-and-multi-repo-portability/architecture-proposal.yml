implementation_motion: >-
  Add a framework-owned host-tool contract family plus a repo-owned desired
  requirements surface; route actual installs into a host-scoped Octon home
  cache; add a provisioning command and validator; then integrate repo-hygiene
  as the first governed consumer.
validation_motion: >-
  Validate the packet itself, validate structural wiring for host-tool
  governance, prove multi-repo shared-cache semantics in tests, and require
  repo-hygiene to resolve its mandatory external tools through the new
  subsystem rather than through ad hoc temp installs.
