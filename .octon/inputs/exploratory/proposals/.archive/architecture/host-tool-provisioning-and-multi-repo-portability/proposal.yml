schema_version: "proposal-v1"
proposal_id: "host-tool-provisioning-and-multi-repo-portability"
title: "Host-Tool Provisioning and Multi-Repo Portability"
summary: >-
  Establish a portable Octon architecture for host-scoped external tool
  provisioning that keeps repo authority inside /.octon/, keeps OS- and
  machine-specific binaries outside the repo, supports multiple Octon-enabled
  repositories on one system, and integrates deterministic tool resolution
  into repo commands such as repo-hygiene without relying on ad hoc /tmp
  installs.
proposal_kind: "architecture"
promotion_scope: "octon-internal"
promotion_targets:
