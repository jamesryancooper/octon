proposal_id: "repository-hygiene-and-retirement"
title: "Repository Hygiene and Transitional-Surface Retirement"
summary: >-
  Establish an Octon-native repository-hygiene capability family for the live
  Rust + Shell repository: detect static deadness, dependency deadness, shell
  orphaning, stale generated outputs, and transitional residue; route
  destructive outcomes through the existing build-to-delete retirement spine;
  and add command, policy, evidence, and validation surfaces without widening
  support scope or creating a second control plane.
