schema_version: "proposal-v1"
proposal_id: "self-audit-and-release-hardening"
title: "Self-Audit And Release Hardening"
summary: >
  Realign Octon's self-checks and release chain with the five-class super-root by
  eliminating validator path drift, classifying authoritative Markdown as
  safety-significant input, extending dependency/update hygiene beyond GitHub
  Actions, requiring immutable action pins for high-trust workflows, and making
  runtime target support explicit and machine-validated.
proposal_kind: "architecture"
