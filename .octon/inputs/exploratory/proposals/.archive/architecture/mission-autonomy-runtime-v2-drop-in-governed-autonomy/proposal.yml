schema_version: proposal-v1
proposal_id: mission-autonomy-runtime-v2-drop-in-governed-autonomy
title: Mission Autonomy Runtime v2 for Full Drop-In Governed Autonomy
summary: >-
  Defines the v2 mission-scoped continuation runtime that consumes a v1
  Engagement / Project Profile / Work Package compiler output and safely
  continues work across bounded governed runs under an Autonomy Window,
  mission-control lease, budget, circuit breakers, support posture, capability
  posture, context freshness, rollback posture, evidence requirements, and
  Decision Request gates.
