schema_version: proposal-v1
proposal_id: octon-execution-role-hard-cutover
title: "Octon Execution Role Hard Cutover"
summary: >-
  Big-bang architecture proposal packet that replaces Octon's legacy agency
  ontology with a frontier-governance execution-role subsystem. The target
  removes canonical agent, assistant, team, actor, persona, and durable subagent
  surfaces; promotes execution role as the canonical agency-facing noun; keeps
  run-contract as the atomic consequential execution unit; and hardens context
  packs, support-target tuples, capability packs, runtime authorization,
  browser/API proof, rollback, replay, intervention, and evidence closure.
