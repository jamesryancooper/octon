proposal_id: "governance-validator-negative-controls"
title: "Governance Validator Negative Controls"
summary: >-
  Add cross-domain validators and negative controls for delegated governance:
  no approval defaults, no dispatch without proof, no generated authority, and
  fail-closed behavior for stale or mismatched evidence.
