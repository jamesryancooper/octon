schema_version: "architecture-proposal-v1"
architecture_scope: "repo-architecture"
decision_type: "new-surface"
title: "Agent Node Model Call Contract"
target_state: >-
  Model calls can participate only as typed, finite, evidenced activity nodes inside a task-specific harness and workflow statechart; agents never own workflow state, policy, support claims, or closeout truth.
boundary_change: >-
  Agent-node schema, model-call receipt contract, context digest binding, allowed tools/connectors by reference, output schema validation, cost/budget posture, terminal states, and forbidden authority claims. This draft does not itself change runtime control, evidence,
  support, connector, or generated-output authority.
authoritative_targets_after_promotion:
  - ".octon/framework/engine/runtime/spec/"
  - ".octon/framework/constitution/contracts/runtime/"
  - ".octon/instance/governance/policies/"
  - ".octon/framework/assurance/runtime/_ops/scripts/"
proposal_local_authority:
  - "proposal.yml"
  - "architecture-proposal.yml"
  - "architecture/target-architecture.md"
  - "architecture/implementation-plan.md"
  - "architecture/acceptance-criteria.md"
non_authoritative_supporting_artifacts:
