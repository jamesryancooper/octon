schema_version: "architecture-proposal-v1"
proposal_id: octon-unified-execution-constitution-cutover
proposal_kind: architecture
architecture_scope: "cross-domain-architecture"
scope_areas:
  - constitutional-kernel
  - objective-layer
  - authority-engine
  - runtime-normalization
  - proof-plane-expansion
  - lab-domain
  - disclosure-and-replay
  - support-targets
  - simplification-and-retirement
decision_type: "boundary-change"
problem_statement: >-
  Octon already implements a strong repository constitution, typed execution boundary,
  mission-scoped autonomy policy, and retained control/evidence roots, but it still
  contains transitional mission-first assumptions, host-shaped approval glue,
  incomplete run normalization, uneven proof planes, and incomplete disclosure/replay
  enforcement. Those gaps prevent a valid claim that Octon is a fully unified execution
  constitution.
architectural_thesis: >-
  Octon should preserve its class-root super-root and engine-owned execution spine while
  extracting a supreme constitutional kernel, making run contracts the atomic unit of
  material execution, centralizing authority in first-class artifacts and route evaluation,
  normalizing runtime around replayable run bundles, introducing a first-class lab domain,
  publishing explicit support targets, and simplifying the agency kernel around real
  boundary value.
implementation_posture: >-
  This packet optimizes for the best target-state-correct architecture needed to
  reach the unified execution constitution. It must not preserve transitional
  structure or choose a smaller diff when doing so would weaken, delay, or
  distort the intended end-state architecture.
required_outcomes:
  - one constitutional kernel with explicit normative and epistemic precedence
  - workspace charter + mission charter + run contract + execution attempt/stage model
  - host-agnostic authority artifacts and routing
  - event-sourced or equivalently durable run lifecycle
  - multi-plane proof across structural, functional, behavioral, governance, and recovery
  - mandatory RunCard and HarnessCard disclosure
  - explicit evidence retention classes and external replay path
  - explicit support-target matrix with fail-closed unsupported handling
  - build-to-delete retirement discipline
acceptance_gate: >-
  Octon may claim to be a fully unified execution constitution only when every
  consequential execution path is run-bound, authority-routed, proof-backed,
  replayable, disclosed, and governed without relying on host-native authority or
  transitional constitutional surfaces.
