  exit_expectation: >-
    Promote only after the lifecycle discovery bug, validator shell portability
    gap, fallback evidence contract, and support-claim documentation have
    implementation receipts, negative tests, registry synchronization evidence,
    and durable promotion evidence outside proposal-local inputs. Otherwise
    revise, reject, supersede, or archive this packet.
related_proposals:
