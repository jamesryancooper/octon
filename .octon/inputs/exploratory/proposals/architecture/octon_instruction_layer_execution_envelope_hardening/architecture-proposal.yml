packet_id: octon_instruction_layer_execution_envelope_hardening
architecture_target: >
  Refine existing instruction-layer, engine runtime, capability-pack, and
  validator surfaces so the repo emits complete provenance and normalized
  capability / output-envelope semantics without creating new top-level control
  planes.
claim_posture:
  mode: refinement_only
  support_widening: forbidden
  rationale: >
    The packet improves existing admitted capability surfaces and evidence
    quality. It does not widen host adapters, model adapters, locales, or
    workload tiers.
coverage_summary:
  instruction_layer_provenance:
    current_status: partially_covered
    final_motion: adapt
  capability_invocation_output_envelope:
    current_status: partially_covered
    final_motion: adapt
non_negotiables:
  - No second authoritative control plane
  - No generated or proposal-local truth
  - No raw inputs as runtime or policy truth
  - No bypass of the engine-owned authorization boundary
  - No support-target widening without explicit admission, evidence, and disclosure work
top_authority_surfaces:
  - .octon/framework/cognition/_meta/architecture/specification.md
  - .octon/framework/constitution/contracts/runtime/instruction-layer-manifest-v2.schema.json
  - .octon/framework/engine/runtime/spec/execution-request-v2.schema.json
  - .octon/framework/engine/runtime/spec/execution-grant-v1.schema.json
  - .octon/framework/engine/runtime/spec/execution-receipt-v2.schema.json
  - .octon/framework/capabilities/packs/shell/manifest.yml
  - .octon/framework/capabilities/packs/repo/manifest.yml
  - .octon/instance/governance/policies/repo-shell-execution-classes.yml
  - .octon/instance/agency/runtime/tool-output-budgets.yml
blocking_gaps:
  - Existing instruction-layer manifests do not yet bind full capability / class / envelope disclosure.
  - Existing request / grant / receipt path does not yet guarantee normalized pack-to-envelope traceability.
  - No dedicated validator currently closes these gaps end to end.
implementation_motion:
  primary: extension_refinement_of_existing_canonical_surfaces
  secondary: overlay_scoped_repo_specific_augmentation
  avoided:
    - new control-plane family
    - broad constitutional rewrite
    - support-target expansion
validation_motion:
  - schema refinement
  - validator addition
  - CI workflow extension
  - receipt and evidence coherence checks
  - two consecutive clean passes for closure
