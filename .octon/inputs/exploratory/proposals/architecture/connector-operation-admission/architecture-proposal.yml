schema_version: "architecture-proposal-v1"
architecture_scope: "repo-architecture"
decision_type: "boundary-change"
title: "Connector Operation Admission"
target_state: >-
  Connector operations can execute only when support posture, operation admission, effect token verification, evidence retention, and trust posture agree; protocol/tool discovery remains input only.
boundary_change: >-
  Operation-level connector admission records, trust dossiers, support-target binding, effect-token binding, invocation receipts, denial reasons, and validators. This draft does not itself change runtime control, evidence,
  support, connector, or generated-output authority.
authoritative_targets_after_promotion:
  - ".octon/instance/governance/connector-admissions/"
  - ".octon/instance/governance/connectors/"
  - ".octon/framework/constitution/contracts/adapters/"
  - ".octon/framework/assurance/runtime/_ops/scripts/"
proposal_local_authority:
  - "proposal.yml"
  - "architecture-proposal.yml"
  - "architecture/target-architecture.md"
  - "architecture/implementation-plan.md"
  - "architecture/acceptance-criteria.md"
non_authoritative_supporting_artifacts:
  - "README.md"
  - "navigation/**"
  - "resources/**"
  - "support/**"
  - "RISK-REGISTER.md"
  - "validation-plan.md"
  - "NON-GOALS.md"
  - "PACKET_MANIFEST.md"
