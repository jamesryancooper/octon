schema_version: "proposal-v1"
proposal_id: "repo-instance-architecture"
title: "Repo-Instance Authoritative Layer"
summary: "Formalize `/.octon/instance/**` as the repo-specific durable authoritative layer, ratify `instance/manifest.yml`, `instance/ingress/AGENTS.md`, and `instance/extensions.yml` as canonical instance control surfaces, and define the boundary, validation, update, and portability rules that keep repo-owned authority separate from framework, raw inputs, mutable state, and generated outputs."
proposal_kind: "architecture"
promotion_scope: "octon-internal"
promotion_targets:
  - ".octon/README.md"
  - ".octon/octon.yml"
  - ".octon/instance/manifest.yml"
  - ".octon/instance/ingress/AGENTS.md"
  - ".octon/instance/bootstrap/"
  - ".octon/instance/locality/"
  - ".octon/instance/cognition/"
  - ".octon/instance/capabilities/runtime/"
  - ".octon/instance/orchestration/"
  - ".octon/instance/extensions.yml"
  - ".octon/framework/cognition/_meta/architecture/specification.md"
  - ".octon/framework/cognition/_meta/architecture/shared-foundation.md"
  - ".octon/framework/assurance/runtime/"
  - ".octon/framework/orchestration/runtime/workflows/"
status: "implemented"
lifecycle:
  temporary: true
  exit_expectation: "Promote the repo-instance boundary, companion-manifest requirements, canonical ingress placement, desired extension configuration rules, and fail-closed validation/update semantics into durable `.octon/` architecture, documentation, assurance, and workflow surfaces, then archive this proposal once canonical repo-owned authority no longer depends on transitional mixed placement assumptions."
related_proposals:
  - "super-root-semantics-and-taxonomy"
  - "root-manifest-profiles-and-export-semantics"
  - "framework-core-architecture"
