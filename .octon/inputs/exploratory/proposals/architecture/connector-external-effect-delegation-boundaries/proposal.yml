  - ".octon/framework/assurance/runtime/_ops/tests/"
status: "accepted"
lifecycle:
  temporary: true
  exit_expectation: >-
    Implement only after shared contract evidence and retained connector
    validation, conformance, drift/churn, and promotion receipts.
related_proposals:
  - "octon-wide-delegated-governance-migration"
  - "delegated-governance-shared-contract-model"
program_parent: "octon-wide-delegated-governance-migration"
