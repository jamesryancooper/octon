schema_version: "proposal-v1"
proposal_id: "connector-external-effect-delegation-boundaries"
title: "Connector External Effect Delegation Boundaries"
summary: >-
  Define connector and external-effect delegation boundaries, preserving human
  authority for irreversible effects unless token, rollback, compensation, and
  irreversibility proof are explicit.
