schema_version: "octon-extension-prompt-set-v1"
prompt_set_id: "octon-concept-integration-subsystem-targeted-integration"
version: "2.0.0"
stages:
  - stage_id: "scope-subsystem"
    prompt_id: "octon-concept-integration-subsystem-targeted-integration-scope"
    path: "stages/01-scope-subsystem.md"
    role_class: "stage"
    order: 1
  - stage_id: "extract-subsystem-concepts"
    prompt_id: "octon-concept-integration-subsystem-targeted-integration-extract"
    path: "stages/02-extract-subsystem-concepts.md"
    role_class: "stage"
    order: 2
  - stage_id: "verify-subsystem-fit"
    prompt_id: "octon-concept-integration-subsystem-targeted-integration-verify"
    path: "stages/03-verify-subsystem-fit.md"
    role_class: "stage"
    order: 3
  - stage_id: "build-subsystem-packet"
    prompt_id: "octon-concept-integration-subsystem-targeted-integration-build-packet"
    path: "stages/04-build-subsystem-packet.md"
    role_class: "stage"
    order: 4
companions:
  - prompt_id: "octon-concept-integration-subsystem-targeted-integration-align-bundle"
    path: "companions/01-align-bundle.md"
    role_class: "maintenance-companion"
references:
  - ref_id: "bundle-contract"
    path: "references/bundle-contract.md"
shared_references:
  - ref_id: "repository-grounding"
    path: "shared/repository-grounding.md"
  - ref_id: "managed-artifact-contract"
    path: "shared/managed-artifact-contract.md"
  - ref_id: "alignment-mode-contract"
    path: "shared/alignment-mode-contract.md"
  - ref_id: "architecture-packet-contract"
    path: "shared/architecture-packet-contract.md"
  - ref_id: "packet-execution-contract"
    path: "shared/packet-execution-contract.md"
required_repo_anchors:
  - "README.md"
  - ".octon/README.md"
  - ".octon/instance/ingress/AGENTS.md"
  - ".octon/framework/constitution/CHARTER.md"
  - ".octon/framework/constitution/charter.yml"
  - ".octon/framework/constitution/precedence/normative.yml"
  - ".octon/framework/constitution/precedence/epistemic.yml"
  - ".octon/framework/constitution/obligations/fail-closed.yml"
  - ".octon/framework/constitution/obligations/evidence.yml"
  - ".octon/framework/constitution/ownership/roles.yml"
  - ".octon/framework/constitution/contracts/registry.yml"
  - ".octon/instance/charter/workspace.md"
  - ".octon/instance/charter/workspace.yml"
  - ".octon/framework/cognition/_meta/architecture/specification.md"
alignment_policy:
  default_mode: "auto"
  stale_behavior: "realign_or_fail_closed"
  skip_mode_policy: "degraded-retained-explicit"
  receipt_root: ".octon/state/evidence/validation/extensions/prompt-alignment"
invalidation_conditions:
  - "prompt-manifest-sha-changed"
  - "prompt-asset-sha-changed"
  - "required-anchor-sha-changed"
  - "extension-desired-config-sha-changed"
  - "root-manifest-sha-changed"
artifact_policy:
  internal_artifacts:
    - "source-artifact"
    - "concept-extraction-output"
    - "concept-verification-output"
    - "selected-concepts"
    - "proposal-packet-path"
    - "executable-implementation-prompt"
  packet_support_files:
    - "support/source-artifact.md"
    - "support/concept-extraction-output.md"
    - "support/concept-verification-output.md"
    - "support/executable-implementation-prompt.md"
