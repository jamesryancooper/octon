schema_version: "extensions-commands-fragment-v1"
commands:
  - id: octon-proposal
    display_name: "Octon Proposal Lifecycle"
    path: octon-proposal.md
    summary: "Resolve the appropriate proposal lifecycle route for packet or program targets and dispatch to the matching leaf bundle."
    access: agent
    argument_hint: "[--bundle <route-id>] [--lifecycle-action <route-id>] [--packet-path <path>] [--program-packet-path <path>] [--source-kind <kind>] [--finding-id <id>] [--dry-run-route true|false]"
  - id: octon-proposal-create-packet
    display_name: "Octon Proposal Lifecycle: Create Packet"
    path: octon-proposal-create-packet.md
    summary: "Create a manifest-governed proposal packet from source context."
    access: agent
    argument_hint: "<source> [--proposal-kind architecture|policy|migration|design] [--proposal-id <id>]"
  - id: octon-proposal-explain-packet
    display_name: "Octon Proposal Lifecycle: Explain Packet"
    path: octon-proposal-explain-packet.md
    summary: "Explain a proposal packet without widening its scope or authority."
    access: agent
    argument_hint: "<packet-path>"
  - id: octon-proposal-review-packet
    display_name: "Octon Proposal Lifecycle: Review Packet"
    path: octon-proposal-review-packet.md
    summary: "Review a proposal packet and record the review verdict receipt."
    access: agent
    argument_hint: "<packet-path>"
  - id: octon-proposal-revise-packet
    display_name: "Octon Proposal Lifecycle: Revise Packet"
    path: octon-proposal-revise-packet.md
    summary: "Apply packet-local revisions for review findings and record the revision receipt."
    access: agent
    argument_hint: "<packet-path> [--review-id <id>] [--finding-id <id>]"
  - id: octon-proposal-generate-packet-implementation-prompt
    display_name: "Octon Proposal Lifecycle: Generate Packet Implementation Prompt"
    path: octon-proposal-generate-packet-implementation-prompt.md
    summary: "Generate a packet-specific executable implementation prompt."
    access: agent
    argument_hint: "<packet-path>"
  - id: octon-proposal-run-packet-implementation
    display_name: "Octon Proposal Lifecycle: Run Packet Implementation"
    path: octon-proposal-run-packet-implementation.md
    summary: "Run implementation for one proposal packet from its executable implementation prompt."
    access: agent
    argument_hint: "<packet-path>"
  - id: octon-proposal-generate-packet-verification-prompt
    display_name: "Octon Proposal Lifecycle: Generate Packet Verification Prompt"
    path: octon-proposal-generate-packet-verification-prompt.md
    summary: "Generate a packet-specific follow-up verification prompt."
    access: agent
    argument_hint: "<packet-path> [--implemented-state <summary>]"
  - id: octon-proposal-generate-packet-correction-prompt
    display_name: "Octon Proposal Lifecycle: Generate Packet Correction Prompt"
    path: octon-proposal-generate-packet-correction-prompt.md
    summary: "Generate a targeted correction prompt from one unresolved finding."
    access: agent
    argument_hint: "<packet-path> --finding-id <id>"
  - id: octon-proposal-run-packet-verification-and-correction-loop
    display_name: "Octon Proposal Lifecycle: Run Packet Verification And Correction Loop"
    path: octon-proposal-run-packet-verification-and-correction-loop.md
    summary: "Run packet verification and correction to a declared terminal state."
    access: agent
    argument_hint: "<packet-path>"
  - id: octon-proposal-generate-packet-closeout-prompt
    display_name: "Octon Proposal Lifecycle: Generate Packet Closeout Prompt"
    path: octon-proposal-generate-packet-closeout-prompt.md
    summary: "Generate a packet-specific closeout prompt."
    access: agent
    argument_hint: "<packet-path> [--closeout-scope local|pr|merge]"
  - id: octon-proposal-closeout-packet
    display_name: "Octon Proposal Lifecycle: Closeout Packet"
    path: octon-proposal-closeout-packet.md
    summary: "Execute gated closeout for one proposal packet."
    access: agent
    argument_hint: "<packet-path>"
  - id: octon-proposal-run-packet-lifecycle
    display_name: "Octon Proposal Lifecycle: Run Packet Lifecycle"
    path: octon-proposal-run-packet-lifecycle.md
    summary: "Run generic lifecycle orchestration for one proposal packet and emit route handoff evidence."
    access: agent
    argument_hint: "<packet-path> [--run-id <id>] [--executor auto|codex|claude|mock] [--max-iterations <n>]"
  - id: octon-proposal-create-program
    display_name: "Octon Proposal Lifecycle: Create Program"
    path: octon-proposal-create-program.md
    summary: "Create a parent proposal program coordinating canonical child packets."
    access: agent
    argument_hint: "<source> [--child-packet-paths <paths>] [--execution-mode <mode>]"
  - id: octon-proposal-explain-program
    display_name: "Octon Proposal Lifecycle: Explain Program"
    path: octon-proposal-explain-program.md
    summary: "Explain a parent proposal program without widening child authority."
    access: agent
    argument_hint: "<program-packet-path>"
  - id: octon-proposal-review-program
    display_name: "Octon Proposal Lifecycle: Review Program"
    path: octon-proposal-review-program.md
    summary: "Review parent proposal program coordination without changing child authority."
    access: agent
    argument_hint: "<program-packet-path>"
  - id: octon-proposal-revise-program
    display_name: "Octon Proposal Lifecycle: Revise Program"
    path: octon-proposal-revise-program.md
    summary: "Apply parent-local proposal program coordination revisions and record a revision receipt."
    access: agent
    argument_hint: "<program-packet-path> [--review-id <id>] [--finding-id <id>]"
  - id: octon-proposal-generate-program-implementation-prompt
    display_name: "Octon Proposal Lifecycle: Generate Program Implementation Prompt"
    path: octon-proposal-generate-program-implementation-prompt.md
    summary: "Generate aggregate implementation prompt for a proposal program."
    access: agent
    argument_hint: "<program-packet-path>"
  - id: octon-proposal-generate-program-verification-prompt
    display_name: "Octon Proposal Lifecycle: Generate Program Verification Prompt"
    path: octon-proposal-generate-program-verification-prompt.md
    summary: "Generate aggregate verification prompt for a proposal program."
    access: agent
    argument_hint: "<program-packet-path>"
  - id: octon-proposal-generate-program-correction-prompt
    display_name: "Octon Proposal Lifecycle: Generate Program Correction Prompt"
    path: octon-proposal-generate-program-correction-prompt.md
    summary: "Generate targeted correction prompt for a program-level or child finding."
    access: agent
    argument_hint: "<program-packet-path> --finding-id <id>"
  - id: octon-proposal-cleanup-lifecycle-residue
    display_name: "Octon Proposal Lifecycle: Cleanup Lifecycle Residue"
    path: octon-proposal-cleanup-lifecycle-residue.md
    summary: "Classify and close out safe residual worktree artifacts for a proposal program lifecycle run."
    access: agent
    argument_hint: "<program-packet-path> [--run-id <id>] [--blocked-child-id <id>] [--blocked-route-id <route-id>]"
  - id: octon-proposal-run-program-verification-and-correction-loop
    display_name: "Octon Proposal Lifecycle: Run Program Verification And Correction Loop"
    path: octon-proposal-run-program-verification-and-correction-loop.md
    summary: "Run program verification and correction to a declared terminal state."
    access: agent
    argument_hint: "<program-packet-path>"
  - id: octon-proposal-generate-program-closeout-prompt
    display_name: "Octon Proposal Lifecycle: Generate Program Closeout Prompt"
    path: octon-proposal-generate-program-closeout-prompt.md
    summary: "Generate closeout prompt for a coherent proposal program."
    access: agent
    argument_hint: "<program-packet-path>"
  - id: octon-proposal-closeout-program
    display_name: "Octon Proposal Lifecycle: Closeout Program"
    path: octon-proposal-closeout-program.md
    summary: "Execute gated closeout for a proposal program."
    access: agent
    argument_hint: "<program-packet-path>"
  - id: octon-proposal-run-program-lifecycle
    display_name: "Octon Proposal Lifecycle: Run Program Lifecycle"
    path: octon-proposal-run-program-lifecycle.md
    summary: "Run generic lifecycle orchestration for one proposal program and emit route handoff evidence."
    access: agent
    argument_hint: "<program-packet-path> [--run-id <id>] [--executor auto|codex|claude|mock] [--max-iterations <n>]"
