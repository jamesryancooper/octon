schema_version: "octon-extension-lifecycle-contract-v1"
lifecycle_id: "proposal-program"
owner_extension: "octon-proposal-lifecycle"
version: "1.0.0"
execution_strategy: "orchestrated-replan-loop"

target:
  input: "program_packet_path"
  manifest_path: "proposal.yml"
  status_field: "status"
  allowed_statuses:
    - "draft"
    - "in-review"
    - "accepted"
    - "rejected"
    - "implemented"
    - "archived"

program:
  child_registry_path: "resources/child-packet-index.yml"
  child_lifecycle_id_default: "proposal-packet"
  supported_execution_modes:
    - "sequential"
    - "parallel-independent"
    - "gated-parallel"
    - "approval-gated"
    - "program-atomic"
  atomic_policy:
    eligibility: "explicit-route-opt-in"
    require_declared_write_scopes: true
  recovery_policy:
    max_recovery_attempts: 2
    serialize_write_scope_conflicts: true
    handlers:
      stale-receipt:
        max_attempts: 2
        replan_after_attempt: true
      target-drift-explained:
        max_attempts: 1
        replan_after_attempt: true
      validation-failed:
        recovery_route_id: "generate-program-correction-prompt"
        max_attempts: 1
        replan_after_attempt: true
        human_required: false
      publication-drift:
        max_attempts: 1
        replan_after_attempt: true
      missing-evidence:
        max_attempts: 2
        replan_after_attempt: true
      executor-failed:
        max_attempts: 2
        replan_after_attempt: true
      executor-timed-out:
        max_attempts: 2
        replan_after_attempt: true
      executor-preflight-blocked:
        max_attempts: 0
        human_required: true
      unsupported-mode-config:
        max_attempts: 0
        human_required: true
      noncritical-artifact-cleanup:
        max_attempts: 1
        replan_after_attempt: true
      lifecycle-residue-cleanup-needed:
        recovery_route_id: "cleanup-lifecycle-residue"
        max_attempts: 1
        replan_after_attempt: true
        human_required: false
      authority-ambiguity:
        max_attempts: 0
        human_required: true
    recipes:
      - blocker_class: "stale-receipt"
        preconditions:
          - "live-state-readable"
          - "selected-route-present"
          - "receipt-stale"
        idempotency_class: "idempotent-rerun"
        human_required: false
        retry_budget: 2
        dependent_handling: "pause-dependent"
        post_attempt_validation:
          - "replan-live-state"
          - "receipt-freshness"
        replan_behavior: "after-attempt"
        allowed_authority_zones:
          - "workspace-declared"
        allowed_artifact_classes:
          - "workspace-source"
        operation_class: "retry-child-route"
        requires_declared_write_scope: true
        requires_zone_evidence: true
      - blocker_class: "target-drift-explained"
        recovery_action_id: "rebaseline-checkpoint"
        preconditions:
          - "live-state-readable"
          - "target-path-unchanged"
          - "write-scope-unchanged"
          - "current-run-child-owned-drift-evidence"
          - "authority-zone-allowed"
          - "run-bound-current"
        idempotency_class: "inspect-only"
        human_required: false
        retry_budget: 1
        dependent_handling: "pause-dependent"
        post_attempt_validation:
          - "replan-live-state"
          - "authority-boundary-check"
          - "replay-verify"
        replan_behavior: "after-attempt"
        allowed_authority_zones:
          - "octon-run-bound"
        allowed_artifact_classes:
          - "run-control"
          - "run-evidence"
        operation_class: "program-recovery-action"
        requires_run_binding: true
        requires_zone_evidence: true
      - blocker_class: "validation-failed"
        recovery_route_id: "generate-program-correction-prompt"
        preconditions:
          - "authority-zone-allowed"
          - "declared-write-scope-contained"
        idempotency_class: "approval-gated-mutation"
        human_required: false
        retry_budget: 1
        dependent_handling: "continue-independent"
        post_attempt_validation:
          - "replan-live-state"
        replan_behavior: "after-attempt"
        allowed_authority_zones:
          - "workspace-declared"
        allowed_artifact_classes:
          - "workspace-source"
        operation_class: "program-recovery-action"
        requires_declared_write_scope: true
        requires_zone_evidence: true
      - blocker_class: "publication-drift"
        recovery_action_id: "refresh-publication-projections"
        preconditions:
          - "authority-zone-allowed"
          - "generated-non-authority"
        idempotency_class: "idempotent-rerun"
        human_required: false
        retry_budget: 1
        dependent_handling: "pause-dependent"
        post_attempt_validation:
          - "replan-live-state"
          - "publication-freshness-cleared"
          - "replay-verify"
        replan_behavior: "after-attempt"
        allowed_authority_zones:
          - "octon-generated-derived"
        allowed_artifact_classes:
          - "generated-derived"
        operation_class: "refresh-generated-projection"
        requires_zone_evidence: true
      - blocker_class: "missing-evidence"
        preconditions:
          - "live-state-readable"
          - "selected-route-present"
          - "missing-evidence"
          - "authority-zone-allowed"
          - "declared-write-scope-contained"
        idempotency_class: "idempotent-rerun"
        human_required: false
        retry_budget: 2
        dependent_handling: "pause-dependent"
        post_attempt_validation:
          - "replan-live-state"
        replan_behavior: "after-attempt"
        allowed_authority_zones:
          - "workspace-declared"
        allowed_artifact_classes:
          - "workspace-source"
        operation_class: "retry-child-route"
        requires_declared_write_scope: true
        requires_zone_evidence: true
      - blocker_class: "executor-failed"
        preconditions:
          - "live-state-readable"
          - "selected-route-present"
          - "authority-zone-allowed"
          - "declared-write-scope-contained"
        idempotency_class: "bounded-retry"
        human_required: false
        retry_budget: 2
        dependent_handling: "continue-independent"
        post_attempt_validation:
          - "replan-live-state"
        replan_behavior: "after-attempt"
        allowed_authority_zones:
          - "workspace-declared"
        allowed_artifact_classes:
          - "workspace-source"
        operation_class: "retry-child-route"
        requires_declared_write_scope: true
        requires_zone_evidence: true
      - blocker_class: "executor-timed-out"
        preconditions:
          - "live-state-readable"
          - "selected-route-present"
          - "authority-zone-allowed"
          - "declared-write-scope-contained"
        idempotency_class: "bounded-retry"
        human_required: false
        retry_budget: 2
        dependent_handling: "continue-independent"
        post_attempt_validation:
          - "replan-live-state"
        replan_behavior: "after-attempt"
        allowed_authority_zones:
          - "workspace-declared"
        allowed_artifact_classes:
          - "workspace-source"
        operation_class: "retry-child-route"
        requires_declared_write_scope: true
        requires_zone_evidence: true
      - blocker_class: "noncritical-artifact-cleanup"
        recovery_action_id: "cleanup-current-run-artifacts"
        preconditions:
          - "live-state-readable"
          - "current-run-child-owned-drift-evidence"
          - "authority-zone-allowed"
          - "artifact-ownership-known"
          - "run-bound-current"
        idempotency_class: "idempotent"
        human_required: false
        retry_budget: 1
        dependent_handling: "continue-independent"
        post_attempt_validation:
          - "replan-live-state"
          - "authority-boundary-check"
        replan_behavior: "after-attempt"
        allowed_authority_zones:
          - "current-run-agent-artifact"
        allowed_artifact_classes:
          - "current-run-generated"
        operation_class: "cleanup-current-run-artifact"
        requires_run_binding: true
        requires_declared_write_scope: true
        requires_zone_evidence: true
      - blocker_class: "lifecycle-residue-cleanup-needed"
        recovery_route_id: "cleanup-lifecycle-residue"
        preconditions:
          - "live-state-readable"
          - "authority-zone-allowed"
          - "run-bound-current"
        idempotency_class: "idempotent-rerun"
        human_required: false
        retry_budget: 1
        dependent_handling: "continue-independent"
        post_attempt_validation:
          - "replan-live-state"
          - "authority-boundary-check"
        replan_behavior: "after-attempt"
        allowed_authority_zones:
          - "workspace-declared"
          - "octon-run-bound"
          - "current-run-agent-artifact"
        allowed_artifact_classes:
          - "workspace-source"
          - "run-control"
          - "run-evidence"
          - "current-run-generated"
        operation_class: "program-recovery-action"
        requires_run_binding: true
        requires_zone_evidence: true
      - blocker_class: "authority-ambiguity"
        idempotency_class: "approval-gated-mutation"
        human_required: true
        retry_budget: 0
        dependent_handling: "pause-phase"
        post_attempt_validation:
          - "replay-verify"
        replan_behavior: "none"
      - blocker_class: "unsafe-resume"
        idempotency_class: "non-recoverable"
        human_required: true
        retry_budget: 0
        dependent_handling: "fail-closed"
        post_attempt_validation:
          - "replay-verify"
        replan_behavior: "none"
      - blocker_class: "authority-boundary-ambiguous"
        idempotency_class: "non-recoverable"
        human_required: true
        retry_budget: 0
        dependent_handling: "fail-closed"
        post_attempt_validation:
          - "authority-boundary-check"
        replan_behavior: "none"
  closeout_policy:
    required_child_terminal_outcomes:
      - "archived"
      - "rejected"
    terminal_child_receipt_requirements:
      - outcome_id: "archived"
        required_receipts:
          - "implementation-run"
          - "implementation-conformance"
          - "post-implementation-drift"
          - "proposal-closeout"
        required_receipt_field_equals:
          - receipt_id: "implementation-run"
            field: "verdict"
            value: "pass"
          - receipt_id: "implementation-conformance"
            field: "verdict"
            value: "pass"
          - receipt_id: "post-implementation-drift"
            field: "verdict"
            value: "pass"
          - receipt_id: "proposal-closeout"
            field: "verdict"
            value: "pass"
          - receipt_id: "proposal-closeout"
            field: "archive_authorized"
            value: "yes"
      - outcome_id: "rejected"
        required_receipts:
          - "proposal-review"
        required_receipt_field_equals:
          - receipt_id: "proposal-review"
            field: "verdict"
            value: "rejected"
    require_child_receipts_fresh: true
    require_aggregate_evidence: true
    enforce_authority_boundaries: true
  authority_boundaries:
    parent_coordinates_only: true
    child_receipts_remain_child_owned: true
    child_promotion_targets_remain_child_owned: true

input_bindings:
  target:
    source: "lifecycle.target"
  program_packet_path:
    source: "lifecycle.target"
  child_packet_paths:
    source: "run.input.child_packet_paths"
  execution_mode:
    source: "run.input.execution_mode"
  closeout_scope:
    source: "run.input.closeout_scope"
  finding_id:
    source: "run.input.finding_id"

states:
  - state_id: "create-program"
  - state_id: "review-program"
  - state_id: "revise-program"
  - state_id: "plan-children"
  - state_id: "coordinate-children"
  - state_id: "generate-program-implementation-prompt"
  - state_id: "generate-program-verification-prompt"
  - state_id: "run-program-verification"
  - state_id: "generate-program-correction-prompt"
  - state_id: "generate-program-closeout-prompt"
  - state_id: "closeout"
  - state_id: "archive"

terminal_outcomes:
  - outcome_id: "archived"
    when:
      all:
        - manifest_status: "archived"
  - outcome_id: "rejected"
    when:
      all:
        - manifest_status: "rejected"
        - receipt_verdict:
            receipt_id: "proposal-review"
            value: "rejected"
        - receipt_fresh: "proposal-review"
        - receipt_complete: "proposal-review"

validators:
  - validator_id: "proposal-standard"
    argv:
      - "bash"
      - ".octon/framework/assurance/runtime/_ops/scripts/validate-proposal-standard.sh"
      - "--package"
      - "{{target}}"
  - validator_id: "program-child-proposal-readiness"
    argv:
      - "bash"
      - ".octon/framework/assurance/runtime/_ops/scripts/validate-proposal-program-child-readiness.sh"
      - "--package"
      - "{{target}}"
  - validator_id: "program-structure"
    argv:
      - "bash"
      - ".octon/framework/assurance/runtime/_ops/scripts/validate-proposal-program-structure.sh"
      - "--package"
      - "{{target}}"
  - validator_id: "proposal-review-baseline"
    argv:
      - "bash"
      - ".octon/framework/assurance/runtime/_ops/scripts/validate-proposal-review-gate.sh"
      - "--package"
      - "{{target}}"
  - validator_id: "proposal-review-strict"
    argv:
      - "bash"
      - ".octon/framework/assurance/runtime/_ops/scripts/validate-proposal-review-gate.sh"
      - "--package"
      - "{{target}}"
      - "--require-implementation-authorization"

gates:
  - gate_id: "program-review-authorization"
    validator_id: "proposal-review-strict"
    required_before_routes:
      - "generate-program-implementation-prompt"
      - "promote-proposal"
    on_fail_route_id: "review-program"
  - gate_id: "program-child-proposal-readiness"
    validator_id: "program-child-proposal-readiness"
    required_before_routes:
      - "generate-program-implementation-prompt"
  - gate_id: "program-structure"
    validator_id: "program-structure"
    required_before_routes:
      - "generate-program-implementation-prompt"
      - "promote-proposal"
      - "generate-program-verification-prompt"
      - "generate-program-closeout-prompt"
      - "closeout-program"
      - "archive-proposal"

receipts:
  - receipt_id: "program-creation"
    path: "support/program-creation.md"
    required_fields:
      - "creation_id"
      - "created_at"
      - "creator"
      - "program_packet_path"
      - "child_packet_count"
      - "execution_mode"
      - "child_registry_digest"
      - "child_authority_preserved"
      - "verdict"
    verdict_field: "verdict"
  - receipt_id: "proposal-review"
    path: "support/proposal-review.md"
    required_fields:
      - "review_id"
      - "reviewed_at"
      - "reviewer"
      - "verdict"
      - "implementation_prompt_authorized"
      - "reviewed_packet_digest"
      - "open_blocking_findings_count"
    verdict_field: "verdict"
    freshness:
      digest_command:
        - "bash"
        - ".octon/framework/assurance/runtime/_ops/scripts/validate-proposal-review-gate.sh"
        - "--package"
        - "{{target}}"
        - "--print-digest"
      digest_field: "reviewed_packet_digest"
  - receipt_id: "program-implementation-prompt"
    path: "support/executable-program-implementation-prompt.md"
  - receipt_id: "implementation-run"
    path: "support/implementation-run.md"
    required_fields:
      - "verdict"
      - "implemented_at"
      - "promotion_evidence_count"
      - "child_authority_preserved"
    verdict_field: "verdict"
  - receipt_id: "program-verification-prompt"
    path: "support/follow-up-program-verification-prompt.md"
  - receipt_id: "program-correction-prompt"
    path: "support/program-correction-prompts"
  - receipt_id: "program-implementation-conformance"
    path: "support/program-implementation-conformance-review.md"
    required_fields:
      - "verdict"
      - "unresolved_items_count"
      - "child_receipt_summary_count"
      - "child_authority_preserved"
    verdict_field: "verdict"
  - receipt_id: "program-post-implementation-drift"
    path: "support/program-post-implementation-drift-churn-review.md"
    required_fields:
      - "verdict"
      - "unresolved_items_count"
      - "child_receipt_summary_count"
      - "child_authority_preserved"
    verdict_field: "verdict"
  - receipt_id: "program-closeout-prompt"
    path: "support/custom-program-closeout-prompt.md"
  - receipt_id: "proposal-closeout"
    path: "support/proposal-closeout.md"
    required_fields:
      - "verdict"
      - "closed_at"
      - "archive_authorized"
      - "child_authority_preserved"
    verdict_field: "verdict"
  - receipt_id: "lifecycle-residue-cleanup"
    path: "support/lifecycle-residue-cleanup.md"
    required_fields:
      - "verdict"
      - "cleaned_at"
      - "cleanup_candidates"
      - "manual_review_count"
      - "worktree_hygiene_verdict"
      - "remaining_blocker_class"
      - "residue_fingerprint"
    verdict_field: "verdict"

loops:
  - loop_id: "program-review-revision"
    receipt_id: "proposal-review"
    verdict_field: "verdict"
    repeat_values:
      - "revision-required"
    repeat_route_id: "revise-program"
    terminal_values:
      - "accepted"
      - "rejected"
    max_iterations: 5

routes:
  - route_id: "create-program"
    route_type: "extension"
    delegation_contract:
      decision_class: "delegated-execution"
      safe_delegation: true
      authority_zones_allowed:
        - "workspace-declared"
      declared_write_scope_source: "route-completion-and-target"
      required_evidence_gates: []
      required_receipts_before_dispatch: []
      required_receipts_before_completion:
        - "program-creation"
      replay_class: "idempotent"
      automated_recovery_policy: "fail-closed"
      human_only_boundaries:
        - "scope-expansion"
        - "policy-override"
        - "governance-mutation"
        - "external-irreversible-effect"
    command_id: "octon-proposal-create-program"
    skill_id: "octon-proposal-lifecycle-create-program"
    prompt_set_id: "octon-proposal-lifecycle-create-program"
    required_inputs:
      - "child_packet_paths"
    completion:
      expected_receipts:
        - "program-creation"
      expected_paths:
        - "proposal.yml"
        - "README.md"
        - "resources/child-packet-index.yml"
        - "resources/child-packet-index.md"
        - "architecture/packet-sequence.md"
      expected_manifest_status: "draft"
      expected_target_change: true
      replan_required: true
    enter_when:
      any:
        - target_missing: true
        - file_absent: "proposal.yml"
        - file_absent: "resources/child-packet-index.yml"
  - route_id: "review-program"
    route_type: "extension"
    delegation_contract:
      decision_class: "delegated-execution"
      safe_delegation: true
      authority_zones_allowed:
        - "workspace-declared"
      declared_write_scope_source: "route-completion-and-target"
      required_evidence_gates: []
      required_receipts_before_dispatch: []
      required_receipts_before_completion:
        - "proposal-review"
      replay_class: "idempotent-rerun"
      automated_recovery_policy: "fail-closed"
      human_only_boundaries:
        - "scope-expansion"
        - "policy-override"
        - "unresolved-risk-acceptance"
        - "contradictory-evidence-resolution"
        - "stale-evidence-acceptance"
    command_id: "octon-proposal-review-program"
    skill_id: "octon-proposal-lifecycle-review-program"
    prompt_set_id: "octon-proposal-lifecycle-review-program"
    completion:
      expected_receipts:
        - "proposal-review"
      replan_required: true
    enter_when:
      any:
        - manifest_status: "draft"
        - all:
            - manifest_status: "in-review"
            - receipt_absent: "proposal-review"
        - all:
            - any:
                - manifest_status: "draft"
                - manifest_status: "in-review"
                - manifest_status: "accepted"
                - manifest_status: "rejected"
            - receipt_stale: "proposal-review"
  - route_id: "revise-program"
    route_type: "extension"
    delegation_contract:
      decision_class: "delegated-execution"
      safe_delegation: true
      authority_zones_allowed:
        - "workspace-declared"
      declared_write_scope_source: "route-completion-and-target"
      required_evidence_gates: []
      required_receipts_before_dispatch:
        - "proposal-review"
      required_receipts_before_completion: []
      replay_class: "idempotent-rerun"
      automated_recovery_policy: "bounded-retry"
      human_only_boundaries:
        - "scope-expansion"
        - "policy-override"
        - "unresolved-risk-acceptance"
    command_id: "octon-proposal-revise-program"
    skill_id: "octon-proposal-lifecycle-revise-program"
    prompt_set_id: "octon-proposal-lifecycle-revise-program"
    completion:
      expected_paths:
        - "support/revisions"
      expected_target_change: true
      replan_required: true
    enter_when:
      all:
        - receipt_complete: "proposal-review"
        - receipt_verdict:
            receipt_id: "proposal-review"
            value: "revision-required"
  - route_id: "generate-program-implementation-prompt"
    route_type: "extension"
    delegation_contract:
      decision_class: "delegated-execution"
      safe_delegation: true
      authority_zones_allowed:
        - "workspace-declared"
      declared_write_scope_source: "route-completion-and-target"
      required_evidence_gates:
        - "program-review-authorization"
        - "program-child-proposal-readiness"
        - "program-structure"
      required_receipts_before_dispatch:
        - "proposal-review"
      required_receipts_before_completion:
        - "program-implementation-prompt"
      replay_class: "idempotent-rerun"
      automated_recovery_policy: "fail-closed"
      human_only_boundaries:
        - "scope-expansion"
        - "policy-override"
        - "stale-evidence-acceptance"
    command_id: "octon-proposal-generate-program-implementation-prompt"
    skill_id: "octon-proposal-lifecycle-generate-program-implementation-prompt"
    prompt_set_id: "octon-proposal-lifecycle-generate-program-implementation-prompt"
    completion:
      expected_receipts:
        - "program-implementation-prompt"
      expected_paths:
        - "support/executable-program-implementation-prompt.md"
      replan_required: true
    enter_when:
      all:
        - manifest_status: "accepted"
        - receipt_complete: "proposal-review"
        - receipt_verdict:
            receipt_id: "proposal-review"
            value: "accepted"
        - receipt_fresh: "proposal-review"
        - file_present: "resources/child-packet-index.yml"
        - receipt_absent: "program-implementation-prompt"
  - route_id: "promote-proposal"
    route_type: "workflow"
    delegation_contract:
      decision_class: "delegated-execution"
      safe_delegation: true
      authority_zones_allowed:
        - "workspace-declared"
        - "octon-generated-derived"
        - "octon-run-bound"
      declared_write_scope_source: "workflow-scope"
      required_evidence_gates:
        - "program-review-authorization"
        - "program-structure"
      required_receipts_before_dispatch:
        - "proposal-review"
        - "program-implementation-prompt"
        - "implementation-run"
      required_receipts_before_completion: []
      replay_class: "no-op-safe"
      automated_recovery_policy: "fail-closed"
      human_only_boundaries:
        - "scope-expansion"
        - "policy-override"
        - "unresolved-risk-acceptance"
        - "governance-mutation"
        - "contradictory-evidence-resolution"
        - "stale-evidence-acceptance"
        - "authority-ambiguity"
        - "external-irreversible-effect"
    completion:
