schema_version: "extensions-commands-fragment-v1"
commands:
  - id: octon-impact-map-and-validation-selector
    display_name: Octon Impact Map And Validation Selector
    path: octon-impact-map-and-validation-selector.md
    summary: "Resolve the matching input family, build an impact map, and select the minimum credible validation set plus next-step routing."
    access: agent
    argument_hint: "[--bundle <route-id>] [--validation-depth minimal|standard|deep] [--strictness credible-minimum|balanced|release-gate] [--dry-run-route true|false] [--explanation-mode concise|full-trace] <route-specific-inputs>"
  - id: octon-impact-map-and-validation-selector-touched-paths
    display_name: Touched Paths Impact Map
    path: octon-impact-map-and-validation-selector-touched-paths.md
    summary: "Turn touched repo paths into an impact map, minimum credible validation set, and next-step routing."
    access: agent
    argument_hint: "--touched-paths <csv|newline-text> [--validation-depth minimal|standard|deep] [--strictness credible-minimum|balanced|release-gate] [--explanation-mode concise|full-trace]"
  - id: octon-impact-map-and-validation-selector-proposal-packet
    display_name: Proposal Packet Impact Map
    path: octon-impact-map-and-validation-selector-proposal-packet.md
    summary: "Turn one proposal packet into an impact map, packet-kind validation floor, and next-step routing."
    access: agent
    argument_hint: "<proposal-packet> [--validation-depth minimal|standard|deep] [--strictness credible-minimum|balanced|release-gate] [--explanation-mode concise|full-trace]"
  - id: octon-impact-map-and-validation-selector-refactor-target
    display_name: Refactor Target Impact Map
    path: octon-impact-map-and-validation-selector-refactor-target.md
    summary: "Turn a rename, move, or restructure target into an impact map, validation floor, and next-step routing."
    access: agent
    argument_hint: "--refactor-target <json|yaml|inline-block> [--validation-depth minimal|standard|deep] [--strictness credible-minimum|balanced|release-gate] [--explanation-mode concise|full-trace]"
  - id: octon-impact-map-and-validation-selector-mixed-inputs
    display_name: Mixed Input Impact Map
    path: octon-impact-map-and-validation-selector-mixed-inputs.md
    summary: "Reconcile touched paths with proposal or refactor intent, surface drift, and select the minimum credible validation floor."
    access: agent
    argument_hint: "[--touched-paths <csv|newline-text>] [--proposal-packet <path|id>] [--refactor-target <json|yaml|inline-block>] [--validation-depth minimal|standard|deep] [--strictness credible-minimum|balanced|release-gate] [--explanation-mode concise|full-trace]"
