schema_version: "extensions-skills-registry-fragment-v1"
skills:
  octon-proposal-packet-lifecycle:
    version: "1.0.0"
    commands: ["/octon-proposal-packet"]
    parameters:
      - name: bundle
        type: text
        required: false
        description: "Optional explicit route id."
      - name: lifecycle_action
        type: text
        required: false
        description: "Lifecycle action used by the composite dispatcher."
      - name: packet_path
        type: text
        required: false
        description: "Proposal packet path or id."
      - name: program_packet_path
        type: text
        required: false
        description: "Parent proposal program packet path."
      - name: source_kind
        type: text
        required: false
        description: "Source kind for packet creation."
      - name: finding_id
        type: text
        required: false
        description: "Stable verification or program finding id."
      - name: dry_run_route
        type: boolean
        required: false
        default: false
        description: "Return the route resolution receipt without dispatching."
    requires:
      context: []
  octon-proposal-packet-lifecycle-create:
    version: "1.0.0"
    commands: ["/octon-proposal-packet-create"]
    parameters:
      - name: source
        type: text
        required: true
        description: "Source context to convert into a proposal packet."
      - name: proposal_kind
        type: text
        required: false
        description: "Optional target proposal kind."
      - name: proposal_id
        type: text
        required: false
        description: "Optional proposal id override."
    requires:
      context: []
  octon-proposal-packet-lifecycle-explain:
    version: "1.0.0"
    commands: ["/octon-proposal-packet-explain"]
    parameters:
      - name: packet_path
        type: text
        required: true
        description: "Proposal packet path or id."
    requires:
      context: []
  octon-proposal-packet-lifecycle-generate-implementation-prompt:
    version: "1.0.0"
    commands: ["/octon-proposal-packet-generate-implementation-prompt"]
    parameters:
      - name: packet_path
        type: text
        required: true
        description: "Proposal packet path or id."
    requires:
      context: []
  octon-proposal-packet-lifecycle-generate-verification-prompt:
    version: "1.0.0"
    commands: ["/octon-proposal-packet-generate-verification-prompt"]
    parameters:
      - name: packet_path
        type: text
        required: true
        description: "Proposal packet path or id."
    requires:
      context: []
  octon-proposal-packet-lifecycle-generate-correction-prompt:
    version: "1.0.0"
    commands: ["/octon-proposal-packet-generate-correction-prompt"]
    parameters:
      - name: packet_path
        type: text
        required: true
        description: "Proposal packet path or id."
      - name: finding_id
        type: text
        required: true
        description: "Stable verification finding id."
    requires:
      context: []
  octon-proposal-packet-lifecycle-run-verification-and-correction-loop:
    version: "1.0.0"
    commands: ["/octon-proposal-packet-run-verification-and-correction-loop"]
    parameters:
      - name: packet_path
        type: text
        required: true
        description: "Proposal packet path or id."
    requires:
      context: []
  octon-proposal-packet-lifecycle-generate-closeout-prompt:
    version: "1.0.0"
