schema_version: "octon-extension-prompt-set-v1"
prompt_set_id: "octon-proposal-packet-lifecycle-generate-program-closeout-prompt"
version: "1.0.0"
stages:
  - stage_id: "generate-program-closeout-prompt"
    prompt_id: "octon-proposal-packet-lifecycle-generate-program-closeout-prompt-generate"
    path: "stages/01-generate-program-closeout-prompt.md"
    role_class: "stage"
    order: 1
companions:
  - prompt_id: "octon-proposal-packet-lifecycle-generate-program-closeout-prompt-align-bundle"
    path: "companions/01-align-bundle.md"
    role_class: "maintenance-companion"
references:
  - ref_id: "bundle-contract"
    path: "references/bundle-contract.md"
shared_references:
  - ref_id: "repository-grounding"
    path: "shared/repository-grounding.md"
  - ref_id: "proposal-contract"
    path: "shared/proposal-contract.md"
  - ref_id: "proposal-authority-boundaries"
    path: "shared/proposal-authority-boundaries.md"
  - ref_id: "lifecycle-artifact-contract"
    path: "shared/lifecycle-artifact-contract.md"
  - ref_id: "validation-and-evidence-contract"
    path: "shared/validation-and-evidence-contract.md"
  - ref_id: "github-closeout-boundary"
    path: "shared/github-closeout-boundary.md"
required_repo_anchors:
  - ".octon/instance/ingress/AGENTS.md"
  - ".octon/framework/constitution/CHARTER.md"
  - ".octon/inputs/exploratory/proposals/README.md"
  - ".octon/framework/scaffolding/governance/patterns/proposal-standard.md"
alignment_policy:
  default_mode: "auto"
  stale_behavior: "realign_or_fail_closed"
  skip_mode_policy: "degraded-retained-explicit"
  receipt_root: ".octon/state/evidence/validation/extensions/prompt-alignment"
invalidation_conditions:
  - "prompt-manifest-sha-changed"
  - "prompt-asset-sha-changed"
  - "required-anchor-sha-changed"
  - "extension-desired-config-sha-changed"
  - "root-manifest-sha-changed"
artifact_policy:
  internal_artifacts:
    - "program-closeout-prompt-plan"
  packet_support_files:
    - "support/custom-program-closeout-prompt.md"
    - "support/child-closeout-prompts/"
