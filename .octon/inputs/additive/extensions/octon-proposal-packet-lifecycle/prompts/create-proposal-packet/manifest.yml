schema_version: "octon-extension-prompt-set-v1"
prompt_set_id: "octon-proposal-packet-lifecycle-create-proposal-packet"
version: "1.0.0"
stages:
  - stage_id: "normalize-source-context"
    prompt_id: "octon-proposal-packet-lifecycle-create-proposal-packet-normalize-source-context"
    path: "stages/01-normalize-source-context.md"
    role_class: "stage"
    order: 1
  - stage_id: "classify-proposal-scenario"
    prompt_id: "octon-proposal-packet-lifecycle-create-proposal-packet-classify-proposal-scenario"
    path: "stages/02-classify-proposal-scenario.md"
    role_class: "stage"
    order: 2
  - stage_id: "select-creation-route"
    prompt_id: "octon-proposal-packet-lifecycle-create-proposal-packet-select-creation-route"
    path: "stages/03-select-creation-route.md"
    role_class: "stage"
    order: 3
  - stage_id: "generate-or-create-packet"
    prompt_id: "octon-proposal-packet-lifecycle-create-proposal-packet-generate-or-create-packet"
    path: "stages/04-generate-or-create-packet.md"
    role_class: "stage"
    order: 4
  - stage_id: "validate-packet"
    prompt_id: "octon-proposal-packet-lifecycle-create-proposal-packet-validate-packet"
    path: "stages/05-validate-packet.md"
    role_class: "stage"
    order: 5
companions:
  - prompt_id: "octon-proposal-packet-lifecycle-create-proposal-packet-generate-custom-creation-prompt"
    path: "companions/01-generate-custom-creation-prompt.md"
    role_class: "prompt-generation-companion"
  - prompt_id: "octon-proposal-packet-lifecycle-create-proposal-packet-align-bundle"
    path: "companions/02-align-bundle.md"
    role_class: "maintenance-companion"
references:
  - ref_id: "bundle-contract"
    path: "references/bundle-contract.md"
shared_references:
  - ref_id: "repository-grounding"
    path: "shared/repository-grounding.md"
  - ref_id: "proposal-contract"
    path: "shared/proposal-contract.md"
  - ref_id: "proposal-authority-boundaries"
    path: "shared/proposal-authority-boundaries.md"
  - ref_id: "lifecycle-artifact-contract"
    path: "shared/lifecycle-artifact-contract.md"
  - ref_id: "validation-and-evidence-contract"
    path: "shared/validation-and-evidence-contract.md"
required_repo_anchors:
  - ".octon/instance/ingress/AGENTS.md"
  - ".octon/framework/constitution/CHARTER.md"
  - ".octon/inputs/exploratory/proposals/README.md"
  - ".octon/framework/scaffolding/governance/patterns/proposal-standard.md"
  - ".octon/framework/assurance/runtime/_ops/scripts/validate-proposal-standard.sh"
alignment_policy:
  default_mode: "auto"
  stale_behavior: "realign_or_fail_closed"
  skip_mode_policy: "degraded-retained-explicit"
  receipt_root: ".octon/state/evidence/validation/extensions/prompt-alignment"
invalidation_conditions:
  - "prompt-manifest-sha-changed"
  - "prompt-asset-sha-changed"
  - "required-anchor-sha-changed"
  - "extension-desired-config-sha-changed"
  - "root-manifest-sha-changed"
artifact_policy:
  internal_artifacts:
    - "source-context"
    - "scenario-classification"
    - "route-selection-receipt"
    - "proposal-packet-path"
  packet_support_files:
    - "resources/source-context.md"
    - "support/proposal-packet-creation-prompt.md"
