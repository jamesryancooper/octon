                predicate: "equals"
                value: "generate-implementation-prompt"
          - matcher_id: "action-generate-implementation-prompt"
            reason_codes: ["lifecycle-action"]
            all_of:
              - input_name: "lifecycle_action"
                predicate: "equals"
                value: "generate-implementation-prompt"
      - route_id: "generate-verification-prompt"
        status: "resolved"
        execution_binding_id: "generate-verification-prompt"
        matchers:
          - matcher_id: "explicit-bundle-generate-verification-prompt"
            reason_codes: ["explicit-bundle"]
            all_of:
              - input_name: "bundle"
                predicate: "equals"
