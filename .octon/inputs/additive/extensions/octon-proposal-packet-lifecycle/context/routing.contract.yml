        status: "deny"
        matchers:
          - matcher_id: "explicit-unsupported-bundle"
            reason_codes: ["unsupported-route-id"]
            all_of:
              - input_name: "bundle"
                predicate: "present"
              - input_name: "bundle"
                predicate: "not_one_of"
                values:
