        matchers:
          - matcher_id: "explicit-bundle-run-verification-and-correction-loop"
            reason_codes: ["explicit-bundle"]
            all_of:
              - input_name: "bundle"
                predicate: "equals"
                value: "run-verification-and-correction-loop"
          - matcher_id: "action-run-verification-and-correction-loop"
            reason_codes: ["lifecycle-action"]
            all_of:
              - input_name: "lifecycle_action"
