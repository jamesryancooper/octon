schema_version: "octon-extension-routing-contract-v1"
dispatchers:
  - dispatcher_id: "octon-proposal-packet-lifecycle"
    default_route_id: "create-proposal-packet"
    accepted_inputs:
      - "bundle"
      - "source_kind"
      - "proposal_kind"
      - "lifecycle_action"
      - "packet_path"
      - "proposal_id"
      - "current_lifecycle_state"
      - "verification_finding_id"
      - "program_packet_path"
      - "child_packet_paths"
      - "execution_mode"
      - "closeout_scope"
      - "user_constraints"
      - "dry_run_route"
    disambiguators:
      - input_name: "bundle"
        kind: "route-id"
        allowed_values:
          - "create-proposal-packet"
          - "explain-proposal-packet"
          - "generate-implementation-prompt"
          - "generate-verification-prompt"
          - "generate-correction-prompt"
          - "run-verification-and-correction-loop"
          - "generate-closeout-prompt"
          - "closeout-proposal-packet"
          - "create-proposal-program"
          - "generate-program-implementation-prompt"
          - "generate-program-verification-prompt"
          - "generate-program-correction-prompt"
          - "run-program-verification-and-correction-loop"
          - "generate-program-closeout-prompt"
          - "closeout-proposal-program"
      - input_name: "lifecycle_action"
        kind: "enum"
        allowed_values:
          - "create-proposal-packet"
          - "explain-proposal-packet"
          - "generate-implementation-prompt"
          - "generate-verification-prompt"
          - "generate-correction-prompt"
          - "run-verification-and-correction-loop"
          - "generate-closeout-prompt"
          - "closeout-proposal-packet"
          - "create-proposal-program"
          - "generate-program-implementation-prompt"
          - "generate-program-verification-prompt"
          - "generate-program-correction-prompt"
          - "run-program-verification-and-correction-loop"
          - "generate-program-closeout-prompt"
          - "closeout-proposal-program"
      - input_name: "proposal_kind"
        kind: "enum"
        allowed_values:
          - "architecture"
          - "policy"
          - "migration"
          - "design"
      - input_name: "execution_mode"
        kind: "enum"
        allowed_values:
          - "sequential"
          - "parallel-independent"
          - "gated-parallel"
          - "program-atomic"
          - "approval-gated"
    precedence:
      - "explicit-bundle-create-proposal-packet"
      - "explicit-bundle-explain-proposal-packet"
      - "explicit-bundle-generate-implementation-prompt"
      - "explicit-bundle-generate-verification-prompt"
      - "explicit-bundle-generate-correction-prompt"
      - "explicit-bundle-run-verification-and-correction-loop"
      - "explicit-bundle-generate-closeout-prompt"
      - "explicit-bundle-closeout-proposal-packet"
      - "explicit-bundle-create-proposal-program"
      - "explicit-bundle-generate-program-implementation-prompt"
      - "explicit-bundle-generate-program-verification-prompt"
      - "explicit-bundle-generate-program-correction-prompt"
      - "explicit-bundle-run-program-verification-and-correction-loop"
      - "explicit-bundle-generate-program-closeout-prompt"
      - "explicit-bundle-closeout-proposal-program"
      - "explicit-unsupported-bundle"
      - "action-create-proposal-packet"
      - "action-explain-proposal-packet"
      - "action-generate-implementation-prompt"
      - "action-generate-verification-prompt"
      - "action-generate-correction-prompt"
      - "action-run-verification-and-correction-loop"
      - "action-generate-closeout-prompt"
      - "action-closeout-proposal-packet"
      - "action-create-proposal-program"
      - "action-generate-program-implementation-prompt"
      - "action-generate-program-verification-prompt"
      - "action-generate-program-correction-prompt"
      - "action-run-program-verification-and-correction-loop"
      - "action-generate-program-closeout-prompt"
      - "action-closeout-proposal-program"
      - "source-driven-packet-creation"
      - "program-input-create"
      - "missing-routeable-inputs"
    routes:
      - route_id: "create-proposal-packet"
        status: "resolved"
        execution_binding_id: "create-proposal-packet"
        matchers:
          - matcher_id: "explicit-bundle-create-proposal-packet"
            reason_codes: ["explicit-bundle"]
            all_of:
              - input_name: "bundle"
                predicate: "equals"
                value: "create-proposal-packet"
          - matcher_id: "action-create-proposal-packet"
            reason_codes: ["lifecycle-action"]
            all_of:
              - input_name: "lifecycle_action"
                predicate: "equals"
                value: "create-proposal-packet"
          - matcher_id: "source-driven-packet-creation"
            reason_codes: ["source-driven-default"]
            all_of:
              - input_name: "source_kind"
                predicate: "present"
              - input_name: "packet_path"
                predicate: "absent"
      - route_id: "explain-proposal-packet"
        status: "resolved"
        execution_binding_id: "explain-proposal-packet"
        matchers:
          - matcher_id: "explicit-bundle-explain-proposal-packet"
            reason_codes: ["explicit-bundle"]
            all_of:
              - input_name: "bundle"
                predicate: "equals"
                value: "explain-proposal-packet"
          - matcher_id: "action-explain-proposal-packet"
            reason_codes: ["lifecycle-action"]
            all_of:
              - input_name: "lifecycle_action"
                predicate: "equals"
                value: "explain-proposal-packet"
      - route_id: "generate-implementation-prompt"
