schema_version: "extensions-skills-fragment-v1"
skills:
  - id: octon-decision-drafter
    display_name: Octon Decision Drafter
    group: extensions
    path: octon-decision-drafter/
    skill_class: invocable
    summary: "Resolve the appropriate decision-drafting route and dispatch to the matching leaf bundle."
    status: active
    tags:
      - octon
      - decision-drafter
      - adr
      - migration
      - rollback
      - receipt
      - extension-pack
      - composite-skill
    triggers:
      - "octon decision drafter"
      - "draft adr update from diff"
      - "draft migration rationale"
      - "draft rollback notes"
      - "draft change receipt"
  - id: octon-decision-drafter-adr-update
