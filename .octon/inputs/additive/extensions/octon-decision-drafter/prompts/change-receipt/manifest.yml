schema_version: "octon-extension-prompt-set-v1"
prompt_set_id: "octon-decision-drafter-change-receipt"
version: "1.0.0"
stages:
  - stage_id: "normalize-diff-and-evidence"
    prompt_id: "octon-decision-drafter-change-receipt-normalize"
    path: "stages/01-normalize-diff-and-evidence.md"
    role_class: "stage"
    order: 1
  - stage_id: "build-receipt-facts"
    prompt_id: "octon-decision-drafter-change-receipt-build-facts"
    path: "stages/02-build-receipt-facts.md"
    role_class: "stage"
    order: 2
  - stage_id: "draft-change-receipt"
    prompt_id: "octon-decision-drafter-change-receipt-draft"
    path: "stages/03-draft-change-receipt.md"
    role_class: "stage"
    order: 3
companions:
  - prompt_id: "octon-decision-drafter-change-receipt-align-bundle"
    path: "companions/01-align-bundle.md"
    role_class: "maintenance-companion"
references:
  - ref_id: "bundle-contract"
    path: "references/bundle-contract.md"
shared_references:
  - ref_id: "repository-grounding"
    path: "shared/repository-grounding.md"
  - ref_id: "non-authoritative-draft-contract"
    path: "shared/non-authoritative-draft-contract.md"
  - ref_id: "diff-evidence-input-contract"
    path: "shared/diff-evidence-input-contract.md"
  - ref_id: "draft-output-contract"
    path: "shared/draft-output-contract.md"
  - ref_id: "draft-artifact-contract"
    path: "shared/draft-artifact-contract.md"
required_repo_anchors:
  - "README.md"
  - ".octon/README.md"
  - ".octon/instance/ingress/AGENTS.md"
  - ".octon/framework/constitution/CHARTER.md"
  - ".octon/framework/constitution/charter.yml"
  - ".octon/framework/constitution/precedence/normative.yml"
  - ".octon/framework/constitution/precedence/epistemic.yml"
  - ".octon/framework/constitution/obligations/fail-closed.yml"
  - ".octon/framework/constitution/obligations/evidence.yml"
  - ".octon/framework/constitution/ownership/roles.yml"
  - ".octon/framework/constitution/contracts/registry.yml"
  - ".octon/framework/cognition/_meta/architecture/specification.md"
  - ".octon/framework/engine/governance/extensions/boundary-contract.md"
  - ".octon/instance/charter/workspace.md"
  - ".octon/instance/charter/workspace.yml"
  - ".octon/instance/cognition/decisions/index.yml"
  - ".octon/instance/cognition/context/shared/migrations/index.yml"
  - ".octon/state/evidence/control/execution/README.md"
  - ".octon/state/evidence/validation/publication/extensions/README.md"
alignment_policy:
  default_mode: "auto"
  stale_behavior: "realign_or_fail_closed"
  skip_mode_policy: "degraded-retained-explicit"
  receipt_root: ".octon/state/evidence/validation/extensions/prompt-alignment"
invalidation_conditions:
  - "prompt-manifest-sha-changed"
  - "prompt-asset-sha-changed"
  - "required-anchor-sha-changed"
  - "extension-desired-config-sha-changed"
  - "root-manifest-sha-changed"
artifact_policy:
  internal_artifacts:
    - "diff-input"
    - "changed-paths"
    - "grounding-evidence"
    - "target-surface"
    - "draft-output"
    - "route-receipt"
  packet_support_files:
    - "support/diff-input.md"
    - "support/changed-paths.md"
    - "support/grounding-evidence.md"
    - "support/target-surface.md"
    - "support/draft-output.md"
