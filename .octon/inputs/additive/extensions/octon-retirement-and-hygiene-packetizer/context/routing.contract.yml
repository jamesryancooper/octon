schema_version: "octon-extension-routing-contract-v1"
dispatchers:
  - dispatcher_id: "octon-retirement-and-hygiene-packetizer"
    default_route_id: "scan-to-reconciliation"
    accepted_inputs:
      - "flow"
      - "audit_id"
      - "audit_dir"
      - "proposal_id"
      - "include_claim_gate"
      - "protected_surface_mode"
      - "dry_run_route"
      - "run_audit"
      - "gap_scope"
      - "packet_attachment"
      - "target_ids"
    disambiguators:
      - input_name: "flow"
        kind: "route-id"
        allowed_values:
          - "scan-to-reconciliation"
          - "audit-to-packet-draft"
          - "registry-gap-analysis"
          - "ablation-plan-draft"
      - input_name: "protected_surface_mode"
        kind: "enum"
        allowed_values:
          - "enforce"
          - "report-only"
      - input_name: "gap_scope"
        kind: "enum"
        allowed_values:
          - "missing"
          - "stale"
          - "all"
    precedence:
      - "explicit-flow-scan-to-reconciliation"
      - "explicit-flow-audit-to-packet-draft"
      - "explicit-flow-registry-gap-analysis"
      - "explicit-flow-ablation-plan-draft"
      - "packet-attachment-implies-ablation"
      - "target-ids-implies-ablation"
      - "gap-scope-implies-registry-gap-analysis"
      - "proposal-id-implies-audit-to-packet-draft"
      - "run-audit-implies-audit-to-packet-draft"
      - "audit-dir-implies-audit-to-packet-draft"
      - "audit-input-implies-audit-to-packet-draft"
      - "default-scan-to-reconciliation"
    routes:
      - route_id: "scan-to-reconciliation"
        status: "resolved"
        execution_binding_id: "scan-to-reconciliation"
        matchers:
          - matcher_id: "explicit-flow-scan-to-reconciliation"
            reason_codes:
              - "explicit-flow"
            all_of:
              - input_name: "flow"
                predicate: "equals"
                value: "scan-to-reconciliation"
          - matcher_id: "default-scan-to-reconciliation"
            reason_codes:
              - "default-route"
            all_of:
              - input_name: "flow"
                predicate: "absent"
              - input_name: "audit_id"
                predicate: "absent"
              - input_name: "audit_dir"
                predicate: "absent"
              - input_name: "proposal_id"
                predicate: "absent"
              - input_name: "run_audit"
                predicate: "absent"
              - input_name: "gap_scope"
                predicate: "absent"
              - input_name: "packet_attachment"
                predicate: "absent"
              - input_name: "target_ids"
                predicate: "absent"
      - route_id: "audit-to-packet-draft"
        status: "resolved"
        execution_binding_id: "audit-to-packet-draft"
        matchers:
          - matcher_id: "explicit-flow-audit-to-packet-draft"
            reason_codes:
              - "explicit-flow"
            all_of:
              - input_name: "flow"
                predicate: "equals"
                value: "audit-to-packet-draft"
          - matcher_id: "proposal-id-implies-audit-to-packet-draft"
            reason_codes:
              - "proposal-draft-requested"
            all_of:
              - input_name: "flow"
                predicate: "absent"
              - input_name: "proposal_id"
                predicate: "present"
          - matcher_id: "run-audit-implies-audit-to-packet-draft"
            reason_codes:
              - "run-audit"
            all_of:
              - input_name: "flow"
                predicate: "absent"
              - input_name: "run_audit"
                predicate: "present"
          - matcher_id: "audit-dir-implies-audit-to-packet-draft"
            reason_codes:
              - "audit-evidence"
            all_of:
              - input_name: "flow"
                predicate: "absent"
              - input_name: "gap_scope"
                predicate: "absent"
              - input_name: "packet_attachment"
                predicate: "absent"
              - input_name: "target_ids"
                predicate: "absent"
              - input_name: "audit_dir"
                predicate: "present"
          - matcher_id: "audit-input-implies-audit-to-packet-draft"
            reason_codes:
              - "audit-evidence"
            all_of:
              - input_name: "flow"
                predicate: "absent"
              - input_name: "gap_scope"
                predicate: "absent"
              - input_name: "packet_attachment"
                predicate: "absent"
              - input_name: "target_ids"
                predicate: "absent"
              - input_name: "audit_id"
                predicate: "present"
      - route_id: "registry-gap-analysis"
        status: "resolved"
        execution_binding_id: "registry-gap-analysis"
        matchers:
          - matcher_id: "explicit-flow-registry-gap-analysis"
            reason_codes:
              - "explicit-flow"
            all_of:
              - input_name: "flow"
                predicate: "equals"
                value: "registry-gap-analysis"
          - matcher_id: "gap-scope-implies-registry-gap-analysis"
            reason_codes:
              - "gap-scope"
            all_of:
              - input_name: "flow"
                predicate: "absent"
              - input_name: "gap_scope"
                predicate: "present"
      - route_id: "ablation-plan-draft"
        status: "resolved"
        execution_binding_id: "ablation-plan-draft"
        matchers:
          - matcher_id: "explicit-flow-ablation-plan-draft"
            reason_codes:
              - "explicit-flow"
            all_of:
              - input_name: "flow"
                predicate: "equals"
                value: "ablation-plan-draft"
          - matcher_id: "packet-attachment-implies-ablation"
            reason_codes:
              - "packet-attachment"
            all_of:
              - input_name: "flow"
                predicate: "absent"
              - input_name: "packet_attachment"
                predicate: "present"
          - matcher_id: "target-ids-implies-ablation"
            reason_codes:
              - "target-selection"
            all_of:
              - input_name: "flow"
                predicate: "absent"
              - input_name: "packet_attachment"
                predicate: "absent"
              - input_name: "target_ids"
                predicate: "present"
    execution_bindings:
      - binding_id: "scan-to-reconciliation"
        route_id: "scan-to-reconciliation"
        command_capability_id: "octon-retirement-and-hygiene-packetizer-scan-to-reconciliation"
        skill_capability_id: "octon-retirement-and-hygiene-packetizer-scan-to-reconciliation"
      - binding_id: "audit-to-packet-draft"
        route_id: "audit-to-packet-draft"
        command_capability_id: "octon-retirement-and-hygiene-packetizer-audit-to-packet-draft"
        skill_capability_id: "octon-retirement-and-hygiene-packetizer-audit-to-packet-draft"
      - binding_id: "registry-gap-analysis"
        route_id: "registry-gap-analysis"
        command_capability_id: "octon-retirement-and-hygiene-packetizer-registry-gap-analysis"
        skill_capability_id: "octon-retirement-and-hygiene-packetizer-registry-gap-analysis"
      - binding_id: "ablation-plan-draft"
        route_id: "ablation-plan-draft"
        command_capability_id: "octon-retirement-and-hygiene-packetizer-ablation-plan-draft"
        skill_capability_id: "octon-retirement-and-hygiene-packetizer-ablation-plan-draft"
