  - .octon/state/evidence/validation/architecture/10of10-remediation/evidence-store/completeness.yml
  - .octon/state/evidence/validation/architecture/10of10-remediation/support-targets/proofing.yml
  - .octon/state/evidence/validation/architecture/10of10-remediation/registry/generated-non-authority-scan.yml
  - .octon/state/evidence/validation/architecture/10of10-remediation/registry/input-non-authority-scan.yml
  - .octon/state/evidence/validation/architecture/10of10-remediation/promotion/receipt-ledger.yml
  - .octon/state/evidence/validation/architecture/10of10-remediation/docs-simplification/runtime-docs-consistency.yml
  - .octon/state/evidence/validation/architecture/10of10-remediation/operator-views/publication.yml
