  - .octon/framework/cognition/_meta/architecture/specification.md
  - .octon/instance/bootstrap/START.md
  - .octon/instance/ingress/AGENTS.md
doc_assertions:
  - doc_ref: .octon/README.md
    required_text:
      - contract-registry.yml
      - registry-backed orientation surface
  - doc_ref: .octon/framework/cognition/_meta/architecture/specification.md
    required_text:
      - machine-readable source of truth
      - contract-registry.yml
  - doc_ref: .octon/instance/bootstrap/START.md
    required_text:
      - steady-state boot sequence
      - contract-registry.yml
  - doc_ref: .octon/instance/ingress/AGENTS.md
    required_text:
      - manifest.yml
      - contract-registry.yml
validator_receipts:
