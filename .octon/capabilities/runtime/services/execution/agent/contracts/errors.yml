version: "1.0.0"
errors:
  - code: InputValidationError
    category: structural
    exit_code: 5
    retryable: false
    operator_action: "Fix payload to match schema/input.schema.json."
  - code: AgentExecutionError
    category: runtime
    exit_code: 4
    retryable: true
    operator_action: "Review checkpoint state and retry or resume with runId."
