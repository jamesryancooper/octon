# Domain Profiles Registry

schema_version: "1.0"

profiles:
  bounded-surfaces:
    description: Domain requires explicit runtime, governance, and practices surfaces.
  state-tracking:
    description: Domain is continuity/state tracking and does not split into bounded runtime/governance/practices surfaces.
  human-led:
    description: Domain is human-led and must not expose autonomous runtime/governance/practices surfaces.
  artifact-sink:
    description: Domain is an output artifact sink and must not expose runtime/governance/practices surfaces.

domains:
  agency: bounded-surfaces
  capabilities: bounded-surfaces
  cognition: bounded-surfaces
  orchestration: bounded-surfaces
  scaffolding: bounded-surfaces
  assurance: bounded-surfaces
  engine: bounded-surfaces
  continuity: state-tracking
  ideation: human-led
  output: artifact-sink
