schema_version: "octon-root-manifest-v1"

class_roots:
  framework: ".octon/framework"
  instance: ".octon/instance"
  inputs: ".octon/inputs"
  state: ".octon/state"
  generated: ".octon/generated"

versioning:
  harness:
    release_version: "0.4.15"
    supported_schema_versions:
      - "octon-root-manifest-v1"
      - "octon-framework-manifest-v1"
      - "octon-instance-manifest-v1"
    rejection_mode: "fail-closed"
    migration_workflow: "framework/orchestration/runtime/workflows/meta/migrate-harness/README.md"
    migration_overview: "framework/orchestration/runtime/workflows/meta/migrate-harness/00-overview.md"
    deterministic_upgrade_instructions:
      - "Run the super-root cutover against the target .octon root."
      - "Materialize framework, instance, inputs, state, and generated in one change."
      - "Re-run harness structure, workflow, proposal, continuity, and alignment validators before promotion."

extensions:
  api_version: "v1"

profiles:
  bootstrap_core:
    include:
      - "octon.yml"
      - "framework/**"
      - "instance/manifest.yml"
  repo_snapshot:
    include:
      - "octon.yml"
      - "framework/**"
      - "instance/**"
      - "inputs/additive/extensions/**"
    exclude:
      - "inputs/exploratory/**"
      - "state/**"
      - "generated/**"
  pack_bundle:
    include:
      - "inputs/additive/extensions/**"
  full_fidelity:
    include:
      - "."

policies:
  raw_input_dependency: "forbidden"
  generated_staleness: "fail-closed"
  required_generated:
    - ".octon/generated/proposals/registry.yml"

human_led:
  - "inputs/exploratory/ideation/**"

resolution:
  authority_order:
    - "framework"
    - "instance"
    - "state"
    - "generated"
  runtime_inputs:
    proposals_registry: ".octon/generated/proposals/registry.yml"
    continuity: ".octon/state/continuity/repo/"
