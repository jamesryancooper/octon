schema_version: octon-root-manifest-v2
topology:
  super_root: .octon/
  class_roots:
    framework: framework/
    instance: instance/
    inputs: inputs/
    state: state/
    generated: generated/
versioning:
  harness:
    release_version: 0.6.54
    supported_schema_versions:
      - octon-root-manifest-v2
      - octon-framework-manifest-v2
      - octon-instance-manifest-v1
    rejection_mode: fail-closed
    migration_workflow: framework/orchestration/runtime/workflows/meta/migrate-harness/README.md
    migration_overview: >-
      framework/orchestration/runtime/workflows/meta/migrate-harness/00-overview.md
    deterministic_upgrade_instructions:
      - >-
        Upgrade the root manifest to octon-root-manifest-v2 and remove legacy
        top-level portability keys.
      - >-
        Upgrade framework/manifest.yml to octon-framework-manifest-v2 and add
        bundled policy-set references.
      - >-
        Add instance/extensions.yml, materialize inputs/additive/extensions/,
        and re-run harness alignment before promotion.
  extensions:
    api_version: '1.0'
profiles:
  bootstrap_core:
    include:
      - octon.yml
      - framework/**
      - instance/manifest.yml
  repo_snapshot:
    include:
      - octon.yml
      - framework/**
      - instance/**
      - inputs/additive/extensions/<enabled-and-dependent>/**
    exclude:
      - inputs/exploratory/**
      - state/**
      - generated/**
  pack_bundle:
    selector: inputs/additive/extensions/<selected>/**
    include_dependency_closure: true
    exclude:
      - framework/**
      - instance/**
      - inputs/exploratory/**
      - state/**
      - generated/**
  full_fidelity:
    advisory: Use a normal Git clone for exact repository reproduction.
policies:
  raw_input_dependency: fail-closed
  generated_staleness: fail-closed
  generated_commit_defaults:
    generated/effective/**: commit
    generated/proposals/registry.yml: commit
    generated/cognition/summaries/**: commit
    generated/cognition/projections/definitions/**: commit
    generated/cognition/graph/**: rebuild
    generated/cognition/projections/materialized/**: rebuild
zones:
  human_led:
    - inputs/exploratory/ideation/**
resolution:
  authority_order:
    - framework
    - instance
    - state
    - generated
  runtime_resolution_ref: .octon/instance/governance/runtime-resolution.yml
  runtime_effective_route_bundle_ref: .octon/generated/effective/runtime/route-bundle.yml
  runtime_effective_route_bundle_lock_ref: .octon/generated/effective/runtime/route-bundle.lock.yml
  runtime_contract_refs:
    resolution_spec: .octon/framework/engine/runtime/spec/runtime-resolution-v1.md
    effective_handle_contract: >-
      .octon/framework/engine/runtime/spec/runtime-effective-artifact-handle-v2.md
    effective_handle_schema: >-
      .octon/framework/engine/runtime/spec/runtime-effective-artifact-handle-v2.schema.json
    route_bundle_lock_schema: >-
      .octon/framework/engine/runtime/spec/runtime-effective-route-bundle-lock-v3.schema.json
    publication_freshness_gates: .octon/framework/engine/runtime/spec/publication-freshness-gates-v4.md
    architecture_health_contract: .octon/framework/engine/runtime/spec/architecture-health-contract-v3.md
    compatibility_retirement_cutover: >-
      .octon/framework/engine/runtime/spec/compatibility-retirement-cutover-v2.md
    historical_lineage:
      effective_handle_contract:
        - >-
          .octon/framework/engine/runtime/spec/runtime-effective-artifact-handle-v1.md
      effective_handle_schema:
        - >-
          .octon/framework/engine/runtime/spec/runtime-effective-artifact-handle-v1.schema.json
      route_bundle_lock_schema:
        - >-
          .octon/framework/engine/runtime/spec/runtime-effective-route-bundle-lock-v2.schema.json
      publication_freshness_gates:
        - .octon/framework/engine/runtime/spec/publication-freshness-gates-v3.md
      architecture_health_contract:
        - >-
          .octon/framework/engine/runtime/spec/architecture-health-contract-v2.md
  architecture_transition_evidence_roots:
    canonical: .octon/state/evidence/validation/architecture/10of10-target-transition
    historical_compatibility:
      - .octon/state/evidence/validation/architecture-target-state-transition
  runtime_inputs:
    objective_contract_family: .octon/framework/constitution/contracts/objective
    runtime_contract_family: .octon/framework/constitution/contracts/runtime
    assurance_contract_family: .octon/framework/constitution/contracts/assurance
    disclosure_contract_family: .octon/framework/constitution/contracts/disclosure
    retention_contract_family: .octon/framework/constitution/contracts/retention
    adapter_contract_family: .octon/framework/constitution/contracts/adapters
    governance_exclusions: .octon/instance/governance/exclusions/action-classes.yml
    workspace_objective_brief: .octon/instance/charter/workspace.md
    workspace_machine_charter: .octon/instance/charter/workspace.yml
    run_continuity_root: .octon/state/continuity/runs
    run_control_root: .octon/state/control/execution/runs
    run_manifest_file: .octon/state/control/execution/runs/<run-id>/run-manifest.yml
    run_evidence_root: .octon/state/evidence/runs
    run_evidence_classification_file: .octon/state/evidence/runs/<run-id>/evidence-classification.yml
    mission_control_root: .octon/state/control/execution/missions
    ownership_registry: .octon/instance/governance/ownership/registry.yml
    mission_autonomy_policy: .octon/instance/governance/policies/mission-autonomy.yml
    trust_registry: .octon/instance/governance/trust/registry.yml
    trust_authority_root: .octon/instance/governance/trust
    trust_control_root: .octon/state/control/trust
    trust_evidence_root: .octon/state/evidence/trust
    trust_continuity_root: .octon/state/continuity/trust
    trust_generated_projection_root: .octon/generated/cognition/projections/materialized/trust
execution_governance:
  policy_mode:
    default: hard-enforce
    protected: hard-enforce
    allowed_development_modes:
      - shadow
      - soft-enforce
      - hard-enforce
  protected_refs:
    - main
  protected_workflows:
    - ai-review-gate
    - pr-autonomy-policy
    - deny-by-default-gates
    - release-please
  critical_action_types:
    - mutate_repo
    - launch_executor_elevated
    - protected_branch_mutation
    - publish_artifact
    - release_publication
  receipt_roots:
    kernel: .octon/state/evidence/runs/kernel
    services: .octon/state/evidence/runs/services
    workflows: .octon/state/evidence/runs/workflows
    executors: .octon/state/evidence/runs/executors
    ci: .octon/state/evidence/runs/ci
  executor_profiles:
    read_only_analysis:
      dangerous_flags_allowed: false
      allow_repo_write: false
      require_hard_enforce: false
      require_human_review: false
      require_rollback_metadata: false
    patch_generation_only:
      dangerous_flags_allowed: false
      allow_repo_write: true
      require_hard_enforce: false
      require_human_review: false
      require_rollback_metadata: false
    scoped_repo_mutation:
      dangerous_flags_allowed: false
      allow_repo_write: true
      require_hard_enforce: false
      require_human_review: false
      require_rollback_metadata: false
    release_candidate_preparation:
      dangerous_flags_allowed: true
      allow_repo_write: true
      require_hard_enforce: true
      require_human_review: true
      require_rollback_metadata: true
    human_review_required:
      dangerous_flags_allowed: false
      allow_repo_write: false
      require_hard_enforce: true
      require_human_review: true
      require_rollback_metadata: true
