schema_version: "workflow-contract-v1"
name: "evaluate-ci-latency"
description: "Evaluate recent GitHub Actions latency, identify breached thresholds and step hotspots, and publish report-only tightening recommendations."
version: "0.1.0"
entry_mode: "human"
execution_profile: "external-dependent"
side_effect_class: "read_only"
execution_controls:
  cancel_safe: true
coordination_key_strategy:
  kind: "none"
executor_interface_version: "workflow-executor-v1"
inputs:
  - name: "window_runs"
    type: "text"
    required: false
    default: "40"
    description: "Number of recent successful PR runs used for latency analysis."
  - name: "top_workflows"
    type: "text"
    required: false
    default: "5"
    description: "Number of slow or regressed workflows to inspect for hotspot detail."
  - name: "gate_scope"
    type: "text"
    required: false
    default: "required"
    description: "Latency scope emphasized in the report: required or all."
  - name: "policy_path"
    type: "file"
    required: false
    default: ".octon/agency/practices/standards/ci-latency-policy.json"
    description: "Policy contract defining thresholds, window sizes, and issue semantics."
stages:
  - id: "collect-latency-evidence"
    asset: "stages/01-collect-latency-evidence.md"
    kind: "analysis"
    consumes: []
    produces: ["stage:collect-latency-evidence"]
    mutation_scope: []
  - id: "classify-breaches-and-hotspots"
    asset: "stages/02-classify-breaches-and-hotspots.md"
    kind: "analysis"
    consumes: ["stage:collect-latency-evidence"]
    produces: ["stage:classify-breaches-and-hotspots"]
    mutation_scope: []
  - id: "publish-tightening-report"
    asset: "stages/03-publish-tightening-report.md"
    kind: "projection"
    consumes: ["stage:classify-breaches-and-hotspots"]
    produces: ["stage:publish-tightening-report"]
    mutation_scope: []
artifacts: []
done_gate:
  checks:
    - "verification stage passes"
constraints:
  fail_closed: true
  forbid_design_packages: true
  require_relative_local_assets: true
