schema_version: "workflow-contract-v1"
name: "promote-from-scratchpad"
description: "Publish distilled insights from ideation/scratchpad/ to agent-facing artifacts."
version: "1.0.0"
entry_mode: "human"
execution_profile: "core"
side_effect_class: "mutating"
execution_controls:
  cancel_safe: false
coordination_key_strategy:
  kind: "workflow-target"
  source_fields:
    - "workflow_group"
    - "workflow_id"
  format: "workflow:{workflow_group}/{workflow_id}"
executor_interface_version: "workflow-executor-v1"
inputs: []
stages:
  - id: "inline"
    asset: "stages/01-inline.md"
    kind: "analysis"
    produces: ["stage:inline"]
    consumes: []
    mutation_scope: []
artifacts: []
done_gate:
  checks:
    - "single stage completes successfully"
constraints:
  fail_closed: true
  forbid_design_packages: true
  require_relative_local_assets: true
