# Octon runtime policy (v1).
#
# This file is not part of the v1 spec-bundle contract, but is used by the
# reference kernel implementation as the deny-by-default allowlist for
# service capabilities.

format_version: policy-v1

default:
  allow: []

categories:
  # Example: allow all interfaces services to write logs.
  interfaces:
    allow:
      - log.write

services:
  interfaces/filesystem-snapshot:
    allow:
      - clock.read
      - fs.read
      - fs.write
      - log.write

  interfaces/filesystem-discovery:
    allow:
      - clock.read
      - fs.read
      - log.write

  interfaces/filesystem-watch:
    allow:
      - clock.read
      - fs.read
      - fs.write
      - log.write

  # Allow the reference KV service to use local storage.
  interfaces/kv:
    allow:
      - storage.local
      - log.write

  # execution/flow defaults to native-octon execution. We grant net.http so
  # langgraph-http remains available as an opt-in adapter path.
  execution/flow:
    allow:
      - log.write
      - fs.read
      - fs.write
      - net.http

# Routing metadata mirrored for runtime/operator visibility.
# Policy enforcement still resolves through capabilities/governance policy.
decision_routing:
  boundary_routes: [allow, escalate, block]
  reason_codes:
    intent_missing: INTENT_MISSING
    intent_ref_invalid: INTENT_REF_INVALID
    boundary_unresolved: BOUNDARY_UNRESOLVED
    boundary_blocked: BOUNDARY_BLOCKED
    boundary_escalation_required: BOUNDARY_ESCALATION_REQUIRED
    mode_violation_autonomy_not_allowed: MODE_VIOLATION_AUTONOMY_NOT_ALLOWED
