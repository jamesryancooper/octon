meta:
  version: "2.0.0-test"

attributes:
  - id: security
    name: Security
  - id: deployability
    name: Deployability
  - id: portability
    name: Portability

selection_defaults:
  fallback_profile: test-profile

charter:
  ref: .octon/assurance/governance/CHARTER.md
  version: "2.0.0"
  priority_chain:
    - id: assurance
      name: Assurance
    - id: productivity
      name: Productivity
    - id: integration
      name: Integration
  tie_break_rule: When weighted priority ties, prioritize items mapped to higher umbrellas in chain order.
  tradeoff_rules:
    - Assurance is non-negotiable.
  required_references:
    charter: .octon/assurance/governance/CHARTER.md
  attribute_umbrella_map:
    security: assurance
    deployability: productivity
    portability: integration

profiles:
  test-profile:
    weights:
      global:
        security: 5
        deployability: 4
        portability: 3
