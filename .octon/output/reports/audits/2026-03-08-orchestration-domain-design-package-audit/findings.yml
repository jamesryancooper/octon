findings:
  - id: "ODP-AUD-001"
    severity: "high"
    title: "Decision evidence is assigned to a continuity surface that does not yet exist in live continuity authority"
    impact: "Decision evidence ownership, retention, and validation remain underspecified at the live Octon boundary."
    risk: "Implementers will invent `continuity/decisions/` behavior ad hoc, weakening evidence consistency and promotion safety."
    evidence:
      - path: ".design-packages/orchestration-domain-design-package/contracts/decision-record-contract.md"
        lines: "8-19"
        note: "Requires `continuity/decisions/<decision-id>/decision.json`."
      - path: ".design-packages/orchestration-domain-design-package/normative-dependencies-and-source-of-truth-map.md"
        lines: "101-107"
        note: "Claims decision evidence depends on continuity plane architecture."
      - path: ".design-packages/orchestration-domain-design-package/canonicalization-target-map.md"
        lines: "31-39"
        note: "Treats `continuity/decisions/` as a future shared target rather than an existing authority surface."
      - path: ".octon/continuity/_meta/architecture/continuity-plane.md"
        lines: "15-25,54-61"
        note: "Live continuity contract canonizes the four-file continuity surface plus `runs/`, not `decisions/`."
    acceptance_criteria:
      - "Add canonical continuity authority for `continuity/decisions/`."
      - "Define retention and validation expectations for decision evidence."
      - "Retarget package claims if the continuity promotion is intentionally deferred."
  - id: "ODP-AUD-002"
    severity: "high"
    title: "Incident promotion depends on a live governance baseline that is product-specific, not Octon-generic"
    impact: "The proposed incident object model lacks a matching live governance authority surface."
    risk: "Runtime incident state may inherit product rollback heuristics instead of generic orchestration policy."
    evidence:
      - path: ".design-packages/orchestration-domain-design-package/normative-dependencies-and-source-of-truth-map.md"
        lines: "88-97"
        note: "Uses `.octon/orchestration/governance/incidents.md` as the incident governance baseline."
      - path: ".design-packages/orchestration-domain-design-package/canonicalization-target-map.md"
        lines: "20-27"
        note: "Says promoted incident state should extend existing `governance/incidents.md`."
      - path: ".octon/orchestration/governance/incidents.md"
        lines: "2-9,40-77"
        note: "Current document is a production rollback runbook with `vercel` and feature-flag commands."
      - path: ".design-packages/orchestration-domain-design-package/contracts/incident-object-contract.md"
        lines: "21-61"
        note: "Expects generic lifecycle, closure authority, and object invariants not covered by the current baseline."
    acceptance_criteria:
      - "Create a generic Octon incident governance contract."
      - "Keep product-specific rollback guidance as a separate runbook."
      - "Update the normative map and canonicalization target to point at the generic governance contract."
  - id: "ODP-AUD-003"
    severity: "medium"
    title: "Validation gates are specified, but the package has no machine-readable schemas, fixtures, or validator contract"
    impact: "The package is strong for planning but weak for deterministic proof."
    risk: "First implementations can diverge while still claiming conformance to the prose contracts."
    evidence:
      - path: ".design-packages/orchestration-domain-design-package/implementation-readiness.md"
        lines: "5-14,75-123"
        note: "Claims implementation readiness and defines gate checklist obligations."
      - path: ".design-packages/orchestration-domain-design-package/assurance-and-acceptance-matrix.md"
        lines: "22-128"
        note: "Requires contract validation, shape validation, scenario proof, and promotion gates."
      - path: ".design-packages/orchestration-domain-design-package/canonicalization-target-map.md"
        lines: "11-27"
        note: "Requires validation hooks for promoted surfaces."
      - path: ".design-packages/orchestration-domain-design-package"
        lines: "inventory"
        note: "Observed package inventory contains 52 files, all Markdown."
    acceptance_criteria:
      - "Add machine-readable schema exemplars for core contracts."
      - "Add positive and negative scenario fixtures for queue, decision, run, and incident behavior."
      - "Define validator inputs and expected failure outputs before retaining the stronger readiness claim."
