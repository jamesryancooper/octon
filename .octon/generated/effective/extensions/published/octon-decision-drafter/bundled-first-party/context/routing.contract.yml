schema_version: "octon-extension-routing-contract-v1"
dispatchers:
  - dispatcher_id: "octon-decision-drafter"
    default_route_id: "change-receipt"
    accepted_inputs:
      - "bundle"
      - "diff_range"
      - "diff_source"
      - "changed_paths"
      - "evidence_refs"
      - "adr_ref"
      - "migration_plan_ref"
      - "run_contract_ref"
      - "rollback_posture_ref"
      - "proposal_packet_ref"
      - "output_mode"
      - "draft_target_path"
      - "alignment_mode"
      - "dry_run_route"
    disambiguators:
      - input_name: "bundle"
        kind: "route-id"
        allowed_values:
          - "adr-update"
          - "migration-rationale"
          - "rollback-notes"
          - "change-receipt"
      - input_name: "output_mode"
        kind: "enum"
        allowed_values:
          - "inline"
          - "patch-suggestion"
          - "scratch-md"
    precedence:
      - "explicit-bundle-adr-update-diff-range"
      - "explicit-bundle-adr-update-diff-source"
      - "explicit-bundle-migration-rationale-diff-range"
      - "explicit-bundle-migration-rationale-diff-source"
      - "explicit-bundle-rollback-notes-diff-range"
      - "explicit-bundle-rollback-notes-diff-source"
      - "explicit-bundle-change-receipt-diff-range"
      - "explicit-bundle-change-receipt-diff-source"
      - "explicit-unsupported-bundle"
      - "conflicting-target-adr-and-migration"
      - "conflicting-target-adr-and-proposal"
      - "conflicting-target-adr-and-run"
      - "conflicting-target-adr-and-rollback"
      - "conflicting-target-migration-and-run"
      - "conflicting-target-migration-and-rollback"
      - "conflicting-target-proposal-and-run"
      - "conflicting-target-proposal-and-rollback"
      - "conflicting-diff-sources"
      - "patch-suggestion-missing-target"
      - "adr-ref-diff-range"
      - "adr-ref-diff-source"
      - "migration-plan-diff-range"
      - "migration-plan-diff-source"
      - "proposal-packet-diff-range"
      - "proposal-packet-diff-source"
      - "rollback-posture-diff-range"
      - "rollback-posture-diff-source"
      - "run-contract-diff-range"
      - "run-contract-diff-source"
      - "default-change-receipt-diff-range"
      - "default-change-receipt-diff-source"
      - "missing-grounding-diff-range"
      - "missing-grounding-diff-source"
      - "missing-diff-source"
    routes:
      - route_id: "adr-update"
        status: "resolved"
        execution_binding_id: "adr-update"
        matchers:
          - matcher_id: "explicit-bundle-adr-update-diff-range"
            reason_codes:
              - "explicit-bundle"
            all_of:
              - input_name: "bundle"
                predicate: "equals"
                value: "adr-update"
              - input_name: "diff_range"
                predicate: "present"
              - input_name: "diff_source"
                predicate: "absent"
          - matcher_id: "explicit-bundle-adr-update-diff-source"
            reason_codes:
              - "explicit-bundle"
            all_of:
              - input_name: "bundle"
                predicate: "equals"
                value: "adr-update"
              - input_name: "diff_source"
                predicate: "present"
              - input_name: "diff_range"
                predicate: "absent"
          - matcher_id: "adr-ref-diff-range"
            reason_codes:
              - "adr-ref"
            all_of:
              - input_name: "adr_ref"
                predicate: "present"
              - input_name: "diff_range"
                predicate: "present"
              - input_name: "diff_source"
                predicate: "absent"
          - matcher_id: "adr-ref-diff-source"
            reason_codes:
              - "adr-ref"
            all_of:
              - input_name: "adr_ref"
                predicate: "present"
              - input_name: "diff_source"
                predicate: "present"
              - input_name: "diff_range"
                predicate: "absent"
      - route_id: "migration-rationale"
        status: "resolved"
        execution_binding_id: "migration-rationale"
        matchers:
          - matcher_id: "explicit-bundle-migration-rationale-diff-range"
            reason_codes:
              - "explicit-bundle"
            all_of:
              - input_name: "bundle"
                predicate: "equals"
                value: "migration-rationale"
              - input_name: "diff_range"
                predicate: "present"
              - input_name: "diff_source"
                predicate: "absent"
          - matcher_id: "explicit-bundle-migration-rationale-diff-source"
            reason_codes:
              - "explicit-bundle"
            all_of:
              - input_name: "bundle"
                predicate: "equals"
                value: "migration-rationale"
              - input_name: "diff_source"
                predicate: "present"
              - input_name: "diff_range"
                predicate: "absent"
          - matcher_id: "migration-plan-diff-range"
            reason_codes:
              - "migration-plan-ref"
            all_of:
              - input_name: "migration_plan_ref"
                predicate: "present"
              - input_name: "diff_range"
                predicate: "present"
              - input_name: "diff_source"
                predicate: "absent"
          - matcher_id: "migration-plan-diff-source"
            reason_codes:
              - "migration-plan-ref"
            all_of:
              - input_name: "migration_plan_ref"
                predicate: "present"
              - input_name: "diff_source"
                predicate: "present"
              - input_name: "diff_range"
                predicate: "absent"
          - matcher_id: "proposal-packet-diff-range"
            reason_codes:
              - "proposal-packet-ref"
            all_of:
              - input_name: "proposal_packet_ref"
                predicate: "present"
              - input_name: "diff_range"
                predicate: "present"
              - input_name: "diff_source"
                predicate: "absent"
          - matcher_id: "proposal-packet-diff-source"
            reason_codes:
              - "proposal-packet-ref"
            all_of:
              - input_name: "proposal_packet_ref"
                predicate: "present"
              - input_name: "diff_source"
                predicate: "present"
              - input_name: "diff_range"
                predicate: "absent"
      - route_id: "rollback-notes"
        status: "resolved"
        execution_binding_id: "rollback-notes"
        matchers:
          - matcher_id: "explicit-bundle-rollback-notes-diff-range"
            reason_codes:
              - "explicit-bundle"
            all_of:
              - input_name: "bundle"
                predicate: "equals"
                value: "rollback-notes"
              - input_name: "diff_range"
                predicate: "present"
              - input_name: "diff_source"
                predicate: "absent"
          - matcher_id: "explicit-bundle-rollback-notes-diff-source"
            reason_codes:
              - "explicit-bundle"
            all_of:
              - input_name: "bundle"
                predicate: "equals"
                value: "rollback-notes"
              - input_name: "diff_source"
                predicate: "present"
              - input_name: "diff_range"
                predicate: "absent"
          - matcher_id: "rollback-posture-diff-range"
            reason_codes:
              - "rollback-posture-ref"
            all_of:
              - input_name: "rollback_posture_ref"
                predicate: "present"
              - input_name: "diff_range"
                predicate: "present"
              - input_name: "diff_source"
                predicate: "absent"
          - matcher_id: "rollback-posture-diff-source"
            reason_codes:
              - "rollback-posture-ref"
            all_of:
              - input_name: "rollback_posture_ref"
                predicate: "present"
              - input_name: "diff_source"
                predicate: "present"
              - input_name: "diff_range"
                predicate: "absent"
          - matcher_id: "run-contract-diff-range"
            reason_codes:
              - "run-contract-ref"
            all_of:
              - input_name: "run_contract_ref"
                predicate: "present"
              - input_name: "diff_range"
                predicate: "present"
              - input_name: "diff_source"
                predicate: "absent"
          - matcher_id: "run-contract-diff-source"
            reason_codes:
              - "run-contract-ref"
            all_of:
              - input_name: "run_contract_ref"
                predicate: "present"
              - input_name: "diff_source"
                predicate: "present"
              - input_name: "diff_range"
                predicate: "absent"
      - route_id: "change-receipt"
        status: "resolved"
        execution_binding_id: "change-receipt"
        matchers:
          - matcher_id: "explicit-bundle-change-receipt-diff-range"
            reason_codes:
              - "explicit-bundle"
            all_of:
              - input_name: "bundle"
                predicate: "equals"
                value: "change-receipt"
              - input_name: "diff_range"
                predicate: "present"
              - input_name: "diff_source"
                predicate: "absent"
          - matcher_id: "explicit-bundle-change-receipt-diff-source"
            reason_codes:
              - "explicit-bundle"
            all_of:
              - input_name: "bundle"
                predicate: "equals"
                value: "change-receipt"
              - input_name: "diff_source"
                predicate: "present"
              - input_name: "diff_range"
                predicate: "absent"
          - matcher_id: "default-change-receipt-diff-range"
            reason_codes:
              - "default-diff-plus-grounding"
            all_of:
              - input_name: "evidence_refs"
                predicate: "present"
              - input_name: "adr_ref"
                predicate: "absent"
              - input_name: "migration_plan_ref"
                predicate: "absent"
              - input_name: "proposal_packet_ref"
                predicate: "absent"
              - input_name: "rollback_posture_ref"
                predicate: "absent"
              - input_name: "run_contract_ref"
                predicate: "absent"
              - input_name: "diff_range"
                predicate: "present"
              - input_name: "diff_source"
                predicate: "absent"
          - matcher_id: "default-change-receipt-diff-source"
            reason_codes:
              - "default-diff-plus-grounding"
            all_of:
              - input_name: "evidence_refs"
                predicate: "present"
              - input_name: "adr_ref"
                predicate: "absent"
              - input_name: "migration_plan_ref"
                predicate: "absent"
              - input_name: "proposal_packet_ref"
                predicate: "absent"
              - input_name: "rollback_posture_ref"
                predicate: "absent"
              - input_name: "run_contract_ref"
                predicate: "absent"
              - input_name: "diff_source"
                predicate: "present"
              - input_name: "diff_range"
                predicate: "absent"
      - route_id: "unsupported-route-id"
        status: "deny"
        matchers:
          - matcher_id: "explicit-unsupported-bundle"
            reason_codes:
              - "unsupported-route-id"
            all_of:
              - input_name: "bundle"
                predicate: "present"
              - input_name: "bundle"
                predicate: "not_one_of"
                values:
                  - "adr-update"
                  - "migration-rationale"
                  - "rollback-notes"
                  - "change-receipt"
      - route_id: "conflicting-target-refs"
        status: "escalate"
        matchers:
          - matcher_id: "conflicting-target-adr-and-migration"
            reason_codes:
              - "conflicting-target-refs"
            all_of:
              - input_name: "adr_ref"
                predicate: "present"
              - input_name: "migration_plan_ref"
                predicate: "present"
          - matcher_id: "conflicting-target-adr-and-proposal"
            reason_codes:
              - "conflicting-target-refs"
            all_of:
              - input_name: "adr_ref"
                predicate: "present"
              - input_name: "proposal_packet_ref"
                predicate: "present"
          - matcher_id: "conflicting-target-adr-and-run"
            reason_codes:
              - "conflicting-target-refs"
            all_of:
              - input_name: "adr_ref"
                predicate: "present"
              - input_name: "run_contract_ref"
                predicate: "present"
          - matcher_id: "conflicting-target-adr-and-rollback"
            reason_codes:
              - "conflicting-target-refs"
            all_of:
              - input_name: "adr_ref"
                predicate: "present"
              - input_name: "rollback_posture_ref"
                predicate: "present"
          - matcher_id: "conflicting-target-migration-and-run"
            reason_codes:
              - "conflicting-target-refs"
            all_of:
              - input_name: "migration_plan_ref"
                predicate: "present"
              - input_name: "run_contract_ref"
                predicate: "present"
          - matcher_id: "conflicting-target-migration-and-rollback"
            reason_codes:
              - "conflicting-target-refs"
            all_of:
              - input_name: "migration_plan_ref"
                predicate: "present"
              - input_name: "rollback_posture_ref"
                predicate: "present"
          - matcher_id: "conflicting-target-proposal-and-run"
            reason_codes:
              - "conflicting-target-refs"
            all_of:
              - input_name: "proposal_packet_ref"
                predicate: "present"
              - input_name: "run_contract_ref"
                predicate: "present"
          - matcher_id: "conflicting-target-proposal-and-rollback"
            reason_codes:
              - "conflicting-target-refs"
            all_of:
              - input_name: "proposal_packet_ref"
                predicate: "present"
              - input_name: "rollback_posture_ref"
                predicate: "present"
      - route_id: "conflicting-diff-source"
        status: "escalate"
        matchers:
          - matcher_id: "conflicting-diff-sources"
            reason_codes:
              - "conflicting-diff-source"
            all_of:
              - input_name: "diff_range"
                predicate: "present"
              - input_name: "diff_source"
                predicate: "present"
      - route_id: "patch-suggestion-missing-target"
        status: "escalate"
        matchers:
          - matcher_id: "patch-suggestion-missing-target"
            reason_codes:
              - "patch-suggestion-missing-target"
            all_of:
              - input_name: "output_mode"
                predicate: "equals"
                value: "patch-suggestion"
              - input_name: "draft_target_path"
                predicate: "absent"
      - route_id: "missing-grounding"
        status: "escalate"
        matchers:
          - matcher_id: "missing-grounding-diff-range"
            reason_codes:
              - "missing-grounding"
            all_of:
              - input_name: "evidence_refs"
                predicate: "absent"
              - input_name: "adr_ref"
                predicate: "absent"
              - input_name: "migration_plan_ref"
                predicate: "absent"
              - input_name: "proposal_packet_ref"
                predicate: "absent"
              - input_name: "rollback_posture_ref"
                predicate: "absent"
              - input_name: "run_contract_ref"
                predicate: "absent"
              - input_name: "diff_range"
                predicate: "present"
              - input_name: "diff_source"
                predicate: "absent"
          - matcher_id: "missing-grounding-diff-source"
            reason_codes:
              - "missing-grounding"
            all_of:
              - input_name: "evidence_refs"
                predicate: "absent"
              - input_name: "adr_ref"
                predicate: "absent"
              - input_name: "migration_plan_ref"
                predicate: "absent"
              - input_name: "proposal_packet_ref"
                predicate: "absent"
              - input_name: "rollback_posture_ref"
                predicate: "absent"
              - input_name: "run_contract_ref"
                predicate: "absent"
              - input_name: "diff_source"
                predicate: "present"
              - input_name: "diff_range"
                predicate: "absent"
      - route_id: "missing-diff-source"
        status: "escalate"
        matchers:
          - matcher_id: "missing-diff-source"
            reason_codes:
              - "missing-diff-source"
            all_of:
              - input_name: "diff_range"
                predicate: "absent"
              - input_name: "diff_source"
                predicate: "absent"
    execution_bindings:
      - binding_id: "adr-update"
        route_id: "adr-update"
        command_capability_id: "octon-decision-drafter-adr-update"
        skill_capability_id: "octon-decision-drafter-adr-update"
        prompt_set_id: "octon-decision-drafter-adr-update"
      - binding_id: "migration-rationale"
        route_id: "migration-rationale"
        command_capability_id: "octon-decision-drafter-migration-rationale"
        skill_capability_id: "octon-decision-drafter-migration-rationale"
        prompt_set_id: "octon-decision-drafter-migration-rationale"
      - binding_id: "rollback-notes"
        route_id: "rollback-notes"
        command_capability_id: "octon-decision-drafter-rollback-notes"
        skill_capability_id: "octon-decision-drafter-rollback-notes"
        prompt_set_id: "octon-decision-drafter-rollback-notes"
      - binding_id: "change-receipt"
        route_id: "change-receipt"
        command_capability_id: "octon-decision-drafter-change-receipt"
        skill_capability_id: "octon-decision-drafter-change-receipt"
        prompt_set_id: "octon-decision-drafter-change-receipt"
