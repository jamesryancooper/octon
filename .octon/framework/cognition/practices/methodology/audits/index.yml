# Methodology Audit Governance Index
# Machine-readable discovery index for bounded audit doctrine artifacts.

schema_version: "1.0"
files:
  - id: audit-governance-overview
    path: README.md
    summary: Bounded audit governance overview and artifact contract.
    when: First entrypoint before planning audit work.

  - id: audit-doctrine
    path: doctrine.md
    summary: Core doctrine for bounded, convergent audit execution.
    when: When defining audit strategy and done-gate boundaries.

  - id: audit-invariants
    path: invariants.md
    summary: Required invariants and non-negotiable bounded-audit rules.
    when: When validating audit plan completeness.

  - id: audit-exceptions
    path: exceptions.md
    summary: Exception contract for rare bounded-audit deviations.
    when: When requesting or evaluating audit exceptions.

  - id: audit-ci-gates
    path: ci-gates.md
    summary: CI gate requirements for audit convergence and evidence enforcement.
    when: When implementing or debugging audit validation gates.

  - id: audit-findings-contract
    path: findings-contract.md
    summary: Stable finding identity and acceptance criteria contract.
    when: When generating, deduplicating, or resolving findings.

  - id: audit-surface-architecture-doctrine
    path: surface-architecture.md
    summary: Canonical doctrine for bounded analysis of one durable Octon surface or surface unit.
    when: When planning or running a single-surface architecture audit.
