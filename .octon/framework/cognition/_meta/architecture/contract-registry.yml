schema_version: "architecture-contract-registry-v1"
execution:
  write_roots:
    run_continuity_root: ".octon/state/continuity/runs"
    run_evidence_root: ".octon/state/evidence/runs"
    external_evidence_index_root: ".octon/state/evidence/external-index"
    lab_evidence_root: ".octon/state/evidence/lab"
    run_control_root: ".octon/state/control/execution/runs"
    run_assurance_root: ".octon/state/evidence/runs/<run-id>/assurance"
    run_measurements_root: ".octon/state/evidence/runs/<run-id>/measurements"
    run_interventions_root: ".octon/state/evidence/runs/<run-id>/interventions"
    run_disclosure_root: ".octon/state/evidence/disclosure/runs/<run-id>"
    release_disclosure_root: ".octon/state/evidence/disclosure/releases/<release-id>"
    governance_disclosure_root: ".octon/instance/governance/disclosure"
    execution_control_root: ".octon/state/control/execution"
    mission_control_root: ".octon/state/control/execution/missions"
    control_evidence_root: ".octon/state/evidence/control/execution"
    mission_continuity_root: ".octon/state/continuity/repo/missions"
    mission_effective_route_root: ".octon/generated/effective/orchestration/missions"
    mission_summary_root: ".octon/generated/cognition/summaries/missions"
    operator_digest_root: ".octon/generated/cognition/summaries/operators"
    mission_projection_root: ".octon/generated/cognition/projections/materialized/missions"
    execution_tmp_root: ".octon/generated/.tmp/execution"
  policy_roots:
    network_egress: ".octon/instance/governance/policies/network-egress.yml"
    execution_budgets: ".octon/instance/governance/policies/execution-budgets.yml"
    mission_autonomy: ".octon/instance/governance/policies/mission-autonomy.yml"
    ownership_registry: ".octon/instance/governance/ownership/registry.yml"
    support_targets: ".octon/instance/governance/support-targets.yml"
    missions_registry: ".octon/instance/orchestration/missions/registry.yml"
  control_state:
    budget_state: ".octon/state/control/execution/budgets/"
    approval_requests_root: ".octon/state/control/execution/approvals/requests"
    approval_grants_root: ".octon/state/control/execution/approvals/grants"
    exception_leases: ".octon/state/control/execution/exceptions/leases/"
    revocations: ".octon/state/control/execution/revocations/"
    runs_root: ".octon/state/control/execution/runs"
    missions_root: ".octon/state/control/execution/missions"
  objective_binding:
    contract_family_root: ".octon/framework/constitution/contracts/objective"
    workspace_objective_brief: ".octon/instance/charter/workspace.md"
    workspace_machine_charter: ".octon/instance/charter/workspace.yml"
  runtime_binding:
    contract_family_root: ".octon/framework/constitution/contracts/runtime"
    run_manifest_file: ".octon/state/control/execution/runs/<run-id>/run-manifest.yml"
    run_continuity_file: ".octon/state/continuity/runs/<run-id>/handoff.yml"
    runtime_state_file: ".octon/state/control/execution/runs/<run-id>/runtime-state.yml"
    rollback_posture_file: ".octon/state/control/execution/runs/<run-id>/rollback-posture.yml"
    checkpoint_root: ".octon/state/control/execution/runs/<run-id>/checkpoints"
    receipt_root: ".octon/state/evidence/runs/<run-id>/receipts"
    replay_pointer_file: ".octon/state/evidence/runs/<run-id>/replay-pointers.yml"
  assurance_binding:
    contract_family_root: ".octon/framework/constitution/contracts/assurance"
    functional_report_file: ".octon/state/evidence/runs/<run-id>/assurance/functional.yml"
    behavioral_report_file: ".octon/state/evidence/runs/<run-id>/assurance/behavioral.yml"
    maintainability_report_file: ".octon/state/evidence/runs/<run-id>/assurance/maintainability.yml"
    recovery_report_file: ".octon/state/evidence/runs/<run-id>/assurance/recovery.yml"
    evaluator_report_file: ".octon/state/evidence/runs/<run-id>/assurance/evaluator.yml"
    lab_evidence_root: ".octon/state/evidence/lab"
  disclosure_binding:
    contract_family_root: ".octon/framework/constitution/contracts/disclosure"
    authored_harness_card_file: ".octon/instance/governance/disclosure/harness-card.yml"
    run_card_file: ".octon/state/evidence/disclosure/runs/<run-id>/run-card.yml"
    harness_card_root: ".octon/state/evidence/disclosure/releases"
    historical_harness_card_mirror_root: ".octon/state/evidence/lab/harness-cards"
    benchmark_root: ".octon/state/evidence/lab/benchmarks"
    evaluator_review_root: ".octon/state/evidence/lab/evaluator-reviews"
  retention_binding:
    contract_family_root: ".octon/framework/constitution/contracts/retention"
    external_index_root: ".octon/state/evidence/external-index"
    evidence_classification_file: ".octon/state/evidence/runs/<run-id>/evidence-classification.yml"
    replay_storage_classes:
      - "git-inline"
      - "git-pointer"
      - "external-immutable"
  adapter_binding:
    contract_family_root: ".octon/framework/constitution/contracts/adapters"
    host_adapter_root: ".octon/framework/engine/runtime/adapters/host"
    model_adapter_root: ".octon/framework/engine/runtime/adapters/model"
    support_target_declaration: ".octon/instance/governance/support-targets.yml"
  authority_binding:
    contract_family_root: ".octon/framework/constitution/contracts/authority"
    control_evidence_root: ".octon/state/evidence/control/execution"
  forbidden_write_prefixes:
    - ".octon/framework/engine/_ops/state"
  required_doc_surfaces:
    - ".octon/framework/constitution/CHARTER.md"
    - ".octon/framework/constitution/contracts/assurance/README.md"
    - ".octon/framework/constitution/contracts/authority/README.md"
    - ".octon/framework/constitution/contracts/disclosure/README.md"
    - ".octon/framework/constitution/contracts/retention/README.md"
    - ".octon/framework/constitution/contracts/adapters/README.md"
    - ".octon/framework/constitution/contracts/objective/README.md"
    - ".octon/framework/constitution/contracts/runtime/README.md"
    - ".octon/README.md"
    - ".octon/instance/ingress/AGENTS.md"
    - ".octon/framework/cognition/_meta/architecture/specification.md"
    - ".octon/framework/cognition/_meta/architecture/runtime-vs-ops-contract.md"
    - ".octon/framework/cognition/governance/principles/mission-scoped-reversible-autonomy.md"
    - ".octon/instance/bootstrap/START.md"
    - ".octon/framework/engine/README.md"
    - ".octon/framework/engine/runtime/spec/policy-interface-v1.md"
    - ".octon/framework/engine/runtime/spec/execution-request-v3.schema.json"
    - ".octon/framework/engine/runtime/spec/execution-receipt-v3.schema.json"
    - ".octon/framework/engine/runtime/spec/policy-receipt-v2.schema.json"
    - ".octon/framework/engine/runtime/spec/policy-digest-v2.md"
    - ".octon/state/control/execution/runs/README.md"
    - ".octon/state/control/README.md"
    - ".octon/state/evidence/README.md"
  blocking_checks:
    - ".octon/framework/assurance/runtime/_ops/scripts/validate-version-parity.sh"
    - ".octon/framework/assurance/runtime/_ops/scripts/validate-architecture-conformance.sh"
    - ".octon/framework/assurance/runtime/_ops/scripts/validate-runtime-effective-state.sh"
    - ".octon/framework/assurance/runtime/_ops/scripts/validate-objective-binding-cutover.sh"
    - ".octon/framework/assurance/runtime/_ops/scripts/validate-runtime-lifecycle-normalization.sh"
    - ".octon/framework/assurance/runtime/_ops/scripts/validate-unified-execution-phase3-runtime-evidence-normalization.sh"
    - ".octon/framework/assurance/runtime/_ops/scripts/validate-phase4-proof-lab-enforcement.sh"
    - ".octon/framework/assurance/runtime/_ops/scripts/validate-assurance-disclosure-expansion.sh"
    - ".octon/framework/assurance/runtime/_ops/scripts/validate-execution-constitution-closeout.sh"
    - ".octon/framework/assurance/runtime/_ops/scripts/validate-wave5-agency-adapter-hardening.sh"
    - ".octon/framework/assurance/runtime/_ops/scripts/validate-mission-runtime-contracts.sh"
    - ".octon/framework/assurance/runtime/_ops/scripts/validate-mission-lifecycle-cutover.sh"
    - ".octon/framework/assurance/runtime/_ops/scripts/validate-mission-intent-invariants.sh"
    - ".octon/framework/assurance/runtime/_ops/scripts/validate-route-normalization.sh"
    - ".octon/framework/assurance/runtime/_ops/scripts/validate-mission-view-generation.sh"
    - ".octon/framework/assurance/runtime/_ops/scripts/validate-mission-control-evidence.sh"
    - ".octon/framework/assurance/runtime/_ops/scripts/validate-mission-source-of-truth.sh"
    - ".github/workflows/architecture-conformance.yml"
mission_autonomy:
  mission_registry: ".octon/instance/orchestration/missions/registry.yml"
  mission_charter_glob: ".octon/instance/orchestration/missions/*/mission.yml"
  mission_policy: ".octon/instance/governance/policies/mission-autonomy.yml"
  ownership_registry: ".octon/instance/governance/ownership/registry.yml"
  control_root: ".octon/state/control/execution/missions"
  control_evidence_root: ".octon/state/evidence/control/execution"
  continuity_root: ".octon/state/continuity/repo/missions"
  effective_route_root: ".octon/generated/effective/orchestration/missions"
  mission_summary_root: ".octon/generated/cognition/summaries/missions"
  operator_digest_root: ".octon/generated/cognition/summaries/operators"
  mission_projection_root: ".octon/generated/cognition/projections/materialized/missions"
documentation:
  class_precedence:
    - "authoritative-doc"
    - "operational-guide"
    - "narrative-doc"
  safety_trigger_classes:
    - "authoritative-doc"
  classes:
    - id: "authoritative-doc"
      description: "Markdown documents that define architecture, governance, bootstrap, or review-receipt behavior."
      match_globs:
        - ".octon/framework/constitution/CHARTER.md"
        - ".octon/framework/constitution/contracts/assurance/README.md"
        - ".octon/framework/constitution/contracts/authority/README.md"
        - ".octon/framework/constitution/contracts/disclosure/README.md"
        - ".octon/framework/constitution/contracts/retention/README.md"
        - ".octon/framework/constitution/contracts/adapters/README.md"
        - ".octon/framework/constitution/contracts/objective/README.md"
        - ".octon/framework/constitution/contracts/runtime/README.md"
        - ".octon/README.md"
        - ".octon/instance/ingress/AGENTS.md"
        - ".octon/framework/cognition/_meta/architecture/specification.md"
        - ".octon/framework/cognition/_meta/architecture/runtime-vs-ops-contract.md"
        - ".octon/framework/cognition/governance/principles/mission-scoped-reversible-autonomy.md"
        - ".octon/instance/bootstrap/START.md"
        - ".octon/framework/engine/README.md"
        - ".octon/framework/engine/runtime/spec/policy-interface-v1.md"
        - ".octon/framework/engine/runtime/spec/policy-digest-v2.md"
        - ".octon/state/control/README.md"
        - ".octon/state/evidence/README.md"
        - ".octon/state/control/execution/runs/README.md"
        - ".octon/framework/execution-roles/practices/pull-request-standards.md"
        - ".octon/instance/cognition/decisions/[0-9][0-9][0-9]-*.md"
        - ".github/PULL_REQUEST_TEMPLATE.md"
        - ".github/PULL_REQUEST_TEMPLATE/kaizen.md"
    - id: "operational-guide"
      description: "Markdown guidance that shapes operator behavior but does not define authoritative contract boundaries."
      match_globs:
        - ".octon/framework/**/README.md"
        - ".octon/framework/**/guide.md"
        - ".octon/framework/**/guides/**/*.md"
        - ".octon/framework/**/references/**/*.md"
        - ".octon/framework/**/practices/*.md"
        - ".octon/framework/**/practices/**/*.md"
        - ".octon/instance/bootstrap/scope.md"
        - ".octon/instance/bootstrap/conventions.md"
        - ".octon/instance/bootstrap/catalog.md"
        - ".octon/framework/engine/runtime/README.md"
        - ".octon/framework/engine/practices/**/*.md"
    - id: "narrative-doc"
      description: "Markdown content that remains non-authoritative and may stay on the cheaper safety path."
      match_globs:
        - "**/*.md"
