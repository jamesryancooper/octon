      handle_contract:
        - ".octon/framework/engine/runtime/spec/runtime-effective-artifact-handle-v1.md"
      handle_schema:
        - ".octon/framework/engine/runtime/spec/runtime-effective-artifact-handle-v1.schema.json"
      freshness_contract:
        - ".octon/framework/engine/runtime/spec/publication-freshness-gates-v3.md"
      route_bundle_lock_schema:
        - ".octon/framework/engine/runtime/spec/runtime-effective-route-bundle-lock-v2.schema.json"
    freshness_artifacts:
      - "artifact-map.yml"
      - "generation.lock.yml"
    commit_default_ref: ".octon/octon.yml#policies.generated_commit_defaults"
    allowed_source_family_refs:
      - "instance_governance"
      - "instance_locality"
      - "instance_missions"
      - "state_control_execution"
      - "state_evidence"
    forbidden_source_family_refs:
      - "inputs_additive"
      - "inputs_exploratory"
    required_conditions:
      - "publication receipt retained"
      - "generation lock current"
      - "resolver-verified runtime handle required"
      - "freshness.mode required with digest_bound, ttl_bound, or receipt_bound semantics"
      - "required dependency handles must verify before parent handles are trusted"
      - "legacy freshness timestamps remain ignored compatibility metadata, never trust inputs"
      - "root manifest digest drift invalidates trust immediately"
      - "canonical architecture evidence root resolves under architecture/10of10-target-transition"
      - "no authority widening beyond canonical sources"
  cognition_read_models:
    output_root: ".octon/generated/cognition/"
    authority_status: "derived-only"
    runtime_facing: false
    receipt_root: ".octon/state/evidence/validation/"
    commit_default_ref: ".octon/octon.yml#policies.generated_commit_defaults"
    allowed_source_family_refs:
      - "instance_decisions"
      - "instance_missions"
      - "state_control_execution"
      - "state_evidence"
      - "state_continuity"
    forbidden_source_family_refs:
      - "inputs_exploratory"
    required_conditions:
      - "field-level traceability to canonical authored, control, evidence, or continuity sources"
      - "freshness bounded by retained evidence and current control state"
      - "non-authority notice and forbidden-consumer metadata retained"
    named_maps:
      - projection_id: "architecture-map"
        definition_ref: ".octon/generated/cognition/projections/definitions/architecture-map.yml"
        materialized_ref: ".octon/generated/cognition/projections/materialized/architecture-map.md"
      - projection_id: "runtime-route-map"
        materialized_ref: ".octon/generated/cognition/projections/materialized/runtime-route-map.md"
      - projection_id: "support-pack-route-map"
        materialized_ref: ".octon/generated/cognition/projections/materialized/support-pack-route-map.md"
      - projection_id: "compatibility-retirement-map"
        definition_ref: ".octon/generated/cognition/projections/definitions/compatibility-retirement-map.yml"
        materialized_ref: ".octon/generated/cognition/projections/materialized/compatibility-retirement-map.md"
  proposal_discovery:
    output_path: ".octon/generated/proposals/registry.yml"
    authority_status: "derived-only"
    runtime_facing: false
    source_family_ref: "inputs_exploratory"
    lifecycle_authority: "proposal.yml and subtype manifests only"
    forbidden_consumers:
      - "runtime"
      - "policy"
    required_conditions:
      - "deterministic rebuild from proposal manifests"
      - "archive status preserved as lineage only"
