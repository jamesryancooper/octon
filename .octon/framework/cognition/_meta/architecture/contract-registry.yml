schema_version: "architecture-contract-registry-v2"
registry:
  registry_id: "octon-topology-authority-registry"
  role: >-
    Machine-readable topology, authority, publication, and doc-target registry
    for the Octon super-root.
  status: "active"
  structural_authority_note: >-
    This registry is the canonical machine-readable structural authority
    surface for class roots, delegated registries, path families, publication
    metadata, and active doc targets. It remains subordinate to the
    constitutional kernel and preserves the legacy execution, mission_autonomy,
    and documentation projections for existing validators.
  subordinate_to:
    - ".octon/framework/constitution/CHARTER.md"
    - ".octon/framework/constitution/charter.yml"
    - ".octon/framework/constitution/precedence/normative.yml"
  compatibility_projections:
    - "execution"
    - "mission_autonomy"
    - "documentation"
class_roots:
  resolution_order:
    - "framework"
    - "instance"
    - "state"
    - "generated"
    - "inputs"
  framework:
    root: ".octon/framework/"
    authority_class: "portable-authored-authority"
    authored_authority: true
    steady_state_role: >-
      Portable authored Octon core, constitutional contracts, runtime
      components, validators, and helper assets.
    must_not_contain:
      - "repo-local mutable control truth"
      - "retained evidence"
      - "generated outputs"
  instance:
    root: ".octon/instance/"
    authority_class: "repo-specific-authored-authority"
    authored_authority: true
    steady_state_role: >-
      Repo-specific durable authored authority including ingress, bootstrap,
      workspace charter, governance, locality, cognition decisions, runtime
      capability projections, and missions.
    must_not_contain:
      - "rebuildable generated outputs presented as authority"
      - "raw exploratory inputs presented as runtime or policy authority"
  state:
    root: ".octon/state/"
    authority_class: "operational-truth-and-retained-evidence"
    authored_authority: false
    steady_state_role: >-
      Mutable control truth, retained evidence, disclosure receipts, validation
      evidence, and active continuity or handoff state.
    must_not_contain:
      - "portable authored framework contracts"
      - "repo-owned durable governance policy"
  generated:
    root: ".octon/generated/"
    authority_class: "derived-projection"
    authored_authority: false
    steady_state_role: >-
      Rebuildable runtime-effective handles, operator read models,
      materialized projections, and proposal discovery projections.
    must_not_contain:
      - "durable authority"
      - "retained evidence presented as rebuildable output"
  inputs:
    root: ".octon/inputs/"
    authority_class: "non-authoritative-input"
    authored_authority: false
    steady_state_role: >-
      Raw additive inputs, exploratory proposals, and human-led ideation that
      may inform promotion or publication work without becoming direct runtime
      or policy dependencies.
    must_not_contain:
      - "direct runtime dependencies"
      - "direct policy dependencies"
steady_state_surface_classes:
  authored-authority:
    canonical_roots:
      - ".octon/framework/**"
      - ".octon/instance/**"
    authority_posture: "durable-authored-authority"
    role: "Canonical authored authority for constitutional, structural, runtime, and repo-governance contracts."
  mutable-control:
    canonical_roots:
      - ".octon/state/control/**"
    authority_posture: "mutable-operational-truth"
    role: "Current execution, quarantine, approval, and publication control truth."
  retained-evidence:
    canonical_roots:
      - ".octon/state/evidence/**"
    authority_posture: "retained-factual-truth"
    role: "Receipts, proof bundles, validation records, and disclosure evidence."
  continuity-state:
    canonical_roots:
      - ".octon/state/continuity/**"
    authority_posture: "resumption-context"
    role: "Handoff and continuity state that may guide resumption without minting authority."
  generated-operator-read-model:
    canonical_roots:
      - ".octon/generated/cognition/**"
    authority_posture: "derived-non-authority"
    role: "Traceable operator and maintainer projections that remain barred from runtime, policy, and support authority."
  generated-runtime-effective-handle:
    canonical_roots:
      - ".octon/generated/effective/**"
    authority_posture: "derived-runtime-handle"
    role: "Runtime-facing generated outputs that may be consumed only through resolver-verified handles."
  compatibility-projection:
    canonical_roots:
      - ".octon/instance/capabilities/runtime/packs/**"
      - ".octon/generated/cognition/projections/materialized/**"
      - ".octon/AGENTS.md"
      - "AGENTS.md"
      - "CLAUDE.md"
    authority_posture: "compatibility-only"
    role: "Retained shims and transitional mirrors that must never widen runtime, policy, or support authority."
  historical-evidence:
    canonical_roots:
      - ".octon/state/evidence/lab/**"
      - ".octon/state/evidence/disclosure/releases/**"
    authority_posture: "retained-historical-record"
    role: "Historical proof and disclosure records retained for lineage, replay, and audit."
  proposal-input:
    canonical_roots:
      - ".octon/inputs/exploratory/proposals/**"
    authority_posture: "lineage-only-input"
    role: "Exploratory proposal packets that may guide promotion work but never become live authority."
  raw-additive-input:
    canonical_roots:
      - ".octon/inputs/additive/**"
    authority_posture: "untrusted-additive-input"
    role: "Raw additive extension inputs pending desired selection, activation, publication, and freshness validation."
delegated_registries:
  root_manifest:
    path: ".octon/octon.yml"
    role: >-
      Super-root manifest for class-root bindings, portability profiles,
      runtime input bindings, and generated commit defaults.
    machine_keys:
      - "topology.class_roots"
      - "profiles"
      - "resolution"
      - "resolution.runtime_contract_refs"
      - "policies.generated_commit_defaults"
    status: "active"
  constitutional_contract_registry:
    path: ".octon/framework/constitution/contracts/registry.yml"
    role: "Constitutional contract-family registry and integration-surface register."
    machine_keys:
      - "kernel_surfaces"
      - "families"
      - "integration_surfaces"
    status: "active"
  overlay_points_registry:
    path: ".octon/framework/overlay-points/registry.yml"
    role: "Framework-authored declaration of legal overlay points and merge modes."
    status: "active"
  instance_manifest:
    path: ".octon/instance/manifest.yml"
    role: "Repo-side overlay enablement and instance-local overlay bindings."
    machine_keys:
      - "enabled_overlay_points"
    status: "active"
  ingress_manifest:
    path: ".octon/instance/ingress/manifest.yml"
    role: >-
      Mandatory ingress read order, optional orientation overlays, adapter
      parity targets, and the canonical branch/PR closeout workflow pointer.
    machine_keys:
      - "mandatory_reads"
      - "optional_orientation"
      - "conditional_orientation"
      - "adapter_parity_targets"
      - "closeout_workflow_ref"
    status: "active"
  decisions_index:
    path: ".octon/instance/cognition/decisions/index.yml"
    role: "Append-only machine discovery surface for durable ADR lineage."
    machine_keys:
      - "records"
    status: "active"
  retirement_register:
    path: ".octon/instance/governance/retirement-register.yml"
    role: "Repo-owned compatibility-retirement inventory for retained transitional surfaces."
    machine_keys:
      - "entries"
    status: "active"
path_families:
  constitutional_kernel:
    class_root: "framework"
    canonical_paths:
      - ".octon/framework/constitution/CHARTER.md"
      - ".octon/framework/constitution/charter.yml"
      - ".octon/framework/constitution/precedence/**"
      - ".octon/framework/constitution/obligations/**"
      - ".octon/framework/constitution/ownership/**"
      - ".octon/framework/constitution/contracts/**"
    authority_class: "supreme-repo-local-authority"
    role: "Repo-local constitutional kernel and constitutional contract families."
    allowed_consumers:
      - "docs"
      - "runtime"
      - "validators"
      - "operators"
    forbidden_consumers:
      - "generated projections as authority substitutes"
      - "host affordances as authority substitutes"
    delegated_registry_refs:
      - "constitutional_contract_registry"
    validator_refs:
      - ".octon/framework/assurance/runtime/_ops/scripts/validate-contract-governance.sh"
      - ".octon/framework/assurance/runtime/_ops/scripts/validate-architecture-conformance.sh"
    doc_target_refs:
      - "super_root_readme"
      - "architecture_specification"
      - "bootstrap_start"
      - "ingress_surface"
  structural_architecture:
    class_root: "framework"
    canonical_paths:
      - ".octon/framework/cognition/_meta/architecture/contract-registry.yml"
      - ".octon/framework/cognition/_meta/architecture/specification.md"
    authority_class: "structural-topology-authority"
    role: >-
      Machine-readable and human-readable structural architecture contract for
      placement, topology, publication, and doc-role invariants.
    allowed_consumers:
      - "docs"
      - "validators"
      - "runtime packaging and conformance tooling"
    forbidden_consumers:
      - "constitutional override logic"
      - "generated projections as source of truth"
    validator_refs:
      - ".octon/framework/assurance/runtime/_ops/scripts/validate-architecture-conformance.sh"
      - ".octon/framework/assurance/runtime/_ops/scripts/validate-authoritative-doc-triggers.sh"
      - ".octon/framework/assurance/runtime/_ops/scripts/validate-active-doc-hygiene.sh"
    doc_target_refs:
      - "super_root_readme"
      - "architecture_specification"
      - "bootstrap_start"
      - "ingress_surface"
  compatibility_retirement:
    class_root: "instance"
    canonical_paths:
      - ".octon/instance/governance/retirement-register.yml"
      - ".octon/instance/governance/contracts/retirement-policy.yml"
      - ".octon/instance/governance/contracts/retirement-review.yml"
      - ".octon/framework/engine/runtime/spec/compatibility-retirement-cutover-v2.md"
      - ".octon/generated/cognition/projections/materialized/compatibility-retirement-map.md"
    authority_class: "transitional-retirement-governance"
    role: "Declares retained compatibility surfaces, their successors, forbidden-consumer cutover posture, and the review/retirement contract."
    allowed_consumers:
      - "docs"
      - "validators"
      - "operators"
    forbidden_consumers:
      - "runtime or policy as a parallel authority path"
      - "runtime or policy direct reads from compatibility projections"
    delegated_registry_refs:
      - "retirement_register"
    validator_refs:
      - ".octon/framework/assurance/runtime/_ops/scripts/validate-compatibility-retirement.sh"
      - ".octon/framework/assurance/runtime/_ops/scripts/validate-compatibility-retirement-readiness.sh"
      - ".octon/framework/assurance/runtime/_ops/scripts/validate-compatibility-retirement-cutover.sh"
    doc_target_refs:
      - "architecture_specification"
      - "bootstrap_start"
  branch_pr_closeout_workflow:
    class_root: "framework"
    canonical_paths:
      - ".octon/framework/orchestration/runtime/workflows/meta/closeout/**"
      - ".octon/framework/execution-roles/practices/standards/git-worktree-autonomy-contract.yml"
      - ".octon/framework/capabilities/runtime/skills/remediation/closeout-pr/**"
    authority_class: "branch-closeout-workflow-governance"
    role: >-
      Canonical branch/PR closeout workflow, merge-lane semantics, and
      autonomous remediation/merge orchestration surfaces.
    allowed_consumers:
      - "agents"
      - "operators"
      - "validators"
      - "docs"
    forbidden_consumers:
      - "ingress manifest as an inline duplicate policy surface"
      - "build-to-delete governance closeout as a substitute"
    validator_refs:
      - ".octon/framework/assurance/runtime/_ops/scripts/validate-git-github-workflow-alignment.sh"
    doc_target_refs:
      - "architecture_specification"
      - "bootstrap_start"
  runtime_authorization_coverage:
    class_root: "framework"
    canonical_paths:
      - ".octon/framework/engine/runtime/spec/execution-authorization-v1.md"
      - ".octon/framework/engine/runtime/spec/authorization-boundary-coverage-v1.md"
      - ".octon/framework/engine/runtime/spec/material-side-effect-inventory-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/material-side-effect-inventory.yml"
      - ".octon/framework/engine/runtime/spec/authorization-boundary-coverage-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/authorization-boundary-coverage.yml"
      - ".octon/framework/engine/runtime/spec/authorization-phase-result-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/authorized-effect-token-v1.md"
      - ".octon/framework/engine/runtime/spec/authorized-effect-token-v2.schema.json"
      - ".octon/framework/engine/runtime/spec/authorized-effect-token-consumption-v1.schema.json"
    authority_class: "runtime-boundary-coverage-contract"
    role: "Runtime-owned boundary, inventory, typed effect-token, coverage, and phase-result contract surfaces."
    allowed_consumers:
      - "runtime"
      - "validators"
      - "docs"
    forbidden_consumers:
      - "generated projections as an authority substitute"
    validator_refs:
      - ".octon/framework/assurance/runtime/_ops/scripts/validate-material-side-effect-inventory.sh"
      - ".octon/framework/assurance/runtime/_ops/scripts/validate-authorization-boundary-coverage.sh"
      - ".octon/framework/assurance/runtime/_ops/scripts/validate-authorized-effect-token-enforcement.sh"
      - ".octon/framework/assurance/runtime/_ops/scripts/validate-run-lifecycle-transition-coverage.sh"
    doc_target_refs:
      - "architecture_specification"
  engagement_work_package_compiler:
    class_root: "framework"
    related_class_roots:
      - "instance"
      - "state"
      - "generated"
    canonical_paths:
      - ".octon/framework/engine/runtime/spec/engagement-work-package-compiler-v1.md"
      - ".octon/framework/engine/runtime/spec/engagement-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/project-profile-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/engagement-objective-brief-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/work-package-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/decision-request-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/evidence-profile-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/preflight-evidence-lane-v1.md"
      - ".octon/framework/engine/runtime/spec/tool-connector-posture-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/connector-posture-policy-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/connector-posture-registry-v1.schema.json"
      - ".octon/framework/constitution/contracts/runtime/engagement-v1.schema.json"
      - ".octon/framework/constitution/contracts/runtime/project-profile-v1.schema.json"
      - ".octon/framework/constitution/contracts/runtime/engagement-objective-brief-v1.schema.json"
      - ".octon/framework/constitution/contracts/runtime/work-package-v1.schema.json"
      - ".octon/framework/constitution/contracts/authority/decision-request-v1.schema.json"
      - ".octon/framework/constitution/contracts/runtime/evidence-profile-v1.schema.json"
      - ".octon/framework/constitution/contracts/adapters/tool-connector-posture-v1.schema.json"
      - ".octon/framework/constitution/contracts/adapters/connector-posture-policy-v1.schema.json"
      - ".octon/framework/constitution/contracts/adapters/connector-posture-registry-v1.schema.json"
      - ".octon/instance/locality/project-profile.yml"
      - ".octon/instance/governance/connectors/posture.yml"
      - ".octon/instance/governance/connectors/registry.yml"
      - ".octon/state/control/engagements/**"
      - ".octon/state/evidence/engagements/**"
      - ".octon/state/evidence/orientation/**"
      - ".octon/state/evidence/project-profiles/**"
      - ".octon/state/evidence/project-profiles/<profile-id>/source-facts/**"
      - ".octon/state/evidence/decisions/**"
      - ".octon/state/evidence/engagements/<engagement-id>/run-contract-readiness/**"
      - ".octon/state/continuity/engagements/**"
      - ".octon/generated/cognition/projections/materialized/engagements/**"
      - ".octon/generated/cognition/projections/materialized/work-packages/**"
    authority_class: "engagement-compiler-preparation-contract"
    role: >-
      Product-level preparation layer that compiles adoption, Project Profile,
      engagement-scoped Objective Brief candidate, Work Package, Decision
      Requests, evidence profile, connector posture, context-pack request, and
      first run-contract candidate without replacing the run lifecycle.
    allowed_consumers:
      - "runtime"
      - "validators"
      - "operators"
      - "docs"
    forbidden_consumers:
      - "run lifecycle replacement"
      - "workspace charter substitution"
      - "runtime dependencies on inputs/**"
      - "runtime dependencies on generated cognition projections"
      - "README-only connector authority"
      - "live connector effect authorization"
    doc_target_refs:
      - "architecture_specification"
      - "bootstrap_start"
  mission_autonomy_runtime_v2:
    class_root: "framework"
    related_class_roots:
      - "instance"
      - "state"
      - "generated"
    canonical_paths:
      - ".octon/framework/engine/runtime/spec/autonomy-window-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/mission-queue-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/mission-continuation-decision-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/mission-run-ledger-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/mission-closeout-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/mission-evidence-profile-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/mission-aware-decision-request-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/connector-operation-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/connector-admission-v1.schema.json"
      - ".octon/framework/constitution/contracts/runtime/autonomy-window-v1.schema.json"
      - ".octon/framework/constitution/contracts/runtime/mission-queue-v1.schema.json"
      - ".octon/framework/constitution/contracts/runtime/mission-continuation-decision-v1.schema.json"
      - ".octon/framework/constitution/contracts/runtime/mission-run-ledger-v1.schema.json"
      - ".octon/framework/constitution/contracts/runtime/mission-closeout-v1.schema.json"
      - ".octon/framework/constitution/contracts/runtime/mission-evidence-profile-v1.schema.json"
      - ".octon/framework/constitution/contracts/authority/mission-aware-decision-request-v1.schema.json"
      - ".octon/framework/constitution/contracts/adapters/connector-operation-v1.schema.json"
      - ".octon/framework/constitution/contracts/adapters/connector-admission-v1.schema.json"
      - ".octon/instance/governance/policies/mission-continuation.yml"
      - ".octon/instance/governance/policies/autonomy-window.yml"
      - ".octon/instance/governance/policies/connector-admission.yml"
      - ".octon/instance/governance/policies/mission-closeout.yml"
      - ".octon/state/control/execution/missions/**"
      - ".octon/state/evidence/control/execution/missions/**"
      - ".octon/state/continuity/repo/missions/**"
      - ".octon/generated/cognition/projections/materialized/missions/**"
    authority_class: "mission-continuation-runtime-contract"
    role: >-
      Mission-scoped continuation layer that consumes v1 Engagement and Work
      Package state, opens an Autonomy Window, maintains a Mission Queue,
      emits Continuation Decisions, indexes governed runs, and prepares
      run-contract candidates without replacing the run lifecycle.
    allowed_consumers:
      - "runtime"
      - "validators"
      - "operators"
      - "docs"
    forbidden_consumers:
      - "run lifecycle replacement"
      - "execution authorization replacement"
      - "per-run journal replacement"
      - "runtime dependencies on inputs/**"
      - "generated cognition projections as control"
      - "broad live connector effects"
    validator_refs:
      - ".octon/framework/assurance/runtime/_ops/scripts/validate-mission-autonomy-runtime-v2.sh"
    doc_target_refs:
      - "architecture_specification"
      - "bootstrap_start"
  continuous_stewardship_runtime_v3:
    class_root: "framework"
    related_class_roots:
      - "instance"
      - "state"
      - "generated"
    canonical_paths:
      - ".octon/framework/engine/runtime/spec/continuous-stewardship-runtime-v3.md"
      - ".octon/framework/engine/runtime/spec/stewardship-program-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/stewardship-epoch-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/stewardship-trigger-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/stewardship-admission-decision-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/stewardship-idle-decision-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/stewardship-renewal-decision-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/stewardship-epoch-closeout-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/stewardship-ledger-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/stewardship-evidence-profile-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/stewardship-aware-decision-request-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/stewardship-campaign-coordination-hook-v1.schema.json"
      - ".octon/instance/stewardship/programs/**"
      - ".octon/state/control/stewardship/programs/**"
      - ".octon/state/evidence/stewardship/programs/**"
      - ".octon/state/continuity/stewardship/programs/**"
      - ".octon/generated/cognition/projections/materialized/stewardship/**"
    authority_class: "continuous-stewardship-runtime-contract"
    role: >-
      Long-running availability layer that opens finite epochs, normalizes
      triggers, emits Admission, Idle, and Renewal Decisions, and hands bounded
      work to v1/v2 without replacing missions or run lifecycle authority.
    allowed_consumers:
      - "runtime"
      - "validators"
      - "operators"
      - "docs"
    forbidden_consumers:
      - "run lifecycle replacement"
      - "mission-control lease replacement"
      - "execution authorization replacement"
      - "generated cognition projections as control"
      - "runtime dependencies on inputs/**"
      - "campaigns as execution containers"
      - "infinite agent loops"
    validator_refs:
      - ".octon/framework/assurance/runtime/_ops/scripts/validate-continuous-stewardship-runtime-v3.sh"
    doc_target_refs:
      - "architecture_specification"
      - "bootstrap_start"
  connector_admission_runtime_v4:
    class_root: "framework"
    related_class_roots:
      - "instance"
      - "state"
      - "generated"
    canonical_paths:
      - ".octon/framework/engine/runtime/spec/connector-identity-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/connector-operation-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/connector-admission-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/connector-trust-dossier-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/connector-evidence-profile-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/connector-drift-record-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/connector-quarantine-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/connector-capability-mapping-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/connector-support-proof-map-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/connector-operation-posture-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/connector-credential-class-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/connector-egress-class-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/connector-failure-taxonomy-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/connector-replay-rollback-posture-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/connector-execution-receipt-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/connector-evidence-receipt-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/connector-validation-receipt-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/connector-trust-dossier-proof-bundle-v1.schema.json"
      - ".octon/framework/engine/runtime/spec/connector-aware-decision-request-v1.schema.json"
      - ".octon/framework/constitution/contracts/adapters/connector-identity-v1.schema.json"
      - ".octon/framework/constitution/contracts/adapters/connector-operation-v1.schema.json"
