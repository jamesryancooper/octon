schema_version: "octon-overlay-points-registry-v1"
overlay_points:
  - overlay_point_id: "instance-governance-policies"
    owning_domain: "governance"
    instance_glob: ".octon/instance/governance/policies/**"
    merge_mode: "replace_by_path"
    validator: ".octon/framework/assurance/runtime/_ops/scripts/validate-overlay-points.sh"
    precedence: 10
    artifact_kinds:
      - "policy"
  - overlay_point_id: "instance-governance-contracts"
    owning_domain: "governance"
    instance_glob: ".octon/instance/governance/contracts/**"
    merge_mode: "replace_by_path"
    validator: ".octon/framework/assurance/runtime/_ops/scripts/validate-overlay-points.sh"
    precedence: 20
    artifact_kinds:
      - "contract"
  - overlay_point_id: "instance-governance-adoption"
    owning_domain: "governance"
    instance_glob: ".octon/instance/governance/adoption/**"
    merge_mode: "replace_by_path"
    validator: ".octon/framework/assurance/runtime/_ops/scripts/validate-overlay-points.sh"
    precedence: 25
    artifact_kinds:
      - "playbook"
  - overlay_point_id: "instance-governance-retirement"
    owning_domain: "governance"
    instance_glob: ".octon/instance/governance/retirement/**"
    merge_mode: "replace_by_path"
    validator: ".octon/framework/assurance/runtime/_ops/scripts/validate-overlay-points.sh"
    precedence: 26
    artifact_kinds:
      - "contract"
  - overlay_point_id: "instance-governance-exclusions"
    owning_domain: "governance"
    instance_glob: ".octon/instance/governance/exclusions/**"
    merge_mode: "replace_by_path"
    validator: ".octon/framework/assurance/runtime/_ops/scripts/validate-overlay-points.sh"
    precedence: 27
    artifact_kinds:
      - "contract"
  - overlay_point_id: "instance-governance-capability-packs"
    owning_domain: "governance"
    instance_glob: ".octon/instance/governance/capability-packs/**"
    merge_mode: "replace_by_path"
    validator: ".octon/framework/assurance/runtime/_ops/scripts/validate-overlay-points.sh"
    precedence: 28
    artifact_kinds:
      - "contract"
  - overlay_point_id: "instance-governance-decisions"
    owning_domain: "governance"
    instance_glob: ".octon/instance/governance/decisions/**"
    merge_mode: "append_only"
    validator: ".octon/framework/assurance/runtime/_ops/scripts/validate-overlay-points.sh"
    precedence: 29
    artifact_kinds:
      - "decision"
  - overlay_point_id: "instance-execution-roles-runtime"
    owning_domain: "execution-roles"
    instance_glob: ".octon/instance/execution-roles/runtime/**"
    merge_mode: "merge_by_id"
    validator: ".octon/framework/assurance/runtime/_ops/scripts/validate-overlay-points.sh"
    precedence: 30
    artifact_kinds:
      - "runtime"
  - overlay_point_id: "instance-assurance-runtime"
    owning_domain: "assurance"
    instance_glob: ".octon/instance/assurance/runtime/**"
    merge_mode: "append_only"
    validator: ".octon/framework/assurance/runtime/_ops/scripts/validate-overlay-points.sh"
    precedence: 40
    artifact_kinds:
      - "runtime"
