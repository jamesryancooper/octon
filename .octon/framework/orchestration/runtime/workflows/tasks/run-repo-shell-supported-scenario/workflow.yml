---
schema_version: workflow-contract-v2
name: run-repo-shell-supported-scenario
description: Guided repo-shell supported-scenario workflow that retains scenario proof, replay linkage, and operator-facing summaries.
version: 1.0.0
entry_mode: human
execution_profile: core
side_effect_class: read_only
execution_controls:
  cancel_safe: true
coordination_key_strategy:
  kind: none
executor_interface_version: workflow-executor-v1
inputs: []
stages:
- id: inline
  asset: stages/01-inline.md
  kind: analysis
  produces:
  - stage:inline
  consumes: []
  mutation_scope: []
  authorization:
    action_type: execute_stage
    requested_capabilities:
    - workflow.stage.execute
    - evidence.write
    side_effects:
      write_repo: false
      write_evidence: true
      shell: true
      network: false
      model_invoke: true
      state_mutation: false
      publication: false
      branch_mutation: false
    risk_tier: low
    scope:
      read:
      - workflow-scope
      - workflow-contract
      write:
      - workflow-evidence
    review_requirements:
      human_approval: false
      quorum: false
      rollback_metadata: false
    allowed_executor_profiles:
    - read_only_analysis
artifacts:
  - name: lab_scenario_proof
    path: ".octon/state/evidence/lab/scenarios/<scenario-id>/scenario-proof.yml"
    description: "Retained repo-shell supported-scenario proof."
  - name: publication_receipt
    path: ".octon/state/evidence/validation/publication/workflows/repo-shell-supported-scenario-<run-id>.yml"
    description: "Retained publication-style receipt for supported scenario execution."
done_gate:
  checks:
  - single stage completes successfully
constraints:
  fail_closed: true
  forbid_design_packages: true
  require_relative_local_assets: true
