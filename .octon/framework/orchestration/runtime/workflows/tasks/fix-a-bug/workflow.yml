---
schema_version: workflow-contract-v2
name: fix-a-bug
description: Step-by-step guide to fixing a bug with AI assistance.
version: 1.0.0
entry_mode: human
execution_profile: core
side_effect_class: mutating
execution_controls:
  cancel_safe: false
coordination_key_strategy:
  kind: workflow-target
  source_fields:
  - workflow_group
  - workflow_id
  format: workflow:{workflow_group}/{workflow_id}
executor_interface_version: workflow-executor-v1
inputs: []
stages:
- id: inline
  asset: stages/01-inline.md
  kind: analysis
  produces:
  - stage:inline
  consumes: []
  mutation_scope: []
  authorization:
    action_type: execute_stage
    requested_capabilities:
    - workflow.stage.execute
    - evidence.write
    side_effects:
      write_repo: false
      write_evidence: true
      shell: true
      network: false
      model_invoke: true
      state_mutation: false
      publication: false
      branch_mutation: false
    risk_tier: low
    scope:
      read:
      - workflow-scope
      write:
      - workflow-evidence
    review_requirements:
      human_approval: false
      quorum: false
      rollback_metadata: false
    allowed_executor_profiles:
    - read_only_analysis
artifacts: []
done_gate:
  checks:
  - single stage completes successfully
constraints:
  fail_closed: true
  forbid_design_packages: true
  require_relative_local_assets: true
