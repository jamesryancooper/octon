schema_version: "workflow-contract-v1"
name: "audit-continuous"
description: "Orchestrate a layered bounded continuous audit across subsystem integrity, observability, operational readiness, API contracts, test quality, security, data governance, cross-subsystem coherence, and freshness. Produces deterministic evidence with stable finding IDs, coverage accounting, and explicit done-gate evaluation for recurring risk control."
version: "1.0.0"
entry_mode: "human"
execution_profile: "core"
side_effect_class: "read_only"
execution_controls:
  cancel_safe: true
coordination_key_strategy:
  kind: "none"
executor_interface_version: "workflow-executor-v1"
inputs:
  - name: subsystem
    type: folder
    required: true
    description: "Root directory of the subsystem to continuously audit"
  - name: docs
    type: folder
    required: false
    description: "Companion documentation directory for optional coherence checks"
  - name: severity_threshold
    type: text
    required: false
    default: "all"
    description: "Minimum severity to report: critical, high, medium, low, all"
  - name: cadence
    type: text
    required: false
    default: "weekly"
    description: "Continuous execution cadence metadata: daily or weekly"
  - name: lookback_days
    type: text
    required: false
    default: "7"
    description: "Historical lookback window in days used for trend context"
  - name: run_operational
    type: boolean
    required: false
    default: true
    description: "Run operational-readiness layer"
  - name: run_api_contract
    type: boolean
    required: false
    default: true
    description: "Run API-contract layer"
  - name: run_test_quality
    type: boolean
    required: false
    default: true
    description: "Run test-quality layer"
  - name: run_security
    type: boolean
    required: false
    default: true
    description: "Run security/compliance layer"
  - name: run_data_governance
    type: boolean
    required: false
    default: true
    description: "Run data-governance layer"
  - name: run_cross_subsystem
    type: boolean
    required: false
    default: true
    description: "Run cross-subsystem coherence layer"
  - name: run_freshness
    type: boolean
    required: false
    default: true
    description: "Run freshness and supersession layer"
  - name: max_age_days
    type: text
    required: false
    default: "30"
    description: "Freshness threshold in days when run_freshness is enabled"
  - name: post_remediation
    type: boolean
    required: false
    default: false
    description: "Enable strict done-gate enforcement for remediation verification"
  - name: convergence_k
    type: text
    required: false
    default: "3"
    description: "Number of controlled reruns used to evaluate convergence stability"
  - name: seed_list
    type: text
    required: false
    description: "Comma-separated deterministic seeds used for multi-run consistency checks"
stages:
  - id: "configure"
    asset: "stages/01-configure.md"
    kind: "analysis"
    consumes: []
    produces: ["stage:configure"]
    mutation_scope: []
  - id: "subsystem-health-audit"
    asset: "stages/02-subsystem-health-audit.md"
    kind: "analysis"
    consumes: ["stage:configure"]
    produces: ["stage:subsystem-health-audit"]
    mutation_scope: []
  - id: "observability-audit"
    asset: "stages/03-observability-audit.md"
    kind: "analysis"
    consumes: ["stage:subsystem-health-audit"]
    produces: ["stage:observability-audit"]
    mutation_scope: []
  - id: "operational-readiness-audit"
    asset: "stages/04-operational-readiness-audit.md"
    kind: "analysis"
    consumes: ["stage:observability-audit"]
    produces: ["stage:operational-readiness-audit"]
    mutation_scope: []
  - id: "api-contract-audit"
    asset: "stages/05-api-contract-audit.md"
    kind: "analysis"
    consumes: ["stage:operational-readiness-audit"]
    produces: ["stage:api-contract-audit"]
    mutation_scope: []
  - id: "test-quality-audit"
    asset: "stages/06-test-quality-audit.md"
    kind: "analysis"
    consumes: ["stage:api-contract-audit"]
    produces: ["stage:test-quality-audit"]
    mutation_scope: []
  - id: "security-audit"
    asset: "stages/07-security-audit.md"
    kind: "analysis"
    consumes: ["stage:test-quality-audit"]
    produces: ["stage:security-audit"]
    mutation_scope: []
  - id: "data-governance-audit"
    asset: "stages/08-data-governance-audit.md"
    kind: "analysis"
    consumes: ["stage:security-audit"]
    produces: ["stage:data-governance-audit"]
    mutation_scope: []
  - id: "cross-subsystem-audit"
    asset: "stages/09-cross-subsystem-audit.md"
    kind: "analysis"
    consumes: ["stage:data-governance-audit"]
    produces: ["stage:cross-subsystem-audit"]
    mutation_scope: []
  - id: "freshness-audit"
    asset: "stages/10-freshness-audit.md"
    kind: "analysis"
    consumes: ["stage:cross-subsystem-audit"]
    produces: ["stage:freshness-audit"]
    mutation_scope: []
  - id: "merge"
    asset: "stages/11-merge.md"
    kind: "projection"
    consumes: ["stage:freshness-audit"]
    produces: ["stage:merge"]
    mutation_scope: []
  - id: "report"
    asset: "stages/12-report.md"
    kind: "projection"
    consumes: ["stage:merge"]
    produces: ["stage:report"]
    mutation_scope: []
  - id: "verify"
    asset: "stages/13-verify.md"
    kind: "verification"
    consumes: ["stage:report"]
    produces: ["stage:verify"]
    mutation_scope: []
artifacts:
  - name: continuous_audit_report
    path: "/.octon/state/evidence/validation/analysis/{{date}}-audit-continuous.md"
    kind: file
    format: markdown
    determinism: unique
    description: "Consolidated audit-continuous report with ongoing risk recommendation"
  - name: subsystem_health_audit_report
    path: "/.octon/state/evidence/validation/analysis/{{date}}-subsystem-health-audit.md"
    kind: file
    format: markdown
    determinism: unique
    description: "Subsystem-health stage report (mandatory)"
  - name: observability_coverage_audit_report
    path: "/.octon/state/evidence/validation/analysis/{{date}}-observability-coverage-audit-{{run_id}}.md"
    kind: file
    format: markdown
    determinism: unique
    description: "Observability-coverage stage report (mandatory)"
  - name: operational_readiness_audit_report
    path: "/.octon/state/evidence/validation/analysis/{{date}}-operational-readiness-audit-{{run_id}}.md"
    kind: file
    format: markdown
    determinism: unique
    description: "Operational-readiness stage report (produced if enabled)"
  - name: api_contract_audit_report
    path: "/.octon/state/evidence/validation/analysis/{{date}}-api-contract-audit-{{run_id}}.md"
    kind: file
    format: markdown
    determinism: unique
    description: "API-contract stage report (produced if enabled)"
  - name: test_quality_audit_report
    path: "/.octon/state/evidence/validation/analysis/{{date}}-test-quality-audit-{{run_id}}.md"
    kind: file
    format: markdown
    determinism: unique
    description: "Test-quality stage report (produced if enabled)"
  - name: security_compliance_audit_report
    path: "/.octon/state/evidence/validation/analysis/{{date}}-security-compliance-audit-{{run_id}}.md"
    kind: file
    format: markdown
    determinism: unique
    description: "Security-compliance stage report (produced if enabled)"
  - name: data_governance_audit_report
    path: "/.octon/state/evidence/validation/analysis/{{date}}-data-governance-audit-{{run_id}}.md"
    kind: file
    format: markdown
    determinism: unique
    description: "Data-governance stage report (produced if enabled)"
  - name: cross_subsystem_audit_report
    path: "/.octon/state/evidence/validation/analysis/{{date}}-cross-subsystem-coherence-audit.md"
    kind: file
    format: markdown
    determinism: unique
    description: "Cross-subsystem stage report (produced if enabled)"
  - name: freshness_audit_report
    path: "/.octon/state/evidence/validation/analysis/{{date}}-freshness-and-supersession-audit.md"
    kind: file
    format: markdown
    determinism: unique
    description: "Freshness stage report (produced if enabled)"
  - name: continuous_audit_bundle
    path: "/.octon/state/evidence/validation/audits/{{date}}-{{slug}}/"
    kind: directory
    format: mixed
    determinism: unique
    description: "Authoritative bounded-audit bundle for continuous risk recommendation and done-gate evidence"
done_gate:
  checks:
    - "All enabled stages executed or explicitly skipped"
    - "Consolidated audit-continuous report exists"
    - "Bounded bundle exists at `.octon/state/evidence/validation/audits/YYYY-MM-DD-<slug>/`"
    - "Findings are deduplicated with stable IDs and acceptance criteria"
    - "Coverage and convergence metadata are present"
    - "Done-gate expression is evaluated and recorded"
    - "If `post_remediation=true`, done-gate is true"
constraints:
  fail_closed: true
  forbid_design_packages: true
  require_relative_local_assets: true
