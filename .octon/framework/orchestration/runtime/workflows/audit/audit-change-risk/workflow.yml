schema_version: "workflow-contract-v1"
name: "audit-change-risk"
description: "Orchestrate layered bounded audits to quantify change risk across subsystem integrity, migration impact, API contracts, test quality, operational readiness, cross-subsystem coherence, and freshness. Produces deterministic evidence with stable finding IDs, coverage accounting, and explicit done-gate evaluation."
version: "1.0.0"
entry_mode: "human"
execution_profile: "core"
side_effect_class: "read_only"
execution_controls:
  cancel_safe: true
coordination_key_strategy:
  kind: "none"
executor_interface_version: "workflow-executor-v1"
inputs:
  - name: subsystem
    type: folder
    required: true
    description: "Root directory of the changed subsystem to audit"
  - name: manifest
    type: file
    required: false
    description: "Migration manifest (inline YAML or file path) used for migration-impact checks"
  - name: docs
    type: folder
    required: false
    description: "Companion documentation directory for optional coherence checks"
  - name: severity_threshold
    type: text
    required: false
    default: "all"
    description: "Minimum severity to report: critical, high, medium, low, all"
  - name: run_migration
    type: boolean
    required: false
    default: true
    description: "Run migration-impact stage when manifest is available"
  - name: run_api_contract
    type: boolean
    required: false
    default: true
    description: "Run API-contract risk stage"
  - name: run_test_quality
    type: boolean
    required: false
    default: true
    description: "Run test-quality containment-risk stage"
  - name: run_operational
    type: boolean
    required: false
    default: true
    description: "Run operational-readiness risk stage"
  - name: run_cross_subsystem
    type: boolean
    required: false
    default: true
    description: "Run cross-subsystem coherence contagion-risk stage"
  - name: run_freshness
    type: boolean
    required: false
    default: true
    description: "Run freshness and supersession stale-context risk stage"
  - name: max_age_days
    type: text
    required: false
    default: "30"
    description: "Freshness threshold in days when run_freshness is enabled"
  - name: post_remediation
    type: boolean
    required: false
    default: false
    description: "Enable strict done-gate enforcement for remediation verification"
  - name: convergence_k
    type: text
    required: false
    default: "3"
    description: "Number of controlled reruns used to evaluate convergence stability"
  - name: seed_list
    type: text
    required: false
    description: "Comma-separated deterministic seeds used for multi-run consistency checks"
stages:
  - id: "configure"
    asset: "stages/01-configure.md"
    kind: "analysis"
    consumes: []
    produces: ["stage:configure"]
    mutation_scope: []
  - id: "subsystem-health-audit"
    asset: "stages/02-subsystem-health-audit.md"
    kind: "analysis"
    consumes: ["stage:configure"]
    produces: ["stage:subsystem-health-audit"]
    mutation_scope: []
  - id: "migration-impact-audit"
    asset: "stages/03-migration-impact-audit.md"
    kind: "analysis"
    consumes: ["stage:subsystem-health-audit"]
    produces: ["stage:migration-impact-audit"]
    mutation_scope: []
  - id: "api-contract-audit"
    asset: "stages/04-api-contract-audit.md"
    kind: "analysis"
    consumes: ["stage:migration-impact-audit"]
    produces: ["stage:api-contract-audit"]
    mutation_scope: []
  - id: "test-quality-audit"
    asset: "stages/05-test-quality-audit.md"
    kind: "analysis"
    consumes: ["stage:api-contract-audit"]
    produces: ["stage:test-quality-audit"]
    mutation_scope: []
  - id: "operational-readiness-audit"
    asset: "stages/06-operational-readiness-audit.md"
    kind: "analysis"
    consumes: ["stage:test-quality-audit"]
    produces: ["stage:operational-readiness-audit"]
    mutation_scope: []
  - id: "cross-subsystem-audit"
    asset: "stages/07-cross-subsystem-audit.md"
    kind: "analysis"
    consumes: ["stage:operational-readiness-audit"]
    produces: ["stage:cross-subsystem-audit"]
    mutation_scope: []
  - id: "freshness-audit"
    asset: "stages/08-freshness-audit.md"
    kind: "analysis"
    consumes: ["stage:cross-subsystem-audit"]
    produces: ["stage:freshness-audit"]
    mutation_scope: []
  - id: "merge"
    asset: "stages/09-merge.md"
    kind: "projection"
    consumes: ["stage:freshness-audit"]
    produces: ["stage:merge"]
    mutation_scope: []
  - id: "report"
    asset: "stages/10-report.md"
    kind: "projection"
    consumes: ["stage:merge"]
    produces: ["stage:report"]
    mutation_scope: []
  - id: "verify"
    asset: "stages/11-verify.md"
    kind: "verification"
    consumes: ["stage:report"]
    produces: ["stage:verify"]
    mutation_scope: []
artifacts:
  - name: change_risk_report
    path: "/.octon/state/evidence/validation/analysis/{{date}}-audit-change-risk.md"
    kind: file
    format: markdown
    determinism: unique
    description: "Consolidated change-risk report with risk tier and recommendation"
  - name: subsystem_health_audit_report
    path: "/.octon/state/evidence/validation/analysis/{{date}}-subsystem-health-audit.md"
    kind: file
    format: markdown
    determinism: unique
    description: "Subsystem-health stage report (mandatory)"
  - name: migration_audit_report
    path: "/.octon/state/evidence/validation/analysis/{{date}}-migration-audit.md"
    kind: file
    format: markdown
    determinism: unique
    description: "Migration-impact stage report (produced if enabled and manifest is provided)"
  - name: api_contract_audit_report
    path: "/.octon/state/evidence/validation/analysis/{{date}}-api-contract-audit-{{run_id}}.md"
    kind: file
    format: markdown
    determinism: unique
    description: "API-contract stage report (produced if enabled)"
  - name: test_quality_audit_report
    path: "/.octon/state/evidence/validation/analysis/{{date}}-test-quality-audit-{{run_id}}.md"
    kind: file
    format: markdown
    determinism: unique
    description: "Test-quality stage report (produced if enabled)"
  - name: operational_readiness_audit_report
    path: "/.octon/state/evidence/validation/analysis/{{date}}-operational-readiness-audit-{{run_id}}.md"
    kind: file
    format: markdown
    determinism: unique
    description: "Operational-readiness stage report (produced if enabled)"
  - name: cross_subsystem_audit_report
    path: "/.octon/state/evidence/validation/analysis/{{date}}-cross-subsystem-coherence-audit.md"
    kind: file
    format: markdown
    determinism: unique
    description: "Cross-subsystem stage report (produced if enabled)"
  - name: freshness_audit_report
    path: "/.octon/state/evidence/validation/analysis/{{date}}-freshness-and-supersession-audit.md"
    kind: file
    format: markdown
    determinism: unique
    description: "Freshness stage report (produced if enabled)"
  - name: change_risk_audit_bundle
    path: "/.octon/state/evidence/validation/audits/{{date}}-{{slug}}/"
    kind: directory
    format: mixed
    determinism: unique
    description: "Authoritative bounded-audit bundle for change-risk recommendation and done-gate evidence"
done_gate:
  checks:
    - "All enabled stages executed or explicitly skipped"
    - "Consolidated change-risk report exists"
    - "Bounded bundle exists at `.octon/state/evidence/validation/audits/YYYY-MM-DD-<slug>/`"
    - "Findings are deduplicated with stable IDs and acceptance criteria"
    - "Coverage and convergence metadata are present"
    - "Done-gate expression is evaluated and recorded"
    - "If `post_remediation=true`, done-gate is true"
constraints:
  fail_closed: true
  forbid_design_packages: true
  require_relative_local_assets: true
