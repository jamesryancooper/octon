---
schema_version: workflow-contract-v2
name: audit-architecture-readiness
description: Orchestrate whole-harness and bounded-domain architecture-readiness audits
  into a deterministic bounded-audit recommendation with optional supplemental evidence.
version: 1.0.0
entry_mode: human
execution_profile: core
side_effect_class: read_only
execution_controls:
  cancel_safe: true
coordination_key_strategy:
  kind: none
executor_interface_version: workflow-executor-v1
inputs:
- name: target_path
  type: folder
  required: true
  description: 'Octon target path to audit: either .octon or one top-level bounded-surface
    domain'
- name: severity_threshold
  type: text
  required: false
  default: all
  description: 'Minimum severity to report: critical, high, medium, low, all'
- name: run_cross_subsystem
  type: boolean
  required: false
  default: true
  description: Run audit-cross-subsystem-coherence when the target is whole-harness
- name: run_domain_architecture
  type: boolean
  required: false
  default: true
  description: Run audit-domain-architecture when the target is bounded-domain
- name: post_remediation
  type: boolean
  required: false
  default: false
  description: Enable strict done-gate enforcement for remediation verification
- name: convergence_k
  type: text
  required: false
  default: '3'
  description: Number of controlled reruns used to evaluate convergence stability
- name: seed_list
  type: text
  required: false
  description: Comma-separated deterministic seeds used for multi-run consistency
    checks
stages:
- id: configure
  asset: stages/01-configure.md
  kind: analysis
  consumes: []
  produces:
  - stage:configure
  mutation_scope: []
  authorization:
    action_type: execute_stage
    requested_capabilities:
    - workflow.stage.execute
    - evidence.write
    side_effects:
      write_repo: false
      write_evidence: true
      shell: true
      network: false
      model_invoke: true
      state_mutation: false
      publication: false
      branch_mutation: false
    risk_tier: low
    scope:
      read:
      - workflow-scope
      write:
      - workflow-evidence
    review_requirements:
      human_approval: false
      quorum: false
      rollback_metadata: false
    allowed_executor_profiles:
    - read_only_analysis
- id: classify-target
  asset: stages/02-classify-target.md
  kind: analysis
  consumes:
  - stage:configure
