artifacts:
- name: architecture_readiness_workflow_report
  path: "/.octon/state/evidence/validation/analysis/{{date}}-audit-architecture-readiness.md"
  kind: file
  format: markdown
  determinism: unique
  description: Consolidated architecture-readiness workflow report with recommendation
    and rationale
- name: architecture_readiness_audit_report
  path: "/.octon/state/evidence/validation/analysis/{{date}}-architecture-readiness-audit-{{run_id}}.md"
  kind: file
  format: markdown
  determinism: unique
  description: Primary stage report produced by audit-architecture-readiness
- name: architecture_readiness_summary_json
  path: "/.octon/state/evidence/validation/analysis/{{date}}-architecture-readiness-audit-{{run_id}}.json"
  kind: file
  format: json
  determinism: unique
  description: Machine-readable summary produced by audit-architecture-readiness
- name: cross_subsystem_audit_report
  path: "/.octon/state/evidence/validation/analysis/{{date}}-cross-subsystem-coherence-audit.md"
  kind: file
  format: markdown
  determinism: unique
  description: Cross-subsystem coherence report (produced if enabled and applicable)
- name: domain_architecture_audit_report
  path: "/.octon/state/evidence/validation/analysis/{{date}}-domain-architecture-audit-{{run_id}}.md"
  kind: file
  format: markdown
  determinism: unique
  description: Supplemental domain-architecture report (produced if enabled and applicable)
- name: architecture_readiness_audit_bundle
  path: "/.octon/state/evidence/validation/audits/{{date}}-{{slug}}/"
  kind: directory
  format: mixed
  determinism: unique
  description: Authoritative bounded-audit bundle for architecture-readiness recommendation
    and done-gate evidence
done_gate:
  checks:
  - Primary audit executes and classifies the target explicitly
  - Supplemental stages execute or skip according to the target mode
  - Consolidated workflow report exists
  - Bounded-audit bundle exists at `.octon/state/evidence/validation/audits/YYYY-MM-DD-<slug>/`
  - Findings are deduplicated with stable IDs and acceptance criteria
  - Coverage and convergence metadata are present
  - Done-gate expression is evaluated and recorded
  - If `post_remediation=true`, done-gate is true
constraints:
  fail_closed: true
  forbid_design_packages: true
  require_relative_local_assets: true
