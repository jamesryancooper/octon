---
schema_version: workflow-contract-v2
name: update-harness
description: Align an existing harness with the canonical class-root, overlay, and
  ingress contracts by auditing root-manifest, repo-instance, adapter, and boundary
  gaps, planning updates, and executing bounded remediations while preserving repo-owned
  `instance/**` authority unless an explicit migration contract applies.
version: 1.3.0
entry_mode: human
execution_profile: core
side_effect_class: mutating
execution_controls:
  cancel_safe: false
coordination_key_strategy:
  kind: workflow-target
  source_fields:
  - workflow_group
  - workflow_id
  format: workflow:{workflow_group}/{workflow_id}
executor_interface_version: workflow-executor-v1
inputs: []
stages:
- id: audit-state
  asset: stages/01-audit-state.md
  kind: analysis
  consumes: []
  produces:
  - stage:audit-state
  mutation_scope: []
  authorization:
    action_type: execute_stage
    requested_capabilities:
    - workflow.stage.execute
    - evidence.write
    side_effects:
      write_repo: false
      write_evidence: true
      shell: true
      network: false
      model_invoke: true
      state_mutation: false
      publication: false
      branch_mutation: false
    risk_tier: low
    scope:
      read:
      - workflow-scope
      write:
      - workflow-evidence
    review_requirements:
      human_approval: false
      quorum: false
      rollback_metadata: false
    allowed_executor_profiles:
    - read_only_analysis
- id: identify-gaps
  asset: stages/02-identify-gaps.md
  kind: analysis
  consumes:
