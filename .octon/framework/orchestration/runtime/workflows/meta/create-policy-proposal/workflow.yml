---
schema_version: workflow-contract-v2
name: create-policy-proposal
description: Scaffold a standard-governed policy proposal from canonical templates,
  materialize its manifests, persist workflow bundle evidence, and validate it immediately.
version: 1.0.0
entry_mode: human
execution_profile: core
side_effect_class: mutating
execution_controls:
  cancel_safe: false
coordination_key_strategy:
  kind: workflow-target
  source_fields:
  - workflow_group
  - workflow_id
  format: workflow:{workflow_group}/{workflow_id}
executor_interface_version: workflow-executor-v1
inputs:
- name: proposal_id
  type: text
  required: true
  description: Kebab-case policy proposal id and directory name under .octon/inputs/exploratory/proposals/policy/
- name: proposal_title
  type: text
  required: true
  description: Human-readable proposal title
- name: promotion_scope
  type: text
  required: true
  description: 'Promotion scope: octon-internal or repo-local'
- name: promotion_targets
  type: text
  required: true
  description: Comma-separated durable target paths that will survive proposal removal
stages:
- id: validate-request
  asset: stages/01-validate-request.md
  kind: analysis
  consumes: []
  produces:
  - stage:validate-request
  mutation_scope: []
  authorization:
    action_type: execute_stage
    requested_capabilities:
    - workflow.stage.execute
    - evidence.write
    side_effects:
      write_repo: false
      write_evidence: true
      shell: true
      network: false
      model_invoke: true
      state_mutation: false
      publication: false
      branch_mutation: false
    risk_tier: low
    scope:
      read:
      - workflow-scope
      write:
      - workflow-evidence
    review_requirements:
      human_approval: false
      quorum: false
      rollback_metadata: false
    allowed_executor_profiles:
    - read_only_analysis
- id: scaffold-proposal
  asset: stages/03-scaffold-package.md
  kind: mutation
  consumes:
  - stage:validate-request
  produces:
  - stage:scaffold-proposal
  mutation_scope: &1
  - workflow-scope
  authorization:
    action_type: execute_stage
    requested_capabilities:
    - workflow.stage.execute
    - repo.write
    - evidence.write
    side_effects:
      write_repo: true
      write_evidence: true
      shell: true
      network: false
      model_invoke: true
      state_mutation: false
      publication: false
      branch_mutation: false
    risk_tier: medium
    scope:
      read:
      - workflow-scope
      write: *1
    review_requirements:
      human_approval: false
      quorum: false
      rollback_metadata: true
    allowed_executor_profiles:
    - scoped_repo_mutation
- id: validate-proposal
  asset: stages/04-validate-package.md
  kind: verification
  consumes:
  - stage:scaffold-proposal
  produces:
  - stage:validate-proposal
  mutation_scope: []
  authorization:
    action_type: execute_stage
    requested_capabilities:
    - workflow.stage.execute
    - evidence.write
    side_effects:
      write_repo: false
      write_evidence: true
      shell: true
      network: false
      model_invoke: true
      state_mutation: false
      publication: false
      branch_mutation: false
    risk_tier: low
    scope:
      read:
      - workflow-scope
      write:
      - workflow-evidence
    review_requirements:
      human_approval: false
      quorum: false
      rollback_metadata: false
    allowed_executor_profiles:
    - read_only_analysis
- id: report
  asset: stages/05-report.md
  kind: projection
  consumes:
  - stage:validate-proposal
  produces:
  - stage:report
  mutation_scope: []
  authorization:
    action_type: execute_stage
    requested_capabilities:
    - workflow.stage.execute
    - evidence.write
    side_effects:
      write_repo: false
      write_evidence: true
      shell: true
      network: false
      model_invoke: true
      state_mutation: false
      publication: false
      branch_mutation: false
    risk_tier: low
    scope:
      read:
      - workflow-scope
      write:
      - workflow-evidence
    review_requirements:
      human_approval: false
      quorum: false
      rollback_metadata: false
    allowed_executor_profiles:
    - read_only_analysis
artifacts:
- name: create_policy_proposal_workflow_summary
  path: "../../../../../.octon/state/evidence/validation/{{date}}-create-policy-proposal.md"
  kind: file
  format: markdown
  determinism: unique
  description: Top-level workflow summary with proposal identity, validator outcome,
    and next steps
- name: create_policy_proposal_workflow_bundle
  path: "../../../../../.octon/state/evidence/runs/workflows/{{date}}-create-policy-proposal-{{proposal_id}}/"
  kind: directory
  format: mixed
  determinism: unique
  description: Workflow execution bundle containing stage receipts, validation state,
    scaffold inventory, and validator evidence
- name: create_policy_proposal_validator_log
  path: "../../../../../.octon/state/evidence/runs/workflows/{{date}}-create-policy-proposal-{{proposal_id}}/standard-validator.log"
  kind: file
  format: markdown
  determinism: unique
  description: Captured stdout and stderr from the proposal validator stack
- name: policy_proposal_root
  path: "../../../../../.octon/inputs/exploratory/proposals/policy/{{proposal_id}}/"
  kind: directory
  format: mixed
  determinism: unique
  description: Scaffolded standard-governed policy proposal
- name: proposal_manifest
  path: "../../../../../.octon/inputs/exploratory/proposals/policy/{{proposal_id}}/proposal.yml"
  kind: file
  format: yaml
  determinism: unique
  description: Root manifest for the scaffolded policy proposal
- name: policy_proposal_manifest
  path: "../../../../../.octon/inputs/exploratory/proposals/policy/{{proposal_id}}/policy-proposal.yml"
  kind: file
  format: yaml
  determinism: unique
  description: Subtype manifest for the scaffolded policy proposal
- name: proposal_registry
  path: "../../../../../.octon/generated/proposals/registry.yml"
  kind: file
  format: yaml
  determinism: shared
  description: Manifest-governed proposal registry updated with the new active proposal
    entry
done_gate:
  checks:
  - scaffolded proposal directory exists under .octon/inputs/exploratory/proposals/policy/
  - "`proposal.yml` and `policy-proposal.yml` are present and valid"
  - registry.yml includes the scaffolded proposal
  - workflow bundle exists under `.octon/state/evidence/runs/workflows/`
  - "`bundle.yml`, `summary.md`, `commands.md`, `validation.md`, and `inventory.md`
    exist"
  - "`reports/`, `stage-inputs/`, and `stage-logs/` exist"
  - standard-validator.log exists
  - validate-proposal-standard.sh and validate-policy-proposal.sh pass for the scaffolded
    proposal
  - validate-proposal-implementation-readiness.sh ran and recorded a structural-only
    or implementation-grade gate outcome
  - top-level summary exists
  - final verdict is explicit
constraints:
  fail_closed: true
  forbid_design_packages: false
  require_relative_local_assets: true
