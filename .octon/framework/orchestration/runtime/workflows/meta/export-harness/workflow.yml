schema_version: "workflow-contract-v1"
name: "export-harness"
description: "Materialize repo_snapshot or pack_bundle exports from the v2 root-manifest profile contract and fail closed on incomplete enabled-pack closure."
version: "1.0.0"
entry_mode: "human"
execution_profile: "core"
side_effect_class: "mutating"
execution_controls:
  cancel_safe: false
coordination_key_strategy:
  kind: "workflow-target"
  source_fields:
    - "workflow_group"
    - "workflow_id"
  format: "workflow:{workflow_group}/{workflow_id}"
executor_interface_version: "workflow-executor-v1"
inputs:
  - name: profile
    type: text
    required: true
    description: "Export profile: repo_snapshot or pack_bundle"
  - name: output_dir
    type: folder
    required: true
    description: "Empty directory where the export root and export.receipt.yml will be written"
  - name: pack_ids
    type: text
    required: false
    description: "Comma-separated pack ids. Required only for pack_bundle."
stages:
  - id: "validate-request"
    asset: "stages/01-validate-request.md"
    kind: "analysis"
    consumes: []
    produces: ["stage:validate-request"]
    mutation_scope: []
  - id: "resolve-profile"
    asset: "stages/02-resolve-profile.md"
    kind: "analysis"
    consumes: ["stage:validate-request"]
    produces: ["stage:resolve-profile"]
    mutation_scope: []
  - id: "materialize-export"
    asset: "stages/03-materialize-export.md"
    kind: "mutation"
    consumes: ["stage:resolve-profile"]
    produces: ["stage:materialize-export"]
    mutation_scope: ["workflow-scope"]
  - id: "verify-export"
    asset: "stages/04-verify-export.md"
    kind: "verification"
    consumes: ["stage:materialize-export"]
    produces: ["stage:verify-export"]
    mutation_scope: []
artifacts:
  - name: export_root
    path: "{{output_dir}}/.octon/"
    kind: directory
    format: mixed
    determinism: unique
    description: "Materialized harness export rooted at .octon/"
  - name: export_receipt
    path: "{{output_dir}}/export.receipt.yml"
    kind: file
    format: yaml
    determinism: unique
    description: "Receipt describing the exported profile payload, manifest schema versions, and resolved pack closure"
done_gate:
  checks:
    - "export root exists at <output_dir>/.octon/"
    - "export.receipt.yml exists at <output_dir>/"
    - "repo_snapshot exports octon.yml, framework/**, instance/**, and enabled-pack dependency closure only"
    - "pack_bundle exports only selected packs plus dependency closure"
constraints:
  fail_closed: true
  forbid_design_packages: true
  require_relative_local_assets: true
