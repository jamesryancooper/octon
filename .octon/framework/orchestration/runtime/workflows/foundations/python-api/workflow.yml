---
schema_version: workflow-contract-v2
name: python-api-foundation
description: 'Orchestrate the six Python API foundation skills in dependency order:
  scaffold-package first, then contract-first-api / infra-manifest / dev-toolchain
  in parallel, then test-harness, then contributor-guide last. Supports partial runs
  and resume after interruption.'
version: 1.0.0
entry_mode: human
execution_profile: external-dependent
side_effect_class: mutating
execution_controls:
  cancel_safe: false
coordination_key_strategy:
  kind: workflow-target
  source_fields:
  - workflow_group
  - workflow_id
  format: workflow:{workflow_group}/{workflow_id}
executor_interface_version: workflow-executor-v1
inputs:
- name: project_name
  type: text
  required: true
  description: Project name (lowercase, hyphens)
- name: description
  type: text
  required: true
  description: One-line project description
- name: python_version
  type: text
  required: true
  default: python3.12
  description: Python version (e.g., python3.12)
- name: services
  type: text
  required: false
  description: 'Infrastructure services: postgres, nats, redis, s3, temporal'
- name: skip
  type: text
  required: false
  description: Comma-separated skill IDs to skip
stages:
- id: gather-input
  asset: stages/01-gather-input.md
  kind: analysis
  consumes: []
  produces:
  - stage:gather-input
  mutation_scope: []
  authorization:
    action_type: execute_stage
    requested_capabilities:
    - workflow.stage.execute
    - evidence.write
    side_effects:
      write_repo: false
      write_evidence: true
      shell: true
      network: true
      model_invoke: true
      state_mutation: false
      publication: false
      branch_mutation: false
    risk_tier: low
    scope:
      read:
      - workflow-scope
      write:
      - workflow-evidence
    review_requirements:
      human_approval: false
      quorum: false
      rollback_metadata: false
    allowed_executor_profiles:
    - read_only_analysis
- id: scaffold-package
  asset: stages/02-scaffold-package.md
  kind: analysis
  consumes:
