artifacts:
- name: project_scaffold
  path: src/{{package_name}}/
  kind: directory
  format: python-package
  determinism: unique
  description: Complete Python package structure
- name: contracts
  path: docs/contracts/
  kind: directory
  format: mixed
  determinism: unique
  description: OpenAPI spec, JSON schemas, and versioning policy
- name: test_suite
  path: tests/
  kind: directory
  format: python-tests
  determinism: unique
  description: Three-tier test pyramid
- name: contributor_docs
  path: AGENT.md
  kind: file
  format: markdown
  determinism: unique
  description: AI agent orientation document
done_gate:
  checks:
  - "`pyproject.toml` exists with correct project name and dependencies"
  - "`src/<package>/` tree exists with all standard sub-packages"
  - "`docs/contracts/openapi-v1.yaml` exists (if contracts were generated)"
  - "`tests/` directory has conftest, contract tests, and unit tests"
  - "`docker-compose.local.yml` exists (if infrastructure was declared)"
  - "`justfile` exists with standard targets"
  - "`AGENT.md` and `CONTRIBUTING.md` exist"
  - "`just check` passes (or failures are documented)"
  - Verification step passes
constraints:
  fail_closed: true
  forbid_design_packages: true
  require_relative_local_assets: true
