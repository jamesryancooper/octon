# ============================================================================
# WORKFLOW GROUP DEFINITIONS
# Domain-oriented clusters for routing and directory organization.
# Workflows declare a `group` above; members are resolved here.
# ============================================================================
workflow_group_definitions:
  meta:
    description: Operate on the harness itself (CRUD for harness components)
    path: meta/
    members: [evaluate-harness, evaluate-ci-latency, migrate-harness, export-harness, update-harness, create-workflow, evaluate-workflow, update-workflow, create-skill, create-design-proposal, create-migration-proposal, create-policy-proposal, create-architecture-proposal, validate-proposal, promote-proposal, archive-proposal]
  audit:
    description: Audit orchestration and release gates
    path: audit/
    members: [audit-documentation, audit-design-proposal, audit-migration-proposal, audit-policy-proposal, audit-architecture-proposal, audit-workflow-system, audit-orchestration, audit-pre-release, audit-change-risk, audit-continuous, audit-post-incident, audit-release-readiness, audit-architecture-readiness]
  refactor:
    description: Verified structural refactor orchestration
    path: refactor/
    members: [refactor]
  foundations:
    description: Stack-specific project scaffolding orchestration
    path: foundations/
    members: [python-api-foundation, swift-macos-app-foundation]
  missions:
    description: Mission lifecycle management
    path: missions/
    members: [create-mission, complete-mission]
  projects:
    description: Project scaffolding
    path: projects/
    members: [create-project]
  ideation:
    description: Scratchpad content promotion
    path: ideation/
    members: [promote-from-scratchpad]
  tasks:
    description: Guided operational task playbooks
    path: tasks/
    members: [agent-led-happy-path, bootstrap-doctor, add-api-endpoint, add-ui-feature, fix-a-bug, handle-security-issue, repo-consequential-preflight, run-repo-shell-supported-scenario, run-data-migration]
# ============================================================================
# GOVERNANCE LINKAGE
# Capability map governs whether workflows may run autonomous or require
# role-mediated / human-only execution.
# ============================================================================
governance:
  capability_map_ref: "../../governance/capability-map-v1.yml"
  capability_map_schema_ref: "../../governance/capability-map-v1.schema.json"
  classification_field: "capability_classification"
  autonomy_gate:
    autonomous_execution_requires: "execution-role-ready"
    non_ready_modes: ["role-mediated", "human-only"]
