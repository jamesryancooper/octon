max_concurrency: 1
concurrency_mode: "serialize"
idempotency_strategy:
  kind: "event-dedupe"
  key_fields:
    - "automation_id"
    - "event_id"
    - "workflow_ref.workflow_id"
retry_policy:
  max_attempts: 3
  backoff: "fixed"
  retryable_classes:
    - "lock_acquisition_failure"
    - "launch_commit_failure"
pause_on_error: false
incident_policy:
  open_incident_on:
    - "launch-commit-failure"
