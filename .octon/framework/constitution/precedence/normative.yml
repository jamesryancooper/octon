schema_version: "octon-constitution-precedence-v1"
precedence_type: "normative"
summary: "Normative authority order for repo-local control decisions."
repo_class_root_fallback_order:
  - "framework"
  - "instance"
  - "state"
  - "generated"
  - "inputs"
layers:
  - rank: 1
    authority: "non-waivable-external-obligations"
    surfaces:
      - "external obligations"
      - "break-glass directives"
      - "live revocations"
    decision_rule: "These outrank all repo-local authority."
    adoption_status: "active"
  - rank: 2
    authority: "constitutional-kernel"
    surfaces:
      - ".octon/framework/constitution/CHARTER.md"
      - ".octon/framework/constitution/charter.yml"
      - ".octon/framework/constitution/obligations/fail-closed.yml"
      - ".octon/framework/constitution/obligations/evidence.yml"
    decision_rule: "The constitutional kernel is the supreme repo-local control regime."
    adoption_status: "active"
  - rank: 3
    authority: "repo-governance-declarations"
    surfaces:
      - ".octon/instance/governance/support-targets.yml"
      - ".octon/instance/governance/exclusions/action-classes.yml"
      - ".octon/instance/governance/policies/**"
      - ".octon/instance/governance/contracts/**"
    decision_rule: >-
      Published repo-owned policy families and support-target declarations apply
      beneath the kernel.
    adoption_status: "active"
    notes:
      - "Repo policy families are active."
      - "Support-target declarations are published for Wave 2 routing."
  - rank: 4
    authority: "run-specific-authority-artifacts"
    surfaces:
      - ".octon/state/control/execution/approvals/**"
      - ".octon/state/control/execution/exceptions/**"
      - ".octon/state/control/execution/revocations/**"
    decision_rule: >-
      Approval, exception, and revocation artifacts govern the current run.
      Labels, comments, checks, and similar host affordances may mirror
      status, but they never become authority and are ignored by runtime when
      canonical control artifacts disagree.
    adoption_status: "active"
    activation_wave: 2
  - rank: 5
    authority: "workspace-charter-pair"
    surfaces:
      - ".octon/instance/charter/workspace.md"
      - ".octon/instance/charter/workspace.yml"
    decision_rule: "Workspace-wide objective authority applies beneath the kernel and repo policy."
    adoption_status: "active"
  - rank: 6
    authority: "mission-charter-pair"
    surfaces:
      - ".octon/instance/orchestration/missions/**"
    decision_rule: "Mission authority governs continuity, ownership, overlap, and long-horizon autonomy."
    adoption_status: "active"
  - rank: 7
    authority: "run-contract"
    surfaces:
      - ".octon/state/control/execution/runs/<run-id>/run-contract.yml"
    decision_rule: "Run contracts are the atomic execution authority for consequential runs."
    adoption_status: "active"
    activation_wave: 1
  - rank: 8
    authority: "stage-attempt-contract"
    surfaces:
      - ".octon/state/control/execution/runs/<run-id>/stage-attempts/**"
    decision_rule: "Stage-attempt contracts govern retries, staged execution, and resumable attempt records beneath the bound run contract."
    adoption_status: "active"
    activation_wave: 1
  - rank: 9
    authority: "run-lifecycle-control"
    surfaces:
      - ".octon/state/control/execution/runs/<run-id>/run-manifest.yml"
      - ".octon/state/control/execution/runs/<run-id>/runtime-state.yml"
      - ".octon/state/control/execution/runs/<run-id>/rollback-posture.yml"
      - ".octon/state/control/execution/runs/<run-id>/checkpoints/**"
      - ".octon/state/evidence/runs/<run-id>/{receipts/**,checkpoints/**,replay/**,assurance/**,measurements/**,interventions/**,disclosure/**,replay-pointers.yml,trace-pointers.yml,evidence-classification.yml}"
    decision_rule: >-
      Bound run lifecycle files govern execution-time topology, status,
      rollback posture, durable checkpoints, replay manifests and pointers,
      evidence classification, proof-plane evidence, observability evidence,
      and RunCard disclosure beneath the bound run contract. These artifacts
      summarize authority and evidence but may not widen authority.
    adoption_status: "active"
    activation_wave: 3
  - rank: 10
    authority: "capability-tool-and-adapter-contracts"
    surfaces:
      - ".octon/framework/capabilities/**"
      - ".octon/framework/capabilities/packs/**"
      - ".octon/instance/capabilities/runtime/packs/**"
      - ".octon/framework/constitution/contracts/adapters/**"
      - ".octon/framework/engine/runtime/adapters/**"
    decision_rule: "Capability and adapter contracts may narrow execution but may not widen authority; adapter families remain replaceable and non-authoritative."
    adoption_status: "active"
    notes:
      - "Capability contracts are active."
      - "Generalized model and host adapter contracts are active in Wave 5."
  - rank: 11
    authority: "structural-architecture-and-placement-specs"
    surfaces:
      - ".octon/framework/cognition/_meta/architecture/specification.md"
      - ".octon/framework/cognition/_meta/architecture/contract-registry.yml"
      - ".octon/README.md"
      - ".octon/instance/bootstrap/START.md"
    decision_rule: >-
      Structural architecture and placement specs remain authoritative for
      topology and placement, but they may not override higher constitutional
      layers.
    adoption_status: "active"
  - rank: 12
    authority: "informative-context"
    surfaces:
      - "informative docs"
      - "generated summaries"
      - "chat history"
      - "model priors"
    decision_rule: "Informative context may guide interpretation but never mint authority."
    adoption_status: "active"
conflict_rule: >-
  When two applicable surfaces occupy the same layer, resolve by declared
  overlay rules and class-root fallback order without overriding higher layers.
  If support-target declarations and governance exclusions disagree, exclusions
  win for deny-only routing and the mismatch must emit drift evidence.
