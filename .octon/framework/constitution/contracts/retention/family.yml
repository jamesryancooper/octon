schema_version: "octon-constitutional-retention-family-v1"
family_id: "retention"
status: "active"
activation_wave: 6
release_state: "pre-1.0"
change_profile: "atomic"
profile_selection_receipt_ref: ".octon/instance/cognition/context/shared/migrations/2026-03-29-unified-execution-constitution-phase3-runtime-evidence-normalization/plan.md"
retention_model:
  run_continuity_root: ".octon/state/continuity/runs"
  run_evidence_root: ".octon/state/evidence/runs"
  control_evidence_root: ".octon/state/evidence/control/execution"
  external_index_root: ".octon/state/evidence/external-index"
  evidence_classification_file: ".octon/state/evidence/runs/<run-id>/evidence-classification.yml"
evidence_classes:
  - class_id: "A"
    label: "git-inline"
    description: "Git-inline disclosures, approvals, decisions, run cards, harness cards, and benchmark summaries."
    canonical_storage_class: "git-inline"
  - class_id: "B"
    label: "git-pointer"
    description: "Git-retained manifests and pointer files for replay, assurance summaries, and external artifact indices."
    canonical_storage_class: "git-pointer"
  - class_id: "C"
    label: "external-immutable"
    description: "External immutable raw model I/O, browser artifacts, HAR files, screenshots, videos, and high-frequency telemetry."
    canonical_storage_class: "external-immutable"
storage_classes:
  - class_id: "git-inline"
    description: "Evidence retained directly under canonical in-repo evidence roots."
  - class_id: "git-pointer"
    description: "Canonical evidence stores a stable in-repo pointer to another retained artifact family."
  - class_id: "external-immutable"
    description: "Canonical evidence stores a content-addressed pointer to immutable payloads outside the Git tree."
schemas:
  evidence_classification: ".octon/framework/constitution/contracts/retention/evidence-classification-v1.schema.json"
  external_replay_index: ".octon/framework/constitution/contracts/retention/external-replay-index-v1.schema.json"
  replay_storage_class: ".octon/framework/constitution/contracts/retention/replay-storage-class-v1.schema.json"
rules:
  - "Run continuity must remain distinct from retained evidence."
  - "Replay-heavy external payloads require a content-addressed retained index entry."
  - "Canonical run evidence must declare the packet evidence class plus storage class for each replay-bearing artifact."
