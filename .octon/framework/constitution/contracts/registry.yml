schema_version: "octon-constitution-contract-registry-v1"
kernel_surfaces:
  charter:
    markdown: ".octon/framework/constitution/CHARTER.md"
    machine: ".octon/framework/constitution/charter.yml"
    status: "active"
  precedence:
    normative: ".octon/framework/constitution/precedence/normative.yml"
    epistemic: ".octon/framework/constitution/precedence/epistemic.yml"
    status: "active"
  obligations:
    fail_closed: ".octon/framework/constitution/obligations/fail-closed.yml"
    evidence: ".octon/framework/constitution/obligations/evidence.yml"
    status: "active"
  ownership:
    roles: ".octon/framework/constitution/ownership/roles.yml"
    status: "active"
  support_targets:
    schema: ".octon/framework/constitution/support-targets.schema.json"
    authoritative_declaration: ".octon/instance/governance/support-targets.yml"
    status: "active-transitional"
families:
  - family_id: "objective"
    path: ".octon/framework/constitution/contracts/objective/**"
    activation_wave: 1
    status: "active-transitional"
    description: "Workspace, mission, run, and stage-attempt objective contracts."
  - family_id: "authority"
    path: ".octon/framework/constitution/contracts/authority/**"
    activation_wave: 2
    status: "active-transitional"
    description: "Approval, exception, revocation, and grant-bundle contracts."
  - family_id: "runtime"
    path: ".octon/framework/constitution/contracts/runtime/**"
    activation_wave: 3
    status: "reserved"
    description: "Run-lifecycle, checkpoint, and execution-state contracts."
  - family_id: "assurance"
    path: ".octon/framework/constitution/contracts/assurance/**"
    activation_wave: 4
    status: "reserved"
    description: "Proof-plane and assurance gating contracts."
  - family_id: "disclosure"
    path: ".octon/framework/constitution/contracts/disclosure/**"
    activation_wave: 4
    status: "reserved"
    description: "RunCard and HarnessCard disclosure contracts."
  - family_id: "retention"
    path: ".octon/framework/constitution/contracts/retention/**"
    activation_wave: 4
    status: "reserved"
    description: "Retention, replay, and evidence lifecycle contracts."
integration_surfaces:
  objective_contract_family:
    root: ".octon/framework/constitution/contracts/objective/**"
    status: "active-transitional"
  authority_contract_family:
    root: ".octon/framework/constitution/contracts/authority/**"
    status: "active-transitional"
  workspace_charter_pair:
    narrative: ".octon/instance/bootstrap/OBJECTIVE.md"
    machine: ".octon/instance/cognition/context/shared/intent.contract.yml"
    contract_ref: ".octon/framework/constitution/contracts/objective/workspace-charter-pair.yml"
    status: "active"
  mission_authority:
    path: ".octon/instance/orchestration/missions/**"
    role: "continuity-container"
    status: "active-transitional"
  run_control_root:
    path: ".octon/state/control/execution/runs/**"
    status: "active-transitional"
  authority_control_roots:
    approvals: ".octon/state/control/execution/approvals/**"
    exceptions: ".octon/state/control/execution/exceptions/**"
    revocations: ".octon/state/control/execution/revocations/**"
    status: "active-transitional"
  repo_policy_inputs:
    - ".octon/instance/governance/policies/**"
    - ".octon/instance/governance/ownership/registry.yml"
    - ".octon/instance/governance/support-targets.yml"
  retained_evidence_roots:
    - ".octon/state/evidence/runs/**"
    - ".octon/state/evidence/control/execution/**"
    - ".octon/state/evidence/validation/publication/**"
notes:
  - "Wave 0 established the constitutional kernel and reserved the objective contract family."
  - "Wave 1 promotes the workspace objective pair, defines run-contract and stage-attempt schemas, and publishes the canonical run-control root."
  - "Wave 2 activates the authority contract family, publishes support-target declarations for routing, and normalizes approval, exception, revocation, and decision evidence roots."
  - "Current mission-backed execution remains the live operational path until later runtime lifecycle waves move primary execution-time state to run roots."
