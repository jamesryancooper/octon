schema_version: "octon-constitution-contract-registry-v1"
kernel_surfaces:
  charter:
    markdown: ".octon/framework/constitution/CHARTER.md"
    machine: ".octon/framework/constitution/charter.yml"
    status: "active"
  precedence:
    normative: ".octon/framework/constitution/precedence/normative.yml"
    epistemic: ".octon/framework/constitution/precedence/epistemic.yml"
    status: "active"
  obligations:
    fail_closed: ".octon/framework/constitution/obligations/fail-closed.yml"
    evidence: ".octon/framework/constitution/obligations/evidence.yml"
    status: "active"
  ownership:
    roles: ".octon/framework/constitution/ownership/roles.yml"
    status: "active"
  support_targets:
    schema: ".octon/framework/constitution/support-targets.schema.json"
    authoritative_declaration: ".octon/instance/governance/support-targets.yml"
    status: "active"
shim_surfaces:
  ingress_projection_adapters:
    paths:
      - ".octon/AGENTS.md"
      - "AGENTS.md"
      - "CLAUDE.md"
    role: "adapter-only projected ingress surfaces"
    status: "active-shim"
    retirement_condition: "Remove when supported tools can enter directly through /.octon/instance/ingress/AGENTS.md without repo-root adapters."
  agency_constitution_application:
    path: ".octon/framework/agency/governance/CONSTITUTION.md"
    role: "historical agency constitutional shim retained outside the required execution path"
    status: "historical-shim"
    retirement_condition: "Delete when lineage references stop requiring the historical agency constitutional shim."
  cognition_governance_charter:
    path: ".octon/framework/cognition/governance/CHARTER.md"
    role: "historical cognition-governance charter shim"
    status: "historical-shim"
    retirement_condition: "Delete when compatibility readers and lineage references no longer require the cognition-governance shim."
  assurance_governance_charter:
    path: ".octon/framework/assurance/governance/CHARTER.md"
    role: "subordinate assurance-governance shim retained for assurance-local weighting and scoring policy"
    status: "subordinate-governance"
    retirement_condition: "Delete when assurance-local weighting and scoring no longer depend on a subordinate charter shim."
  protected_principles_charter:
    path: ".octon/framework/cognition/governance/principles/principles.md"
    role: "protected subordinate principles charter"
    status: "subordinate-governance"
    retirement_condition: "Delete only if a stricter subordinate governance successor fully replaces the protected principles charter."
families:
  - family_id: "objective"
    path: ".octon/framework/constitution/contracts/objective/**"
    activation_wave: 1
    status: "active"
    description: "Workspace, mission, run, and stage-attempt objective contracts."
  - family_id: "authority"
    path: ".octon/framework/constitution/contracts/authority/**"
    activation_wave: 2
    status: "active"
    description: "Approval, exception, revocation, and grant-bundle contracts."
  - family_id: "runtime"
    path: ".octon/framework/constitution/contracts/runtime/**"
    activation_wave: 3
    status: "active"
    description: "Run-lifecycle, checkpoint, and execution-state contracts."
  - family_id: "assurance"
    path: ".octon/framework/constitution/contracts/assurance/**"
    activation_wave: 4
    status: "active"
    description: "Proof-plane and assurance gating contracts."
  - family_id: "disclosure"
    path: ".octon/framework/constitution/contracts/disclosure/**"
    activation_wave: 4
    status: "active"
    description: "RunCard and HarnessCard disclosure contracts."
  - family_id: "adapters"
    path: ".octon/framework/constitution/contracts/adapters/**"
    activation_wave: 5
    status: "active"
    description: "Host, model, and capability-pack contracts plus conformance criteria."
  - family_id: "retention"
    path: ".octon/framework/constitution/contracts/retention/**"
    activation_wave: 6
    status: "active"
    description: "Retention, replay, and evidence lifecycle contracts."
integration_surfaces:
  objective_contract_family:
    root: ".octon/framework/constitution/contracts/objective/**"
    status: "active"
  authority_contract_family:
    root: ".octon/framework/constitution/contracts/authority/**"
    status: "active"
  runtime_contract_family:
    root: ".octon/framework/constitution/contracts/runtime/**"
    status: "active"
  retention_contract_family:
    root: ".octon/framework/constitution/contracts/retention/**"
    status: "active"
  run_manifest_file:
    path: ".octon/state/control/execution/runs/<run-id>/run-manifest.yml"
    status: "active"
  run_evidence_classification_file:
    path: ".octon/state/evidence/runs/<run-id>/evidence-classification.yml"
    status: "active"
  assurance_contract_family:
    root: ".octon/framework/constitution/contracts/assurance/**"
    status: "active"
  disclosure_contract_family:
    root: ".octon/framework/constitution/contracts/disclosure/**"
    status: "active"
  governance_disclosure_source:
    path: ".octon/instance/governance/disclosure/**"
    status: "active"
  closure_claim_manifest:
    path: ".octon/instance/governance/closure/unified-execution-constitution.yml"
    status: "active"
  closure_claim_status_matrix:
    path: ".octon/instance/governance/closure/unified-execution-constitution-status.yml"
    status: "active"
  retained_disclosure_roots:
    runs: ".octon/state/evidence/disclosure/runs/**"
    releases: ".octon/state/evidence/disclosure/releases/**"
    status: "active"
  adapter_contract_family:
    root: ".octon/framework/constitution/contracts/adapters/**"
    status: "active"
  workspace_charter_pair:
    narrative: ".octon/instance/charter/workspace.md"
    machine: ".octon/instance/charter/workspace.yml"
    machine_schema_ref: ".octon/framework/constitution/contracts/objective/workspace-charter-v1.schema.json"
    historical_shims:
      - ".octon/instance/bootstrap/OBJECTIVE.md"
      - ".octon/instance/cognition/context/shared/intent.contract.yml"
    contract_ref: ".octon/framework/constitution/contracts/objective/workspace-charter-pair.yml"
    status: "active"
  mission_authority:
    path: ".octon/instance/orchestration/missions/**"
    role: "continuity-container"
    status: "active"
  run_control_root:
    path: ".octon/state/control/execution/runs/**"
    status: "active"
  run_continuity_root:
    path: ".octon/state/continuity/runs/**"
    status: "active"
  run_evidence_root:
    path: ".octon/state/evidence/runs/**"
    status: "active"
  disclosure_evidence_root:
    path: ".octon/state/evidence/disclosure/**"
    status: "active"
  external_evidence_index_root:
    path: ".octon/state/evidence/external-index/**"
    status: "active"
  lab_evidence_root:
    path: ".octon/state/evidence/lab/**"
    status: "active"
  authority_control_roots:
    approvals: ".octon/state/control/execution/approvals/**"
    exceptions: ".octon/state/control/execution/exceptions/**"
    revocations: ".octon/state/control/execution/revocations/**"
    status: "active"
  repo_policy_inputs:
    - ".octon/instance/governance/policies/**"
    - ".octon/instance/governance/contracts/**"
    - ".octon/instance/governance/ownership/registry.yml"
    - ".octon/instance/governance/support-targets.yml"
  runtime_adapter_roots:
    host: ".octon/framework/engine/runtime/adapters/host/**"
    model: ".octon/framework/engine/runtime/adapters/model/**"
  runtime_capability_pack_roots:
    framework: ".octon/framework/capabilities/packs/**"
    instance: ".octon/instance/capabilities/runtime/packs/**"
  retained_evidence_roots:
    - ".octon/state/evidence/runs/**"
    - ".octon/state/evidence/lab/**"
    - ".octon/state/evidence/control/execution/**"
    - ".octon/state/evidence/validation/publication/**"
  build_to_delete_review_evidence_root:
    path: ".octon/state/evidence/validation/publication/build-to-delete/**"
    status: "active"
notes:
  - "Wave 0 established the constitutional kernel and reserved the objective contract family."
  - "Phase 1 keeps framework/constitution/** singular and de-authorizes legacy charter- or constitution-shaped surfaces into explicit shims."
  - "Phase 2 re-homes the canonical workspace charter pair into instance/charter/** while preserving bootstrap and cognition objective files as explicit shims."
  - "Wave 1 defines run-contract and stage-attempt schemas and publishes the canonical run-control root."
  - "Wave 2 activates the authority contract family, publishes support-target declarations for routing, and normalizes approval, exception, revocation, and decision evidence roots."
  - "Wave 3 activates the runtime contract family, makes run roots the primary execution-time unit of truth, and bridges mission continuity plus generated read models onto per-run evidence."
  - "Wave 4 activates the assurance and disclosure contract families, promotes lab and observability surfaces, and extends retained run evidence with proof-plane, measurement, intervention, and disclosure families."
  - "Phase 4 adds authored functional, behavioral, maintainability, and recovery suites; substantive lab scenario/replay/shadow/fault domains; and evaluator adapters with CI enforcement."
  - "Wave 4 remediation adds the maintainability proof plane, reusable evaluator and HarnessCard writers, benchmark-backed lab catalogs, and a generic run evidence backfill path."
  - "Wave 5 activates the adapter contract family, publishes runtime host/model adapter manifests, governs capability packs, and bounds adapter support claims through support-target declarations and conformance criteria."
  - "Wave 6 activates retention governance, separates run continuity from retained run evidence, and retires staged coexistence markers so the final constitutional model remains the only live target."
  - "Phase 3 codifies `run-manifest.yml` as the canonical run-manifest model, adds per-run evidence classification, and requires external immutable replay indexing for supported boundary-sensitive run classes."
  - "Phase 7 institutionalizes build-to-delete governance with a retirement registry, recurring drift/support-target/adapter/retirement reviews, and ablation-backed deletion receipts."
