notes:
  - "Wave 0 established the constitutional kernel and reserved the objective contract family."
  - "Phase 1 keeps framework/constitution/** singular and de-authorizes legacy charter- or constitution-shaped surfaces into explicit shims."
  - "Phase 2 re-homes the canonical workspace charter pair into instance/charter/** while preserving bootstrap and cognition objective files as explicit shims."
  - "Wave 1 defines run-contract and stage-attempt schemas and publishes the canonical run-control root."
  - "Wave 2 activates the authority contract family, publishes support-target declarations for routing, and normalizes approval, exception, revocation, and decision evidence roots."
  - "Wave 3 activates the runtime contract family, makes run roots the primary execution-time unit of truth, and bridges mission continuity plus generated read models onto per-run evidence."
  - "Wave 4 activates the assurance and disclosure contract families, promotes lab and observability surfaces, and extends retained run evidence with proof-plane, measurement, intervention, and disclosure families."
  - "Phase 4 adds authored functional, behavioral, maintainability, and recovery suites; substantive lab scenario/replay/shadow/fault domains; and evaluator adapters with CI enforcement."
  - "Wave 4 remediation adds the maintainability proof plane, reusable evaluator and HarnessCard writers, benchmark-backed lab catalogs, and a generic run evidence backfill path."
  - "Wave 5 activates the adapter contract family, publishes runtime host/model adapter manifests, governs capability packs, and bounds adapter support claims through support-target declarations and conformance criteria."
  - "Wave 6 activates retention governance, separates run continuity from retained run evidence, and retires staged coexistence markers so the final constitutional model remains the only live target."
  - "The live support universe is the bounded admitted tuple set declared in .octon/instance/governance/support-targets.yml; browser, API, broad MCP, arbitrary external systems, and effectful connector autonomy remain stage-only, unadmitted, unsupported, or non-live unless support-target admissions, capability-pack admission, connector dossiers, support cards, and retained validation evidence explicitly admit them."
  - "Phase 3 codifies `run-manifest.yml` as the canonical run-manifest model, adds per-run evidence classification, and requires external immutable replay indexing for supported boundary-sensitive run classes."
  - "Phase 7 institutionalizes build-to-delete governance with a retirement registry, recurring drift/support-target/adapter/retirement reviews, and ablation-backed deletion receipts."
  - "Architecture 10of10 remediation hardens promotion receipts, evidence-store completeness, lifecycle coverage, and per-tuple support proofing without widening the bounded admitted live support universe."
  - "Active disclosure remains the RunCard v2 and HarnessCard v2 family; operator read models and generated/effective outputs stay traceable projections rather than alternate authority."
