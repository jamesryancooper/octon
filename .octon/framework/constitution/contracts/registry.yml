schema_version: "octon-constitution-contract-registry-v1"
kernel_surfaces:
  charter:
    markdown: ".octon/framework/constitution/CHARTER.md"
    machine: ".octon/framework/constitution/charter.yml"
    status: "active"
  precedence:
    normative: ".octon/framework/constitution/precedence/normative.yml"
    epistemic: ".octon/framework/constitution/precedence/epistemic.yml"
    status: "active"
  obligations:
    fail_closed: ".octon/framework/constitution/obligations/fail-closed.yml"
    evidence: ".octon/framework/constitution/obligations/evidence.yml"
    status: "active"
  ownership:
    roles: ".octon/framework/constitution/ownership/roles.yml"
    status: "active"
  support_targets:
    schema: ".octon/framework/constitution/support-targets.schema.json"
    authoritative_declaration: ".octon/instance/governance/support-targets.yml"
    status: "active"
  claim_truth_conditions:
    path: ".octon/framework/constitution/claim-truth-conditions.yml"
    status: "active"
  governance_exclusions:
    schema: ".octon/framework/constitution/contracts/authority/prohibited-action-class-v1.schema.json"
    authoritative_declaration: ".octon/instance/governance/exclusions/action-classes.yml"
    status: "active"
shim_surfaces:
  ingress_projection_adapters:
    paths:
      - ".octon/AGENTS.md"
      - "AGENTS.md"
      - "CLAUDE.md"
    role: "adapter-only projected ingress surfaces"
    status: "permanent-projection"
    retirement_condition: "Remove when supported tools can enter directly through /.octon/instance/ingress/AGENTS.md without repo-root adapters."
  cognition_governance_charter:
    path: ".octon/framework/cognition/governance/CHARTER.md"
    role: "historical cognition-governance charter shim"
    status: "historical-shim"
    retirement_condition: "Delete when compatibility readers and lineage references no longer require the cognition-governance shim."
  assurance_governance_charter:
    path: ".octon/framework/assurance/governance/CHARTER.md"
    role: "subordinate assurance-governance shim retained for assurance-local weighting and scoring policy"
    status: "subordinate-governance"
    retirement_condition: "Delete when assurance-local weighting and scoring no longer depend on a subordinate charter shim."
  protected_principles_charter:
    path: ".octon/framework/cognition/governance/principles/principles.md"
    role: "protected subordinate principles charter"
    status: "subordinate-governance"
    retirement_condition: "Delete only if a stricter subordinate governance successor fully replaces the protected principles charter."
families:
  - family_id: "objective"
    path: ".octon/framework/constitution/contracts/objective/**"
    activation_wave: 1
    status: "active"
    description: "Workspace, mission, run, and stage-attempt objective contracts."
  - family_id: "authority"
    path: ".octon/framework/constitution/contracts/authority/**"
    activation_wave: 2
    status: "active"
    description: "Approval, exception, revocation, grant-bundle, and promotion-receipt contracts."
  - family_id: "runtime"
    path: ".octon/framework/constitution/contracts/runtime/**"
    activation_wave: 3
    status: "active"
    description: "Run-lifecycle, checkpoint, and execution-state contracts."
  - family_id: "assurance"
    path: ".octon/framework/constitution/contracts/assurance/**"
    activation_wave: 4
    status: "active"
    description: "Proof-plane, support-target proof-bundle, and assurance gating contracts."
  - family_id: "disclosure"
    path: ".octon/framework/constitution/contracts/disclosure/**"
    activation_wave: 4
    status: "active"
    description: "RunCard and HarnessCard disclosure contracts."
  - family_id: "adapters"
    path: ".octon/framework/constitution/contracts/adapters/**"
    activation_wave: 5
    status: "active"
    description: "Host, model, and capability-pack contracts plus conformance criteria."
  - family_id: "retention"
    path: ".octon/framework/constitution/contracts/retention/**"
    activation_wave: 6
    status: "active"
    description: "Retention, evidence-store, replay, and evidence lifecycle contracts."
integration_surfaces:
  objective_contract_family:
    root: ".octon/framework/constitution/contracts/objective/**"
    status: "active"
