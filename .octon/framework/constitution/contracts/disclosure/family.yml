schema_version: "octon-constitutional-disclosure-family-v1"
family_id: "disclosure"
status: "active"
activation_wave: 4
release_state: "pre-1.0"
change_profile: "atomic"
profile_selection_receipt_ref: ".octon/instance/cognition/context/shared/migrations/2026-04-05-unified-execution-constitution-proposal-packet-implementation/plan.md"
authority_rules:
  subordinate_to:
    - ".octon/state/control/execution/runs/<run-id>/run-contract.yml"
    - ".octon/state/control/execution/approvals/**"
    - ".octon/instance/governance/support-targets.yml"
    - ".octon/instance/governance/exclusions/action-classes.yml"
  rule: >-
    Disclosure artifacts summarize authority and evidence; they do not mint,
    widen, revoke, or replace durable authority.
run_card:
  schema_ref: ".octon/framework/constitution/contracts/disclosure/run-card-v2.schema.json"
  evidence_root: ".octon/state/evidence/disclosure/runs"
  canonical_file: "run-card.yml"
  projection_file: "run-card.md"
  historical_mirror_root: ".octon/state/evidence/runs/<run-id>/disclosure"
  required_refs:
    - "run-contract"
    - "decision-artifact"
    - "grant-bundle"
    - "retained-run-evidence"
    - "adapter-support"
    - "measurements"
    - "interventions"
    - "proof-planes"
    - "replay"
    - "recovery"
    - "runtime-services"
harness_card:
  schema_ref: ".octon/framework/constitution/contracts/disclosure/harness-card-v2.schema.json"
  authored_source_ref: ".octon/instance/governance/disclosure/harness-card.yml"
  release_lineage_ref: ".octon/instance/governance/disclosure/release-lineage.yml"
  evidence_root: ".octon/state/evidence/disclosure/releases"
  canonical_file_pattern: "<release-id>/harness-card.yml"
  projection_file_pattern: "<release-id>/harness-card.md"
  historical_mirror_root: ".octon/state/evidence/lab/harness-cards"
  required_refs:
    - "support-target-declaration"
    - "governance-exclusions"
    - "adapter-support"
    - "support-universe-coverage"
    - "proof-bundle"
    - "known-limits"
gating:
  behavioral_claims_require_any:
    - "lab-scenario"
    - "replay"
    - "scenario"
    - "shadow-run"
  support_claims_require_support_target_ref: true
  live_claim_requires_release_lineage_registry: true
