  work_package:
    schema_ref: ".octon/framework/constitution/contracts/runtime/work-package-v1.schema.json"
    runtime_spec_ref: ".octon/framework/engine/runtime/spec/work-package-v1.schema.json"
    control_file: ".octon/state/control/engagements/<engagement-id>/work-package.yml"
