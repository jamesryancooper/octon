    runtime_spec_ref: ".octon/framework/engine/runtime/spec/stewardship-trigger-v1.schema.json"
    control_root: ".octon/state/control/stewardship/programs/<program-id>/triggers"
    evidence_root: ".octon/state/evidence/stewardship/programs/<program-id>/triggers"
  admission_decision:
    schema_ref: ".octon/framework/constitution/contracts/runtime/stewardship-admission-decision-v1.schema.json"
    runtime_spec_ref: ".octon/framework/engine/runtime/spec/stewardship-admission-decision-v1.schema.json"
    control_root: ".octon/state/control/stewardship/programs/<program-id>/admission-decisions"
  idle_decision:
    schema_ref: ".octon/framework/constitution/contracts/runtime/stewardship-idle-decision-v1.schema.json"
    runtime_spec_ref: ".octon/framework/engine/runtime/spec/stewardship-idle-decision-v1.schema.json"
    control_root: ".octon/state/control/stewardship/programs/<program-id>/idle-decisions"
  renewal_decision:
    schema_ref: ".octon/framework/constitution/contracts/runtime/stewardship-renewal-decision-v1.schema.json"
    runtime_spec_ref: ".octon/framework/engine/runtime/spec/stewardship-renewal-decision-v1.schema.json"
    control_root: ".octon/state/control/stewardship/programs/<program-id>/renewal-decisions"
  epoch_closeout:
    schema_ref: ".octon/framework/constitution/contracts/runtime/stewardship-epoch-closeout-v1.schema.json"
    runtime_spec_ref: ".octon/framework/engine/runtime/spec/stewardship-epoch-closeout-v1.schema.json"
    control_file: ".octon/state/control/stewardship/programs/<program-id>/epochs/<epoch-id>/closeout.yml"
  stewardship_ledger:
    schema_ref: ".octon/framework/constitution/contracts/runtime/stewardship-ledger-v1.schema.json"
    runtime_spec_ref: ".octon/framework/engine/runtime/spec/stewardship-ledger-v1.schema.json"
    control_file: ".octon/state/control/stewardship/programs/<program-id>/ledger.yml"
    rule: "Stewardship Ledger indexes stewardship events and does not replace mission/run evidence."
  evidence_profile:
    schema_ref: ".octon/framework/constitution/contracts/runtime/stewardship-evidence-profile-v1.schema.json"
    runtime_spec_ref: ".octon/framework/engine/runtime/spec/stewardship-evidence-profile-v1.schema.json"
  campaign_coordination_hook:
    schema_ref: ".octon/framework/constitution/contracts/runtime/stewardship-campaign-coordination-hook-v1.schema.json"
    runtime_spec_ref: ".octon/framework/engine/runtime/spec/stewardship-campaign-coordination-hook-v1.schema.json"
    rule: "Campaign hooks remain coordination-only and cannot launch workflows or own runs."
  stewardship_aware_decision_request:
    schema_ref: ".octon/framework/constitution/contracts/authority/stewardship-aware-decision-request-v1.schema.json"
    runtime_spec_ref: ".octon/framework/engine/runtime/spec/stewardship-aware-decision-request-v1.schema.json"
    control_root: ".octon/state/control/stewardship/programs/<program-id>/decisions"
    evidence_root: ".octon/state/evidence/stewardship/programs/<program-id>/decision-requests"
    rule: "Stewardship-aware Decision Requests block stewardship control gates only; they do not authorize material execution."
  authority_boundary_rule: >-
    Stewardship Programs, Epochs, Triggers, Admission Decisions, Idle
    Decisions, Renewal Decisions, Ledgers, and campaign hooks do not authorize
    material execution. Bounded work must hand off to v1/v2 mission and run
    lifecycle surfaces.
bridges:
  runtime_services:
    replay_store: ".octon/framework/engine/runtime/crates/replay_store"
    telemetry_sink: ".octon/framework/engine/runtime/crates/telemetry_sink"
    runtime_bus: ".octon/framework/engine/runtime/crates/runtime_bus"
    rule: "Replay, telemetry, and runtime-event services are first-class runtime inputs and not merely post hoc evidence conventions."
  state_reconstruction:
    ref: ".octon/framework/constitution/contracts/runtime/state-reconstruction-v2.md"
    historical_lineage_refs:
      - ".octon/framework/constitution/contracts/runtime/state-reconstruction-v1.md"
    rule: "Mutable run state is derived from the append-only canonical Run Journal plus bounded side artifacts; the journal wins on conflict."
  run_continuity:
    source_root: ".octon/state/continuity/runs"
    rule: "Run continuity carries resumability and handoff state; `run-manifest.yml`, checkpoints, replay pointers, and retained evidence remain the authoritative artifact-rooted resume set."
  mission_continuity:
    source_root: ".octon/state/continuity/repo/missions"
    rule: "Mission continuity consumes run evidence and lifecycle state; it does not replace them."
  generated_read_models:
    summary_root: ".octon/generated/cognition/summaries/missions"
    projection_root: ".octon/generated/cognition/projections/materialized/missions"
    rule: "Generated mission summaries and mission views must reference per-run evidence when runs are bound."
migration:
  event_family_canonicalization:
    source_contract_ref: ".octon/framework/engine/runtime/spec/runtime-event-v1.schema.json"
    canonical_contract_ref: ".octon/framework/constitution/contracts/runtime/run-event-v2.schema.json"
    rule: >-
      Engine-local dot-named runtime-event-v1 events are compatibility aliases
      only. Canonical control ledgers, reconstruction, replay, and closeout
      snapshots must normalize them into the hyphenated run-event-v2 family
      before validation or persistence.
    aliases:
      - legacy_event_type: "run.started"
        canonical_event_types:
          - "run-created"
          - "run-bound"
        mapping_rule: "Use run-created for initial run identity creation; use run-bound once the bound run root becomes authoritative."
      - legacy_event_type: "run.context_pack_bound"
        canonical_event_types:
          - "context-pack-bound"
        mapping_rule: "Preserve the bound context pack ref."
      - legacy_event_type: "run.context_pack_requested"
        canonical_event_types:
          - "context-pack-requested"
        mapping_rule: "Preserve the requested context policy and run binding."
      - legacy_event_type: "run.context_pack_built"
        canonical_event_types:
          - "context-pack-built"
        mapping_rule: "Preserve the context pack, receipt, and model-visible context refs."
      - legacy_event_type: "run.context_pack_rejected"
        canonical_event_types:
          - "context-pack-rejected"
        mapping_rule: "Preserve the denial reason and failed context evidence refs."
      - legacy_event_type: "run.context_pack_compacted"
        canonical_event_types:
          - "context-pack-compacted"
        mapping_rule: "Preserve the compaction ref and model-visible context hash."
      - legacy_event_type: "run.context_pack_invalidated"
        canonical_event_types:
          - "context-pack-invalidated"
        mapping_rule: "Preserve the invalidation reason and stale context evidence refs."
      - legacy_event_type: "run.context_pack_rebuilt"
        canonical_event_types:
          - "context-pack-rebuilt"
        mapping_rule: "Preserve the rebuild ref, prior pack ref, and rebuilt pack ref."
      - legacy_event_type: "run.grant_issued"
        canonical_event_types:
          - "authority-granted"
        mapping_rule: "Preserve policy, grant-bundle, and support-target refs."
      - legacy_event_type: "run.grant_denied"
        canonical_event_types:
          - "authority-denied"
        mapping_rule: "Preserve denial reason and governing policy refs."
      - legacy_event_type: "approval.requested"
        canonical_event_types:
          - "approval-requested"
        mapping_rule: "Preserve approval target and request refs."
      - legacy_event_type: "approval.resolved"
        canonical_event_types:
          - "approval-granted"
          - "approval-denied"
        mapping_rule: "Choose the canonical event from the resolved decision outcome."
      - legacy_event_type: "capability.invoked"
        canonical_event_types:
          - "capability-invoked"
        mapping_rule: "Preserve capability request, authorization, and invocation refs when available."
      - legacy_event_type: "checkpoint.created"
        canonical_event_types:
          - "checkpoint-created"
        mapping_rule: "Preserve checkpoint side-artifact refs."
      - legacy_event_type: "evidence.persisted"
        canonical_event_types:
          - "evidence-snapshot-created"
        mapping_rule: "Preserve evidence snapshot and manifest refs."
      - legacy_event_type: "replay.available"
        canonical_event_types:
          - "replay-materialized"
        mapping_rule: "Preserve replay manifest or replay pointer refs."
      - legacy_event_type: "rollback.started"
        canonical_event_types:
          - "rollback-started"
        mapping_rule: "Preserve rollback posture or plan refs."
      - legacy_event_type: "rollback.completed"
        canonical_event_types:
          - "rollback-completed"
        mapping_rule: "Preserve rollback completion evidence refs."
      - legacy_event_type: "intervention.recorded"
        canonical_event_types:
          - "operator-intervention-recorded"
        mapping_rule: "Preserve intervention actor and disclosure refs."
      - legacy_event_type: "disclosure.ready"
        canonical_event_types:
          - "run-card-published"
          - "disclosure-published"
        mapping_rule: "Use run-card-published for RunCard materialization; otherwise use disclosure-published."
      - legacy_event_type: "run.closed"
        canonical_event_types:
          - "run-closed"
        mapping_rule: "Preserve closure evidence and final state refs."
