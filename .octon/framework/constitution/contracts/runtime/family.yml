schema_version: "octon-constitutional-runtime-family-v1"
family_id: "runtime"
status: "active"
activation_wave: 3
release_state: "pre-1.0"
change_profile: "atomic"
profile_selection_receipt_ref: ".octon/instance/cognition/context/shared/migrations/2026-04-18-octon-frontier-governance-target-state/plan.md"
activation_lineage_refs:
  - ".octon/instance/cognition/context/shared/migrations/2026-03-29-unified-execution-constitution-phase3-runtime-evidence-normalization/plan.md"
  - ".octon/instance/cognition/context/shared/migrations/2026-04-05-unified-execution-constitution-proposal-packet-implementation/plan.md"
  - ".octon/instance/cognition/context/shared/migrations/2026-04-07-two-packet-final-state-execution/plan.md"
  - ".octon/instance/cognition/context/shared/migrations/2026-04-09-octon-uec-hardening-recertification/plan.md"
  - ".octon/instance/cognition/context/shared/migrations/2026-04-11-octon-selected-harness-concepts-integration/plan.md"
run_lifecycle:
  event_ledger:
    event_schema_ref: ".octon/framework/constitution/contracts/runtime/run-event-v2.schema.json"
    ledger_schema_ref: ".octon/framework/constitution/contracts/runtime/run-event-ledger-v2.schema.json"
    historical_schema_refs:
      event:
        - ".octon/framework/constitution/contracts/runtime/run-event-v1.schema.json"
      ledger:
        - ".octon/framework/constitution/contracts/runtime/run-event-ledger-v1.schema.json"
    control_root: ".octon/state/control/execution/runs"
    canonical_files:
      - "events.ndjson"
      - "events.manifest.yml"
  run_manifest:
    schema_ref: ".octon/framework/constitution/contracts/runtime/run-manifest-v2.schema.json"
    control_root: ".octon/state/control/execution/runs"
    canonical_file: "run-manifest.yml"
  run_continuity:
    schema_ref: ".octon/framework/constitution/contracts/runtime/run-continuity-v1.schema.json"
    continuity_root: ".octon/state/continuity/runs"
    canonical_file: "handoff.yml"
  runtime_state:
    schema_ref: ".octon/framework/constitution/contracts/runtime/runtime-state-v2.schema.json"
    historical_schema_refs:
      - ".octon/framework/constitution/contracts/runtime/runtime-state-v1.schema.json"
    control_root: ".octon/state/control/execution/runs"
    canonical_file: "runtime-state.yml"
  rollback_posture:
    schema_ref: ".octon/framework/constitution/contracts/runtime/rollback-posture-v1.schema.json"
    control_root: ".octon/state/control/execution/runs"
    canonical_file: "rollback-posture.yml"
  checkpoints:
    schema_ref: ".octon/framework/constitution/contracts/runtime/checkpoint-v2.schema.json"
    control_root: ".octon/state/control/execution/runs"
    canonical_dir: "checkpoints"
  replay_pointers:
    schema_ref: ".octon/framework/constitution/contracts/runtime/replay-pointers-v1.schema.json"
    evidence_root: ".octon/state/evidence/runs"
    canonical_file: "replay-pointers.yml"
  trace_pointers:
    schema_ref: ".octon/framework/constitution/contracts/runtime/trace-pointer-v2.schema.json"
    evidence_root: ".octon/state/evidence/runs"
    canonical_file: "trace-pointers.yml"
  retry_records:
    schema_ref: ".octon/framework/constitution/contracts/runtime/retry-record-v1.schema.json"
    control_root: ".octon/state/control/execution/runs"
    canonical_dir: "retry-records"
  contamination_records:
    schema_ref: ".octon/framework/constitution/contracts/runtime/contamination-record-v1.schema.json"
    control_root: ".octon/state/control/execution/runs"
    canonical_dir: "contamination"
  compensation_records:
    schema_ref: ".octon/framework/constitution/contracts/runtime/compensation-record-v1.schema.json"
    control_root: ".octon/state/control/execution/runs"
    canonical_dir: "compensation"
  retained_run_evidence:
    evidence_root: ".octon/state/evidence/runs"
    canonical_families:
      - "receipts/**"
      - "checkpoints/**"
      - "replay/**"
      - "assurance/**"
      - "measurements/**"
      - "interventions/**"
      - "trace/**"
      - "disclosure/**"
      - "trace-pointers.yml"
      - "evidence-classification.yml"
      - "retained-run-evidence.yml"
bridges:
  runtime_services:
    replay_store: ".octon/framework/engine/runtime/crates/replay_store"
    telemetry_sink: ".octon/framework/engine/runtime/crates/telemetry_sink"
    runtime_bus: ".octon/framework/engine/runtime/crates/runtime_bus"
    rule: "Replay, telemetry, and runtime-event services are first-class runtime inputs and not merely post hoc evidence conventions."
  state_reconstruction:
    ref: ".octon/framework/constitution/contracts/runtime/state-reconstruction-v2.md"
    historical_lineage_refs:
      - ".octon/framework/constitution/contracts/runtime/state-reconstruction-v1.md"
    rule: "Mutable run state is derived from the append-only canonical Run Journal plus bounded side artifacts; the journal wins on conflict."
  run_continuity:
    source_root: ".octon/state/continuity/runs"
    rule: "Run continuity carries resumability and handoff state; `run-manifest.yml`, checkpoints, replay pointers, and retained evidence remain the authoritative artifact-rooted resume set."
  mission_continuity:
    source_root: ".octon/state/continuity/repo/missions"
    rule: "Mission continuity consumes run evidence and lifecycle state; it does not replace them."
  generated_read_models:
    summary_root: ".octon/generated/cognition/summaries/missions"
    projection_root: ".octon/generated/cognition/projections/materialized/missions"
    rule: "Generated mission summaries and mission views must reference per-run evidence when runs are bound."
migration:
  event_family_canonicalization:
    source_contract_ref: ".octon/framework/engine/runtime/spec/runtime-event-v1.schema.json"
    canonical_contract_ref: ".octon/framework/constitution/contracts/runtime/run-event-v2.schema.json"
    rule: >-
      Engine-local dot-named runtime-event-v1 events are compatibility aliases
      only. Canonical control ledgers, reconstruction, replay, and closeout
      snapshots must normalize them into the hyphenated run-event-v2 family
      before validation or persistence.
    aliases:
      - legacy_event_type: "run.started"
        canonical_event_types:
          - "run-created"
          - "run-bound"
        mapping_rule: "Use run-created for initial run identity creation; use run-bound once the bound run root becomes authoritative."
      - legacy_event_type: "run.context_pack_bound"
        canonical_event_types:
          - "context-pack-bound"
        mapping_rule: "Preserve the bound context pack ref."
      - legacy_event_type: "run.grant_issued"
        canonical_event_types:
          - "authority-granted"
        mapping_rule: "Preserve policy, grant-bundle, and support-target refs."
      - legacy_event_type: "run.grant_denied"
        canonical_event_types:
          - "authority-denied"
        mapping_rule: "Preserve denial reason and governing policy refs."
      - legacy_event_type: "approval.requested"
        canonical_event_types:
          - "approval-requested"
        mapping_rule: "Preserve approval target and request refs."
      - legacy_event_type: "approval.resolved"
        canonical_event_types:
          - "approval-granted"
          - "approval-denied"
        mapping_rule: "Choose the canonical event from the resolved decision outcome."
      - legacy_event_type: "capability.invoked"
        canonical_event_types:
          - "capability-invoked"
        mapping_rule: "Preserve capability request, authorization, and invocation refs when available."
      - legacy_event_type: "checkpoint.created"
        canonical_event_types:
          - "checkpoint-created"
        mapping_rule: "Preserve checkpoint side-artifact refs."
      - legacy_event_type: "evidence.persisted"
        canonical_event_types:
          - "evidence-snapshot-created"
        mapping_rule: "Preserve evidence snapshot and manifest refs."
      - legacy_event_type: "replay.available"
        canonical_event_types:
          - "replay-materialized"
        mapping_rule: "Preserve replay manifest or replay pointer refs."
      - legacy_event_type: "rollback.started"
        canonical_event_types:
          - "rollback-started"
        mapping_rule: "Preserve rollback posture or plan refs."
      - legacy_event_type: "rollback.completed"
        canonical_event_types:
          - "rollback-completed"
        mapping_rule: "Preserve rollback completion evidence refs."
      - legacy_event_type: "intervention.recorded"
        canonical_event_types:
          - "operator-intervention-recorded"
        mapping_rule: "Preserve intervention actor and disclosure refs."
      - legacy_event_type: "disclosure.ready"
        canonical_event_types:
          - "run-card-published"
          - "disclosure-published"
        mapping_rule: "Use run-card-published for RunCard materialization; otherwise use disclosure-published."
      - legacy_event_type: "run.closed"
        canonical_event_types:
          - "run-closed"
        mapping_rule: "Preserve closure evidence and final state refs."
