schema_version: "octon-constitutional-runtime-family-v1"
family_id: "runtime"
status: "active"
activation_wave: 3
release_state: "pre-1.0"
change_profile: "atomic"
profile_selection_receipt_ref: ".octon/instance/cognition/context/shared/migrations/2026-03-30-unified-execution-constitution-atomic-cutover/plan.md"
activation_lineage_refs:
  - ".octon/instance/cognition/context/shared/migrations/2026-03-29-unified-execution-constitution-phase3-runtime-evidence-normalization/plan.md"
run_lifecycle:
  run_manifest:
    schema_ref: ".octon/framework/constitution/contracts/runtime/run-manifest-v1.schema.json"
    control_root: ".octon/state/control/execution/runs"
    canonical_file: "run-manifest.yml"
  run_continuity:
    schema_ref: ".octon/framework/constitution/contracts/runtime/run-continuity-v1.schema.json"
    continuity_root: ".octon/state/continuity/runs"
    canonical_file: "handoff.yml"
  runtime_state:
    schema_ref: ".octon/framework/constitution/contracts/runtime/runtime-state-v1.schema.json"
    control_root: ".octon/state/control/execution/runs"
    canonical_file: "runtime-state.yml"
  rollback_posture:
    schema_ref: ".octon/framework/constitution/contracts/runtime/rollback-posture-v1.schema.json"
    control_root: ".octon/state/control/execution/runs"
    canonical_file: "rollback-posture.yml"
  checkpoints:
    schema_ref: ".octon/framework/constitution/contracts/runtime/checkpoint-v1.schema.json"
    control_root: ".octon/state/control/execution/runs"
    canonical_dir: "checkpoints"
  replay_pointers:
    schema_ref: ".octon/framework/constitution/contracts/runtime/replay-pointers-v1.schema.json"
    evidence_root: ".octon/state/evidence/runs"
    canonical_file: "replay-pointers.yml"
  trace_pointers:
    schema_ref: ".octon/framework/constitution/contracts/runtime/trace-pointers-v1.schema.json"
    evidence_root: ".octon/state/evidence/runs"
    canonical_file: "trace-pointers.yml"
  retry_records:
    schema_ref: ".octon/framework/constitution/contracts/runtime/retry-record-v1.schema.json"
    control_root: ".octon/state/control/execution/runs"
    canonical_dir: "retry-records"
  contamination_records:
    schema_ref: ".octon/framework/constitution/contracts/runtime/contamination-record-v1.schema.json"
    control_root: ".octon/state/control/execution/runs"
    canonical_dir: "contamination"
  retained_run_evidence:
    evidence_root: ".octon/state/evidence/runs"
    canonical_families:
      - "receipts/**"
      - "checkpoints/**"
      - "replay/**"
      - "assurance/**"
      - "measurements/**"
      - "interventions/**"
      - "trace/**"
      - "disclosure/**"
      - "trace-pointers.yml"
      - "evidence-classification.yml"
      - "retained-run-evidence.yml"
bridges:
  run_continuity:
    source_root: ".octon/state/continuity/runs"
    rule: "Run continuity carries resumability and handoff state; `run-manifest.yml`, checkpoints, replay pointers, and retained evidence remain the authoritative artifact-rooted resume set."
  mission_continuity:
    source_root: ".octon/state/continuity/repo/missions"
    rule: "Mission continuity consumes run evidence and lifecycle state; it does not replace them."
  generated_read_models:
    summary_root: ".octon/generated/cognition/summaries/missions"
    projection_root: ".octon/generated/cognition/projections/materialized/missions"
    rule: "Generated mission summaries and mission views must reference per-run evidence when runs are bound."
