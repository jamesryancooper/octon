  rollback_retirement_posture:
    schema_ref: ".octon/framework/constitution/contracts/runtime/evolution-rollback-retirement-posture-v1.schema.json"
    runtime_spec_ref: ".octon/framework/engine/runtime/spec/evolution-rollback-retirement-posture-v1.schema.json"
