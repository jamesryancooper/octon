    root: ".octon/instance/orchestration/missions/**"
    role: "continuity-container"
  run_contract:
    schema_ref: ".octon/framework/constitution/contracts/objective/run-contract-v1.schema.json"
    control_root: ".octon/state/control/execution/runs"
    canonical_file: "run-contract.yml"
    execution_unit: "atomic"
  stage_attempt_contract:
    schema_ref: ".octon/framework/constitution/contracts/objective/stage-attempt-v1.schema.json"
    control_root: ".octon/state/control/execution/runs"
