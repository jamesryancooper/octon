schema_version: "octon-constitutional-authority-family-v1"
family_id: "authority"
status: "active"
activation_wave: 2
release_state: "pre-1.0"
change_profile: "atomic"
profile_selection_receipt_ref: ".octon/instance/cognition/context/shared/migrations/2026-04-18-octon-frontier-governance-target-state/plan.md"
activation_lineage_refs:
  - ".octon/instance/cognition/context/shared/migrations/2026-03-28-unified-execution-constitution-phase2-objective-authority-cutover/plan.md"
  - ".octon/instance/cognition/context/shared/migrations/2026-04-05-unified-execution-constitution-proposal-packet-implementation/plan.md"
  - ".octon/instance/cognition/context/shared/migrations/2026-04-07-two-packet-final-state-execution/plan.md"
  - ".octon/instance/cognition/context/shared/migrations/2026-04-09-octon-uec-hardening-recertification/plan.md"
authority_routing:
  request:
    schema_ref: ".octon/framework/constitution/contracts/authority/approval-request-v1.schema.json"
    control_root: ".octon/state/control/execution/approvals/requests"
  grant:
    schema_ref: ".octon/framework/constitution/contracts/authority/approval-grant-v1.schema.json"
    control_root: ".octon/state/control/execution/approvals/grants"
  exception_lease:
    schema_ref: ".octon/framework/constitution/contracts/authority/exception-lease-v1.schema.json"
    control_root: ".octon/state/control/execution/exceptions/leases"
  revocation:
    schema_ref: ".octon/framework/constitution/contracts/authority/revocation-v1.schema.json"
    control_root: ".octon/state/control/execution/revocations"
  quorum_policy:
    schema_ref: ".octon/framework/constitution/contracts/authority/quorum-policy-v1.schema.json"
    instance_policy_ref: ".octon/instance/governance/policies/mission-autonomy.yml#quorum"
  prohibited_action_class:
    schema_ref: ".octon/framework/constitution/contracts/authority/prohibited-action-class-v1.schema.json"
    instance_policy_ref: ".octon/instance/governance/exclusions/action-classes.yml"
  escalation_record:
    schema_ref: ".octon/framework/constitution/contracts/authority/escalation-record-v1.schema.json"
    evidence_root: ".octon/state/evidence/control/execution"
  authority_route_receipt:
    schema_ref: ".octon/framework/constitution/contracts/authority/authority-route-receipt-v1.schema.json"
    evidence_root: ".octon/state/evidence/control/execution"
  decision_artifact:
    schema_ref: ".octon/framework/constitution/contracts/authority/decision-artifact-v2.schema.json"
    evidence_root: ".octon/state/evidence/control/execution"
  grant_bundle:
    schema_ref: ".octon/framework/constitution/contracts/authority/grant-bundle-v2.schema.json"
    evidence_root: ".octon/state/evidence/control/execution"
  decision_request:
    schema_ref: ".octon/framework/constitution/contracts/authority/decision-request-v1.schema.json"
    runtime_spec_ref: ".octon/framework/engine/runtime/spec/decision-request-v1.schema.json"
    control_root: ".octon/state/control/engagements/<engagement-id>/decisions"
    evidence_root: ".octon/state/evidence/decisions"
    rule: "Decision Requests are operator-facing wrappers and must resolve into canonical approval, exception, revocation, decision, grant, risk, or clarification artifacts before affecting execution."
  mission_aware_decision_request:
    schema_ref: ".octon/framework/constitution/contracts/authority/mission-aware-decision-request-v1.schema.json"
    runtime_spec_ref: ".octon/framework/engine/runtime/spec/mission-aware-decision-request-v1.schema.json"
    control_root: ".octon/state/control/execution/missions/<mission-id>/decisions"
    evidence_root: ".octon/state/evidence/control/execution/missions/<mission-id>/decision-requests"
    rule: "Blocks mission continuation only; must resolve into canonical authority artifacts before affecting execution."
  stewardship_aware_decision_request:
    schema_ref: ".octon/framework/constitution/contracts/authority/stewardship-aware-decision-request-v1.schema.json"
    runtime_spec_ref: ".octon/framework/engine/runtime/spec/stewardship-aware-decision-request-v1.schema.json"
    control_root: ".octon/state/control/stewardship/programs/<program-id>/decisions"
    evidence_root: ".octon/state/evidence/stewardship/programs/<program-id>/decision-requests"
    rule: "Blocks stewardship admission, epoch, renewal, campaign, idle, or closure behavior only; it never authorizes material execution."
  connector_aware_decision_request:
    schema_ref: ".octon/framework/constitution/contracts/authority/connector-aware-decision-request-v1.schema.json"
    runtime_spec_ref: ".octon/framework/engine/runtime/spec/connector-aware-decision-request-v1.schema.json"
    control_root: ".octon/state/control/connectors/<connector-id>/decisions"
    evidence_root: ".octon/state/evidence/connectors/<connector-id>/decisions"
    rule: "Blocks connector admission, quarantine reset, support widening, credential use, or risk acceptance only; it never authorizes material execution."
  self_evolution_decision_request:
    schema_ref: ".octon/framework/constitution/contracts/authority/self-evolution-decision-request-v1.schema.json"
    runtime_spec_ref: ".octon/framework/engine/runtime/spec/self-evolution-decision-request-v1.schema.json"
    control_root: ".octon/state/control/evolution/decisions"
    evidence_root: ".octon/state/evidence/evolution/decisions"
    rule: "Blocks or resolves self-evolution review, proposal, promotion, recertification, rollback, retirement, and closure gates; it never authorizes promotion or material execution by itself."
  constitutional_amendment_request:
    schema_ref: ".octon/framework/constitution/contracts/authority/constitutional-amendment-request-v1.schema.json"
    runtime_spec_ref: ".octon/framework/engine/runtime/spec/constitutional-amendment-request-v1.schema.json"
    control_root: ".octon/state/control/evolution/amendment-requests"
    evidence_root: ".octon/state/evidence/evolution/amendment-requests"
    rule: "Required for constitutional self-evolution and always requires human/quorum approval plus promotion and recertification evidence."
  self_evolution_promotion_receipt:
    schema_ref: ".octon/framework/constitution/contracts/authority/self-evolution-promotion-receipt-v1.schema.json"
    runtime_spec_ref: ".octon/framework/engine/runtime/spec/promotion-receipt-v1.schema.json"
    evidence_root: ".octon/state/evidence/evolution/promotions"
    rule: "Records promotion outcome and cannot authorize future change."
projection_rules:
  host_affordances:
    status: "non-authoritative"
    surfaces:
      - "labels"
      - "comments"
      - "checks"
      - "workflow env flags"
    rule: >-
      Host-facing approval affordances may mirror status or request attention,
      but runtime resolves authority only from canonical approval, exception,
      revocation, decision, and grant-bundle artifacts.
