schema_version: "octon-constitution-evidence-obligations-v1"
obligation_contract:
  id_namespace: "EVI"
  id_pattern: "^EVI-[0-9]{3}$"
  uniqueness_required: true
  stability_policy: "append-only"
  owner: "Octon governance"
  validator_ref: ".octon/framework/assurance/runtime/_ops/scripts/validate-evidence-obligation-ids.sh"
  evidence_refs:
    - ".octon/framework/engine/runtime/spec/evidence-store-v1.md"
    - ".octon/framework/constitution/contracts/assurance/support-target-proof-bundle-v1.schema.json"
retained_evidence_roots:
  - ".octon/state/evidence/runs/**"
  - ".octon/state/evidence/disclosure/**"
  - ".octon/state/evidence/lab/**"
  - ".octon/state/evidence/control/execution/**"
  - ".octon/state/evidence/connectors/**"
  - ".octon/state/evidence/evolution/**"
  - ".octon/state/evidence/external-index/**"
  - ".octon/state/evidence/validation/publication/**"
obligations:
  - id: "EVI-001"
    requirement: "Consequential execution retains runtime evidence under state/evidence/runs/**."
    adoption_status: "active"
  - id: "EVI-002"
    requirement: "Control-plane mutations retain durable evidence under state/evidence/control/execution/**."
    adoption_status: "active"
  - id: "EVI-003"
    requirement: >-
      Profile-governed work records change_profile, release_state,
      profile-selection facts, rationale, and transitional_exception_note when required.
    adoption_status: "active"
  - id: "EVI-004"
    requirement: >-
      Publication of runtime-facing effective outputs retains publication
      receipts under state/evidence/validation/publication/**.
    adoption_status: "active"
  - id: "EVI-005"
    requirement: "Hidden human intervention is prohibited; material intervention must be durably disclosed."
    adoption_status: "active"
  - id: "EVI-006"
    requirement: "Every consequential run emits disclosure artifacts such as RunCard outputs."
    adoption_status: "active"
    activation_wave: 4
  - id: "EVI-007"
    requirement: "System-level support claims emit support-target-backed disclosure artifacts such as HarnessCard outputs."
    adoption_status: "active"
    activation_wave: 4
  - id: "EVI-008"
    requirement: "Runtime-versus-doc mismatches emit drift evidence or block publication until reconciled."
    adoption_status: "active"
  - id: "EVI-009"
    requirement: >-
      Support claims and autonomy envelopes must cite explicit support-target
      declarations once the support-target matrix is published.
    adoption_status: "active"
    activation_wave: 2
  - id: "EVI-010"
    requirement: >-
      Behavioral claims cite retained lab, replay, scenario, or shadow-run
      evidence before they can pass consequential disclosure gates.
    adoption_status: "active"
    activation_wave: 4
  - id: "EVI-011"
    requirement: >-
      Adapter-backed support claims retain explicit adapter ids and
      conformance criteria under bound run evidence or disclosure artifacts.
    adoption_status: "active"
    activation_wave: 5
  - id: "EVI-012"
    requirement: >-
      Every retained support surface appears in at least one runtime-backed run
      bundle, one proof or lab bundle, and final disclosure coverage.
    adoption_status: "active"
    activation_wave: 7
  - id: "EVI-013"
    requirement: >-
      Consequential run closeout retains an evidence-store completeness record
      that ties canonical authority, lifecycle, assurance, replay, disclosure,
      and evidence-classification artifacts together.
    adoption_status: "active"
    activation_wave: 6
  - id: "EVI-014"
    requirement: >-
      Promotion or activation that changes authoritative, control, active
      release, or runtime-facing generated-effective meaning retains a
      promotion receipt under the canonical control-evidence root.
    adoption_status: "active"
  - id: "EVI-015"
    requirement: >-
      Each admitted support-target tuple retains a current proof bundle that
      links admission, support dossier sufficiency, representative retained run
      disclosure, proof-plane coverage, and negative-control evidence before
      live claims may cite the tuple.
    adoption_status: "active"
    activation_wave: 7
  - id: "EVI-016"
    requirement: >-
      Generated operator read models retain freshness and source-traceability
      metadata to canonical authority or evidence roots and never substitute
      for those roots.
    adoption_status: "active"
  - id: "EVI-017"
    requirement: >-
      Consequential execution and closure validation retain evidence under the
      canonical evidence-store contract, distinguishing retained evidence from
      transport-only CI artifacts and generated mirrors.
    adoption_status: "active"
  - id: "EVI-018"
    requirement: >-
      Closure-grade support claims retain a tuple-level proof bundle, evidence
      completeness receipt, and disclosure references under architecture or
      publication validation evidence roots.
    adoption_status: "active"
  - id: "EVI-019"
    requirement: >-
      Runtime-effective route-bundle publication retains current source digests,
      publication receipt linkage, and freshness proof under
      state/evidence/validation/architecture/10of10-target-transition/**.
    adoption_status: "active"
  - id: "EVI-020"
    requirement: >-
      Compiled pack-route publication retains no-widening proof linking support
      tuple admission, governance intent, and generated/effective runtime
      routes.
    adoption_status: "active"
  - id: "EVI-021"
    requirement: >-
      Support-path normalization retains path-normalization and proof-refresh
      receipts when admissions, dossiers, support cards, and support matrices
      are republished.
    adoption_status: "active"
  - id: "EVI-022"
    requirement: >-
      Compact extension active state retains publication and compatibility
      receipt linkage while moving dependency closure and required inputs into
      generation locks and artifact maps.
    adoption_status: "active"
  - id: "EVI-023"
    requirement: >-
      Runtime-effective handle verification retains handle kind, generation
      id, source refs and digests, output and lock digests, publication
      receipt linkage, freshness mode, allowed consumers, forbidden
      consumers, and non-authority classification.
    adoption_status: "active"
  - id: "EVI-024"
    requirement: >-
      Publication freshness validation retains explicit freshness-mode proof
      and root-manifest invalidation evidence for runtime route bundles, pack
      routes, extension catalogs, support matrices, and capability routing
      outputs when they are published as runtime-facing generated/effective
      artifacts.
    adoption_status: "active"
  - id: "EVI-025"
    requirement: >-
      Raw generated/effective runtime read denials retain negative-control
      evidence showing runtime access remains restricted to resolver-verified
      handles.
    adoption_status: "active"
  - id: "EVI-026"
    requirement: >-
      Authorization-boundary coverage retains discovered, static,
      manual_exception, retired, stage_only, or denied classification plus
      request-builder, receipt, support-tuple interaction, and rollback or
      evidence requirements for every material side-effect path.
    adoption_status: "active"
  - id: "EVI-027"
    requirement: >-
      Executable support proof bundles retain evaluator identity, input and
      output digests, pass/fail criteria, negative controls, trace or replay
      references, receipt references, and final result in addition to tuple,
      dossier, disclosure, and proof-plane linkage.
    adoption_status: "active"
  - id: "EVI-028"
    requirement: >-
      Compatibility-retirement cutover retains canonical successor,
      allowed-consumer and forbidden-consumer posture, future-widening
      blocker status, review cadence, and evidence references for each live
      compatibility surface.
    adoption_status: "active"
  - id: "EVI-029"
    requirement: >-
      Architecture-health v2 retains dimension-level depth classifications and
      a final closure-grade certificate under
      state/evidence/validation/architecture/10of10-target-transition/closure/**.
    adoption_status: "active"
  - id: "EVI-030"
    requirement: >-
      Operator read-model publication retains explicit non-authority notice,
      canonical refs, receipt refs, freshness metadata, and forbidden
      consumer classification.
    adoption_status: "active"
  - id: "EVI-031"
    requirement: >-
      Connector admission, trust, drift, quarantine, operation receipt, and
      validation proof retain evidence under state/evidence/connectors/** and
      never substitute for run-level evidence when a material run occurs.
    adoption_status: "active"
  - id: "EVI-032"
    requirement: >-
      Self-evolution candidates, evidence distillation, governance impact
      simulations, assurance lab gates, proposal compilation, amendment
      requests, promotions, recertifications, rollbacks, retirements, and
      ledger updates retain evidence under state/evidence/evolution/** and
      never substitute for human/quorum approval, proposal manifests, ADRs, run
      evidence, or promotion receipts.
    adoption_status: "active"
