schema_version: "octon-constitution-charter-v1"
charter_id: "octon-harness-charter"
version: "1.3.1-bounded-admitted-revalidation"
owner: "Octon governance"
purpose: >-
  Provide one explicit repo-local constitutional kernel for the Octon
  super-root so consequential autonomous work stays scoped, fail-closed,
  evidence-backed, reviewable, and support-honest across the explicitly
  admitted live support universe.
non_goals:
  - "Make raw inputs authoritative for runtime or policy."
  - "Allow host UI state, chat transcripts, or generated projections to become control-plane authority."
  - "Treat continuity notes or generated summaries as substitutes for durable authority and evidence."
non_negotiables:
  - id: "NK-001"
    rule: "Preserve the five-class super-root: framework, instance, inputs, state, and generated."
  - id: "NK-002"
    rule: "Keep authored authority in framework/** and instance/** only."
  - id: "NK-003"
    rule: "Keep generated/** derived-only and raw inputs/** non-authoritative."
  - id: "NK-004"
    rule: "Fail closed on missing ownership, missing required evidence, unsupported support claims, or unresolved policy conflicts."
  - id: "NK-005"
    rule: "Require explicit authority routing before material side effects."
  - id: "NK-006"
    rule: "Prohibit hidden human intervention and silent authority widening."
  - id: "NK-007"
    rule: "Require mission-backed authority for long-horizon or recurring autonomy."
  - id: "NK-008"
    rule: "Require every compensating mechanism to carry an owner, removal review, and retirement trigger."
  - id: "NK-009"
    rule: "Require behavioral claims to cite retained lab, replay, scenario, or shadow-run evidence."
  - id: "NK-010"
    rule: "Keep RunCard and HarnessCard disclosure artifacts subordinate to durable authority and retained evidence."
  - id: "NK-011"
    rule: "Keep one accountable orchestrator as the default execution role."
  - id: "NK-012"
    rule: "Treat host adapters and model adapters as replaceable, non-authoritative boundaries."
  - id: "NK-013"
    rule: "Require adapter-backed support claims to remain bounded by explicit support-target declarations, governance exclusions, and adapter-conformance criteria."
  - id: "NK-014"
    rule: "No surface may enter the live claim unless it is dossier-backed, runtime-backed, proof-backed, and disclosure-backed."
  - id: "NK-015"
    rule: "Final disclosure must state the admitted claim envelope and may not outstate stage-only, unsupported, or unadmitted surfaces."
fail_closed_rules_ref: ".octon/framework/constitution/obligations/fail-closed.yml"
evidence_obligations_ref: ".octon/framework/constitution/obligations/evidence.yml"
normative_precedence_ref: ".octon/framework/constitution/precedence/normative.yml"
epistemic_precedence_ref: ".octon/framework/constitution/precedence/epistemic.yml"
support_targets_ref:
  schema: ".octon/framework/constitution/support-targets.schema.json"
  authoritative_declaration: ".octon/instance/governance/support-targets.yml"
  declaration_status: "active"
governance_exclusions_ref:
  authoritative_declaration: ".octon/instance/governance/exclusions/action-classes.yml"
  declaration_status: "active"
amendment_policy:
  change_control: "explicit constitutional amendment workflow"
  human_approval_required: true
  required_artifacts:
    - "aligned doc updates"
    - "validator updates"
    - "documented rationale"
    - "documented rollback posture"
review_cadence: "quarterly and on each material constitutional change"
live_model:
  release_state: "pre-1.0"
  change_profile: "atomic"
  atomic_mode: "clean-break"
  profile_selection_receipt_ref: ".octon/instance/cognition/context/shared/migrations/2026-04-18-octon-frontier-governance-target-state/plan.md"
  consequential_execution_unit: "run-contract"
  authority_engine: "runtime-consumed"
  support_universe_mode: "bounded-admitted-finite"
  support_universe_doctrine: >-
    The live support universe remains finite and bounded by admitted supported
    tuples; every claim-critical modeled surface must be dossier-backed,
    runtime-real, validator-covered, proof-backed, and disclosure-backed
    before it may enter the live claim.
  governance_exclusions_doctrine: >-
    Prohibited or non-claimed action classes live under explicit governance
    exclusions and must not survive as unsupported support tiers.
  disclosure_roots:
    authored: ".octon/instance/governance/disclosure/**"
    runs: ".octon/state/evidence/disclosure/runs/**"
    releases: ".octon/state/evidence/disclosure/releases/**"
  runtime_service_roots:
    replay_store: ".octon/framework/engine/runtime/crates/replay_store"
    telemetry_sink: ".octon/framework/engine/runtime/crates/telemetry_sink"
    runtime_bus: ".octon/framework/engine/runtime/crates/runtime_bus"
historical_adoption_lineage:
  status: "historical-non-live"
  wave: 7
  staged_cutovers:
    run_contract_requirement: "wave-1"
    authority_artifact_normalization: "wave-2-active"
    assurance_families: "wave-4-active"
    disclosure_families: "wave-4-active"
    adapter_contracts: "wave-5-active"
    support_target_declarations: "wave-7-bounded-admitted-active"
