schema_version: "git-worktree-autonomy-contract-v1"
workflow_id: "octon-git-github-autonomy"
status: "active"
owner: "Octon governance"
purpose: >-
  Define Octon's environment-neutral, worktree-native Git and GitHub workflow
  so ingress, practice docs, helper scripts, remediation skills, and
  validators share one durable contract.
environment:
  supported_operator_lanes:
    - "plain-git-gh"
    - "helper-lane"
  host_apps_non_authoritative: true
  canonical_operator_terms:
    - "closeout"
    - "ready"
    - "request auto-merge"
  compatibility_aliases:
    - "ship"
operating_model:
  primary_integration_anchor: "one clean primary main worktree or clone"
  branch_worktree_unit: "one branch worktree per task or PR"
  branch_pr_lifetime: "same branch and same PR for the life of the task"
  draft_first: true
  final_merge_authority:
    system: "GitHub"
    requirements:
      - "rulesets"
      - "required_checks"
      - "reviewer_or_maintainer_confirmation_or_documented_solo_maintainer_exception"
  reviewer_owned_thread_resolution:
    default: "reviewer-or-maintainer"
    solo_maintainer_exception:
      status: "allowed"
      actor_requirement: "author is also repository owner or maintainer"
      scope: "review-thread resolution only"
      required_sequence:
        - "fix"
        - "commit"
        - "push"
        - "reply"
        - "required_checks_green"
        - "maintainer_override_evidence"
      eligible_threads:
        - "automated reviewer thread directly remediated by pushed diff"
        - "outdated reviewer thread addressed by pushed diff"
        - "human reviewer thread only with explicit maintainer override"
      forbidden_uses:
        - "substitute for required review approval"
        - "resolve unresolved human objection without explicit maintainer override"
        - "bypass required checks, rulesets, or GitHub mergeability"
closeout:
  trigger_terms:
    - "finish"
    - "ship"
    - "closeout"
  prompt_contexts:
    primary_main_worktree: "Branch into a feature worktree and prepare a draft PR."
    branch_worktree_no_pr: "Stage, commit, push, and open a draft PR."
    branch_worktree_draft_pr_autonomous_lane: "Mark ready and request squash auto-merge."
    branch_worktree_draft_pr_manual_lane: "Mark ready for human review with auto-merge off."
  ready_pr_status_contexts:
    branch_worktree_ready_pr_waiting_on_required_checks_or_auto_merge:
      message: >-
        This PR is already ready and has only queued or running required
        checks, or is waiting on GitHub auto-merge. No new closeout mutation is
        needed while checks are still pending.
    branch_worktree_ready_pr_waiting_on_reviewer_or_maintainer_confirmation:
      message: >-
        This PR is already ready and is waiting on reviewer or maintainer
        confirmation, or on documented solo-maintainer exception evidence. No
        new closeout action is needed.
    branch_worktree_ready_pr_manual_lane_waiting_on_human_review_or_merge:
      message: >-
        This PR is already ready in the manual lane and is waiting on human
        review or merge. No new closeout action is needed.
  suppressions:
    - "active_implementation_continues"
    - "user_reports_work_in_progress"
    - "blocked_by_red_required_checks"
    - "blocked_by_unaddressed_author_action_items"
    - "blocked_waiting_on_reviewer_confirmation"
    - "blocked_waiting_on_solo_maintainer_exception_evidence"
remediation:
  author_sequence:
    - "fix"
    - "commit"
    - "push"
    - "reply"
  allowed_git_subset:
    - "git status"
    - "git diff"
    - "git add"
    - "git commit"
    - "git push"
  forbidden_operations:
    - "git commit --amend"
    - "git rebase"
    - "git push --force"
    - "git push --force-with-lease"
    - "unauthorized programmatic review-thread resolution"
    - "merge main into branch as remediation shortcut"
helpers:
  git_pr_open:
    posture: "create-oriented"
    draft_only: true
    later_updates: "push follow-up commits to the same branch"
  git_pr_ship:
    default_mode: "status"
    explicit_request_flags:
      - "--request-ready"
      - "--request-automerge"
    request_only: true
    final_merge_gate: >-
      GitHub required checks, review policy, and reviewer or maintainer
      confirmation remain the final merge gate, with documented
      solo-maintainer exception evidence allowed only for conversation cleanup.
validation:
  drift_classes:
    - "ready_pr declared without explicit handling"
    - "stale rebase or force-push remediation guidance"
    - "git-pr-open widening initial PR creation beyond draft-first"
    - "git-pr-open template population coupled to stale placeholder prose"
    - "helper docs overstating behavior"
    - "remediation skill promise exceeding its allowed-tools boundary"
    - "helper messaging implying readiness proof rather than request semantics"
  scenario_lanes:
    - "plain-git-gh"
    - "helper-lane"
  scenario_focus:
    - "ready_pr status handling"
    - "git-pr-open draft-only creation"
    - "git-pr-open canonical template population"
    - "review remediation with new commits"
    - "safe linked-worktree cleanup"
autonomous_closeout_loop:
  owner_surface: "/closeout-pr"
  start_context: "current branch worktree at a credible completion point"
  worktree_review:
    inspect:
      - "tracked_changes"
      - "unstaged_changes"
      - "untracked_changes"
      - "ignored_or_generated_output_candidates"
      - "local_skill_logs"
      - "prompt_scaffolding"
    stage_rule: "include only files that belong to the intended task"
    final_hygiene_gate:
      no_unintended_tracked_changes: true
      no_unintended_untracked_artifacts: true
      no_unwanted_prompt_scaffolding: true
      no_unwanted_local_skill_logs: true
      generated_outputs_preserved_when_required: true
      retained_evidence_preserved_when_required: true
  draft_pr_flow:
    commit_push_and_pr: true
    same_branch_same_pr_for_life_of_task: true
  polling_loop:
    checks_running: "wait and poll again"
    check_failure: "inspect every failing check, job, and script; identify the failing contract; apply the smallest target-architecture-correct fix; validate locally when reproducible; commit; push; recheck"
    unresolved_conversations: "treat as merge blocker and continue remediation loop"
    red_required_checks: "not a waiting state and not a completed closeout; enter check_failure remediation or report an explicit external blocker"
  conversation_policy:
    author_path:
      - "fix"
      - "commit"
      - "push"
      - "reply"
    reviewer_owned_thread_resolution: "reviewer-or-maintainer by default"
    solo_maintainer_exception: >-
      Author-side programmatic resolution is allowed only when the author is
      also repository owner or maintainer, the thread has been remediated by a
      pushed diff, the author replied with evidence, required checks are green,
      and the action is recorded as conversation cleanup rather than review
      approval.
  ready_gate:
    required_checks_green: true
    unresolved_conversations_cleared: true
    author_action_items_cleared: true
    final_hygiene_gate_satisfied: true
    correct_merge_lane: true
  merge_lane_policy:
    autonomous_lane: "request squash auto-merge or merge when GitHub allows"
    manual_lane: "leave ready for authorized human review and keep observing until merged"
  post_merge_cleanup:
    close_local_branch_when_safe: true
    close_remote_branch_when_safe: true
    confirm_local_main_synced: true
    confirm_origin_synced: true
  end_states:
    - "merged"
    - "explicit_external_blocker"
