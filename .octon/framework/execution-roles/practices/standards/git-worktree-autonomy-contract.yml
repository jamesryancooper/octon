schema_version: "git-worktree-autonomy-contract-v2"
workflow_id: "octon-change-git-github-routing"
status: "active"
owner: "Octon governance"
purpose: >-
  Bind Git, worktree, branch, and GitHub mechanics to the canonical
  Change-first default work unit policy without making branches or Pull
  Requests the default work unit.
policy_refs:
  default_work_unit_policy_ref: ".octon/framework/product/contracts/default-work-unit.yml"
  change_receipt_schema_ref: ".octon/framework/product/contracts/change-receipt-v1.schema.json"
  pr_subflow_skill_ref: ".octon/framework/capabilities/runtime/skills/remediation/closeout-pr/SKILL.md"
environment:
  supported_operator_lanes:
    - "plain-git"
    - "plain-git-gh"
    - "helper-lane"
  host_apps_non_authoritative: true
operating_model:
  default_work_unit: "Change"
  internal_execution_bundle: "Change Package"
  route_selection_required_before_git_mutation: true
  route_ids:
    - "direct-main"
    - "branch-no-pr"
    - "branch-pr"
    - "stage-only-escalate"
  primary_integration_anchor: "one clean current main worktree or clone"
  branch_role: "isolation mechanism selected by Change route"
  pr_role: "optional publication and review output selected by Change route"
  github_authority: "projection-only"
  route_requirements:
    direct-main:
      required:
        - "clean current main"
        - "no unrelated working tree changes"
        - "local validation at selected floor"
        - "landed commit on main"
        - "Change receipt"
        - "rollback handle"
      forbidden:
        - "protected-branch mutation without admitted safety route"
        - "claiming completion with only an unstaged patch"
        - "bypassing required validation"
    branch-no-pr:
      required:
        - "branch or worktree identity"
        - "explicit reason no PR is required"
        - "local validation or recorded blocker"
        - "commit, patch, or checkpoint durable enough to resume"
        - "lifecycle outcome"
        - "integration status"
        - "publication status"
        - "cleanup status"
        - "Change receipt or continuation receipt"
        - "rollback or discard plan"
        - "provider route-neutral ruleset evidence when claiming hosted landing"
        - "pushed source branch, exact source SHA checks, and origin/main equality when claiming hosted landing"
      forbidden:
        - "opening a PR only because a branch exists"
        - "claiming PR-backed publication"
        - "claiming landed from patch, checkpoint, or branch-local commit evidence alone"
        - "claiming hosted landing from a pushed-only branch"
        - "claiming hosted landing while provider ruleset requires PR"
        - "PR URL, PR number, or PR metadata"
    branch-pr:
      required:
        - "branch identity"
        - "PR URL or number"
        - "PR body references Change intent, validation, risk, and rollback"
        - "hosted checks required by the selected lane"
        - "review or solo-maintainer exception evidence when policy requires it"
        - "Change receipt that treats PR metadata as output"
        - "lifecycle outcome distinguishing published, ready, landed, and cleaned"
      final_merge_authority:
        system: "GitHub"
        requirements:
          - "rulesets"
          - "required_checks"
          - "reviewer_or_maintainer_confirmation_or_documented_solo_maintainer_exception"
    stage-only-escalate:
      required:
        - "preserved patch, checkpoint, or branch state"
        - "blocker reason"
        - "missing decision, validation, rollback, auth, review, or ownership item"
        - "next route condition"
closeout:
  owner_surface: "/closeout-change"
  pr_backed_subflow: "/closeout-pr"
  trigger_terms:
    - "finish"
    - "ship"
    - "closeout"
  prompt_contexts:
    direct_main_eligible: "Validate, commit on main, write a Change receipt, and record rollback."
    branch_no_pr: "Preserve, commit, push, land, or clean up the branch without opening a PR only when lifecycle evidence supports the claimed outcome."
    branch_pr: "Invoke PR-backed publication/review mechanics through closeout-pr after Change routing selects branch-pr, and distinguish published, ready, landed, and cleaned outcomes."
    stage_only_escalate: "Preserve state and report blockers without claiming completion."
  suppressions:
    - "active_implementation_continues"
    - "user_reports_work_in_progress"
    - "blocked_by_red_required_checks"
    - "blocked_by_unaddressed_author_action_items"
    - "blocked_waiting_on_reviewer_confirmation"
    - "blocked_waiting_on_solo_maintainer_exception_evidence"
helpers:
  git_wt_new:
    route_guard: "branch-no-pr or branch-pr only"
    posture: "branch-isolation helper"
  git_pr_open:
    route_guard: "branch-pr only"
    posture: "PR-backed publication helper"
    draft_only: true
    later_updates: "push follow-up commits to the same branch"
  git_pr_ship:
    route_guard: "branch-pr only"
    default_mode: "status"
    explicit_request_flags:
      - "--request-ready"
      - "--request-automerge"
    request_only: true
  git_pr_cleanup:
    route_guard: "PR-backed cleanup unless branch-only cleanup is explicitly selected"
  git_branch_commit:
    route_guard: "branch-no-pr or branch-pr only"
    posture: "branch-local commit helper"
  git_branch_push:
    route_guard: "branch-no-pr or branch-pr only"
    posture: "branch publication or backup helper without opening a PR"
  git_required_checks_at_ref:
    route_guard: "branch-no-pr or branch-pr"
    posture: "exact-SHA hosted check evidence helper"
  git_branch_hosted_preflight:
    route_guard: "branch-no-pr only"
    posture: "hosted no-PR landing preflight helper"
  git_branch_land:
    route_guard: "branch-no-pr only"
    posture: "local no-PR branch landing helper"
  git_branch_land_hosted_no_pr:
    route_guard: "branch-no-pr only"
    posture: "fast-forward-only hosted no-PR landing helper"
  git_branch_cleanup:
    route_guard: "branch-no-pr or branch-pr only"
    posture: "branch and worktree cleanup helper without requiring PR metadata"
validation:
  drift_classes:
    - "PR, branch, GitHub, or Change Package described as product default work unit"
    - "branch helper invoked before Change route selection"
    - "PR helper invoked for direct-main or branch-no-pr route"
    - "closeout-pr discoverable as the route-neutral default"
    - "Change receipt missing for completed route"
    - "direct-main route lacking validation or rollback evidence"
    - "checkpoint, patch, or branch-local commit reported as landed"
    - "branch-no-pr receipt containing PR metadata"
    - "branch-no-pr hosted landing claim without provider route-neutral ruleset evidence"
    - "branch-no-pr hosted landing claim without exact source SHA checks"
    - "branch-no-pr hosted landing claim without origin/main equality"
    - "branch-pr draft/open/ready state reported as full closeout"
    - "cleanup claim lacking local, remote, or worktree cleanup evidence or deferred-cleanup record"
  scenario_lanes:
    - "direct-main"
    - "branch-no-pr"
    - "branch-pr"
    - "stage-only-escalate"
remediation:
  allowed_git_subset:
    - "git status"
    - "git diff"
    - "git add"
    - "git commit"
    - "git push"
  forbidden_operations:
    - "git commit --amend"
    - "git rebase"
    - "git push --force"
    - "git push --force-with-lease"
    - "unauthorized programmatic review-thread resolution"
    - "merge main into branch as remediation shortcut"
pr_backed_review_policy:
  reviewer_owned_thread_resolution:
    default: "reviewer-or-maintainer"
    solo_maintainer_exception:
      status: "allowed"
      actor_requirement: "author is also repository owner or maintainer"
      scope: "review-thread resolution only"
      required_sequence:
        - "fix"
        - "commit"
        - "push"
        - "reply"
        - "required_checks_green"
        - "maintainer_override_evidence"
      forbidden_uses:
        - "substitute for required review approval"
        - "resolve unresolved human objection without explicit maintainer override"
        - "bypass required checks, rulesets, or GitHub mergeability"
