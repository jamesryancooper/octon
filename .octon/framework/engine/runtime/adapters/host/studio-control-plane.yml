schema_version: "octon-host-adapter-v1"
adapter_id: "studio-control-plane"
display_name: "Studio Desktop Host"
host_family: "studio"
description: "Desktop host surface for Studio inspection and governed execution launch without adding hidden authority."
replaceable: true
authority_mode: "non_authoritative"
runtime_surface:
  interface_ref: ".octon/framework/engine/runtime/crates/studio/README.md"
  integration_class: "desktop-host"
projection_sources:
  - "desktop-ui"
  - "operator-surface"
  - "launch-intent"
support_target_ref: ".octon/instance/governance/support-targets.yml"
support_tier_declarations:
  model_tiers:
    - "frontier-governed"
    - "repo-local-governed"
  workload_tiers:
    - "observe-and-read"
    - "repo-consequential"
    - "boundary-sensitive"
  language_resource_tiers:
    - "reference-owned"
    - "extended-governed"
  locale_tiers:
    - "english-primary"
    - "spanish-secondary"
conformance_criteria_refs:
  - "HOST-001"
  - "HOST-002"
  - "HOST-004"
conformance_suite_refs:
  - ".octon/framework/assurance/functional/browser/studio-browser-path.yml"
failure_taxonomy_ref: ".octon/framework/observability/governance/failure-taxonomy.yml"
known_limitations:
  - "Studio is governed only through the declared support universe and does not widen support beyond the matrix."
  - "Desktop affordances remain operator UX and never substitute for runtime receipts."
non_authoritative_boundaries:
  - "Studio may render or launch governed flows, but it may not approve, revoke, or widen authority."
  - "Displayed host state remains subordinate to canonical control and disclosure artifacts."
