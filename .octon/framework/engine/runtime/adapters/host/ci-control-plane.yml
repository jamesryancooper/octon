schema_version: "octon-host-adapter-v1"
adapter_id: "ci-control-plane"
display_name: "CI Control Plane Projection"
host_family: "ci"
description: "Projects protected execution posture and release-health state into CI without letting CI define authority."
replaceable: true
authority_mode: "projection_only"
runtime_surface:
  interface_ref: ".github/workflows/architecture-conformance.yml"
  integration_class: "ci-host"
projection_sources:
  - "workflow-job"
  - "check-run"
  - "protected-ref"
support_target_ref: ".octon/instance/governance/support-targets.yml"
support_tier_declarations:
  model_tiers:
    - "MT-B"
    - "MT-C"
  workload_tiers:
    - "WT-2"
    - "WT-3"
  language_resource_tiers:
    - "LT-REF"
  locale_tiers:
    - "LOC-EN"
conformance_criteria_refs:
  - "HOST-001"
  - "HOST-003"
  - "HOST-004"
known_limitations:
  - "CI is a projection boundary for protected checks and must defer to canonical authority artifacts."
  - "This host remains staged for broader locale or experimental-context claims."
non_authoritative_boundaries:
  - "CI checks and workflow state may block promotion, but they do not mint approval or support authority."
  - "Protected execution posture still resolves through canonical control roots and runtime receipts."
