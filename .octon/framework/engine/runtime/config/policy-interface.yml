format_version: policy-interface-config-v1

paths:
  default_policy: ".octon/framework/capabilities/governance/policy/deny-by-default.v2.yml"
  receipt_writer: ".octon/framework/capabilities/_ops/scripts/policy-receipt-write.sh"
  rollout_mode_state: ".octon/state/control/capabilities/rollout-mode.state"
  intent_contract: ".octon/framework/engine/runtime/spec/intent-contract-v1.schema.json"
  instruction_layer_manifest_schema: ".octon/framework/engine/runtime/spec/instruction-layer-manifest-v1.schema.json"
  network_egress_policy: ".octon/instance/governance/policies/network-egress.yml"
  execution_budget_policy: ".octon/instance/governance/policies/execution-budgets.yml"
  mission_autonomy_policy: ".octon/instance/governance/policies/mission-autonomy.yml"
  ownership_registry: ".octon/instance/governance/ownership/registry.yml"
  support_targets: ".octon/instance/governance/support-targets.yml"
  objective_contract_family: ".octon/framework/constitution/contracts/objective"
  authority_contract_family: ".octon/framework/constitution/contracts/authority"
  workspace_objective_brief: ".octon/instance/bootstrap/OBJECTIVE.md"
  workspace_intent_contract: ".octon/instance/cognition/context/shared/intent.contract.yml"
  missions_registry: ".octon/instance/orchestration/missions/registry.yml"
  execution_budget_state: ".octon/state/control/execution/budget-state.yml"
  approval_request_root: ".octon/state/control/execution/approvals/requests"
  approval_grant_root: ".octon/state/control/execution/approvals/grants"
  execution_exception_leases: ".octon/state/control/execution/exceptions/leases.yml"
  execution_revocations: ".octon/state/control/execution/revocations/grants.yml"
  run_control_root: ".octon/state/control/execution/runs"
  mission_control_root: ".octon/state/control/execution/missions"
  control_receipt_root: ".octon/state/evidence/control/execution"
  mission_effective_route_root: ".octon/generated/effective/orchestration/missions"
  mission_summary_root: ".octon/generated/cognition/summaries/missions"
  operator_digest_root: ".octon/generated/cognition/summaries/operators"
  mission_projection_root: ".octon/generated/cognition/projections/materialized/missions"

exit_codes:
  allow: 0
  deny: 13
  contract_error: 2

wrapper:
  acp_enforce:
    supports_emit_receipt: true
    validates_receipt: true
    material_runs_require_manifest: true

enforcement:
  intent_binding:
    enabled: true
    missing_action: deny
    invalid_action: deny
    missing_reason_code: INTENT_MISSING
    invalid_reason_code: INTENT_REF_INVALID
