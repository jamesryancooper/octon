schema_version: material-side-effect-inventory-v1
classes:
  - id: repo-mutation
    token_type: "AuthorizedEffect<RepoMutation>"
    roots:
      - ".octon/framework/capabilities/runtime/services/**"
      - ".octon/framework/orchestration/runtime/workflows/**"
    examples:
      - "service scaffold creation"
      - "service build mutation"
      - "workflow-stage repo write"
    required_boundary: ".octon/framework/engine/runtime/spec/execution-authorization-v1.md"
    owner: "Octon runtime"
    risk_tier: "high"
    material: true
  - id: evidence-mutation
    token_type: "AuthorizedEffect<EvidenceMutation>"
    roots:
      - ".octon/state/evidence/**"
    examples:
      - "execution receipt write"
      - "authorization phase receipt write"
      - "disclosure evidence linkage"
    required_boundary: ".octon/framework/engine/runtime/spec/execution-authorization-v1.md"
    owner: "Octon runtime"
    risk_tier: "high"
    material: true
  - id: control-mutation
    token_type: "AuthorizedEffect<StateControlMutation>"
    roots:
      - ".octon/state/control/**"
    examples:
      - "run lifecycle binding"
      - "checkpoint and runtime-state mutation"
    required_boundary: ".octon/framework/engine/runtime/spec/execution-authorization-v1.md"
    owner: "Octon runtime"
    risk_tier: "high"
    material: true
  - id: control-plane-preparation
    token_type: "NoAuthorizedEffectToken<ControlPlanePreparation>"
    roots:
      - ".octon/state/control/connectors/**"
      - ".octon/state/evidence/connectors/**"
      - ".octon/generated/cognition/projections/materialized/connectors/**"
    examples:
      - "connector admission posture preparation"
      - "connector quarantine status preparation"
      - "connector trust evidence indexing without external operation execution"
    required_boundary: ".octon/framework/orchestration/practices/connector-admission-standards.md"
    owner: "Octon runtime"
    risk_tier: "medium"
    material: false
  - id: generated-effective-publication
    token_type: "AuthorizedEffect<GeneratedEffectivePublication>"
    roots:
      - ".octon/generated/effective/**"
    examples:
      - "runtime route-bundle publication"
      - "pack-route publication"
      - "support-target matrix publication"
    required_boundary: ".octon/framework/engine/runtime/spec/execution-authorization-v1.md"
    owner: "Octon runtime"
    risk_tier: "high"
    material: true
  - id: executor-launch
    token_type: "AuthorizedEffect<ExecutorLaunch>"
    roots:
      - ".octon/generated/.tmp/execution/**"
      - ".octon/generated/.tmp/engine/**"
    examples:
      - "studio launch"
      - "workflow executor bootstrap"
    required_boundary: ".octon/framework/engine/runtime/spec/execution-authorization-v1.md"
    owner: "Octon runtime"
    risk_tier: "high"
    material: true
  - id: service-invocation
    token_type: "AuthorizedEffect<ServiceInvocation>"
    roots:
      - ".octon/framework/capabilities/runtime/services/**"
      - ".octon/framework/engine/runtime/adapters/**"
    examples:
      - "tool or service invocation"
      - "stdio-mediated service execution"
      - "outbound network egress"
      - "model-backed invocation"
    required_boundary: ".octon/framework/engine/runtime/spec/execution-authorization-v1.md"
    owner: "Octon runtime"
    risk_tier: "high"
    material: true
  - id: protected-ci-check
    token_type: "AuthorizedEffect<ProtectedCiCheck>"
    roots:
      - ".github/workflows/**"
    examples:
      - "protected CI merge or approval action"
    required_boundary: ".octon/framework/engine/runtime/spec/execution-authorization-v1.md"
    owner: "Octon governance"
    risk_tier: "high"
    material: true
  - id: extension-activation
    token_type: "AuthorizedEffect<ExtensionActivation>"
    roots:
      - ".octon/generated/effective/extensions/**"
      - ".octon/state/control/extensions/**"
      - ".claude/**"
      - ".cursor/**"
      - ".codex/**"
    examples:
      - "extension activation or publication"
      - "host projection publication"
    required_boundary: ".octon/framework/engine/runtime/spec/execution-authorization-v1.md"
    owner: "Octon governance"
    risk_tier: "high"
    material: true
  - id: capability-pack-activation
    token_type: "AuthorizedEffect<CapabilityPackActivation>"
    roots:
      - ".octon/generated/effective/capabilities/**"
      - ".octon/instance/governance/capability-packs/**"
    examples:
      - "capability pack route activation"
    required_boundary: ".octon/framework/engine/runtime/spec/execution-authorization-v1.md"
    owner: "Octon governance"
    risk_tier: "high"
    material: true
paths:
