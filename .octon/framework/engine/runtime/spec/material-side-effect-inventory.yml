    class_id: service-invocation
    owner_ref: ".octon/framework/engine/runtime/crates/kernel/src/commands/mod.rs"
    consumer_api_ref: ".octon/framework/engine/runtime/crates/kernel/src/commands/mod.rs::invoke_service_with_verified_effect"
    negative_bypass_test_ref: ".octon/framework/assurance/runtime/_ops/tests/test-authorized-effect-token-negative-bypass.sh"
    consumption_receipt_required: true
    journal_event_required: true
    token_required: true
    coverage_state: live
