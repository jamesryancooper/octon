schema_version: "materiality-classification-policy-v1"
policy_id: "execution-materiality-classification"
owner: "Octon governance"
status: "active"
classes:
  - class_id: "observation_only"
    rule: "Read-only inspection that does not mutate repo, control state, evidence, or external systems."
    required_route: "allow"
  - class_id: "bounded_consequential"
    rule: "Repo-local consequential execution that mutates repo or retained state but remains inside the managed repository."
    required_route: "allow-with-run-binding"
  - class_id: "boundary_sensitive"
    rule: "Execution that uses boundary-sensitive packs, shell launchers, network egress, or other higher-risk consequential surfaces."
    required_route: "allow-with-run-binding-and-replay"
surface_map:
  - surface: "services:list"
    class_id: "observation_only"
  - surface: "tool:*"
    class_id: "bounded_consequential"
  - surface: "service:new"
    class_id: "bounded_consequential"
  - surface: "service:build"
    class_id: "bounded_consequential"
  - surface: "studio"
    class_id: "boundary_sensitive"
  - surface: "workflow:run"
    class_id: "bounded_consequential"
  - surface: "run:start"
    class_id: "bounded_consequential"
  - surface: "run:resume"
    class_id: "bounded_consequential"
