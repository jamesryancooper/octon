schema_version: "run-required-policy-v1"
policy_id: "universal-run-binding"
owner: "Octon governance"
status: "active"
default_direct_route: "deny"
observation_only_surfaces:
  - surface: "info"
    route: "allow"
  - surface: "services:list"
    route: "allow"
  - surface: "run:inspect"
    route: "allow"
  - surface: "run:checkpoint"
    route: "allow"
  - surface: "run:close"
    route: "allow"
  - surface: "run:replay"
    route: "allow"
  - surface: "run:disclose"
    route: "allow"
  - surface: "orchestration:*"
    route: "allow"
consequential_surfaces:
  - surface: "tool:*"
    route: "compatibility-run-binding"
  - surface: "service:new"
    route: "compatibility-run-binding"
  - surface: "service:build"
    route: "compatibility-run-binding"
  - surface: "studio"
    route: "compatibility-run-binding"
  - surface: "workflow:run"
    route: "deny"
rules:
  - "No consequential surface may execute without a canonical control-root run contract and manifest."
  - "Compatibility entry points must not survive as live consequential execution lanes."
  - "Observation-only surfaces may execute directly when they do not mutate repo, control state, evidence, or external systems."
