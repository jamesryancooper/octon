schema_version: "octon-product-feature-catalog-v1"
catalog_role: "navigation-only"
authority_note: >-
  This catalog is informative navigation only. It links to authoritative,
  runtime, generated, evidence, and validation surfaces, but it does not mint
  authority, support claims, runtime routes, generated-effective state, or
  durable execution evidence.
features:
  - feature_id: "lifecycle-autopilot"
    name: "Lifecycle Autopilot"
    implementation_status: "implemented"
    summary: >-
      Generic lifecycle orchestration plus route execution for
      extension-declared lifecycle contracts, with proposal packets as the
      first end-to-end pilot.
    primary_audiences:
      - "agents"
      - "operators"
      - "maintainers"
    owner_subsystems:
      - "engine/runtime"
      - "capabilities/extensions"
      - "orchestration/workflows"
      - "assurance/runtime"
      - "product"
    entrypoints:
      - kind: "cli"
        value: "octon lifecycle plan --lifecycle <id> --target <path>"
      - kind: "cli"
        value: "octon lifecycle run --lifecycle <id> --target <path>"
      - kind: "cli"
        value: "octon lifecycle resume --run-id <id>"
      - kind: "command"
        value: "/octon-proposal-packet-run-lifecycle"
      - kind: "skill"
        value: "octon-proposal-packet-lifecycle-run-lifecycle"
    authoritative_refs:
      - path: ".octon/framework/constitution/CHARTER.md"
        role: "constitutional boundary for governed execution"
        authority_class: "authored-authority"
      - path: ".octon/framework/constitution/obligations/fail-closed.yml"
        role: "fail-closed obligation family"
        authority_class: "authored-authority"
      - path: ".octon/framework/constitution/obligations/evidence.yml"
        role: "evidence obligation family"
        authority_class: "authored-authority"
      - path: ".octon/framework/cognition/_meta/architecture/inputs/additive/extensions/schemas/extension-lifecycle-contract.schema.json"
        role: "extension lifecycle contract schema"
        authority_class: "runtime-spec"
      - path: ".octon/framework/engine/runtime/spec/lifecycle-route-execution-request-v1.schema.json"
        role: "route execution request schema"
        authority_class: "runtime-spec"
      - path: ".octon/framework/engine/runtime/spec/lifecycle-route-execution-result-v1.schema.json"
        role: "route execution result schema"
        authority_class: "runtime-spec"
      - path: ".octon/framework/engine/runtime/spec/lifecycle-route-completion-observation-v1.schema.json"
        role: "route completion observation schema"
        authority_class: "runtime-spec"
    runtime_surfaces:
      - path: ".octon/framework/engine/runtime/crates/kernel/src/lifecycle.rs"
        role: "generic lifecycle planning, gates, receipts, checkpoints, and resume"
        authority_class: "runtime-implementation"
      - path: ".octon/framework/engine/runtime/crates/kernel/src/lifecycle_driver.rs"
        role: "plan-execute-observe-replan driver"
        authority_class: "runtime-implementation"
      - path: ".octon/framework/engine/runtime/crates/lifecycle_executor"
        role: "shared lifecycle route executor adapter crate"
        authority_class: "runtime-implementation"
    extension_surfaces:
      - path: ".octon/inputs/additive/extensions/octon-proposal-packet-lifecycle/context/lifecycle.contract.yml"
        role: "authored proposal packet lifecycle contract input"
        authority_class: "publication-input-only"
      - path: ".octon/inputs/additive/extensions/octon-proposal-packet-lifecycle/commands/octon-proposal-packet-run-lifecycle.md"
        role: "authored user-facing proposal lifecycle command input"
        authority_class: "publication-input-only"
      - path: ".octon/inputs/additive/extensions/octon-proposal-packet-lifecycle/skills/octon-proposal-packet-lifecycle-run-lifecycle/SKILL.md"
        role: "authored user-facing proposal lifecycle skill input"
        authority_class: "publication-input-only"
    generated_effective_surfaces:
      - path: ".octon/generated/effective/extensions/catalog.effective.yml"
        role: "generated extension catalog used for runtime discovery"
        authority_class: "generated-effective-non-authority"
      - path: ".octon/generated/effective/extensions/published/octon-proposal-packet-lifecycle/bundled-first-party/context/lifecycle.contract.yml"
        role: "published lifecycle contract projection consumed at runtime"
        authority_class: "generated-effective-non-authority"
      - path: ".octon/generated/effective/runtime/route-bundle.yml"
        role: "generated runtime route bundle"
        authority_class: "generated-effective-non-authority"
    evidence_surfaces:
      - path_pattern: ".octon/state/evidence/runs/workflows/<run-id>/"
        role: "workflow run evidence bundle"
        authority_class: "retained-evidence-pattern"
      - path_pattern: ".octon/state/control/execution/runs/<run-id>/lifecycle-checkpoint.yml"
        role: "lifecycle checkpoint and resume control state"
        authority_class: "retained-evidence-pattern"
    validation_refs:
      - path: ".octon/framework/assurance/runtime/_ops/scripts/validate-lifecycle-contracts.sh"
        role: "lifecycle contract validator"
        authority_class: "validation"
      - path: ".octon/framework/assurance/runtime/_ops/tests/test-validate-lifecycle-contracts.sh"
        role: "lifecycle contract validator tests"
        authority_class: "validation"
      - path: ".octon/framework/assurance/runtime/_ops/tests/test-lifecycle-runner.sh"
        role: "lifecycle runner tests"
        authority_class: "validation"
      - path: ".octon/framework/assurance/runtime/_ops/tests/test-lifecycle-executor-adapter.sh"
        role: "lifecycle executor adapter tests"
        authority_class: "validation"
      - path: ".octon/framework/assurance/runtime/_ops/tests/test-proposal-lifecycle-v1-acceptance.sh"
        role: "proposal lifecycle end-to-end acceptance tests"
        authority_class: "validation"
      - path: ".octon/inputs/additive/extensions/octon-proposal-packet-lifecycle/validation/tests/test-route-resolution.sh"
        role: "proposal lifecycle extension route-resolution tests"
        authority_class: "publication-input-only"
    related_docs:
      - path: ".octon/framework/product/features/lifecycle-autopilot.md"
        role: "human-readable feature note"
        authority_class: "navigation-only"
      - path: ".octon/inputs/additive/extensions/octon-proposal-packet-lifecycle/README.md"
        role: "proposal lifecycle extension overview"
        authority_class: "publication-input-only"
      - path: ".octon/inputs/additive/extensions/octon-proposal-packet-lifecycle/context/routing-guide.md"
        role: "proposal lifecycle routing guidance"
        authority_class: "publication-input-only"
    authority_notes:
      - "The product feature catalog is navigation-only."
      - "Generated effective projections remain derived-only and require their own freshness validation."
      - "Raw additive extension inputs are publication inputs, not runtime authority."
      - "Proposal-local receipts are evidence only and do not create proposal manifest statuses."
