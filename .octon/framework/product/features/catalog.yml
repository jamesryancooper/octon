schema_version: "octon-product-feature-catalog-v1"
catalog_role: "navigation-only"
authority_note: >-
  This catalog is informative navigation only. It links to authoritative,
  runtime, generated, evidence, and validation surfaces, but it does not mint
  authority, support claims, runtime routes, generated-effective state, or
  durable execution evidence.
features:
  - feature_id: "lifecycle-autopilot"
    name: "Lifecycle Autopilot"
    implementation_status: "implemented"
    summary: >-
      Generic lifecycle orchestration plus route execution for
      extension-declared lifecycle contracts, with proposal packets and
      proposal-program multi-target runs as the first end-to-end pilots.
    primary_audiences:
      - "agents"
      - "operators"
      - "maintainers"
    owner_subsystems:
      - "engine/runtime"
      - "capabilities/extensions"
      - "orchestration/workflows"
      - "assurance/runtime"
      - "product"
    entrypoints:
      - kind: "cli"
        value: "octon lifecycle plan --lifecycle <id> --target <path>"
      - kind: "cli"
        value: "octon lifecycle run --lifecycle <id> --target <path>"
      - kind: "cli"
        value: "octon lifecycle run --lifecycle proposal-program --target <parent-program-packet> --max-child-concurrency <n>"
      - kind: "cli"
        value: "octon lifecycle resume --run-id <id>"
      - kind: "cli"
        value: "octon lifecycle program inspect --run-id <id>"
      - kind: "cli"
        value: "octon lifecycle program replay --run-id <id> [--verify]"
      - kind: "cli"
        value: "octon lifecycle program status --run-id <id> [--format json|text]"
      - kind: "cli"
        value: "octon lifecycle program explain-blockers --run-id <id>"
      - kind: "cli"
        value: "octon lifecycle program approve --run-id <id> --child <id> --route <id> --reason <text>"
      - kind: "cli"
        value: "octon lifecycle program retry --run-id <id> [--child <id>]"
      - kind: "cli"
        value: "octon lifecycle program cancel --run-id <id> --reason <text>"
      - kind: "cli"
        value: "octon lifecycle program propose-mutation --run-id <id> --spec <path>"
      - kind: "cli"
        value: "octon lifecycle program apply-mutation --run-id <id> --spec <path> --reason <text>"
      - kind: "cli"
        value: "octon lifecycle program scaffold --target <parent-program-packet> --spec <path> [--dry-run]"
      - kind: "command"
        value: "/octon-proposal-run-packet-lifecycle"
      - kind: "skill"
        value: "octon-proposal-lifecycle-run-packet-lifecycle"
      - kind: "command"
        value: "/octon-proposal-run-program-lifecycle"
      - kind: "skill"
        value: "octon-proposal-lifecycle-run-program-lifecycle"
    authoritative_refs:
      - path: ".octon/framework/constitution/CHARTER.md"
        role: "constitutional boundary for governed execution"
        authority_class: "authored-authority"
      - path: ".octon/framework/constitution/obligations/fail-closed.yml"
        role: "fail-closed obligation family"
        authority_class: "authored-authority"
      - path: ".octon/framework/constitution/obligations/evidence.yml"
        role: "evidence obligation family"
        authority_class: "authored-authority"
      - path: ".octon/framework/cognition/_meta/architecture/inputs/additive/extensions/schemas/extension-lifecycle-contract.schema.json"
        role: "extension lifecycle contract schema"
        authority_class: "runtime-spec"
      - path: ".octon/framework/cognition/_meta/architecture/inputs/additive/extensions/schemas/proposal-program-child-registry.schema.json"
        role: "proposal-program child registry schema"
        authority_class: "runtime-spec"
      - path: ".octon/framework/cognition/_meta/architecture/inputs/additive/extensions/schemas/program-lifecycle-event.schema.json"
        role: "program lifecycle event log record schema"
        authority_class: "runtime-spec"
      - path: ".octon/framework/cognition/_meta/architecture/inputs/additive/extensions/schemas/proposal-program-mutation.schema.json"
        role: "proposal-program mutation spec schema"
        authority_class: "runtime-spec"
      - path: ".octon/framework/cognition/_meta/architecture/inputs/additive/extensions/schemas/proposal-program-scaffold.schema.json"
        role: "proposal-program scaffold spec schema"
        authority_class: "runtime-spec"
      - path: ".octon/framework/engine/runtime/spec/lifecycle-program-controller-invariants.md"
        role: "Lifecycle Autopilot proposal-program controller closeout invariant spec"
        authority_class: "runtime-spec"
      - path: ".octon/framework/engine/runtime/spec/lifecycle-route-execution-request-v1.schema.json"
        role: "route execution request schema"
        authority_class: "runtime-spec"
      - path: ".octon/framework/engine/runtime/spec/lifecycle-route-execution-result-v1.schema.json"
        role: "route execution result schema"
        authority_class: "runtime-spec"
      - path: ".octon/framework/engine/runtime/spec/lifecycle-route-completion-observation-v1.schema.json"
        role: "route completion observation schema"
        authority_class: "runtime-spec"
    runtime_surfaces:
      - path: ".octon/framework/engine/runtime/crates/kernel/src/lifecycle.rs"
        role: "generic lifecycle planning, gates, receipts, checkpoints, and resume"
        authority_class: "runtime-implementation"
      - path: ".octon/framework/engine/runtime/crates/kernel/src/lifecycle_program.rs"
        role: "proposal-program planning, scheduling, atomic barrier recovery, replay verification, status read models, mutations, scaffold, closeout, checkpoints, and operator controls"
        authority_class: "runtime-implementation"
      - path: ".octon/framework/engine/runtime/crates/kernel/src/lifecycle_driver.rs"
        role: "plan-execute-observe-replan driver"
        authority_class: "runtime-implementation"
      - path: ".octon/framework/engine/runtime/crates/lifecycle_executor"
        role: "shared lifecycle route executor adapter crate"
        authority_class: "runtime-implementation"
    extension_surfaces:
      - path: ".octon/inputs/additive/extensions/octon-proposal-lifecycle/context/lifecycle.contract.yml"
        role: "authored proposal packet lifecycle contract input"
        authority_class: "publication-input-only"
      - path: ".octon/inputs/additive/extensions/octon-proposal-lifecycle/context/lifecycles/proposal-program.contract.yml"
        role: "authored proposal-program lifecycle contract input"
        authority_class: "publication-input-only"
      - path: ".octon/inputs/additive/extensions/octon-proposal-lifecycle/commands/octon-proposal-run-packet-lifecycle.md"
        role: "authored user-facing proposal packet lifecycle command input"
        authority_class: "publication-input-only"
      - path: ".octon/inputs/additive/extensions/octon-proposal-lifecycle/skills/octon-proposal-lifecycle-run-packet-lifecycle/SKILL.md"
        role: "authored user-facing proposal packet lifecycle skill input"
        authority_class: "publication-input-only"
      - path: ".octon/inputs/additive/extensions/octon-proposal-lifecycle/commands/octon-proposal-run-program-lifecycle.md"
        role: "authored user-facing proposal program lifecycle command input"
        authority_class: "publication-input-only"
      - path: ".octon/inputs/additive/extensions/octon-proposal-lifecycle/skills/octon-proposal-lifecycle-run-program-lifecycle/SKILL.md"
        role: "authored user-facing proposal program lifecycle skill input"
        authority_class: "publication-input-only"
    generated_effective_surfaces:
      - path: ".octon/generated/effective/extensions/catalog.effective.yml"
        role: "generated extension catalog used for runtime discovery"
        authority_class: "generated-effective-non-authority"
      - path: ".octon/generated/effective/extensions/published/octon-proposal-lifecycle/bundled-first-party/context/lifecycle.contract.yml"
        role: "published proposal-packet lifecycle contract projection consumed at runtime"
        authority_class: "generated-effective-non-authority"
      - path: ".octon/generated/effective/extensions/published/octon-proposal-lifecycle/bundled-first-party/context/lifecycles/proposal-program.contract.yml"
        role: "published proposal-program lifecycle contract projection consumed at runtime"
        authority_class: "generated-effective-non-authority"
      - path: ".octon/generated/effective/runtime/route-bundle.yml"
        role: "generated runtime route bundle"
        authority_class: "generated-effective-non-authority"
    evidence_surfaces:
      - path_pattern: ".octon/state/evidence/runs/workflows/<run-id>/"
        role: "workflow run evidence bundle"
        authority_class: "retained-evidence-pattern"
      - path_pattern: ".octon/state/control/execution/runs/<run-id>/lifecycle-checkpoint.yml"
        role: "lifecycle checkpoint and resume control state"
        authority_class: "retained-evidence-pattern"
      - path_pattern: ".octon/state/control/execution/runs/<run-id>/program-lifecycle-checkpoint.yml"
        role: "program lifecycle checkpoint and child target control state"
        authority_class: "retained-evidence-pattern"
      - path_pattern: ".octon/state/control/execution/runs/<run-id>/program-events.ndjson"
        role: "durable program event log for replay and operator inspection"
        authority_class: "retained-evidence-pattern"
    validation_refs:
      - path: ".octon/framework/assurance/runtime/_ops/scripts/validate-lifecycle-contracts.sh"
        role: "lifecycle contract validator"
        authority_class: "validation"
      - path: ".octon/framework/assurance/runtime/_ops/scripts/validate-proposal-program-child-readiness.sh"
        role: "proposal-program child readiness gate before program implementation prompt generation"
        authority_class: "validation"
      - path: ".octon/framework/assurance/runtime/_ops/tests/test-validate-lifecycle-contracts.sh"
        role: "lifecycle contract validator tests"
        authority_class: "validation"
      - path: ".octon/framework/assurance/runtime/_ops/tests/test-validate-proposal-program-child-readiness.sh"
        role: "proposal-program child readiness validator tests"
        authority_class: "validation"
      - path: ".octon/framework/assurance/runtime/_ops/tests/test-lifecycle-runner.sh"
        role: "lifecycle runner tests"
        authority_class: "validation"
      - path: ".octon/framework/assurance/runtime/_ops/tests/test-lifecycle-executor-adapter.sh"
        role: "lifecycle executor adapter tests"
        authority_class: "validation"
      - path: ".octon/framework/assurance/runtime/_ops/tests/test-proposal-lifecycle-v1-acceptance.sh"
        role: "proposal lifecycle end-to-end acceptance tests"
        authority_class: "validation"
      - path: ".octon/inputs/additive/extensions/octon-proposal-lifecycle/validation/tests/test-route-resolution.sh"
        role: "proposal lifecycle extension route-resolution tests"
        authority_class: "publication-input-only"
    related_docs:
      - path: ".octon/framework/product/features/lifecycle-autopilot.md"
        role: "human-readable feature note"
        authority_class: "navigation-only"
      - path: ".octon/inputs/additive/extensions/octon-proposal-lifecycle/README.md"
        role: "proposal lifecycle extension overview"
        authority_class: "publication-input-only"
      - path: ".octon/inputs/additive/extensions/octon-proposal-lifecycle/context/routing-guide.md"
        role: "proposal lifecycle routing guidance"
        authority_class: "publication-input-only"
    authority_notes:
      - "The product feature catalog is navigation-only."
      - "Generated effective projections remain derived-only and require their own freshness validation."
      - "Raw additive extension inputs are publication inputs, not runtime authority."
      - "Proposal-local receipts are evidence only and do not create proposal manifest statuses."
  - feature_id: "extension-packs"
    name: "Extension Packs"
    implementation_status: "implemented"
    summary: >-
      Shared additive extension-pack substrate with declarative capability
      profiles, publication, generated effective projections, and runtime
      resolver guardrails.
    primary_audiences:
      - "agents"
      - "operators"
      - "extension authors"
      - "maintainers"
    owner_subsystems:
      - "capabilities/extensions"
      - "orchestration/runtime"
      - "generated/effective"
      - "assurance/runtime"
      - "product"
    entrypoints:
      - kind: "path"
        value: ".octon/inputs/additive/extensions/<pack-id>/pack.yml"
      - kind: "path"
        value: ".octon/generated/effective/extensions/catalog.effective.yml"
      - kind: "path"
        value: ".octon/framework/orchestration/runtime/_ops/scripts/publish-extension-state.sh"
    authoritative_refs:
      - path: ".octon/framework/cognition/_meta/architecture/inputs/additive/extensions/schemas/extension-pack.schema.json"
        role: "extension pack schema including capability profiles"
        authority_class: "runtime-spec"
      - path: ".octon/framework/cognition/_meta/architecture/inputs/additive/extensions/schemas/extension-routing-contract.schema.json"
        role: "routing contract schema"
        authority_class: "runtime-spec"
      - path: ".octon/framework/cognition/_meta/architecture/inputs/additive/extensions/schemas/extension-lifecycle-contract.schema.json"
        role: "lifecycle contract schema"
        authority_class: "runtime-spec"
      - path: ".octon/framework/cognition/_meta/architecture/generated/effective/extensions/schemas/extension-effective-catalog.schema.json"
        role: "generated effective catalog schema"
        authority_class: "runtime-spec"
    runtime_surfaces:
      - path: ".octon/framework/orchestration/runtime/_ops/scripts/extensions-common.sh"
        role: "shared extension validation and publication helper library"
        authority_class: "runtime-implementation"
      - path: ".octon/framework/orchestration/runtime/_ops/scripts/publish-extension-state.sh"
        role: "extension publication generator"
        authority_class: "runtime-implementation"
      - path: ".octon/framework/orchestration/runtime/_ops/scripts/resolve-extension-route.sh"
        role: "routing-contract resolver guarded by generated capability profiles"
        authority_class: "runtime-implementation"
      - path: ".octon/framework/orchestration/runtime/_ops/scripts/resolve-extension-prompt-bundle.sh"
        role: "prompt-bundle resolver guarded by generated capability profiles"
        authority_class: "runtime-implementation"
    extension_surfaces:
      - path: ".octon/inputs/additive/extensions"
        role: "authored extension pack publication-input root"
        authority_class: "publication-input-only"
      - path: ".octon/framework/cognition/_meta/architecture/inputs/additive/extensions/README.md"
        role: "authored extension input surface guidance"
        authority_class: "publication-input-only"
      - path: ".octon/framework/cognition/_meta/architecture/inputs/additive/extensions/schemas/README.md"
        role: "authored extension schema index"
        authority_class: "publication-input-only"
    generated_effective_surfaces:
      - path: ".octon/generated/effective/extensions/catalog.effective.yml"
        role: "generated extension runtime discovery catalog"
        authority_class: "generated-effective-non-authority"
      - path: ".octon/generated/effective/extensions/artifact-map.yml"
        role: "generated extension artifact map with capability profile index"
        authority_class: "generated-effective-non-authority"
      - path: ".octon/generated/effective/extensions/generation.lock.yml"
        role: "generated extension publication lock with profile digest metadata"
        authority_class: "generated-effective-non-authority"
    evidence_surfaces:
      - path_pattern: ".octon/state/evidence/validation/publication/extensions/<timestamp>-<generation-id>.yml"
        role: "extension publication receipt"
        authority_class: "retained-evidence-pattern"
      - path_pattern: ".octon/state/evidence/validation/compatibility/extensions/<timestamp>-<generation-id>.yml"
        role: "extension compatibility receipt"
        authority_class: "retained-evidence-pattern"
    validation_refs:
      - path: ".octon/framework/assurance/runtime/_ops/scripts/validate-extension-pack-contract.sh"
        role: "extension pack contract validator"
        authority_class: "validation"
      - path: ".octon/framework/assurance/runtime/_ops/scripts/validate-extension-publication-state.sh"
        role: "extension publication state validator"
        authority_class: "validation"
      - path: ".octon/framework/assurance/runtime/_ops/tests/test-validate-extension-pack-contract.sh"
        role: "extension pack capability profile contract tests"
        authority_class: "validation"
      - path: ".octon/framework/assurance/runtime/_ops/tests/test-resolve-extension-route.sh"
        role: "routing resolver tests"
        authority_class: "validation"
      - path: ".octon/framework/assurance/runtime/_ops/tests/test-resolve-extension-prompt-bundle.sh"
        role: "prompt bundle resolver tests"
        authority_class: "validation"
    related_docs:
      - path: ".octon/framework/product/features/extension-packs.md"
        role: "human-readable feature note"
        authority_class: "navigation-only"
      - path: ".octon/framework/cognition/_meta/architecture/generated/effective/extensions/README.md"
        role: "generated effective extension output guidance"
        authority_class: "navigation-only"
      - path: ".octon/framework/engine/governance/extensions/trust-and-compatibility.md"
        role: "extension trust, compatibility, and publication guidance"
        authority_class: "navigation-only"
    authority_notes:
      - "The product feature catalog is navigation-only."
      - "Raw extension packs under inputs/additive/extensions are publication inputs only."
      - "Generated effective extension outputs are derived runtime discovery surfaces, not durable authority."
      - "Capability profiles are composable guardrails, not mutually exclusive extension types."
