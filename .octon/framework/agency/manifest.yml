# Agency Manifest (Tier 1 Discovery)
# Canonical routing entrypoint for actor definitions.

schema_version: "1.0"
default_agent: architect

routing:
  assistant_prefix: "@"
  ambiguity_resolution: "ask"
  locality: "repo-instance-scope-registry"

registries:
  agents: "runtime/agents/registry.yml"
  assistants: "runtime/assistants/registry.yml"
  teams: "runtime/teams/registry.yml"

policy:
  allow_skill_actor_delegation: false
  mission_owner_types: [agent, human]
  assistant_mission_ownership: false
