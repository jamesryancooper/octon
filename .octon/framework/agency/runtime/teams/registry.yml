# Teams Registry
# Canonical index for reusable multi-actor compositions.

schema_version: "1.0"
default: delivery-core

teams:
  - id: delivery-core
    path: delivery-core/
    classification: optional-overlay
    purpose: "Default delivery composition anchored on one orchestrator with optional independent verification"
    lead_agent: orchestrator
    members:
      agents: [orchestrator, verifier]
      assistants: [reviewer, refactor, docs]
    handoff_policy: "orchestrator-owns -> assistants-isolate-bounded-work -> verifier-checks-when-independence-matters"
    default_workflow: null
    recommended_workflows: [audit-pre-release, audit-documentation, audit-orchestration]
    composite_skill_policy:
      preferred: []
      requirements: [fail-closed, self-validating, explicit-depends-on]
