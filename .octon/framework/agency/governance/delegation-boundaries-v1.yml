schema_version: "delegation-boundaries-v1"
boundary_set_id: "agency-delegation-core"
boundary_set_version: "1.2.0"
owner: "agency-owner"
approved_by: "octon-platform"
review_cadence_days: 30

boundaries:
  - boundary_id: "DB-001"
    decision_class: "policy-conflict"
    condition: "request conflicts with policy, governance contract, or missing exception evidence"
    route: "escalate"
    severity: "high"
    escalation_target: "policy-author"

  - boundary_id: "DB-002"
    decision_class: "irreversible-action"
    condition: "action is one-way door or lacks deterministic rollback path"
    route: "escalate"
    severity: "high"
    escalation_target: "human-owner"

  - boundary_id: "DB-003"
    decision_class: "out-of-scope-delegation"
    condition: "delegate task exceeds declared delegation packet scope"
    route: "block"
    severity: "medium"
    escalation_target: "delegator"

  - boundary_id: "DB-004"
    decision_class: "standard-reversible-task"
    condition: "task is within scope and reversible under approved controls"
    route: "allow"
    severity: "low"
    escalation_target: "none"

  - boundary_id: "DB-005"
    decision_class: "protected-branch-main-deletion"
    condition: "requested action deletes local or remote branch named main"
    route: "block"
    severity: "high"
    escalation_target: "policy-author"

  - boundary_id: "DB-006"
    decision_class: "execution-profile-tie-break"
    condition: "both atomic and transitional profile conditions appear true for the same change"
    route: "escalate"
    severity: "high"
    escalation_target: "policy-author"
