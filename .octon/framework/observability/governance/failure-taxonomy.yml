schema_version: "failure-taxonomy-v1"
taxonomy_id: "octon-runtime-failure-taxonomy"
classes:
  - class_id: "authority-routing"
    description: "Failures caused by approval, support-tier, exception, or revocation posture."
  - class_id: "run-lifecycle"
    description: "Failures caused by missing run binding, runtime-state drift, or checkpoint loss."
  - class_id: "proof-and-disclosure"
    description: "Failures caused by incomplete proof, replay, or disclosure retention."
  - class_id: "bootstrap-readiness"
    description: "Failures caused by missing ingress, workspace-charter, workflow-discovery, or bootstrap prerequisites."
  - class_id: "repo-shell-classification"
    description: "Failures caused by repo-shell command or path classes routing to deny, stage_only, or escalation."
  - class_id: "repo-consequential-preflight"
    description: "Failures caused by missing or failed repo-consequential preflight before broad verification."
  - class_id: "branch-freshness"
    description: "Failures caused by stale, diverged, or unverifiable branch freshness posture before consequential verification."
  - class_id: "supported-scenario-proof"
    description: "Failures caused by missing repo-shell supported-scenario proof, replay linkage, or retained publication receipts."
  - class_id: "degraded-operator-summary"
    description: "Failures caused by missing or non-machine-grounded degraded-status summaries for operators."
