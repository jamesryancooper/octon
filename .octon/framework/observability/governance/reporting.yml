schema_version: "observability-reporting-v1"
policy_id: "execution-closeout-reporting"
requirements:
  - "Every consequential acceptance run must retain a measurement summary and an intervention log."
  - "Consequential supported runs retain at least one detailed measurement record and one intervention record family, even when the intervention record is empty."
  - "Intervention-free claims must still retain a canonical log that states no hidden intervention occurred."
  - "Runtime/disclosure mismatches retain a drift incident or block claim promotion."
  - "Release closeout reports must cite failure-taxonomy classes when summarizing non-happy-path evidence."
