# Agency Manifest (Template)
# Goal alignment: Enable reliable agent execution that is deterministic enough to trust, observable enough to debug, and flexible enough to evolve.

schema_version: "1.0"
default_agent: null

routing:
  assistant_prefix: "@"
  ambiguity_resolution: "ask"
  locality: "repo-instance-scope-registry"

registries:
  agents: "agents/registry.yml"
  assistants: "assistants/registry.yml"
  teams: "teams/registry.yml"

policy:
  allow_skill_actor_delegation: false
  mission_owner_types: [agent, human]
  assistant_mission_ownership: false
