meta:
  version: "2.2.1"
  updated_at: "2026-03-19"
  owner: "octon-platform"
  status: "active"
  schema_version: "2"
  description: "Policy weights only; measurement scores are in .octon/framework/assurance/governance/scores/scores.yml"

charter:
  ref: ".octon/framework/assurance/governance/CHARTER.md"
  version: "2.2.1"
  priority_chain:
    - id: assurance
      name: Assurance
    - id: productivity
      name: Productivity
    - id: integration
      name: Integration
  tie_break_rule: "When weighted priority ties, prioritize items mapped to higher umbrellas in chain order."
  tradeoff_rules:
    - "Assurance is non-negotiable."
    - "Productivity is optimized inside assurance constraints."
    - "Integration requires explicit contracts, security controls, and tests."
    - "Attribute-level scoring remains the source of truth."
    - "Umbrella rollups must not hide critical assurance weaknesses."
  required_references:
    assurance_engine_readme: ".octon/framework/assurance/README.md"
    override_policy: ".octon/framework/assurance/governance/SUBSYSTEM_OVERRIDE_POLICY.md"
  attribute_umbrella_map:
    performance: productivity
    scalability: productivity
    reliability: assurance
    availability: assurance
    robustness: assurance
    recoverability: assurance
    dependability: assurance
    safety: assurance
    autonomy: productivity
    security: assurance
    complexity_calibration: productivity
    evolvability: productivity
    maintainability: productivity
    portability: integration
    functional_suitability: assurance
    completeness: productivity
    operability: productivity
    observability: assurance
    testability: productivity
    auditability: assurance
    deployability: productivity
    usability: productivity
    accessibility: productivity
    interoperability: integration
    compatibility: integration
    configurability: productivity
    sustainability: productivity

