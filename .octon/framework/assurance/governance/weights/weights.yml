  run_mode:
    local: local-devex
    ci: ci-reliability
    release: ci-reliability
    prod-runtime: ci-reliability
  maturity:
    prototype: local-devex
    alpha: global-default
    beta: ci-reliability
    prod: ci-reliability
    critical: regulated

