guardrails:
  naming:
    profile_regex: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
    max_profile_name_length: 64
  sprawl_controls:
    max_active_profiles_per_repo: 6
    duplicate_similarity_threshold_pct: 80
    require_use_case_for_new_profile: true
  deprecation:
    allowed_statuses: [active, deprecated]
    require_replacement_profile: true
    require_sunset_date: true
    min_release_cycles_before_removal: 2

changelog:
  - date: "2026-03-19"
    version: "2.2.1"
    change: "Aligned assurance charter scope wording to the Packet 3 framework/core class-root architecture."
    rationale: "The framework/core clear-break changes the top-level authority model, so the assurance charter and policy metadata must version that scope alignment together."
    adr: ".octon/framework/cognition/_meta/architecture/specification.md"
    charter_ref: ".octon/framework/assurance/governance/CHARTER.md"
  - date: "2026-02-25"
    version: "2.2.0"
    change: "Aligned assurance charter and score governance for intent-layer closed-loop alignment controls."
    rationale: "Intent-layer controls require explicit assurance criteria and charter wording updates, with governed policy metadata versioned together."
    adr: ".octon/instance/cognition/decisions/045-capability-map-and-alignment-drift-gates.md"
    charter_ref: ".octon/framework/assurance/governance/CHARTER.md"
  - date: "2026-02-24"
    version: "2.1.0"
    change: "Renamed legacy managed-complexity attribute id to complexity_calibration and aligned policy weights to managed-complexity framing."
    rationale: "Align assurance policy contracts with canonical Complexity Calibration and Complexity Fitness language."
    adr: ".octon/instance/cognition/decisions/040-principles-charter-successor-v2026-02-24.md"
    charter_ref: ".octon/framework/assurance/governance/CHARTER.md"
  - date: "2026-02-19"
    version: "2.0.0"
    change: "Breaking migration to umbrella priority chain (Assurance > Productivity > Integration) with canonical attribute_umbrella_map."
    rationale: "Replace legacy chain semantics with a single umbrella-chain contract while preserving attribute-level scoring as source of truth."
    adr: ".octon/instance/cognition/decisions/018-assurance-umbrella-chain-migration.md"
    charter_ref: ".octon/framework/assurance/governance/CHARTER.md"
  - date: "2026-02-18"
    version: "1.3.0"
    change: "Added explicit Charter contract metadata (priority chain, attribute outcome mapping, and tie-break policy) for charter-driven enforcement."
    rationale: "The Assurance Engine must make Charter intent machine-verifiable so resolver outputs and gates can prevent policy drift."
    adr: ".octon/instance/cognition/decisions/016-assurance-charter-assurance-engine-integration.md"
    charter_ref: ".octon/framework/assurance/governance/CHARTER.md"
  - date: "2026-02-18"
    version: "1.2.0"
    change: "Added Autonomy as a canonical weighted/scored quality attribute with bounded-autonomy policy defaults."
    rationale: "Autonomous execution is a primary harness concern and must be explicitly scored while remaining constrained by safety, security, and ACP promotion boundaries."
    adr: ".octon/instance/cognition/decisions/015-autonomy-quality-attribute.md"
  - date: "2026-02-18"
    version: "1.1.0"
    change: "Split policy weights and measurement scores into two files and introduced resolver outputs for effective/results views."
    rationale: "Separate slow-moving architecture policy from frequently updated measurement data to improve governance and reduce noisy ADR churn."
    adr: ".octon/instance/cognition/decisions/014-two-file-weight-governance-model.md"
  - date: "2026-02-18"
    version: "1.0.0"
    change: "Initial weighted quality model with global + ci/local/regulated profiles."
    rationale: "Established deterministic baseline and override contract."
    adr: ".octon/instance/cognition/decisions/013-filesystem-interfaces-native-first.md"
