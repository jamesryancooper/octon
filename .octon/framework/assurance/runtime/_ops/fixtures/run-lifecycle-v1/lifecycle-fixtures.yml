        operation_id: "authorize-run"
        required_refs: ["decision_artifact", "grant_bundle", "context_pack"]
      - from: "authorized"
        to: "running"
        operation_id: "start-stage"
        required_refs: ["stage_attempt", "effect_token"]
      - from: "running"
        to: "paused"
        operation_id: "pause-run"
        required_refs: ["checkpoint", "pause_receipt"]
      - from: "paused"
        to: "running"
        operation_id: "resume-run"
        required_refs: ["grant_bundle", "context_pack", "resume_receipt"]
      - from: "running"
        to: "succeeded"
        operation_id: "complete-run"
        required_refs: ["retained_evidence", "effect_token"]
        material_effect: true
        effect_token_ref: "effect_token"
        authority_source_ref: "decision_artifact"
      - from: "succeeded"
        to: "closed"
        operation_id: "close-run"
        required_refs: ["evidence_store_completeness", "journal_snapshot", "rollback_posture", "run_card", "review_dispositions", "risk_disposition"]
    runtime_state:
      drift_status: "in-sync"
    closeout:
      required_refs: ["evidence_store_completeness", "journal_snapshot", "rollback_posture", "run_card", "review_dispositions", "risk_disposition"]
    generated_operator_view:
      ref_key: "operator_view"
      non_authority_classification: "generated-run-lifecycle-summary"
      source_refs: ["events.ndjson", "runtime-state.yml"]
      forbidden_consumers: ["runtime", "policy", "authority"]
    effect_tokens:
