schema_version: "run-lifecycle-v1-fixture-set"
fixture_set_id: "run-lifecycle-v1-state-machine-enforcement"
lab_scenario_ref: ".octon/framework/lab/scenarios/packs/run-lifecycle-v1-boundary-composition.yml"
validator_ref: ".octon/framework/assurance/runtime/_ops/scripts/validate-run-lifecycle-v1.sh"
cases:
  - case_id: "successful-closeout"
    expectation: "pass"
    coverage:
      - "positive-transitions"
      - "journal-derived-runtime-state"
      - "closeout-completeness"
      - "boundary-composition"
    transitions:
      - from: "draft"
        to: "bound"
        operation_id: "bind-run"
        required_refs: ["run_contract", "run_manifest", "runtime_state", "rollback_posture", "bound_checkpoint"]
      - from: "bound"
        to: "authorized"
        operation_id: "authorize-run"
        required_refs: ["decision_artifact", "grant_bundle", "context_pack"]
      - from: "authorized"
        to: "running"
        operation_id: "start-stage"
        required_refs: ["stage_attempt", "effect_token"]
      - from: "running"
        to: "succeeded"
        operation_id: "complete-run"
        required_refs: ["retained_evidence", "effect_token"]
        material_effect: true
        effect_token_ref: "effect_token"
        authority_source_ref: "decision_artifact"
      - from: "succeeded"
        to: "closed"
        operation_id: "close-run"
        required_refs: ["evidence_store_completeness", "journal_snapshot", "rollback_posture", "run_card", "review_dispositions", "risk_disposition"]
    runtime_state:
      drift_status: "in-sync"
    closeout:
      required_refs: ["evidence_store_completeness", "journal_snapshot", "rollback_posture", "run_card", "review_dispositions", "risk_disposition"]
    generated_operator_view:
      ref_key: "operator_view"
      non_authority_classification: "generated-run-lifecycle-summary"
      source_refs: ["events.ndjson", "runtime-state.yml"]
      forbidden_consumers: ["runtime", "policy", "authority"]
    effect_tokens:
      effect_token:
        status: "valid"
        state_scope: "running"
        single_use: true

  - case_id: "paused-resumed-success"
