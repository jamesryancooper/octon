schema_version: "engagement-work-package-compiler-governance-v1"
policy_id: "engagement-work-package-compiler"
owner: "Octon governance"
status: "active"
default_route: "deny"
release_state: "pre-1.0"
change_profile: "atomic"
compiler_posture:
  v1_mode: "prepare-only-until-runtime-authorization"
  may_create_run_contract_candidate: true
  may_execute_run_contract: false
  material_execution_entrypoint: "octon run start --contract"
  proposal_local_runtime_dependency: "forbidden"
  generated_read_model_authority: "forbidden"
  support_widening: "forbidden"
  non_admitted_connector_live_effects: "forbidden"
allowed_final_outcomes:
  - "ready_for_authorization"
  - "stage_only"
  - "requires_decision"
  - "blocked"
  - "denied"
  - "escalate"
work_package_required_sections:
  - "engagement_ref"
  - "project_profile_ref"
  - "objective_brief_ref"
  - "authority_binding"
  - "support_posture"
  - "capability_posture"
  - "connector_posture"
  - "evidence_profile"
  - "context_pack"
  - "decision_requests"
  - "rollback"
  - "validation"
  - "risk_materiality"
  - "run_contract_candidate"
  - "outcome"
stage_block_behavior:
  non_admitted_connectors:
    prepare_only: "stage_only"
    observe_or_inventory_without_invocation: "stage_only"
    live_effectful_use: "denied"
    unsupported_connector: "blocked"
  missing_context_pack_receipt: "stage_only"
  missing_rollback_for_repo_consequential: "blocked"
  missing_approval: "requires_decision"
  missing_runtime_authorization: "stage_only"
  invalid_support_tuple: "denied"
  unadmitted_capability_pack: "stage_only"
  proposal_local_runtime_dependency: "denied"
  generated_authority_dependency: "denied"
