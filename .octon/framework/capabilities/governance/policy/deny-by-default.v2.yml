schema_version: "2.0"
mode: "hard-enforce"
defaults:
  fail_closed: true
  deny_unknown_tokens: true
  deny_unscoped_bash: true
  deny_unscoped_write: true
developer_context_gate:
  mode: hard-enforce
  allowlist:
    artifact_paths: [AGENTS.md, CLAUDE.md, .octon/AGENTS.md]
    allowed_sections:
      - Behavioral Contract
      - Harness Orientation
      - Skills
      - Workflows
      - Commit Discipline
      - Pull Request Discipline
  limits:
    max_bytes: 24576
    max_sections: 12
context_overhead_gate:
  mode: hard-enforce
  thresholds:
    warn_ratio: 0.20
    soft_fail_ratio: 0.35
    hard_fail_ratio: 0.50
    max_context_files_read: 30
    max_context_acquisition_ms: 120000
  required_receipt_fields:
    - instruction_layers
    - context_acquisition
    - context_overhead_ratio
exceptions:
  state_file: ".octon/state/control/capabilities/deny-by-default-exceptions.yml"
  require_owner: true
  require_reason: true
  require_created: true
  require_expires: true
  max_lease_days: 120
governance_overrides:
  waivers:
    state_file: ".octon/state/control/capabilities/governance-waivers.json"
    required_fields: [id, owner, reason_code, scope, target, created, expires, evidence_refs, receipt_required, risk_tier, acp]
    max_duration_days: 7
    require_receipt: true
  exceptions:
    state_file: ".octon/state/control/capabilities/deny-by-default-exceptions.yml"
    required_fields: [id, owner, reason_code, scope, target, created, expires, evidence_refs, receipt_required, risk_tier, acp]
    max_duration_days: 120
    require_receipt: true
grants:
  state_dir: ".octon/state/control/capabilities/grants"
  default_ttl_seconds: 3600
  max_ttl_seconds_by_tier:
    low: 86400
    medium: 14400
    high: 1800
  allow_auto_grant_low: true
  allow_auto_grant_medium: false
  allow_auto_grant_high: false
  require_provenance: true
agent_only:
  enabled: true
  risk_tiers:
    low:
      min_distinct_agents: 1
      require_review: false
      require_quorum_token: false
      require_rollback_plan: false
    medium:
      min_distinct_agents: 2
      require_review: true
      require_quorum_token: false
      require_rollback_plan: true
    high:
      min_distinct_agents: 2
      require_review: true
      require_quorum_token: true
      require_rollback_plan: true
kill_switch:
  state_dir: ".octon/state/control/capabilities/kill-switches"
  fail_closed: true
profiles:
  refactor:
    description: "Scoped implementation changes across existing modules."
    auto_grant_tier: low
    tool_bundle: ["Read", "Glob", "Grep", "Edit", "Bash(rg *)", "Bash(git diff *)", "Bash(git status*)"]
    write_scope_bundle: ["Write(.octon/*)", "Write(src/*)"]
    service_allowlist: ["plan", "spec", "critic", "replan"]
    deny_rules: ["DDB004_UNSCOPED_BASH", "DDB005_UNSCOPED_WRITE", "DDB021_GRANT_SCOPE_TOO_BROAD"]
  scaffold:
    description: "Create new bounded artifacts from approved templates."
    auto_grant_tier: low
    tool_bundle: ["Read", "Glob", "Grep", "Edit", "Bash(cp *)", "Bash(mkdir *)", "Bash(rg *)"]
    write_scope_bundle: ["Write(.octon/framework/capabilities/*)", "Write(src/*)", "Write(tests/*)"]
    service_allowlist: ["capability-bind", "scheduler", "playbook"]
    deny_rules: ["DDB008_WRITE_SCOPE_BROAD", "DDB021_GRANT_SCOPE_TOO_BROAD"]
  tests:
    description: "Run and update automated tests with least privilege."
    auto_grant_tier: low
    tool_bundle: ["Read", "Glob", "Grep", "Edit", "Bash(cargo test*)", "Bash(npm test*)", "Bash(pytest*)"]
    write_scope_bundle: ["Write(.octon/framework/engine/*)", "Write(test/*)", "Write(tests/*)"]
    service_allowlist: ["critic", "cost", "contingency"]
    deny_rules: ["DDB004_UNSCOPED_BASH", "DDB021_GRANT_SCOPE_TOO_BROAD"]
  docs:
    description: "Author and revise documentation and report artifacts."
    auto_grant_tier: low
    tool_bundle: ["Read", "Glob", "Grep", "Edit", "Bash(rg *)"]
    write_scope_bundle: ["Write(.octon/generated/*)", "Write(.octon/framework/cognition/*)", "Write(README.md)"]
    service_allowlist: ["prompt", "spec", "plan"]
    deny_rules: ["DDB008_WRITE_SCOPE_BROAD", "DDB021_GRANT_SCOPE_TOO_BROAD"]
  release-readiness:
    description: "Hard checks for CI/release with no automatic broadening."
    auto_grant_tier: none
    tool_bundle: ["Read", "Glob", "Grep", "Bash(git diff *)", "Bash(git status*)"]
    write_scope_bundle: ["Write(.octon/state/evidence/validation/*)"]
    service_allowlist: ["guard", "cost", "scheduler", "critic"]
    deny_rules: ["DDB001_POLICY_FILE_MISSING", "DDB002_POLICY_INVALID", "DDB019_KILL_SWITCH_ACTIVE"]
observability:
  decision_log_path: ".octon/state/evidence/decisions/repo/capabilities/deny-by-default-decisions.jsonl"
  friction_slo:
    false_deny_rate_max: 0.005
    median_deny_to_unblock_seconds_max: 60
    auto_remediation_success_rate_min: 0.90
flags_metadata:
  contract_file: ".octon/framework/capabilities/governance/policy/flags.metadata.json"
  schema_file: ".octon/framework/capabilities/governance/policy/flags.metadata.schema.json"
  required_fields: [flag_id, owner, created, expires, cleanup_by, default, description, risk, links]
acp:
  levels:
    - id: ACP-0
      name: Observe
      description: Read-only analysis and inspection.
    - id: ACP-1
      name: Reversible Local
      description: Reversible workspace/repo changes; safe to stage and rollback.
    - id: ACP-2
      name: Stateful Reversible
      description: Stateful changes with rollback proof and canary/rollout constraints.
    - id: ACP-3
      name: Destructive-Adjacent
      description: Soft destruction with recovery windows and strict budgets.
    - id: ACP-4
      name: Irreversible
      description: No recovery path; blocked by default unless break-glass posture is active.
  risk_tier_mapping:
    low: ACP-1
    medium: ACP-2
    high: ACP-3
  operating_modes:
    observe:
      acp_ceiling: ACP-0
      required_evidence_contract: evidence.observe.v1
      escalation_path: owner-review
    iterate:
      acp_ceiling: ACP-1
      required_evidence_contract: evidence.iterate.v1
      escalation_path: owner-review
    operate:
      acp_ceiling: ACP-3
      required_evidence_contract: evidence.operate.v1
      escalation_path: owner-and-verifier-review
    emergency:
      acp_ceiling: ACP-4
      required_evidence_contract: evidence.emergency.v1
      escalation_path: break-glass-owner-escalation
  evidence_contracts:
    evidence.observe.v1:
      required_evidence: [intent, boundaries]
      remediation: "Provide run intent and explicit boundaries before rerunning."
    evidence.iterate.v1:
      required_evidence: [diff, tests, docs.spec]
      remediation: "Attach diff, tests, and spec evidence before promotion."
    evidence.operate.v1:
      required_evidence: [diff, tests, ci, docs.spec, docs.adr, docs.runbook]
      remediation: "Attach complete release evidence bundle and required attestations."
    evidence.emergency.v1:
      required_evidence: [incident.id, rollback.plan, owner.attestation]
      remediation: "Escalate break-glass with incident context, rollback plan, and owner attestation."
  profile_mode_map:
    refactor: iterate
    scaffold: iterate
    tests: iterate
    docs: iterate
    release-readiness: operate
    observe: observe
    iterate: iterate
    operate: operate
    emergency: emergency
  docs_gate:
    enforce_on_phase: [promote]
    evidence_types: [docs.spec, docs.adr, docs.runbook]
    reason_code: ACP_DOCS_EVIDENCE_MISSING
    missing_action_by_acp:
      ACP-1: STAGE_ONLY
      ACP-2: DENY
      ACP-3: DENY
      ACP-4: DENY
  materiality:
    predicate_name: material_side_effect
    aliases: [material side-effect, meaningful behavior change, durable effect, promotion]
    target_fields:
      canonical: material_side_effect
      aliases: [meaningful_behavior_change, durable_effect, promotion]
    enforce_on_phase: [promote, finalize]
    default_for_phase:
      promote: true
      finalize: true
  telemetry_gate:
    enforce_on_phase: [promote]
    required_for_acp_at_or_above: ACP-1
    target_field: telemetry_profile
    allowed_by_acp:
      ACP-1: [minimal, sampled, full]
      ACP-2: [full]
      ACP-3: [full]
      ACP-4: [full]
    reason_codes:
      missing: ACP_TELEMETRY_PROFILE_MISSING
      invalid: ACP_TELEMETRY_PROFILE_INVALID
    missing_action_by_acp:
      ACP-1: STAGE_ONLY
      ACP-2: DENY
      ACP-3: DENY
      ACP-4: DENY
  flag_metadata_gate:
    enforce_on_phase: [promote]
    required_when_target_flags: [has_flags, modifies_flags, flag_change]
    metadata_valid_field: flag_metadata_valid
    evidence_type: flags.metadata
    reason_codes:
      missing_evidence: ACP_FLAG_METADATA_EVIDENCE_MISSING
      invalid: ACP_FLAG_METADATA_INVALID
    missing_action_by_acp:
      ACP-1: STAGE_ONLY
      ACP-2: DENY
      ACP-3: DENY
      ACP-4: DENY
  profile_defaults:
    refactor:
      ceiling: ACP-1
      allow_stage_only_fallback: true
    scaffold:
      ceiling: ACP-1
      allow_stage_only_fallback: true
    tests:
      ceiling: ACP-1
      allow_stage_only_fallback: true
    docs:
      ceiling: ACP-1
      allow_stage_only_fallback: true
    release-readiness:
      ceiling: ACP-3
      allow_stage_only_fallback: true
    observe:
      ceiling: ACP-0
      allow_stage_only_fallback: true
    iterate:
      ceiling: ACP-1
      allow_stage_only_fallback: true
    operate:
      ceiling: ACP-3
      allow_stage_only_fallback: true
    emergency:
      ceiling: ACP-4
      allow_stage_only_fallback: false
      break_glass_required: true
  stage_only_behavior:
    emit_receipt: true
    preserve_artifacts: true
    notify:
      enabled: true
      threshold_acp: ACP-2
      channels: [digest]
  # Intent/Boundary/Mode reason-code contract used by policy interface and
  # downstream telemetry:
  # - INTENT_MISSING
  # - INTENT_REF_INVALID
  # - BOUNDARY_UNRESOLVED
  # - BOUNDARY_BLOCKED
  # - BOUNDARY_ESCALATION_REQUIRED
  # - MODE_VIOLATION_AUTONOMY_NOT_ALLOWED
  rules:
    - id: acp-repo-commit-nonprotected
      match:
        class: git.commit
        phase: [stage, promote]
      require:
        acp: ACP-1
        phase: promote
        reversibility:
          required: true
          primitive: git.revert_commit
          rollback_proof_required: false
          recovery_window_default: P30D
        evidence_required: [diff]
        budget_set: budgets.repo-small
        circuit_breaker_set: circuit_breakers.repo-stage
      on_missing_requirements: STAGE_ONLY
    - id: acp-repo-merge-protected
      match:
        class: git.merge
        phase: [promote]
        target:
          branch: [main, master, production, prod]
      require:
        acp: ACP-2
        phase: promote
        reversibility:
          required: true
          primitive: git.revert_merge
          rollback_proof_required: true
          recovery_window_default: P30D
        evidence_required: [diff, tests, ci]
        quorum_required: quorum.acp2
        budget_set: budgets.repo-merge
        circuit_breaker_set: circuit_breakers.repo-promote
      on_missing_requirements: STAGE_ONLY
    - id: acp-repo-merge-nonprotected
      match:
        class: git.merge
        phase: [promote]
      require:
        acp: ACP-1
        phase: promote
        reversibility:
          required: true
          primitive: git.revert_merge
          rollback_proof_required: false
          recovery_window_default: P30D
        evidence_required: [diff, tests]
        budget_set: budgets.repo-merge
        circuit_breaker_set: circuit_breakers.repo-promote
      on_missing_requirements: STAGE_ONLY
    - id: acp-ci-workflow-edit
      match:
        class: ci.workflow_edit
        phase: [promote]
      require:
        acp: ACP-2
        phase: promote
        reversibility:
          required: true
          primitive: git.revert_commit
          rollback_proof_required: true
          recovery_window_default: P30D
        evidence_required: [diff, tests, ci]
        quorum_required: quorum.acp2
        budget_set: budgets.repo-merge
        circuit_breaker_set: circuit_breakers.repo-promote
      on_missing_requirements: STAGE_ONLY
    - id: acp-repo-modify-ci-alias
      match:
        class: repo.modify_ci
        phase: [promote]
      require:
        acp: ACP-2
        phase: promote
        reversibility:
          required: true
          primitive: git.revert_commit
          rollback_proof_required: true
          recovery_window_default: P30D
        evidence_required: [diff, tests, ci]
        quorum_required: quorum.acp2
        budget_set: budgets.repo-merge
        circuit_breaker_set: circuit_breakers.repo-promote
      on_missing_requirements: STAGE_ONLY
    - id: acp-fs-write
      match:
        class: fs.write
        phase: [stage]
      require:
        acp: ACP-1
        phase: stage
        reversibility:
          required: true
          primitive: fs.overlay_or_branch
          rollback_proof_required: false
          recovery_window_default: P14D
        evidence_required: [diff]
        budget_set: budgets.fs-write
        circuit_breaker_set: circuit_breakers.repo-stage
      on_missing_requirements: STAGE_ONLY
    - id: acp-fs-delete-soft-local
      match:
        class: fs.soft_delete
        phase: [promote]
        target:
          scope: [local]
      require:
        acp: ACP-1
        phase: promote
        reversibility:
          required: true
          primitive: fs.move_to_trash
          rollback_proof_required: false
          recovery_window_default: P30D
        evidence_required: [diff]
        budget_set: budgets.fs-delete
        circuit_breaker_set: circuit_breakers.destructive
      on_missing_requirements: STAGE_ONLY
    - id: acp-fs-delete-soft-broad
      match:
        class: fs.soft_delete
        phase: [promote]
      require:
        acp: ACP-3
        phase: promote
        reversibility:
          required: true
          primitive: fs.move_to_trash
          rollback_proof_required: true
          recovery_window_default: P30D
        evidence_required: [diff]
        quorum_required: quorum.acp3
        budget_set: budgets.fs-delete
        circuit_breaker_set: circuit_breakers.destructive
      on_missing_requirements: STAGE_ONLY
    - id: acp-fs-delete-hard-finalize
      match:
        class: fs.hard_delete
        phase: [finalize]
      require:
        acp: ACP-4
        phase: finalize
        break_glass_required: true
      on_missing_requirements: DENY
    - id: acp-db-migration
      match:
        class: db.migrate
        phase: [promote]
      require:
        acp: ACP-2
        phase: promote
        reversibility:
          required: true
          primitive: db.down_migration_or_shadow
          rollback_proof_required: true
          recovery_window_default: P30D
        evidence_required: [plan, tests, rollback_test]
        quorum_required: quorum.acp2
        budget_set: budgets.db-migrate
        circuit_breaker_set: circuit_breakers.stateful
      on_missing_requirements: STAGE_ONLY
    - id: acp-db-delete-soft
      match:
        class: db.tombstone
        phase: [promote]
      require:
        acp: ACP-3
        phase: promote
        reversibility:
          required: true
          primitive: db.tombstone
          rollback_proof_required: true
          recovery_window_default: P90D
        evidence_required: [plan, rollback_test]
        quorum_required: quorum.acp3
        budget_set: budgets.db-delete
        circuit_breaker_set: circuit_breakers.destructive
      on_missing_requirements: STAGE_ONLY
    - id: acp-db-drop-table-finalize
      match:
        class: db.hard_delete
        phase: [finalize]
      require:
        acp: ACP-4
        phase: finalize
        break_glass_required: true
      on_missing_requirements: DENY
    - id: acp-deploy-canary
      match:
        class: service.deploy
        phase: [promote]
      require:
        acp: ACP-2
        phase: promote
        reversibility:
          required: true
          primitive: deploy.rollback
          rollback_proof_required: true
          recovery_window_default: P14D
        evidence_required: [build, tests, canary]
        quorum_required: quorum.acp2
        budget_set: budgets.deploy
        circuit_breaker_set: circuit_breakers.deploy
      on_missing_requirements: STAGE_ONLY
    - id: acp-service-execute-human
      match:
        class: service.execute
        phase: [promote]
        target:
          workflow_mode: [human-only, agent-augmented]
          capability_classification: [human-only, agent-augmented]
          boundary_route: [allow]
      require:
        acp: ACP-1
        phase: promote
        reversibility:
          required: true
          primitive: git.revert_commit
          rollback_proof_required: false
          recovery_window_default: P14D
        evidence_required: [diff]
        budget_set: budgets.repo-small
        circuit_breaker_set: circuit_breakers.repo-stage
      on_missing_requirements: STAGE_ONLY
    - id: acp-service-autonomy-route-missing
      match:
        class: service.autonomy_route_missing
        phase: [promote]
        target:
          workflow_mode: [autonomous]
      require:
        acp: ACP-4
        phase: promote
        break_glass_required: true
      on_missing_requirements: DENY
    - id: acp-execution-governance-stage
      match:
        class: execution.authorize
        phase: [stage]
      require:
        acp: ACP-1
        phase: stage
        reversibility:
          required: true
          primitive: git.revert_commit
          rollback_proof_required: false
          recovery_window_default: P14D
        evidence_required: [diff]
        budget_set: budgets.repo-small
        circuit_breaker_set: circuit_breakers.repo-stage
      on_missing_requirements: STAGE_ONLY
    - id: acp-infra-destroy-soft
      match:
        class: resource.detach
        phase: [promote]
      require:
        acp: ACP-3
        phase: promote
        reversibility:
          required: true
          primitive: infra.detach_archive
          rollback_proof_required: true
          recovery_window_default: P30D
        evidence_required: [plan, rollback_test]
        quorum_required: quorum.acp3
        budget_set: budgets.infra
        circuit_breaker_set: circuit_breakers.destructive
      on_missing_requirements: STAGE_ONLY
    - id: acp-infra-destroy-finalize
      match:
        class: resource.finalize_destroy
        phase: [finalize]
      require:
        acp: ACP-4
        phase: finalize
        break_glass_required: true
      on_missing_requirements: DENY
reversibility:
  required_for_acp_at_or_above: ACP-1
  primitives:
    git.revert_commit:
      description: Revert a single commit or range to undo staged/promoted changes.
      rollback_handle_type: git-commit
      default_recovery_window: P30D
    git.revert_merge:
      description: Revert a merge commit to undo promotion.
      rollback_handle_type: git-merge
      default_recovery_window: P30D
    fs.overlay_or_branch:
      description: Use branch or overlay staging so file writes are discardable.
      rollback_handle_type: fs-overlay
      default_recovery_window: P14D
    fs.move_to_trash:
      description: Move deleted content to trash/quarantine with restore manifest.
      rollback_handle_type: fs-trash
      default_recovery_window: P30D
      trash_root: .octon/.trash
    db.down_migration_or_shadow:
      description: Provide down migration or shadow strategy to restore prior schema behavior.
      rollback_handle_type: db-migration
      default_recovery_window: P30D
    db.tombstone:
      description: Soft delete via tombstones with retention and restore.
      rollback_handle_type: db-tombstone
      default_recovery_window: P90D
    deploy.rollback:
      description: Roll back deploy via previous release artifact or environment swap.
      rollback_handle_type: deploy-release
      default_recovery_window: P14D
    infra.detach_archive:
      description: Deprovision via detach/archive with snapshot retained for restore.
      rollback_handle_type: infra-snapshot
      default_recovery_window: P30D
  blocked_when_not_break_glass:
    - fs.hard_delete
    - db.hard_delete
    - resource.finalize_destroy
    - git.force_push
budgets:
  repo-small:
    repo.max_files_touched: 50
    repo.max_loc_delta: 1500
    repo.max_commits: 10
    time.max_seconds: 5400
  repo-merge:
    repo.max_files_touched: 200
    repo.max_loc_delta: 8000
    repo.max_commits: 50
    time.max_seconds: 10800
  fs-write:
    fs.max_paths_written: 200
    fs.max_bytes_written: 104857600
    time.max_seconds: 5400
  fs-delete:
    fs.max_paths_deleted: 200
    time.max_seconds: 5400
  db-migrate:
    db.max_tables_touched: 25
    db.max_statements: 500
    time.max_seconds: 10800
  db-delete:
    db.max_rows_affected: 100000
    db.max_tables_touched: 10
    time.max_seconds: 10800
  deploy:
    deploy.max_services: 10
    deploy.max_regions: 3
    time.max_seconds: 10800
  infra:
    infra.max_resources: 50
    time.max_seconds: 10800
quorum:
  acp2:
    min_signatures: 2
    required_roles: [proposer, verifier]
    optional_roles: [recovery, observer]
  acp3:
    min_signatures: 3
    required_roles: [proposer, verifier, recovery]
    optional_roles: [observer]
attestations:
  required_fields:
    - role
    - actor_id
    - timestamp
    - plan_hash
    - evidence_hash
    - signature
  roles:
    proposer:
      description: Produces plan, staged change, and evidence bundle.
    verifier:
      description: Independently validates plan, invariants, and evidence.
    recovery:
      description: Validates rollback in staging and signs recovery plan.
    observer:
      description: Observes promotion and can trip circuit breakers.
    owner:
      description: Boundary owner attestation sourced from ownership metadata.
  binding:
    require_plan_hash: true
    require_evidence_hash: true
    allowed_hash_algorithms: [sha256]
  owner_attestation:
    enabled: true
    role: owner
    sources: [codeowners, ownership_registry, boundaries_manifest]
    required_for_acp: [ACP-2, ACP-3]
    required_when_target_flags: [boundary_exception, owner_scope, owner_attestation_required]
    timeout_seconds: 900
    retry:
      max_attempts: 3
      backoff_seconds: 60
    escalate_on_exhausted: true
circuit_breakers:
  repo-stage:
    triggers:
      - id: cb-test-fail
        type: invariant
        signal: tests.failed
        threshold: 1
        action: stop_and_stage_only
  repo-promote:
    triggers:
      - id: cb-ci-fail
        type: invariant
        signal: ci.failed
        threshold: 1
        action: auto_rollback_and_trip_killswitch
  stateful:
    triggers:
      - id: cb-rollback-proof-missing
        type: requirement
        signal: rollback.proof_missing
        threshold: 1
        action: stop_and_stage_only
  deploy:
    triggers:
      - id: cb-health-degraded
        type: health
        signal: deploy.health.degraded
        threshold: 1
        action: auto_rollback_and_trip_killswitch
  destructive:
    triggers:
      - id: cb-budget-exceeded
        type: budget
        signal: budget.exceeded
        threshold: 1
        action: stop_and_stage_only
receipts:
  required_for_acp_at_or_above: ACP-1
  emit_on: [ALLOW, STAGE_ONLY, DENY, ESCALATE]
  paths:
    runs_dir: .octon/state/evidence/runs
    decision_log: .octon/state/evidence/decisions/repo/capabilities/deny-by-default-decisions.jsonl
