schema_version: "runtime-service-contract-v1"
service_id: "api-client"
owner: "Octon runtime"
status: "stage_only"
service_kind: "boundary-sensitive-runtime-substrate"
capability_pack: "api"
support_target_ref: ".octon/instance/governance/support-targets.yml"
required_route_outcomes:
  - "allow"
  - "stage_only"
  - "escalate"
  - "deny"
required_authority_scope:
  - "api-governed"
required_replay_artifacts:
  - "replay-manifest-v2"
  - "trace-pointer-v2"
  - "external-replay-index"
required_disclosure_artifacts:
  - "run-card-v2"
  - "support-universe-coverage-v2"
runtime_surface_refs:
  - ".octon/framework/lab/scenarios/packs/api/api-supported-scenario.yml"
  - ".octon/framework/lab/faults/api/api-compensation-fault.yml"
  - ".octon/framework/lab/shadow/browser-api-shadow.yml"
known_limits:
  - "API runtime remains fail-closed without explicit egress authority, replay capture, and retained run evidence."
