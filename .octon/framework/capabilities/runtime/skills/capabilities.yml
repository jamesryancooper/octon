# Capabilities Schema
# Defines the vocabulary of capabilities and skill sets for the skills system.
# This is a stable schema file—changes here affect all skill validation.
#
# Load Order:
#   1. manifest.yml   - Skill discovery index
#   2. capabilities.yml (this file) - Capability schema for validation/expansion
#   3. registry.yml   - Extended skill metadata
#
# Usage:
#   - Validation scripts load this to check declared capabilities
#   - Skill set expansion uses skill_set_definitions
#   - Reference file requirements use capability_refs

schema_version: "3.0"

# ============================================================================
# SKILL CLASS DEFINITIONS
# Tier-1 routing classes used for discovery and authoring expectations.
# ============================================================================
skill_class_definitions:
  invocable:
    description: Slash-command or trigger-invoked skill with explicit task flow
    requires_commands: true
    forbids_user_invocable_flag: true

  context:
    description: Background context skill that informs routing but is not directly invoked
    requires_commands: false
    forbids_user_invocable_flag: true

  ruleset:
    description: Invocable rules or pattern catalog used for structured review/guidance
    requires_commands: true
    forbids_user_invocable_flag: true

# ============================================================================
# SKILL SET DEFINITIONS
# Pre-defined capability bundles for common skill patterns.
# Skills declare skill_sets in manifest.yml; capabilities are resolved here.
# ============================================================================
skill_set_definitions:
  executor:
    description: Does multi-step work itself
    capabilities: [phased, branching, stateful]
    primary_refs: [phases.md, decisions.md, checkpoints.md]

  coordinator:
    description: Manages external tasks/jobs
    capabilities: [task-coordinating, parallel]
    primary_refs: [orchestration.md]

  delegator:
    description: Delegates to autonomous sub-agents
    capabilities: [agent-delegating]
    primary_refs: [agents.md]

  collaborator:
    description: Works with humans at decision points
    capabilities: [human-collaborative, stateful]
    primary_refs: [interaction.md, checkpoints.md]

  integrator:
    description: Pipeline building block
    capabilities: [composable, contract-driven]
    primary_refs: [composition.md, io-contract.md]

  specialist:
    description: Requires domain expertise
    capabilities: [domain-specialized]
    primary_refs: [glossary.md]

  guardian:
    description: Enforces quality and safety
    capabilities: [self-validating, safety-bounded]
    primary_refs: [validation.md, safety.md]

# ============================================================================
# SKILL GROUP DEFINITIONS
# Domain-oriented clusters for routing and directory organization.
# Skills declare a `group` in manifest.yml; members are resolved here.
# Orthogonal to skill_sets (which define capability bundles).
# ============================================================================
skill_group_definitions:
  audit:
    description: Audit and verify codebase and harness integrity
    path: audit/
    members: [audit-migration, audit-subsystem-health, audit-cross-subsystem-coherence, audit-freshness-and-supersession, audit-documentation-standards, audit-domain-architecture, audit-surface-architecture, audit-architecture-readiness, audit-charter, audit-observability-coverage, audit-security-compliance, audit-data-governance, audit-test-quality, audit-operational-readiness, audit-release-readiness, audit-api-contract, audit-ui]

  remediation:
    description: Resolve review and CI quality issues
    path: remediation/
    members: [resolve-pr-comments, closeout-pr, triage-ci-failure, ci-gate-triage]

  operations:
    description: Operational response and incident handling workflows
    path: operations/
    members: [incident-response]

  refactor:
    description: Execute verified structural codebase refactors
    path: refactor/
    members: [refactor]

  synthesis:
    description: Produce refined output from raw input
    path: synthesis/
    members: [synthesize-research, refine-prompt, spec-to-implementation, plan-charter-alignment]

  meta:
    description: Operate on the harness itself
    path: meta/
    members: [create-skill, build-mcp-server]

  foundations:
    description: Stack-specific project scaffolding skill families
    path: foundations/
    members: [python-api, python-scaffold-package, python-contract-first-api, python-test-harness, python-dev-toolchain, python-infra-manifest, python-contributor-guide, swift-macos-app, swift-scaffold-package, swift-data-layer, swift-cli-interface, swift-daemon-service, swift-test-harness, swift-contributor-guide, react, react-native, postgres, react-composition-patterns, react-best-practices, react-native-best-practices, postgres-best-practices]

  platforms:
    description: Deployment platform integrations and operations
    path: platforms/
    members: [vercel, vercel-deploy, deploy-status, provider-vercel-delivery, provider-github-gates, provider-nextjs-astro-runtime, provider-preview-smoke, turborepo-taskgraph]

# ============================================================================
# VALID CAPABILITIES
# All recognized capability names for validation.
# ============================================================================
valid_capabilities:
  # Execution
  - phased              # Has distinct execution phases
  - branching           # Has conditional execution paths
  - parallel            # Can execute work concurrently

  # Coordination
  - task-coordinating   # Manages external tasks/jobs
  - agent-delegating    # Delegates to autonomous sub-agents
  - human-collaborative # Requires human decisions

  # State
  - stateful            # Persists state across phases
  - resumable           # Can checkpoint and resume

  # Temporal
  - long-running        # Execution spans extended time (minutes to hours)
  - scheduled           # Triggered on schedule/timer

  # Quality
  - self-validating     # Has formal acceptance criteria
  - error-resilient     # Has recovery procedures

  # Integration
  - composable          # Designed for chaining
  - contract-driven     # Formal I/O specification

  # Scope
  - domain-specialized  # Requires domain knowledge
  - safety-bounded      # Explicit constraints

  # Reliability
  - idempotent          # Safe to retry; same input = same effect
  - cancellable         # Can be stopped mid-execution
  - external-dependent  # Requires external services (APIs, DBs)

  # Output
  - external-output     # Produces non-file outputs (URLs, API responses)

# ============================================================================
# STANDARD PLACEHOLDERS
# Runtime-resolved placeholders allowed in registry I/O paths in addition to
# declared parameter names.
# ============================================================================
standard_placeholders:
  - timestamp
  - date
  - project
  - topic
  - name
  - skill_id
  - category
  - run_id
  - refactor_id

# ============================================================================
# COMPOSITION CONTRACT DEFINITIONS
# Allowed enums for skill-local composition metadata in registry.yml.
# ============================================================================
composition_contract:
  modes:
    - prerequisites
    - sequential
    - parallel
  failure_policies:
    - fail_fast
    - continue_optional
  step_kinds:
    - skill
    - service
  step_roles:
    - prerequisite
    - invoke
  when_operators:
    - always
    - param_present
    - param_equals
    - param_in

# ============================================================================
# CAPABILITY TO REFERENCE MAPPING
# Which reference files are expected for each capability.
# ============================================================================
capability_refs:
  phased: [phases.md]
  branching: [decisions.md]
  parallel: [orchestration.md]
  task-coordinating: [orchestration.md]
  agent-delegating: [agents.md]
  human-collaborative: [interaction.md]
  stateful: [checkpoints.md]
  resumable: [checkpoints.md]
  long-running: [execution-model.md]
  scheduled: [schedule.md]
  self-validating: [validation.md]
  error-resilient: [errors.md]
  composable: [composition.md]
  contract-driven: [io-contract.md]
  domain-specialized: [glossary.md]
  safety-bounded: [safety.md]
  idempotent: [idempotency.md]
  cancellable: [cancellation.md]
  external-dependent: [dependencies.md]
  external-output: [external-outputs.md]

# Reference File Policy:
#   - REQUIRED references: dictated by skill_sets + capabilities via capability_refs above.
#     Validator enforces existence of these files.
#   - OPTIONAL references: skills MAY include additional reference files beyond
#     what their capabilities require. Common cases:
#     - io-contract.md: useful for any skill with structured I/O, even without
#       the `contract-driven` capability
#     - safety.md: useful for any skill with filesystem access, even without
#       the `safety-bounded` capability
#     - examples.md / errors.md: broadly useful across skill types
#   - Validator treats extra references as informational, not errors.
