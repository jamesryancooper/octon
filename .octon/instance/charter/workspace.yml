  - "Refactor bootstrap, validation, portability, and authority-routing surfaces when the change remains reviewable and verifiable."
  - "Run repo-local verification and continuity updates required to ship Octon changes safely."
  - "Retire, rebind, or fully realize retained support surfaces when required to keep the live architecture globally complete."
hard_boundaries:
  - boundary_id: repo-local-only
    rule: "Stay within this managed repository unless an explicit authority surface authorizes external effects."
