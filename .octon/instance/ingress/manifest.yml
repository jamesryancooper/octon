schema_version: ingress-manifest-v1
owner: Octon governance
mandatory_read_set:
  - .octon/framework/constitution/CHARTER.md
  - .octon/framework/constitution/charter.yml
  - .octon/framework/constitution/obligations/fail-closed.yml
  - .octon/framework/constitution/obligations/evidence.yml
  - .octon/framework/constitution/precedence/normative.yml
  - .octon/framework/constitution/precedence/epistemic.yml
  - .octon/framework/constitution/ownership/roles.yml
  - .octon/framework/constitution/contracts/registry.yml
  - .octon/instance/charter/workspace.md
  - .octon/instance/charter/workspace.yml
  - .octon/framework/agency/runtime/agents/orchestrator/AGENT.md
optional_overlays:
  - .octon/framework/agency/governance/DELEGATION.md
  - .octon/framework/agency/governance/MEMORY.md
  - .octon/instance/bootstrap/START.md
  - .octon/instance/bootstrap/scope.md
  - .octon/instance/bootstrap/conventions.md
  - .octon/instance/bootstrap/catalog.md
conditional_overlays:
  continuity_repo:
    - .octon/state/continuity/repo/log.md
    - .octon/state/continuity/repo/tasks.json
  scope_continuity:
    - .octon/state/continuity/scopes/<scope-id>/log.md
    - .octon/state/continuity/scopes/<scope-id>/tasks.json
adapter_parity_targets:
  - .octon/AGENTS.md
  - AGENTS.md
  - CLAUDE.md
workflow_contract_ref: .octon/framework/agency/practices/standards/git-worktree-autonomy-contract.yml
branch_closeout_gate:
  mode: contextual
  deprecated_fallback_prompt: Are you ready to closeout this branch?
  trigger:
    implicit:
      requires_file_changes: true
      requires_completion_point: true
    explicit:
      - finish
      - ship
      - closeout
  detect:
    worktree_context:
      primary_main_worktree:
        branch: main
        probes:
          current_worktree: git rev-parse --show-toplevel
          worktree_inventory: git worktree list --porcelain
      branch_worktree:
        excludes_branch: main
        probes:
          current_branch: git rev-parse --abbrev-ref HEAD
    pr_state:
      probes:
        preferred: gh pr view --json state,isDraft,reviewDecision,statusCheckRollup
        fallback: gh pr list --head <current-branch> --json state,isDraft,reviewDecision,statusCheckRollup
      contexts:
        - no_pr
        - draft_pr
        - ready_pr
      ready_status_contexts:
        - branch_worktree_ready_pr_waiting_on_required_checks_or_auto_merge
        - branch_worktree_ready_pr_waiting_on_reviewer_or_maintainer_confirmation
        - branch_worktree_ready_pr_manual_lane_waiting_on_human_review_or_merge
    merge_lane:
      autonomous_when:
        - current_branch_not_exp_prefix
        - change_not_high_impact_governance_or_control_plane
        - change_not_major_or_unknown_dependabot_transition
      manual_when:
        - current_branch_exp_prefix
        - change_is_high_impact_governance_or_control_plane
        - change_is_major_or_unknown_dependabot_transition
  suppress_when:
    - active_implementation_continues
    - user_reports_work_in_progress
    - blocked_by_red_required_checks
    - blocked_by_unaddressed_author_action_items
    - blocked_waiting_on_reviewer_confirmation
  prompt_by_context:
    primary_main_worktree: "This work is on the main worktree, and Octon does not open PRs from `main`. Should I branch it into a feature worktree and prepare a draft PR?"
    branch_worktree_no_pr: "This branch worktree looks ready for PR closeout. Should I stage, commit, push, and open a draft PR?"
    branch_worktree_draft_pr_autonomous_lane: "This draft PR looks ready for Octon's autonomous merge lane. Should I mark it ready and request squash auto-merge?"
    branch_worktree_draft_pr_manual_lane: "This draft PR looks ready for the manual lane. Should I mark it ready for human review and keep auto-merge off?"
  status_by_context:
    branch_worktree_ready_pr_waiting_on_required_checks_or_auto_merge: "This PR is already ready. It is waiting on required checks or GitHub auto-merge, so no new closeout action is needed."
    branch_worktree_ready_pr_waiting_on_reviewer_or_maintainer_confirmation: "This PR is already ready. It is waiting on reviewer or maintainer confirmation, so no new closeout action is needed."
    branch_worktree_ready_pr_manual_lane_waiting_on_human_review_or_merge: "This PR is already ready in the manual lane. It is waiting on human review or merge, so no new closeout action is needed."
  blocked_response: Report blockers or remaining work instead of asking a closeout question.
# Deprecated compatibility fallback for adapters that still read the scalar prompt.
branch_closeout_prompt: Are you ready to closeout this branch?
change_profile_rule: pre-1.0 defaults to atomic unless a hard gate requires transitional
human_led_blocked_roots:
  - .octon/inputs/exploratory/ideation/**
