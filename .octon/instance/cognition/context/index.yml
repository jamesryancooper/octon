# Context Index
# Lightweight index of reference material in instance/cognition/context/shared/.
# Read this to find relevant context without listing the directory.
#
# Fields:
#   id         - File identifier (filename without extension)
#   path       - Relative path to file
#   summary    - One-line description
#   when       - When an agent should read this file
#
# Contract registry fields:
#   contract_id - Stable contract identifier
#   owner       - Owning subsystem
#   version     - Contract version for change tracking
#   supersedes  - Prior contract IDs replaced by this contract
#   enforced_by - Enforcement paths that gate compliance

