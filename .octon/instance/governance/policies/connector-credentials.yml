schema_version: connector-credential-policy-v1
policy_id: connector-credentials
owner: Octon governance
status: active
default_route: deny
credential_policy_authorizes_execution: false
material_execution_still_requires_run_authorization: true
credential_use_receipt_schema_ref: .octon/framework/engine/runtime/spec/connector-execution-receipt-v1.schema.json
credential_classes:
  - credential_class: none
    storage_posture: no_credentials
    scope: []
    redaction_policy_ref: .octon/instance/governance/policies/connector-data-boundaries.yml
    human_approval_required: false
    retained_evidence_required: true
    credential_use_authorizes_execution: false
  - credential_class: read_only
    storage_posture: externally_managed
    scope:
      - read
    redaction_policy_ref: .octon/instance/governance/policies/connector-data-boundaries.yml
    human_approval_required: true
    retained_evidence_required: true
    credential_use_authorizes_execution: false
  - credential_class: write_scoped
    storage_posture: externally_managed
    scope:
      - write
    redaction_policy_ref: .octon/instance/governance/policies/connector-data-boundaries.yml
    human_approval_required: true
    retained_evidence_required: true
    credential_use_authorizes_execution: false
deferred:
  - self-provisioned credentials
  - privileged external writes
