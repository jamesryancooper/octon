schema_version: "network-egress-policy-v1"
default_route: deny
egress_policy_authorizes_execution: false
material_execution_still_requires_run_authorization: true
rules:
  - id: "langgraph-http-local-runner"
    services:
      - "execution/flow"
    adapters:
      - "langgraph-http"
    methods:
      - "POST"
    schemes:
      - "http"
    hosts:
      - "127.0.0.1"
      - "localhost"
    ports:
      - 8410
    path_prefixes:
      - "/flows/run"
    reason: "Allow explicit local LangGraph flow forwarding when the external HTTP adapter is selected."
