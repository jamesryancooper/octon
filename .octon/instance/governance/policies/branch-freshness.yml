schema_version: "branch-freshness-policy-v1"
policy_id: "branch-freshness"
support_target_ref: ".octon/instance/governance/support-targets.yml"
applies_to_workload_tiers:
  - "repo-consequential"
  - "boundary-sensitive"
applies_to_workflows:
  - "add-api-endpoint"
  - "add-ui-feature"
  - "fix-a-bug"
  - "handle-security-issue"
  - "run-data-migration"
required_preflight_workflow: "repo-consequential-preflight"
comparison_target: "upstream-tracking-branch"
states:
  - state_id: "fresh"
    route: "allow"
    summary: "Branch freshness supports broad verification."
  - state_id: "ahead-no-upstream"
    route: "warn"
    summary: "Branch lacks an upstream comparison target; retain a warning receipt before broad verification."
  - state_id: "behind"
    route: "block"
    summary: "Branch is behind upstream; block broad verification until refreshed or explicitly staged-only."
  - state_id: "diverged"
    route: "escalate"
    summary: "Branch has diverged from upstream; require operator review before broad verification."
  - state_id: "unknown"
    route: "stage_only"
    summary: "Freshness could not be determined; retain evidence and avoid claim-bearing broad verification."
receipt_expectations:
  - "Retain a freshness state in canonical run evidence before broad verification."
  - "Operator-facing degraded summaries must cite branch-freshness failure classes when freshness is non-fresh."
