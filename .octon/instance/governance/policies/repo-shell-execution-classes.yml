schema_version: "repo-shell-execution-classes-policy-v1"
policy_id: "repo-shell-execution-classes"
adapter_id: "repo-shell"
support_target_ref: ".octon/instance/governance/support-targets.yml"
authority_boundary_ref: ".octon/framework/engine/runtime/spec/execution-authorization-v1.md"
receipt_contract_refs:
  - ".octon/framework/engine/runtime/spec/policy-receipt-v2.schema.json"
  - ".octon/framework/engine/runtime/spec/execution-receipt-v2.schema.json"
classification_doctrine:
  - "Repo-shell execution classes narrow execution only; they never mint authority."
  - "Out-of-workspace writes and undeclared broad verification commands fail closed until canonical authority artifacts permit them."
  - "Command and path classes must surface through canonical receipts or checkpoints rather than ad hoc shell output."
classes:
  - class_id: "safe-read-only"
    route: "allow"
    path_scope: "repo-read-only"
    command_prefixes:
      - "pwd"
      - "ls"
      - "find"
      - "rg"
      - "sed"
      - "cat"
      - "head"
      - "tail"
      - "wc"
      - "jq"
      - "yq"
      - "git status"
      - "git diff"
      - "git show"
    receipt_reason: "REPO_SHELL_READ_ONLY_ALLOWED"
  - class_id: "workspace-write"
    route: "allow"
    path_scope: "repo-workspace-only"
    command_prefixes:
      - "apply_patch"
      - "git add"
      - "git mv"
      - "cargo fmt"
      - "prettier"
    receipt_reason: "REPO_SHELL_WORKSPACE_WRITE_ALLOWED"
  - class_id: "broad-verification"
    route: "require-preflight"
    requires_workflow: "repo-consequential-preflight"
    command_prefixes:
      - "cargo test"
      - "pytest"
      - "npm test"
      - "pnpm test"
      - "pnpm vitest"
      - "go test"
    receipt_reason: "REPO_SHELL_BROAD_VERIFICATION_REQUIRES_PREFLIGHT"
  - class_id: "blocked-out-of-workspace"
    route: "deny"
    path_scope: "outside-repo"
    receipt_reason: "REPO_SHELL_OUT_OF_WORKSPACE_DENIED"
  - class_id: "blocked-undeclared-shell-mutation"
    route: "escalate"
    command_prefixes:
      - "rm"
      - "sudo"
      - "chmod"
      - "chown"
    receipt_reason: "REPO_SHELL_MUTATION_ESCALATE"
