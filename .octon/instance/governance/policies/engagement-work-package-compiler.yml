schema_version: "engagement-work-package-compiler-governance-v1"
policy_id: "engagement-work-package-compiler"
owner: "Octon governance"
status: "active"
default_route: "deny"
release_state: "pre-1.0"
change_profile: "atomic"

canonical_refs:
  support_targets_ref: ".octon/instance/governance/support-targets.yml"
  governance_exclusions_ref: ".octon/instance/governance/exclusions/action-classes.yml"
  capability_pack_registry_ref: ".octon/instance/governance/capability-packs/registry.yml"
  context_packing_policy_ref: ".octon/instance/governance/policies/context-packing.yml"
  evidence_profiles_policy_ref: ".octon/instance/governance/policies/evidence-profiles.yml"
  preflight_evidence_lane_policy_ref: ".octon/instance/governance/policies/preflight-evidence-lane.yml"
  connector_posture_ref: ".octon/instance/governance/connectors/posture.yml"
  connector_posture_registry_ref: ".octon/instance/governance/connectors/registry.yml"
  engagement_path_family_registry_ref: ".octon/instance/governance/engagements/path-families.yml"
  risk_materiality_policy_ref: ".octon/instance/governance/policies/risk-materiality.yml"
  execution_authorization_ref: ".octon/framework/engine/runtime/spec/execution-authorization-v1.md"
  run_contract_schema_ref: ".octon/framework/constitution/contracts/runtime/run-contract-v3.schema.json"

compiler_posture:
  v1_mode: "prepare-only-until-runtime-authorization"
  may_create_run_contract_candidate: true
  may_execute_run_contract: false
  material_execution_entrypoint: "octon run start --contract"
  proposal_local_runtime_dependency: "forbidden"
  generated_read_model_authority: "forbidden"
  support_widening: "forbidden"
  non_admitted_connector_live_effects: "forbidden"

allowed_final_outcomes:
  - "ready"
  - "ready_for_authorization"
  - "stage_only"
  - "requires_decision"
  - "blocked"
  - "denied"
  - "escalate"

work_package_required_sections:
  - "engagement_ref"
  - "project_profile_ref"
  - "objective_brief_schema_ref"
  - "objective_control_root"
  - "objective_brief_ref"
  - "objective_brief_evidence_refs"
  - "objective_brief_authority_boundary"
  - "authority_binding"
  - "support_posture"
  - "capability_posture"
  - "connector_posture"
  - "evidence_profile"
  - "context_pack"
  - "decision_requests"
  - "rollback"
  - "validation"
  - "risk_materiality"
  - "placement"
  - "run_contract_candidate"
  - "run_contract_readiness_evidence_refs"
  - "outcome"

gate_matrix:
  - gate_id: "approval"
    requirement: "Operator/quorum approvals, risk acceptances, exceptions, revocations, and policy clarifications are represented as Decision Requests and resolved into canonical low-level control artifacts before live effects."
    required_for:
      - "adoption writes into an unadopted repo"
      - "workspace charter creation or material rewrite"
      - "support-target widening"
      - "risk acceptance"
      - "destructive or irreversible action"
      - "protected-zone mutation"
      - "credential or external service enablement"
      - "closeout with unresolved risk"
    required_outputs:
      - "Decision Request"
      - "approval request or grant"
      - "exception lease when applicable"
      - "revocation when applicable"
      - "risk acceptance decision artifact when applicable"
    missing_route: "requires_decision"
    attempted_live_effect_route: "denied"
    reason_refs:
      - "FCR-006"
      - "EVI-005"
  - gate_id: "runtime_authorization"
    requirement: "Material effects require a valid run-contract candidate, grant bundle, authorized-effect token readiness, context-pack receipt, and execution authorization path."
    required_for:
      - "repo mutation"
      - "control or evidence mutation outside preflight lane"
      - "executor launch"
      - "service/tool/MCP invocation"
      - "shell execution with material effect"
      - "generated-effective publication"
      - "protected CI actions"
      - "outbound HTTP"
      - "capability-pack activation"
    required_outputs:
      - "run-contract-v3 candidate"
      - "grant-bundle"
      - "authorized-effect token readiness"
      - "context-pack receipt"
      - "execution receipt after handoff"
    missing_route: "stage_only"
    attempted_live_effect_route: "denied"
    reason_refs:
      - "FCR-010"
      - "FCR-023"
      - "EVI-026"
  - gate_id: "support_target_reconciliation"
    requirement: "Every claimed live run candidate binds one admitted support tuple, its admission, proof bundle, claim effect, and governance exclusions."
    required_for:
      - "live support claim"
      - "ready_for_authorization outcome"
      - "run-contract candidate"
    required_outputs:
      - "support tuple ref"
      - "admission ref"
      - "proof bundle ref"
      - "claim effect"
      - "exclusion check"
    invalid_tuple_route: "denied"
    stage_only_tuple_route: "stage_only"
    missing_route: "blocked"
    reason_refs:
      - "FCR-009"
      - "FCR-019"
      - "FCR-024"
  - gate_id: "capability_admission"
    requirement: "All requested capability packs are admitted for the reconciled support tuple before ready_for_authorization."
    required_for:
      - "tool use"
      - "shell execution"
      - "generated-effective publication"
      - "connector operation"
    required_outputs:
      - "capability pack ids"
      - "admission status"
      - "support target refs"
      - "required proof refs"
    unadmitted_route: "stage_only"
    missing_route: "blocked"
    attempted_live_effect_route: "denied"
    reason_refs:
      - "FCR-009"
      - "FCR-014"
  - gate_id: "connector_posture"
    requirement: "MCP, API, and browser connectors stay non-live in v1 unless future admission, egress, credential, evidence, rollback, support, and authorization gates all pass."
    required_for:
      - "MCP connector"
      - "API connector"
      - "browser connector"
    required_outputs:
      - "connector posture"
      - "capability mapping"
      - "material-effect classification"
      - "Decision Request when operator approval is needed"
    non_admitted_prepare_route: "stage_only"
    non_admitted_live_effect_route: "denied"
    unsupported_connector_route: "blocked"
    reason_refs:
      - "FCR-009"
      - "FCR-015"
  - gate_id: "context_pack_readiness"
    requirement: "Consequential or boundary-sensitive handoff has a context-pack request and a valid receipt before material effects."
    required_for:
      - "repo-consequential profile"
      - "boundary-sensitive profile"
      - "model-visible repo context"
      - "run-contract candidate handoff"
    required_outputs:
      - "context-pack request"
      - "context-pack receipt"
      - "source manifest"
      - "freshness manifest"
      - "omission manifest"
    missing_request_route: "blocked"
    missing_receipt_route: "stage_only"
    stale_receipt_route: "blocked"
    reason_refs:
      - "FCR-007"
      - "EVI-023"
  - gate_id: "rollback"
    requirement: "Repo-consequential Work Packages bind rollback or reversibility posture before ready_for_authorization."
    required_for:
      - "repo mutation"
      - "generated-effective publication"
      - "protected-zone mutation"
      - "compensable or irreversible action"
    required_outputs:
      - "rollback plan"
      - "reversibility classification"
      - "risk acceptance Decision Request when rollback is incomplete"
    missing_route: "blocked"
    irreversible_route: "requires_decision"
    attempted_live_effect_route: "denied"
    reason_refs:
      - "FCR-020"
      - "EVI-026"
  - gate_id: "evidence_profile_selection"
    requirement: "Each Work Package selects exactly one known evidence profile and the profile is strong enough for the action class."
    required_for:
      - "all Work Packages"
    required_outputs:
      - "selected evidence profile"
      - "profile selection rationale"
      - "required evidence list"
    missing_route: "blocked"
    downgrade_route: "denied"
    reason_refs:
      - "FCR-013"
      - "EVI-003"
  - gate_id: "decision_request_generation"
    requirement: "Any unresolved approval, risk, support, capability, context, rollback, charter, or connector question emits a Decision Request instead of implicit live readiness."
    required_for:
      - "requires_decision outcome"
      - "approval gate"
      - "risk acceptance"
      - "policy ambiguity"
      - "non-admitted connector request"
      - "support or capability ambiguity"
    required_outputs:
      - "Decision Request id"
      - "decision type"
      - "canonical low-level artifact target"
      - "evidence root"
    missing_route: "blocked"
    attempted_bypass_route: "denied"
    reason_refs:
      - "FCR-004"
      - "FCR-005"
      - "FCR-006"
  - gate_id: "generated_and_input_non_authority"
    requirement: "Generated projections and proposal-local or raw input paths remain non-authoritative and cannot be runtime or policy dependencies."
    required_for:
      - "all compiler outputs"
      - "generated operator read models"
      - "proposal promotion"
    required_outputs:
      - "source traceability"
      - "non-authority classification"
      - "durable promoted source refs"
    generated_authority_route: "denied"
    proposal_local_dependency_route: "denied"
    raw_input_dependency_route: "denied"
    reason_refs:
      - "FCR-001"
      - "FCR-002"
      - "FCR-032"
  - gate_id: "placement_cartography"
    requirement: "Engagement, per-engagement Objective Brief, Project Profile, Work Package, Decision Request, evidence, continuity, and generated read-model paths are registered in the engagement path-family registry before any runtime-write readiness claim."
    required_for:
      - "all Work Packages"
      - "ready_for_authorization outcome"
      - "control writes under state/control/engagements/**"
      - "evidence writes under state/evidence/engagements/**"
      - "objective candidate writes under state/control/engagements/<engagement-id>/objective/**"
      - "run-contract readiness evidence under state/evidence/engagements/<engagement-id>/run-contract-readiness/**"
      - "continuity writes under state/continuity/engagements/**"
      - "Project Profile writes under instance/locality/project-profile.yml"
    required_outputs:
      - "engagement path-family registry ref"
      - "runtime-write family refs"
      - "class-root placement"
      - "authority posture"
    missing_registry_route: "blocked"
    unregistered_runtime_write_route: "denied"
    misplaced_runtime_write_route: "denied"
    reason_refs:
      - "FCR-022"
      - "FCR-023"
  - gate_id: "stage_block_outcome"
    requirement: "Unsupported, non-admitted, or incomplete surfaces return stage_only, requires_decision, blocked, denied, or escalate; they never silently become ready_for_authorization."
    required_for:
      - "compiler final outcome"
    required_outputs:
      - "outcome"
      - "reason codes"
      - "blockers"
      - "Decision Requests when resolvable"
    non_admitted_connector_route: "stage_only"
    missing_required_section_route: "blocked"
    unsupported_live_claim_route: "denied"
    reason_refs:
      - "FCR-016"
      - "FCR-028"

stage_block_behavior:
  non_admitted_connectors:
    prepare_only: "stage_only"
    observe_or_inventory_without_invocation: "stage_only"
    live_effectful_use: "denied"
    unsupported_connector: "blocked"
  missing_context_pack_receipt: "stage_only"
  missing_rollback_for_repo_consequential: "blocked"
  missing_approval: "requires_decision"
  missing_runtime_authorization: "stage_only"
  invalid_support_tuple: "denied"
  unadmitted_capability_pack: "stage_only"
  proposal_local_runtime_dependency: "denied"
  generated_authority_dependency: "denied"
