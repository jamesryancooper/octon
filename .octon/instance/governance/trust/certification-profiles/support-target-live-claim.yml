required_rollback_proof:
  - "rollback or compensation posture"
required_freshness_proof:
  - "support proof bundle freshness"
required_approval_or_quorum: "Octon governance approval"
recertification_cadence: "quarterly or before support claim widening"
certification_authorizes_execution: false
certification_widens_support_claims: false
