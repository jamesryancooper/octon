schema_version: "certification-profile-v1"
profile_id: "support-target-live-claim"
certification_class: "support-target-live-claim"
required_evidence:
  - "support target admission"
  - "support dossier"
  - "support proof bundle"
  - "representative retained run disclosure"
required_labs:
  - "support tuple proof sufficiency"
required_simulations:
  - "support widening denial"
required_negative_controls:
  - "third-party certification cannot widen support"
  - "generated support card cannot satisfy live claim"
