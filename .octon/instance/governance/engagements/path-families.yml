schema_version: "engagement-path-family-registry-v1"
registry_id: "engagement-work-package-path-families"
owner: "Octon governance"
status: "active"
default_route: "deny"
compiler_policy_ref: ".octon/instance/governance/policies/engagement-work-package-compiler.yml"
architecture_registry_ref: ".octon/framework/cognition/_meta/architecture/contract-registry.yml"
validator_ref: ".octon/framework/assurance/runtime/_ops/scripts/validate-engagement-work-package-compiler.sh"

registration_doctrine:
  - "Engagement compiler control, evidence, locality, and generated read-model paths must be registered before validator-gated runtime-write readiness."
  - "Registered path families preserve class-root placement; registration never authorizes material effects by itself."
  - "Generated read models are registered only as non-authoritative projections and are forbidden as runtime, policy, support, or approval inputs."

runtime_write_requires_registered_families:
  - "engagement-control"
  - "work-package-control"
  - "objective-brief-control"
  - "decision-request-control"
  - "engagement-evidence"
  - "objective-brief-evidence"
  - "orientation-evidence"
  - "project-profile-evidence"
  - "project-profile-source-fact-evidence"
  - "work-package-compilation-evidence"
  - "decision-evidence"
  - "run-contract-readiness-evidence"
  - "engagement-continuity"
  - "project-profile-authority"

path_families:
  - family_id: "engagement-control"
    class_root: "state"
    surface_class: "mutable-control"
    canonical_paths:
      - ".octon/state/control/engagements/<engagement-id>/engagement.yml"
      - ".octon/state/control/engagements/<engagement-id>/status.yml"
    authority_posture: "mutable-operational-truth"
    runtime_write_gate: "registered-path-family-required"
    allowed_writers:
      - "engagement-compiler"
    forbidden_consumers:
      - "generated projections as authority"
      - "proposal-local files as runtime dependencies"
  - family_id: "work-package-control"
    class_root: "state"
    surface_class: "mutable-control"
    canonical_paths:
      - ".octon/state/control/engagements/<engagement-id>/work-package.yml"
    authority_posture: "mutable-operational-truth"
    runtime_write_gate: "registered-path-family-required"
    allowed_writers:
      - "engagement-compiler"
    forbidden_consumers:
      - "generated projections as authority"
      - "proposal-local files as runtime dependencies"
  - family_id: "objective-brief-control"
    class_root: "state"
    surface_class: "mutable-control"
    canonical_paths:
      - ".octon/state/control/engagements/<engagement-id>/objective/objective-brief.yml"
      - ".octon/state/control/engagements/<engagement-id>/objective/status.yml"
    authority_posture: "per-engagement-candidate-control"
    runtime_write_gate: "registered-path-family-required"
    allowed_writers:
      - "engagement-compiler"
    backing_evidence_family: "objective-brief-evidence"
    not_authority_for:
      - "workspace-charter"
      - "material-execution"
    forbidden_consumers:
      - "workspace-charter authority replacement"
      - "generated projections as authority"
  - family_id: "decision-request-control"
    class_root: "state"
    surface_class: "mutable-control"
    canonical_paths:
      - ".octon/state/control/engagements/<engagement-id>/decisions/<decision-id>.yml"
    authority_posture: "operator-decision-wrapper"
    runtime_write_gate: "registered-path-family-required"
    canonical_successor_roots:
      - ".octon/state/control/execution/approvals/**"
      - ".octon/state/control/execution/exceptions/**"
      - ".octon/state/control/execution/revocations/**"
    forbidden_consumers:
      - "Decision Request as replacement approval control plane"
  - family_id: "project-profile-authority"
    class_root: "instance"
    surface_class: "repo-specific-authored-authority"
    canonical_paths:
      - ".octon/instance/locality/project-profile.yml"
    authority_posture: "repo-local-durable-orientation-authority"
    runtime_write_gate: "registered-path-family-required"
    required_source_evidence_family: "project-profile-evidence"
    forbidden_consumers:
      - "profile facts without retained source evidence"
  - family_id: "engagement-evidence"
    class_root: "state"
    surface_class: "retained-evidence"
    canonical_paths:
      - ".octon/state/evidence/engagements/<engagement-id>/preflight/**"
      - ".octon/state/evidence/engagements/<engagement-id>/adoption-preflight/**"
      - ".octon/state/evidence/engagements/<engagement-id>/classification/**"
    authority_posture: "retained-factual-truth"
    runtime_write_gate: "registered-path-family-required"
  - family_id: "objective-brief-evidence"
    class_root: "state"
    surface_class: "retained-evidence"
    canonical_paths:
      - ".octon/state/evidence/engagements/<engagement-id>/objective/**"
    authority_posture: "retained-factual-truth"
    runtime_write_gate: "registered-path-family-required"
  - family_id: "orientation-evidence"
    class_root: "state"
    surface_class: "retained-evidence"
    canonical_paths:
      - ".octon/state/evidence/orientation/<orientation-id>/**"
    authority_posture: "retained-factual-truth"
    runtime_write_gate: "registered-path-family-required"
  - family_id: "project-profile-evidence"
    class_root: "state"
    surface_class: "retained-evidence"
    canonical_paths:
      - ".octon/state/evidence/project-profiles/<profile-id>/**"
    authority_posture: "retained-factual-truth"
    runtime_write_gate: "registered-path-family-required"
  - family_id: "project-profile-source-fact-evidence"
    class_root: "state"
    surface_class: "retained-evidence"
    canonical_paths:
      - ".octon/state/evidence/project-profiles/<profile-id>/source-facts/**"
    authority_posture: "retained-factual-truth"
    runtime_write_gate: "registered-path-family-required"
  - family_id: "work-package-compilation-evidence"
    class_root: "state"
    surface_class: "retained-evidence"
    canonical_paths:
      - ".octon/state/evidence/engagements/<engagement-id>/work-packages/<work-package-id>/**"
    authority_posture: "retained-factual-truth"
    runtime_write_gate: "registered-path-family-required"
  - family_id: "decision-evidence"
    class_root: "state"
    surface_class: "retained-evidence"
    canonical_paths:
      - ".octon/state/evidence/decisions/<decision-id>/**"
    authority_posture: "retained-factual-truth"
    runtime_write_gate: "registered-path-family-required"
  - family_id: "run-contract-readiness-evidence"
    class_root: "state"
    surface_class: "retained-evidence"
    canonical_paths:
      - ".octon/state/evidence/engagements/<engagement-id>/run-contract-readiness/**"
    authority_posture: "retained-factual-truth"
    runtime_write_gate: "registered-path-family-required"
    not_authority_for:
      - "run execution"
  - family_id: "engagement-continuity"
    class_root: "state"
    surface_class: "continuity-state"
    canonical_paths:
      - ".octon/state/continuity/engagements/<engagement-id>/handoff.yml"
    authority_posture: "resumption-context"
    runtime_write_gate: "registered-path-family-required"
    forbidden_consumers:
      - "runtime authority"
      - "policy authority"
  - family_id: "engagement-generated-read-model"
    class_root: "generated"
    surface_class: "generated-operator-read-model"
    canonical_paths:
      - ".octon/generated/cognition/projections/materialized/engagements/<engagement-id>.yml"
      - ".octon/generated/cognition/projections/materialized/work-packages/<work-package-id>.yml"
    authority_posture: "derived-non-authority"
    runtime_write_gate: "forbidden-as-runtime-authority"
    forbidden_consumers:
      - "runtime"
      - "policy"
      - "support-claim-evaluation"
      - "approval-authority"
