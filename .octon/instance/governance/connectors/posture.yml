schema_version: "engagement-connector-posture-v1"
policy_id: "engagement-connector-posture"
owner: "Octon governance"
status: "active"
default_route: "deny"
support_target_ref: ".octon/instance/governance/support-targets.yml"
capability_pack_registry_ref: ".octon/instance/governance/capability-packs/registry.yml"
browser_api_live_support_policy_ref: ".octon/instance/governance/policies/browser-api-live-support.yml"
network_egress_policy_ref: ".octon/instance/governance/policies/network-egress.yml"
governance_exclusions_ref: ".octon/instance/governance/exclusions/action-classes.yml"

v1_doctrine:
  - "Connector discovery and posture mapping may support prepare-only Work Package compilation."
  - "Connector posture never admits support or capability use by itself."
  - "MCP, API, and browser connectors must not be used for live effects in v1."
  - "Future live connector admission requires support-target admission, capability-pack admission, egress lease, credential posture, rollback or compensation posture, replay, evidence, and runtime authorization."

allowed_v1_operations:
  - "inventory"
  - "classify"
  - "map-to-capability-pack"
  - "emit-decision-request"
  - "prepare-context-request"

forbidden_v1_operations:
  - "invoke-live-connector"
  - "perform-external-side-effect"
  - "use-credentials"
  - "publish-generated-effective-output"
  - "widen-support-target"
  - "activate-capability-pack"

connector_classes:
  - connector_class_id: "mcp"
    label: "MCP connector"
    support_status: "non_admitted"
    capability_pack_ref: null
    material_effect_class: "non-admitted-external-effect-channel"
    prepare_route: "stage_only"
    observe_route: "stage_only"
    live_effect_route: "denied"
    decision_request_required_for:
      - "first live use"
      - "credential enablement"
      - "support admission"
    required_before_live:
      - "support-target-admission"
      - "capability-pack-admission"
      - "connector contract"
      - "egress and credential posture"
      - "rollback or compensation posture"
      - "replay and evidence coverage"
      - "runtime authorization"
  - connector_class_id: "api"
    label: "External API connector"
    support_status: "unadmitted"
    capability_pack_ref: "api"
    material_effect_class: "api_egress"
    prepare_route: "stage_only"
    observe_route: "stage_only"
    live_effect_route: "denied"
    decision_request_required_for:
      - "first live use"
      - "credential enablement"
      - "external service enablement"
    required_before_live:
      - "support-target-admission"
      - "capability-pack-admission"
      - "egress lease"
      - "credential posture"
      - "redaction metadata"
      - "replay manifest"
      - "rollback or compensation posture"
      - "scenario or shadow proof"
      - "runtime authorization"
  - connector_class_id: "browser"
    label: "Browser connector"
    support_status: "unadmitted"
    capability_pack_ref: "browser"
    material_effect_class: "browser_action"
    prepare_route: "stage_only"
    observe_route: "stage_only"
    live_effect_route: "denied"
    decision_request_required_for:
      - "first live use"
      - "credential enablement"
      - "external service enablement"
    required_before_live:
      - "support-target-admission"
      - "capability-pack-admission"
      - "browser session contract"
      - "browser replay"
      - "egress lease"
      - "credential posture"
      - "redaction metadata"
      - "rollback or compensation posture"
      - "scenario or shadow proof"
      - "runtime authorization"

outcome_mapping:
  prepare_only_with_non_admitted_connector: "stage_only"
  live_use_requested_without_admission: "denied"
  connector_unknown_to_policy: "blocked"
  connector_conflicts_with_governance_exclusion: "denied"
  connector_requires_human_approval: "requires_decision"
