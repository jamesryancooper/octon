schema_version: known-limits-policy-v1
owner: Octon governance
scope: active-release-disclosure
rules:
  - rule_id: KLP-001
    requirement: List every residual item from the active residual ledger in active HarnessCard known_limits until the residual ledger is explicitly empty.
  - rule_id: KLP-002
    requirement: List every still-bounded live support fact that materially qualifies the active release claim.
  - rule_id: KLP-003
    requirement: known_limits must be empty only when the blocker ledger is zero, the residual ledger is empty, and no remaining exclusion or bounded live fact materially qualifies the active claim.
  - rule_id: KLP-004
    requirement: known_limits entries must not contradict the active release scope or support admissions.
generated_inputs:
  blocker_ledger_ref: .octon/generated/effective/closure/blocker-ledger.yml
  residual_ledger_ref: .octon/state/evidence/disclosure/releases/2026-04-09-uec-bounded-hardening-closure/closure/residual-ledger.yml
  release_lineage_ref: .octon/instance/governance/disclosure/release-lineage.yml
  governance_exclusions_ref: .octon/instance/governance/exclusions/action-classes.yml
