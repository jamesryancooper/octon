schema_version: "octon-support-targets-v1"
owner: "Octon governance"
default_route: "deny"
review_cadence: "quarterly and before widening support"
tiers:
  model:
    - id: "MT-A"
      label: "frontier-proven"
      default_autonomy: "full"
      description: "Highest-confidence model tier for governed repo-local execution."
    - id: "MT-B"
      label: "repo-local-governed"
      default_autonomy: "bounded"
      description: "Repo-local governed execution with explicit runtime receipts and bounded autonomy."
    - id: "MT-C"
      label: "experimental-adapter"
      default_autonomy: "stage_only"
      description: "Experimental model or adapter tier that stays staged unless explicitly widened."
  workload:
    - id: "WT-1"
      label: "observe-and-read"
      default_route: "allow"
      description: "Read-heavy or observation-first work with no consequential externality."
    - id: "WT-2"
      label: "repo-local-transitional"
      default_route: "allow"
      description: "Transitional harness maintenance and architecture work scoped to this repository."
    - id: "WT-3"
      label: "release-and-boundary-sensitive"
      default_route: "stage_only"
      description: "Boundary-sensitive work that requires stronger proof or mission coverage."
    - id: "WT-4"
      label: "external-or-irreversible"
      default_route: "deny"
      description: "External, irreversible, or unsupported work that must fail closed by default."
  language_resource:
    - id: "LT-REF"
      label: "reference-owned"
      description: "Authoritative repository surfaces and durable runtime receipts."
    - id: "LT-EXT"
      label: "extended-context"
      description: "Broader repo context or imported materials with bounded confidence."
    - id: "LT-EXP"
      label: "experimental-context"
      description: "Experimental or low-confidence context that requires staged handling."
  locale:
    - id: "LOC-EN"
      label: "english-primary"
      description: "Primary English operator and governance surfaces."
    - id: "LOC-MX"
      label: "spanish-secondary"
      description: "Secondary locale with bounded translation and review guarantees."
    - id: "LOC-EXP"
      label: "experimental-locale"
      description: "Experimental locale support that remains staged unless widened explicitly."
compatibility_matrix:
  - model_tier: "MT-A"
    workload_tier: "WT-1"
    language_resource_tier: "LT-REF"
    locale_tier: "LOC-EN"
    support_status: "supported"
    default_route: "allow"
    requires_mission: false
    allowed_capability_packs:
      - "read-only"
      - "analysis"
    required_evidence:
      - "authority-decision-artifact"
  - model_tier: "MT-B"
    workload_tier: "WT-2"
    language_resource_tier: "LT-REF"
    locale_tier: "LOC-EN"
    support_status: "supported"
    default_route: "allow"
    requires_mission: false
    allowed_capability_packs:
      - "repo-maintenance"
      - "governance"
      - "runtime"
    required_evidence:
      - "authority-decision-artifact"
      - "authority-grant-bundle"
      - "run-evidence-root"
  - model_tier: "MT-B"
    workload_tier: "WT-3"
    language_resource_tier: "LT-REF"
    locale_tier: "LOC-EN"
    support_status: "reduced"
    default_route: "stage_only"
    requires_mission: true
    allowed_capability_packs:
      - "governance"
      - "runtime"
    required_evidence:
      - "authority-decision-artifact"
      - "authority-grant-bundle"
      - "mission-authority"
      - "rollback-proof"
  - model_tier: "MT-C"
    workload_tier: "WT-2"
    language_resource_tier: "LT-REF"
    locale_tier: "LOC-EN"
    support_status: "experimental"
    default_route: "stage_only"
    requires_mission: false
    allowed_capability_packs:
      - "read-only"
      - "governance"
    required_evidence:
      - "authority-decision-artifact"
      - "lab-followup"
  - model_tier: "MT-B"
    workload_tier: "WT-2"
    language_resource_tier: "LT-EXT"
    locale_tier: "LOC-EN"
    support_status: "reduced"
    default_route: "stage_only"
    requires_mission: false
    allowed_capability_packs:
      - "governance"
      - "runtime"
    required_evidence:
      - "authority-decision-artifact"
      - "extended-context-review"
  - model_tier: "MT-B"
    workload_tier: "WT-2"
    language_resource_tier: "LT-REF"
    locale_tier: "LOC-MX"
    support_status: "reduced"
    default_route: "stage_only"
    requires_mission: false
    allowed_capability_packs:
      - "governance"
      - "runtime"
    required_evidence:
      - "authority-decision-artifact"
      - "locale-review"
  - model_tier: "MT-B"
    workload_tier: "WT-4"
    language_resource_tier: "LT-REF"
    locale_tier: "LOC-EN"
    support_status: "unsupported"
    default_route: "deny"
    requires_mission: true
    allowed_capability_packs: []
    required_evidence:
      - "escalation-required"
notes:
  - "Wave 2 expands support-target coverage enough for authority routing across workload, model, context, and locale axes."
  - "Full support-claim disclosure remains a later wave concern."
