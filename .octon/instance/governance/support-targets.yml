schema_version: "octon-support-targets-v1"
owner: "Octon governance"
default_route: "deny"
review_cadence: "quarterly and before any support-universe amendment"
governance_exclusions_ref: ".octon/instance/governance/exclusions/action-classes.yml"
live_support_universe:
  model_classes:
    - "frontier-governed"
    - "repo-local-governed"
  workload_classes:
    - "observe-and-read"
    - "repo-consequential"
    - "boundary-sensitive"
  context_classes:
    - "reference-owned"
    - "extended-governed"
  locale_classes:
    - "english-primary"
    - "spanish-secondary"
  host_adapters:
    - "repo-shell"
    - "studio-control-plane"
    - "github-control-plane"
    - "ci-control-plane"
  model_adapters:
    - "repo-local-governed"
    - "frontier-governed"
  capability_packs:
    - "repo"
    - "git"
    - "shell"
    - "telemetry"
    - "browser"
    - "api"
tiers:
  model:
    - id: "frontier-governed"
      label: "frontier-governed"
      default_autonomy: "full"
      description: "Frontier model execution with governed routing, contamination reset, conformance evidence, and disclosure coverage."
    - id: "repo-local-governed"
      label: "repo-local-governed"
      default_autonomy: "bounded"
      description: "Repo-local governed execution with explicit runtime receipts, bounded autonomy, and complete disclosure."
  workload:
    - id: "observe-and-read"
      label: "observe-and-read"
      default_route: "allow"
      description: "Read-heavy or observation-first work with no consequential externality."
    - id: "repo-consequential"
      label: "repo-consequential"
      default_route: "allow"
      description: "Consequential harness maintenance and architecture work governed inside this repository."
    - id: "boundary-sensitive"
      label: "boundary-sensitive"
      default_route: "allow"
      description: "Boundary-sensitive work with mission-backed recovery, replay, and disclosure requirements."
  language_resource:
    - id: "reference-owned"
      label: "reference-owned"
      description: "Authoritative repository surfaces and durable runtime receipts."
    - id: "extended-governed"
      label: "extended-governed"
      description: "Broader governed context admitted into the final support universe with explicit routing and disclosure."
  locale:
    - id: "english-primary"
      label: "english-primary"
      description: "Primary English operator and governance surfaces."
    - id: "spanish-secondary"
      label: "spanish-secondary"
      description: "Secondary locale with governed translation, review, and disclosure guarantees."
