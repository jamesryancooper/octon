schema_version: "octon-support-targets-v1"
owner: "Octon governance"
default_route: "deny"
review_cadence: "quarterly and before widening support"
tiers:
  model:
    - id: "MT-A"
      label: "frontier-proven"
      default_autonomy: "full"
      description: "Highest-confidence model tier for governed repo-local execution."
    - id: "MT-B"
      label: "repo-local-governed"
      default_autonomy: "bounded"
      description: "Repo-local governed execution with explicit runtime receipts and bounded autonomy."
    - id: "MT-C"
      label: "experimental-adapter"
      default_autonomy: "stage_only"
      description: "Experimental model or adapter tier that stays staged unless explicitly widened."
  workload:
    - id: "WT-1"
      label: "observe-and-read"
      default_route: "allow"
      description: "Read-heavy or observation-first work with no consequential externality."
    - id: "WT-2"
      label: "repo-local-transitional"
      default_route: "allow"
      description: "Transitional harness maintenance and architecture work scoped to this repository."
    - id: "WT-3"
      label: "release-and-boundary-sensitive"
      default_route: "stage_only"
      description: "Boundary-sensitive work that requires stronger proof or mission coverage."
    - id: "WT-4"
      label: "external-or-irreversible"
      default_route: "deny"
      description: "External, irreversible, or unsupported work that must fail closed by default."
  language_resource:
    - id: "LT-REF"
      label: "reference-owned"
      description: "Authoritative repository surfaces and durable runtime receipts."
    - id: "LT-EXT"
      label: "extended-context"
      description: "Broader repo context or imported materials with bounded confidence."
    - id: "LT-EXP"
      label: "experimental-context"
      description: "Experimental or low-confidence context that requires staged handling."
  locale:
    - id: "LOC-EN"
      label: "english-primary"
      description: "Primary English operator and governance surfaces."
    - id: "LOC-MX"
      label: "spanish-secondary"
      description: "Secondary locale with bounded translation and review guarantees."
    - id: "LOC-EXP"
      label: "experimental-locale"
      description: "Experimental locale support that remains staged unless widened explicitly."
compatibility_matrix:
  - model_tier: "MT-A"
    workload_tier: "WT-1"
    language_resource_tier: "LT-REF"
    locale_tier: "LOC-EN"
    support_status: "supported"
    default_route: "allow"
    requires_mission: false
    allowed_capability_packs:
      - "repo"
      - "shell"
      - "telemetry"
    required_evidence:
      - "authority-decision-artifact"
  - model_tier: "MT-B"
    workload_tier: "WT-2"
    language_resource_tier: "LT-REF"
    locale_tier: "LOC-EN"
    support_status: "supported"
    default_route: "allow"
    requires_mission: false
    allowed_capability_packs:
      - "repo"
      - "git"
      - "shell"
      - "telemetry"
    required_evidence:
      - "authority-decision-artifact"
      - "authority-grant-bundle"
      - "run-evidence-root"
  - model_tier: "MT-B"
    workload_tier: "WT-3"
    language_resource_tier: "LT-REF"
    locale_tier: "LOC-EN"
    support_status: "reduced"
    default_route: "stage_only"
    requires_mission: true
    allowed_capability_packs:
      - "repo"
      - "git"
      - "shell"
      - "telemetry"
    required_evidence:
      - "authority-decision-artifact"
      - "authority-grant-bundle"
      - "mission-authority"
      - "rollback-proof"
  - model_tier: "MT-C"
    workload_tier: "WT-2"
    language_resource_tier: "LT-REF"
    locale_tier: "LOC-EN"
    support_status: "experimental"
    default_route: "stage_only"
    requires_mission: false
    allowed_capability_packs:
      - "repo"
      - "shell"
      - "telemetry"
    required_evidence:
      - "authority-decision-artifact"
      - "lab-followup"
  - model_tier: "MT-B"
    workload_tier: "WT-2"
    language_resource_tier: "LT-EXT"
    locale_tier: "LOC-EN"
    support_status: "reduced"
    default_route: "stage_only"
    requires_mission: false
    allowed_capability_packs:
      - "repo"
      - "git"
      - "shell"
      - "telemetry"
    required_evidence:
      - "authority-decision-artifact"
      - "extended-context-review"
  - model_tier: "MT-B"
    workload_tier: "WT-2"
    language_resource_tier: "LT-REF"
    locale_tier: "LOC-MX"
    support_status: "reduced"
    default_route: "stage_only"
    requires_mission: false
    allowed_capability_packs:
      - "repo"
      - "git"
      - "shell"
      - "telemetry"
    required_evidence:
      - "authority-decision-artifact"
      - "locale-review"
  - model_tier: "MT-B"
    workload_tier: "WT-4"
    language_resource_tier: "LT-REF"
    locale_tier: "LOC-EN"
    support_status: "unsupported"
    default_route: "deny"
    requires_mission: true
    allowed_capability_packs: []
    required_evidence:
      - "escalation-required"
adapter_conformance_criteria:
  - criterion_id: "HOST-001"
    adapter_kind: "host"
    description: "Host signals remain non-authoritative projections and may mirror, but never mint, canonical authority."
    required_evidence:
      - "authority-decision-artifact"
      - "control-evidence-root"
  - criterion_id: "HOST-002"
    adapter_kind: "host"
    description: "The default host path remains replaceable and bound to the engine authorization boundary."
    required_evidence:
      - "instruction-layer-manifest"
      - "run-evidence-root"
  - criterion_id: "HOST-003"
    adapter_kind: "host"
    description: "Projected control-plane state never becomes hidden authority outside canonical control roots."
    required_evidence:
      - "authority-grant-bundle"
      - "control-evidence-root"
  - criterion_id: "HOST-004"
    adapter_kind: "host"
    description: "Canonical host adapters must publish explicit support-tier envelopes for GitHub, CI, local CLI, and Studio surfaces."
    required_evidence:
      - "support-target-declaration"
      - "instruction-layer-manifest"
  - criterion_id: "MODEL-001"
    adapter_kind: "model"
    description: "Model adapter support claims remain bounded by declared support tiers."
    required_evidence:
      - "authority-decision-artifact"
      - "support-target-declaration"
  - criterion_id: "MODEL-002"
    adapter_kind: "model"
    description: "Model adapter execution emits runtime receipts and instruction-layer manifests."
    required_evidence:
      - "instruction-layer-manifest"
      - "run-evidence-root"
  - criterion_id: "MODEL-003"
    adapter_kind: "model"
    description: "Memory discipline stays runtime-backed rather than persona-backed."
    required_evidence:
      - "run-evidence-root"
      - "control-evidence-root"
  - criterion_id: "MODEL-004"
    adapter_kind: "model"
    description: "Model adapter manifests must publish conformance suites, contamination reset posture, and known limitations."
    required_evidence:
      - "run-evidence-root"
      - "support-target-declaration"
host_adapters:
  - adapter_id: "repo-shell"
    contract_ref: ".octon/framework/engine/runtime/adapters/host/repo-shell.yml"
    authority_mode: "non_authoritative"
    replaceable: true
    support_status: "supported"
    default_route: "allow"
    criteria_refs:
      - "HOST-001"
      - "HOST-002"
      - "HOST-004"
    allowed_model_tiers:
      - "MT-A"
      - "MT-B"
      - "MT-C"
    allowed_workload_tiers:
      - "WT-1"
      - "WT-2"
      - "WT-3"
    allowed_language_resource_tiers:
      - "LT-REF"
      - "LT-EXT"
    allowed_locale_tiers:
      - "LOC-EN"
      - "LOC-MX"
    required_evidence:
      - "authority-decision-artifact"
      - "instruction-layer-manifest"
  - adapter_id: "studio-control-plane"
