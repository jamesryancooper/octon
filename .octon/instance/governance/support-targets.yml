notes:
  - "The live claim is bounded to the admitted finite support universe recorded above; compatibility_matrix is the supported runtime projection compiled from tuple_admissions."
  - "Stage-only or unsupported surfaces remain explicit and reviewable, but they are excluded from the live claim until dossier-backed proof is closed."
  - "Mission-backed repo-consequential work is supported; missionless consequential and boundary-sensitive work are excluded from the live claim."
