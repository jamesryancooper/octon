notes:
  - "The live support universe is globally complete but finite: retained surfaces are supported, governed, runtime-backed, validated, proven, and disclosed."
  - "Deny-only and non-claimed action classes live in governance exclusions rather than the support matrix."
  - "Experimental, reduced, stage_only, unsupported, and unadmitted critical surfaces are retired or rebound and no longer survive as live support tiers."
retired_surfaces:
