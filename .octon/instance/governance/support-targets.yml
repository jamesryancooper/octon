schema_version: "octon-support-targets-v1"
owner: "Octon governance"
default_route: "deny"
review_cadence: "quarterly and before any support-universe amendment"
governance_exclusions_ref: ".octon/instance/governance/exclusions/action-classes.yml"
support_claim_mode: "bounded-admitted-finite"
generated_projection_ref: ".octon/generated/effective/governance/support-target-matrix.yml"
pack_registry_ref: ".octon/instance/capabilities/runtime/packs/registry.yml"
admission_review_contract_ref: ".octon/instance/governance/contracts/support-target-review.yml"
support_dossier_root: ".octon/instance/governance/support-dossiers"
live_support_universe:
  model_classes:
    - "repo-local-governed"
  workload_classes:
    - "observe-and-read"
    - "repo-consequential"
  context_classes:
    - "reference-owned"
  locale_classes:
    - "english-primary"
  host_adapters:
    - "repo-shell"
  model_adapters:
    - "repo-local-governed"
  capability_packs:
    - "repo"
    - "git"
    - "shell"
    - "telemetry"
non_admitted_or_stage_only_surfaces:
  model_classes:
    - "frontier-governed"
  workload_classes:
    - "boundary-sensitive"
  context_classes:
    - "extended-governed"
  locale_classes:
    - "spanish-secondary"
  host_adapters:
    - "studio-control-plane"
    - "github-control-plane"
    - "ci-control-plane"
  model_adapters:
    - "frontier-governed"
  capability_packs:
    - "browser"
    - "api"
tiers:
  model:
    - id: "frontier-governed"
      label: "frontier-governed"
      default_autonomy: "bounded"
      description: "Frontier model execution remains available only for stage-only evaluation until dossier-backed admission is approved."
    - id: "repo-local-governed"
      label: "repo-local-governed"
      default_autonomy: "bounded"
      description: "Repo-local governed execution with runtime receipts, bounded autonomy, and canonical disclosure."
  workload:
    - id: "observe-and-read"
      label: "observe-and-read"
      default_route: "allow"
      description: "Read-heavy or observation-first work with no consequential externality."
    - id: "repo-consequential"
      label: "repo-consequential"
      default_route: "escalate"
      description: "Consequential repository work that is admitted only inside the bounded claim envelope when mission-backed and fully evidenced."
    - id: "boundary-sensitive"
      label: "boundary-sensitive"
      default_route: "escalate"
      description: "Boundary-sensitive work that remains outside the live claim and is stage-only until proof and recovery posture are fully closed."
  language_resource:
    - id: "reference-owned"
      label: "reference-owned"
      description: "Authoritative repository surfaces and durable runtime receipts."
    - id: "extended-governed"
      label: "extended-governed"
      description: "Broader governed context retained only for stage-only evaluation and review-bound experiments."
  locale:
    - id: "english-primary"
      label: "english-primary"
      description: "Primary English operator and governance surfaces."
    - id: "spanish-secondary"
      label: "spanish-secondary"
      description: "Secondary locale retained only for stage-only evaluation until live proof and review cadence are complete."
compatibility_matrix:
  - model_tier: "repo-local-governed"
    workload_tier: "observe-and-read"
    language_resource_tier: "reference-owned"
    locale_tier: "english-primary"
    support_status: "supported"
    default_route: "allow"
    requires_mission: false
    allowed_capability_packs:
      - "repo"
      - "shell"
      - "telemetry"
    required_evidence:
      - "authority-decision-artifact"
      - "measurement-summary"
      - "run-card-v2"
  - model_tier: "repo-local-governed"
    workload_tier: "repo-consequential"
    language_resource_tier: "reference-owned"
    locale_tier: "english-primary"
    support_status: "supported"
    default_route: "allow"
    requires_mission: true
    allowed_capability_packs:
