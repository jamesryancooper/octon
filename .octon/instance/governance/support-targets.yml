notes:
  - "Wave 2 expands support-target coverage enough for authority routing across workload, model, context, and locale axes."
  - "Wave 5 adds bounded adapter envelopes, canonical host-family coverage, governed capability-pack admission, and adapter-conformance criteria for host and model support claims."
