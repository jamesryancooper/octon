adapter_conformance_criteria:
  - criterion_id: "HOST-001"
    adapter_kind: "host"
    description: "Host signals remain non-authoritative projections and may mirror, but never mint, canonical authority."
    required_evidence:
      - "authority-decision-artifact"
      - "control-evidence-root"
  - criterion_id: "HOST-002"
    adapter_kind: "host"
    description: "Supported host adapters emit instruction manifests, failure taxonomies, and disclosure coverage."
    required_evidence:
      - "instruction-layer-manifest"
      - "runtime-event-ledger"
  - criterion_id: "HOST-003"
    adapter_kind: "host"
    description: "Projected host state never becomes hidden authority outside canonical control roots."
    required_evidence:
      - "authority-grant-bundle"
      - "control-evidence-root"
  - criterion_id: "HOST-004"
    adapter_kind: "host"
    description: "Retained host adapters publish explicit supported envelopes, conformance suites, and parity coverage."
    required_evidence:
      - "support-target-declaration"
      - "proof-plane-coverage"
  - criterion_id: "MODEL-001"
    adapter_kind: "model"
    description: "Model adapter support claims remain bounded by declared support targets and governance exclusions."
    required_evidence:
      - "authority-decision-artifact"
      - "support-target-declaration"
  - criterion_id: "MODEL-002"
    adapter_kind: "model"
    description: "Model adapter execution emits runtime receipts and instruction manifests."
    required_evidence:
      - "instruction-layer-manifest"
      - "run-evidence-root"
  - criterion_id: "MODEL-003"
    adapter_kind: "model"
    description: "Memory discipline and contamination reset stay runtime-backed rather than persona-backed."
    required_evidence:
      - "run-evidence-root"
      - "contamination-reset-proof"
  - criterion_id: "MODEL-004"
    adapter_kind: "model"
    description: "Model adapter manifests publish conformance suites, contamination reset posture, and disclosure coverage."
    required_evidence:
      - "run-evidence-root"
      - "proof-plane-coverage"
