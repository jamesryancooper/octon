notes:
  - "The live claim is the bounded admitted finite supported tuple set; tuple_admissions is the inventory and authoritative reference layer for both supported and non-live tuples."
  - "Tuple-specific route, mission, capability-pack, proof-plane, authority-artifact, and claim-effect semantics live only in support-target-admissions/**."
  - "Any supported repo-consequential tuple may retain admitted-live-claim only when its admission and proof bundle carry valid Run Journal conformance and deterministic state-reconstruction proof; stage-only consequential tuples remain explicit non-live until that proof exists."
  - "The generated support-target matrix is a derived runtime-effective handle for publication or runtime narrowing only and must not widen authored support claims."
  - "Stage-only, unsupported, and unadmitted tuple surfaces remain explicit non-live posture and must not be widened by generated or disclosure projections."
  - "Already supported repo-local tuples that rely on model-visible repo context require context-pack receipt evidence under .octon/instance/governance/policies/context-packing.yml; this requirement is narrow-only and does not admit new support."
retired_surfaces:
  - "experimental-model-surface"
  - "experimental-context-surface"
  - "experimental-locale-surface"
  - "unsupported support tiers"
