schema_version: "octon-support-targets-v1"
owner: "Octon governance"
default_route: "deny"
review_cadence: "quarterly and before any support-universe amendment"
governance_exclusions_ref: ".octon/instance/governance/exclusions/action-classes.yml"
support_claim_mode: "bounded-admitted-finite"
generated_projection_ref: ".octon/generated/effective/governance/support-target-matrix.yml"
support_proof_bundle_root: ".octon/state/evidence/validation/support-targets"
support_card_projection_root: ".octon/generated/cognition/projections/materialized/support-cards"
support_admission_root: ".octon/instance/governance/support-target-admissions"
pack_registry_ref: ".octon/instance/governance/capability-packs/registry.yml"
admission_review_contract_ref: ".octon/instance/governance/contracts/support-target-review.yml"
support_proofing_contract_ref: ".octon/instance/governance/contracts/support-target-proofing.yml"
generated_support_matrix_contract_refs:
  handle_contract_ref: ".octon/framework/engine/runtime/spec/runtime-effective-artifact-handle-v2.md"
  freshness_contract_ref: ".octon/framework/engine/runtime/spec/publication-freshness-gates-v4.md"
  runtime_resolution_ref: ".octon/instance/governance/runtime-resolution.yml"
support_matrix_posture:
  authority_mode: "derived-runtime-handle"
  runtime_consumption: "route-bundle-publication-only"
  support_claim_widening: "forbidden"
  allowed_consumers:
    - "publication-workflows"
    - "validators"
    - "operators"
  forbidden_consumers:
    - "policy"
    - "support-claim-evaluation"
    - "direct-runtime-reads"
support_dossier_root: ".octon/instance/governance/support-dossiers"
claim_state_partitions:
  live:
    admission_root: ".octon/instance/governance/support-target-admissions/live"
    dossier_root: ".octon/instance/governance/support-dossiers/live"
  stage-only:
    admission_root: ".octon/instance/governance/support-target-admissions/stage-only"
    dossier_root: ".octon/instance/governance/support-dossiers/stage-only"
  unadmitted:
    admission_root: ".octon/instance/governance/support-target-admissions/unadmitted"
    dossier_root: ".octon/instance/governance/support-dossiers/unadmitted"
  retired:
    admission_root: ".octon/instance/governance/support-target-admissions/retired"
    dossier_root: ".octon/instance/governance/support-dossiers/retired"
live_support_universe:
  model_classes:
    - "repo-local-governed"
  workload_classes:
    - "observe-and-read"
    - "repo-consequential"
  context_classes:
    - "reference-owned"
  locale_classes:
    - "english-primary"
  host_adapters:
    - "repo-shell"
    - "ci-control-plane"
    - "github-control-plane"
  model_adapters:
    - "repo-local-governed"
  capability_packs:
    - "repo"
    - "git"
    - "shell"
    - "telemetry"
resolved_non_live_surfaces:
  model_classes:
    - "frontier-governed"
  workload_classes:
    - "boundary-sensitive"
  context_classes:
    - "extended-governed"
  locale_classes:
    - "spanish-secondary"
  host_adapters:
    - "studio-control-plane"
  model_adapters:
    - "frontier-governed"
  capability_packs:
    - "browser"
    - "api"
tiers:
  model:
    - id: "frontier-governed"
      label: "frontier-governed"
      default_autonomy: "bounded"
      description: "Frontier model execution is admitted through governed runtime, evidence, and disclosure controls."
    - id: "repo-local-governed"
      label: "repo-local-governed"
      default_autonomy: "bounded"
      description: "Repo-local governed execution with runtime receipts, bounded autonomy, and canonical disclosure."
  workload:
    - id: "observe-and-read"
      label: "observe-and-read"
      default_route: "allow"
      description: "Read-heavy or observation-first work with no consequential externality."
    - id: "repo-consequential"
      label: "repo-consequential"
      default_route: "escalate"
      description: "Consequential repository work is admitted when it remains governed, evidenced, disclosed, and for supported tuples proves valid Run Journal conformance plus deterministic state reconstruction through canonical run roots."
    - id: "boundary-sensitive"
      label: "boundary-sensitive"
      default_route: "escalate"
      description: "Boundary-sensitive work is admitted only through explicit fail-closed routing, governed authority, and full evidence coverage."
  language_resource:
    - id: "reference-owned"
      label: "reference-owned"
      description: "Authoritative repository surfaces and durable runtime receipts."
    - id: "extended-governed"
      label: "extended-governed"
      description: "Broader governed context is admitted when it remains bound to canonical runtime, evidence, and disclosure surfaces."
  locale:
    - id: "english-primary"
      label: "english-primary"
      description: "Primary English operator and governance surfaces."
    - id: "spanish-secondary"
      label: "spanish-secondary"
      description: "Secondary locale is admitted under the same canonical governance, runtime, and disclosure controls as the primary locale."
tuple_admissions:
