    allowed_model_tiers:
      - "MT-B"
      - "MT-C"
    allowed_workload_tiers:
      - "WT-2"
      - "WT-3"
    allowed_language_resource_tiers:
      - "LT-REF"
    allowed_locale_tiers:
      - "LOC-EN"
    required_evidence:
      - "authority-decision-artifact"
      - "control-evidence-root"
  - adapter_id: "ci-control-plane"
    contract_ref: ".octon/framework/engine/runtime/adapters/host/ci-control-plane.yml"
    authority_mode: "projection_only"
    replaceable: true
    support_status: "reduced"
    default_route: "stage_only"
    criteria_refs:
      - "HOST-001"
      - "HOST-003"
      - "HOST-004"
    allowed_model_tiers:
      - "MT-B"
      - "MT-C"
    allowed_workload_tiers:
      - "WT-2"
