    authority_mode: "non_authoritative"
    replaceable: true
    support_status: "supported"
    default_route: "allow"
    criteria_refs:
      - "HOST-001"
      - "HOST-002"
      - "HOST-004"
    allowed_model_tiers:
      - "MT-A"
      - "MT-B"
    allowed_workload_tiers:
      - "WT-1"
      - "WT-2"
      - "WT-3"
    allowed_language_resource_tiers:
      - "LT-REF"
