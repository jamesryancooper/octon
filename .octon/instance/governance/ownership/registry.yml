schema_version: "ownership-registry-v1"
directive_precedence:
  - "break_glass_or_kill_switch"
  - "mission_owner"
  - "ownership_registry"
  - "codeowners"
  - "subscribers"
operators:
  - operator_id: "octon-maintainers"
    display_name: "Octon Maintainers"
    contact: "repo://maintainers"
defaults:
  operator_id: "octon-maintainers"
  support_tier: "repo-local-transitional"
assets:
  - asset_id: "octon-harness"
    path_globs:
      - ".octon/**"
    owners:
      - "octon-maintainers"
    support_tier: "repo-local-transitional"
services:
  - service_id: "execution/flow"
    owners:
      - "octon-maintainers"
subscriptions:
  default_routes:
    - "mission_owner"
    - "ownership_registry"
    - "codeowners"
    - "subscribers"
