schema_version: "repo-ablation-deletion-workflow-v1"
workflow_id: "ablation-driven-deletion"
owner: "Octon governance"
status: "active"
registry_ref: ".octon/instance/governance/contracts/retirement-registry.yml"
review_set_ref: ".octon/instance/governance/contracts/closeout-reviews.yml"
receipt_root: ".octon/state/evidence/validation/publication/build-to-delete"
triggers:
  - "When a retirement target reaches its review date."
  - "When a retirement trigger is satisfied."
  - "Before any final target-state claim while registered or historical-retained targets remain."
  - "When support widening or adapter replacement could remove a compensating mechanism."
steps:
  - step_id: "ABL-1"
    action: "Collect baseline evidence for the target's declared value metric and live readers."
  - step_id: "ABL-2"
    action: "Run every validator, benchmark, or scenario listed in required_ablation_suite."
  - step_id: "ABL-3"
    action: "Review drift, adapter, and support-target posture for regressions."
  - step_id: "ABL-4"
    action: "Record a receipt with delete, retain, or demote decision plus non-regression evidence."
  - step_id: "ABL-5"
    action: "Update the retirement registry and review receipts in the same change as any deletion or demotion."
decision_values:
  - "delete"
  - "retain"
  - "demote"
evidence_requirements:
  - "ablation-deletion-receipt"
  - "retirement-review"
  - "current drift-review"
  - "current adapter-review"
  - "current support-target-review"
blocking_rule: "Deletion or final-claim approval is invalid without a current ablation-deletion receipt for each target evaluated in the release."
retirement_path: "Retire only after an automated successor workflow owns the same receipt, non-regression, and same-change update guarantees."
