schema_version: "repo-governance-contract-v1"
contract_id: "promotion-receipts"
owner: "Octon governance"
status: "active"
purpose: "Require retained receipts for promotion or activation that changes authoritative, control, release, or runtime-facing generated-effective meaning."
receipt_schema_ref: ".octon/framework/constitution/contracts/authority/promotion-receipt-v1.schema.json"
receipt_evidence_root: ".octon/state/evidence/control/execution"
triggers:
  - "When material from .octon/inputs/** or .octon/generated/** is promoted into framework/** or instance/**."
  - "When non-authoritative or generated material is materialized into state/control/** or retained control evidence."
  - "When runtime-facing generated/effective views are refreshed for live routing or release publication."
  - "When the active release in release-lineage changes."
required_inputs:
  - ".octon/framework/constitution/contracts/registry.yml"
  - ".octon/instance/governance/non-authority-register.yml"
  - ".octon/instance/governance/disclosure/release-lineage.yml"
  - ".octon/instance/governance/disclosure/harness-card.yml"
  - ".octon/instance/governance/support-targets.yml"
in_scope_promotion_kinds:
  - "authoritative-promotion"
  - "control-materialization"
  - "effective-publication"
  - "release-activation"
  - "release-supersession"
required_receipt_fields:
  - "source_surface.source_ref"
  - "source_surface.source_class"
  - "target_surface.target_ref"
  - "target_surface.target_class"
  - "claim_effect"
  - "authority_basis"
  - "policy_refs"
  - "non_authority_attestation"
evidence_requirements:
  - "Retained promotion receipts under .octon/state/evidence/control/execution/** for every in-scope promotion."
  - "Evidence that generated/effective publications remain derived non-authority and cite canonical sources."
  - "Evidence that release activation or supersession agrees with release-lineage, HarnessCard v2, and coverage ledgers."
blocking_rule: "Reject when an in-scope promotion or activation changes authority, control, release selection, or runtime-facing effective meaning without a retained promotion receipt."
retirement_path: "Retire only if a stricter successor control contract subsumes promotion receipts without weakening non-authority or release-activation guarantees."
