schema_version: "repo-governance-policy-v1"
policy_id: "extension-publication-policy"
owner: "Octon governance"
status: "active"
selection_ref: ".octon/instance/extensions.yml"
active_state_ref: ".octon/state/control/extensions/active.yml"
quarantine_state_ref: ".octon/state/control/extensions/quarantine.yml"
effective_root_ref: ".octon/generated/effective/extensions"
publication_receipt_root_ref: ".octon/state/evidence/validation/publication/extensions"
compatibility_receipt_root_ref: ".octon/state/evidence/validation/compatibility/extensions"
rules:
  - "Raw additive extension inputs remain non-authoritative until selected, published, and freshness-bound."
  - "Generated/effective extension outputs fail closed when publication receipt or generation-lock freshness is stale."
  - "Active and quarantine state remain canonical over generated projections."
  - "Generated/effective extension publication must preserve content-addressed dependency closure."
