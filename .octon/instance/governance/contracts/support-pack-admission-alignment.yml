schema_version: "repo-governance-contract-v1"
contract_id: "support-pack-admission-alignment"
owner: "Octon governance"
status: "active"
purpose: "Require support-target tuples, support dossiers, governance capability-pack intent, runtime pack admissions, and the runtime pack registry to stay in one fail-closed graph."
required_inputs:
  - ".octon/instance/governance/support-targets.yml"
  - ".octon/instance/governance/support-target-admissions/**"
  - ".octon/instance/governance/support-dossiers/**"
  - ".octon/instance/governance/capability-packs/**"
  - ".octon/instance/capabilities/runtime/packs/admissions/**"
  - ".octon/instance/capabilities/runtime/packs/registry.yml"
  - ".octon/generated/effective/capabilities/pack-routes.effective.yml"
  - ".octon/generated/effective/capabilities/pack-routes.lock.yml"
  - ".octon/framework/capabilities/packs/**"
alignment_requirements:
  - "Every pack id in governance intent resolves to one runtime admission and one runtime registry entry."
  - "Governance and runtime pack support_target_refs stay equal after sorting."
  - "Compiled pack routes retain tuple claim_effect and never widen beyond admitted support tuples."
  - "Live tuples may cite only admitted packs."
  - "Stage-only or non-live tuples may cite unadmitted packs only when the tuple remains non-live."
  - "Runtime registry status, default_route, support_target_refs, and required_proof remain in parity with runtime admissions."
blocking_rule: "Reject when pack intent, runtime admission, or live tuple use diverges enough that a live support claim could be widened by drift."
