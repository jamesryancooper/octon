schema_version: "repo-retirement-registry-v1"
registry_id: "execution-constitution-build-to-delete"
owner: "Octon governance"
status: "active"
default_review_cadence: "quarterly and before any bounded completion claim"
review_set_ref: ".octon/instance/governance/contracts/closeout-reviews.yml"
ablation_workflow_ref: ".octon/instance/governance/contracts/ablation-deletion-workflow.yml"
entries:
  - target_id: "ingress-projection-adapters"
    status: "permanent-projection"
    disposition: "projection-only"
    paths:
      - ".octon/AGENTS.md"
      - "AGENTS.md"
      - "CLAUDE.md"
    owner_ref: "operator://octon-maintainers"
    support_scope: "Repo-root and .octon ingress compatibility adapters only."
    value_metric: "All supported tools continue to reach the canonical internal ingress without repo-root policy widening."
    review_contract_ref: ".octon/instance/governance/contracts/drift-review.yml"
    review_date: "2026-06-30"
    retirement_trigger:
      - "Supported tools stop requiring repo-root or .octon ingress adapter copies."
      - "Drift review finds zero supported readers that depend on the adapter files."
    required_ablation_suite:
      - ".octon/framework/assurance/runtime/_ops/scripts/validate-bootstrap-ingress.sh"
      - ".octon/framework/assurance/runtime/_ops/scripts/validate-harness-structure.sh"
      - ".octon/framework/assurance/governance/_ops/scripts/assert-unified-execution-closure.sh"
    evidence_requirements:
      - "drift-review"
      - "retirement-review"
    retirement_path: "Delete the ingress adapter files once supported tools bind directly to /.octon/instance/ingress/AGENTS.md without a repo-root adapter."
  - target_id: "workspace-objective-compatibility-shims"
    status: "retained-noncritical"
    disposition: "compatibility-shim"
    paths:
      - ".octon/instance/bootstrap/OBJECTIVE.md"
      - ".octon/instance/cognition/context/shared/intent.contract.yml"
    owner_ref: "operator://octon-maintainers"
    support_scope: "Bootstrap compatibility and legacy workspace-objective readers only."
    value_metric: "Zero active runtime or scaffold readers remain outside explicit compatibility paths."
    review_contract_ref: ".octon/instance/governance/contracts/drift-review.yml"
    review_date: "2026-06-29"
    retirement_trigger:
      - "Bootstrap and scaffolding stop requiring workspace-objective compatibility adapters."
      - "Drift review finds zero kernel-path or runtime readers."
    required_ablation_suite:
      - ".octon/framework/assurance/runtime/_ops/scripts/validate-bootstrap-ingress.sh"
      - ".octon/framework/assurance/runtime/_ops/scripts/validate-harness-structure.sh"
      - ".octon/framework/assurance/runtime/_ops/scripts/validate-objective-binding-cutover.sh"
    evidence_requirements:
      - "retirement-review"
      - "ablation-deletion-receipt"
    retirement_path: "Delete both compatibility shims once scaffold/bootstrap consumers bind directly to instance/charter/workspace.{md,yml}."
  - target_id: "duplicate-constitutional-shims"
    status: "historical-retained-noncritical"
    disposition: "historical-shim"
    paths:
      - ".octon/framework/agency/governance/CONSTITUTION.md"
      - ".octon/framework/cognition/governance/CHARTER.md"
      - ".octon/framework/assurance/governance/CHARTER.md"
    owner_ref: "operator://octon-maintainers"
    support_scope: "Historical lineage or subordinate assurance-governance only; these surfaces must never regain peer constitutional authority."
    value_metric: "Historical and subordinate references remain useful without re-entering ingress, validator requirements, or proof-plane obligations as peer authority."
    review_contract_ref: ".octon/instance/governance/contracts/drift-review.yml"
    review_date: "2026-06-29"
    retirement_trigger:
      - "Historical lineage references no longer require duplicate constitutional text."
      - "Maintainability and documentation evidence stop citing retained duplicate shims."
    required_ablation_suite:
      - ".octon/framework/assurance/runtime/_ops/scripts/validate-phase6-simplification-deletion.sh"
      - ".octon/framework/assurance/runtime/_ops/scripts/validate-bootstrap-ingress.sh"
      - ".octon/framework/assurance/runtime/_ops/scripts/validate-execution-governance.sh"
    evidence_requirements:
      - "drift-review"
      - "retirement-review"
    retirement_path: "Delete retained duplicate surfaces once lineage docs, maintainability evidence, and assurance-local weighting all point at canonical or subordinate non-shim successors."
  - target_id: "legacy-per-run-decision-lineage"
    status: "historical-retained-noncritical"
    disposition: "historical-lineage-only"
    paths:
      - ".octon/state/evidence/decisions/repo/**"
    owner_ref: "operator://octon-maintainers"
    support_scope: "Historical decision lineage only; per-run authority remains canonical under state/evidence/control/execution/**."
    value_metric: "No active run, disclosure artifact, or validator relies on historical per-run decision evidence."
    review_contract_ref: ".octon/instance/governance/contracts/retirement-review.yml"
    review_date: "2026-06-29"
    retirement_trigger:
      - "All remaining readers consume canonical control/evidence execution roots."
      - "Retirement review finds no lineage-only references needed for audit continuity."
    required_ablation_suite:
      - ".octon/framework/assurance/governance/_ops/scripts/assert-unified-execution-closure.sh"
      - ".octon/framework/assurance/runtime/_ops/scripts/validate-runtime-lifecycle-normalization.sh"
    evidence_requirements:
      - "retirement-review"
      - "ablation-deletion-receipt"
    retirement_path: "Delete the historical lineage root after downstream readers have migrated and the ablation suite shows no disclosure regression."
  - target_id: "helper-authored-run-projections"
    status: "retained-noncritical"
    disposition: "projection-only"
    paths:
      - ".octon/framework/orchestration/runtime/_ops/scripts/write-decision.sh"
      - ".octon/framework/orchestration/runtime/_ops/scripts/write-run.sh"
    owner_ref: "operator://octon-maintainers"
    support_scope: "Legacy projection helpers for seeded run and read-model compatibility only."
    value_metric: "Canonical run control and authority evidence roots remain complete without helper-authored projections."
    review_contract_ref: ".octon/instance/governance/contracts/retirement-review.yml"
    review_date: "2026-06-29"
    retirement_trigger:
      - "Canonical runtime writers and generated views no longer consume helper-authored projections."
      - "Ablation shows no RunCard, run-manifest, or authority evidence regression after helper removal."
    required_ablation_suite:
      - ".octon/framework/assurance/governance/_ops/scripts/assert-unified-execution-closure.sh"
      - ".octon/framework/assurance/runtime/_ops/scripts/validate-runtime-lifecycle-normalization.sh"
      - ".octon/framework/orchestration/runtime/runs/_ops/scripts/validate-runs.sh"
    evidence_requirements:
      - "retirement-review"
      - "ablation-deletion-receipt"
    retirement_path: "Delete helper projection scripts after canonical runtime writers and generated surfaces fully replace them."
  - target_id: "run-local-disclosure-mirrors"
    status: "historical-retained-noncritical"
    disposition: "historical-mirror"
    paths:
      - ".octon/state/evidence/runs/*/disclosure/**"
    owner_ref: "operator://octon-maintainers"
    support_scope: "Historical mirror only; canonical live RunCards now resolve from state/evidence/disclosure/runs/**."
    value_metric: "No supported runtime, validator, or release claim depends on run-local disclosure directories as the canonical home."
    review_contract_ref: ".octon/instance/governance/contracts/retirement-review.yml"
    review_date: "2026-06-30"
    retirement_trigger:
      - "All migration and benchmark lineage references stop needing run-local disclosure mirrors."
      - "Ablation shows no disclosure, replay, or closeout regression after mirror deletion."
    required_ablation_suite:
      - ".octon/framework/assurance/runtime/_ops/scripts/validate-assurance-disclosure-expansion.sh"
      - ".octon/framework/assurance/governance/_ops/scripts/assert-unified-execution-closure.sh"
      - ".octon/framework/orchestration/runtime/runs/_ops/scripts/validate-runs.sh"
    evidence_requirements:
      - "retirement-review"
      - "ablation-deletion-receipt"
    retirement_path: "Delete run-local disclosure mirrors once historical lineage and benchmark fixtures point only at the canonical disclosure roots."
  - target_id: "lab-local-harness-card-mirrors"
    status: "historical-retained-noncritical"
    disposition: "historical-mirror"
    paths:
      - ".octon/state/evidence/lab/harness-cards/**"
    owner_ref: "operator://octon-maintainers"
    support_scope: "Historical mirror only; canonical live HarnessCards are authored under instance/governance/disclosure and retained under state/evidence/disclosure/releases/**."
    value_metric: "No supported release claim, validator, or runtime path treats lab-local HarnessCards as canonical disclosure."
    review_contract_ref: ".octon/instance/governance/contracts/retirement-review.yml"
    review_date: "2026-06-30"
    retirement_trigger:
      - "Benchmark, evaluator, and migration lineage stop needing lab-local HarnessCard mirrors."
      - "Ablation shows no disclosure regression after mirror deletion."
    required_ablation_suite:
      - ".octon/framework/assurance/runtime/_ops/scripts/validate-assurance-disclosure-expansion.sh"
      - ".octon/framework/assurance/governance/_ops/scripts/assert-unified-execution-closure.sh"
    evidence_requirements:
      - "retirement-review"
      - "ablation-deletion-receipt"
    retirement_path: "Delete lab-local HarnessCard mirrors once all historical readers consume the canonical release disclosure roots."
  - target_id: "superseded-release-disclosure-bundles"
    status: "historical-retained-noncritical"
    disposition: "historical-release-evidence"
    paths:
      - ".octon/state/evidence/disclosure/releases/2026-03-30-unified-execution-constitution-atomic-cutover/**"
      - ".octon/state/evidence/disclosure/releases/2026-03-30-unified-execution-constitution-closure/**"
      - ".octon/state/evidence/disclosure/releases/2026-03-31-unified-execution-constitution-clean-break/**"
      - ".octon/state/evidence/disclosure/releases/2026-04-03-uec-clean-break-closure/**"
      - ".octon/state/evidence/disclosure/releases/2026-04-04-uec-global-completion/**"
    owner_ref: "operator://octon-maintainers"
    support_scope: "Historical release lineage only; the active live claim is resolved through instance/governance/disclosure/release-lineage.yml."
    value_metric: "No validator, runtime path, or current claim-bearing disclosure treats a superseded release bundle as the live claim."
    review_contract_ref: ".octon/instance/governance/contracts/retirement-review.yml"
    review_date: "2026-06-30"
    retirement_trigger:
      - "Release-lineage readers no longer require the superseded bundle directories for historical audit continuity."
      - "Ablation shows no disclosure, migration, or review regression after superseded release bundle removal."
    required_ablation_suite:
      - ".octon/framework/assurance/governance/_ops/scripts/assert-unified-execution-closure.sh"
      - ".octon/framework/assurance/governance/_ops/scripts/validate-disclosure-referential-integrity.sh"
    evidence_requirements:
      - "retirement-review"
      - "ablation-deletion-receipt"
    retirement_path: "Delete superseded release bundles once historical lineage consumers rely on release-lineage.yml and the ablation suite shows no current-claim regression."
  - target_id: "runtime-agent-soul-overlays"
    status: "retired"
    disposition: "deleted"
    paths:
      - ".octon/framework/agency/runtime/agents/orchestrator/SOUL.md"
      - ".octon/framework/agency/runtime/agents/verifier/SOUL.md"
      - ".octon/framework/agency/runtime/agents/_scaffold/template/SOUL.md"
    owner_ref: "operator://octon-maintainers"
    support_scope: "Former persona overlays in the runtime-agent kernel path."
    value_metric: "Zero required-path or scaffold references remain."
    review_contract_ref: ".octon/instance/governance/contracts/retirement-review.yml"
    review_date: "2026-03-29"
    retirement_trigger:
      - "Phase 6 simplification removed persona overlays from the kernel path."
    required_ablation_suite:
      - ".octon/framework/assurance/runtime/_ops/scripts/validate-phase6-simplification-deletion.sh"
      - ".octon/framework/agency/_ops/scripts/validate/validate-agency.sh"
    evidence_requirements:
      - ".octon/state/evidence/migration/2026-03-29-unified-execution-constitution-phase6-simplification-deletion/"
      - "ablation-deletion-receipt"
    retirement_path: "Completed on 2026-03-29 by deleting the overlays and validating the orchestrator-only path."
  - target_id: "label-native-authority-lane-projections"
    status: "retired"
    disposition: "deleted"
    paths:
      - ".github/workflows/ai-review-gate.yml"
      - ".github/workflows/pr-auto-merge.yml"
      - ".github/workflows/pr-clean-state-enforcer.yml"
      - ".github/workflows/pr-stale-close.yml"
      - ".github/workflows/pr-triage.yml"
      - ".octon/framework/agency/_ops/scripts/ai-gate/aggregate-decision.sh"
      - ".octon/framework/agency/_ops/scripts/git/git-pr-ship.sh"
      - ".octon/framework/agency/_ops/scripts/github/sync-github-labels.sh"
    owner_ref: "operator://octon-maintainers"
    support_scope: "Former autonomy-lane and AI-gate label projections in the live GitHub control plane."
    value_metric: "Checks and canonical authority artifacts, not labels, carry merge and gate posture."
    review_contract_ref: ".octon/instance/governance/contracts/retirement-review.yml"
    review_date: "2026-03-29"
    retirement_trigger:
      - "Phase 6 removed label-native control-plane behavior from live workflows and helper scripts."
    required_ablation_suite:
      - ".octon/framework/assurance/runtime/_ops/scripts/validate-phase6-simplification-deletion.sh"
      - ".octon/framework/agency/_ops/scripts/validate/validate-autonomy-labels.sh"
      - ".octon/framework/assurance/runtime/_ops/scripts/validate-execution-governance.sh"
    evidence_requirements:
      - ".octon/state/evidence/migration/2026-03-29-unified-execution-constitution-phase6-simplification-deletion/"
      - "ablation-deletion-receipt"
    retirement_path: "Completed on 2026-03-29 by deleting label-native control-plane projections and keeping host adapters projection-only."
