schema_version: "repo-retirement-policy-v2"
policy_id: "execution-constitution-build-to-delete"
owner: "Octon governance"
status: "active"
registry_ref: ".octon/instance/governance/contracts/retirement-registry.yml"
review_set_ref: ".octon/instance/governance/contracts/closeout-reviews.yml"
ablation_workflow_ref: ".octon/instance/governance/contracts/ablation-deletion-workflow.yml"
evidence_root: ".octon/state/evidence/validation/publication/build-to-delete/**"
scope:
  - ".octon/instance/bootstrap/OBJECTIVE.md"
  - ".octon/instance/cognition/context/shared/intent.contract.yml"
  - ".octon/framework/agency/governance/CONSTITUTION.md"
  - ".octon/framework/cognition/governance/CHARTER.md"
  - ".octon/framework/assurance/governance/CHARTER.md"
  - ".octon/framework/orchestration/runtime/_ops/scripts/write-decision.sh"
  - ".octon/framework/orchestration/runtime/_ops/scripts/write-run.sh"
  - ".octon/state/evidence/decisions/repo/**"
rules:
  - rule_id: "RET-001"
    statement: "Every compensating mechanism must be registered with owner, support scope, value metric, review date, retirement trigger, required ablation suite, evidence requirements, and retirement path."
  - rule_id: "RET-002"
    statement: "Historical or compatibility-only surfaces may remain only when the retirement registry marks them non-authoritative and drift review keeps them out of the live execution path."
  - rule_id: "RET-003"
    statement: "Deletion, demotion, or continued retention is valid only after drift-review, support-target-review, adapter-review, retirement-review, and ablation evidence are current."
  - rule_id: "RET-004"
    statement: "A final target-state claim fails closed when any registered target has no active owner, no future review date, or no retirement path."
retirement_statuses:
  - "registered"
  - "historical-retained"
  - "retired"
