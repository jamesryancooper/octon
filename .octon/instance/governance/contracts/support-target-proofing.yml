schema_version: "repo-governance-contract-v1"
contract_id: "support-target-proofing"
owner: "Octon governance"
status: "active"
purpose: "Require each admitted support-target tuple to carry a current proof bundle that links admission, dossier sufficiency, representative retained runs, proof planes, and disclosure coverage."
proof_bundle_schema_ref: ".octon/framework/constitution/contracts/assurance/support-target-proof-bundle-v1.schema.json"
proof_execution_validator_ref: ".octon/framework/assurance/runtime/_ops/scripts/validate-proof-bundle-executability.sh"
support_target_ref: ".octon/instance/governance/support-targets.yml"
support_dossier_root: ".octon/instance/governance/support-dossiers"
support_proof_bundle_root: ".octon/state/evidence/validation/support-targets"
support_card_projection_root: ".octon/generated/cognition/projections/materialized/support-cards"
execution_requirements:
  proof_mode: "runnable-or-replayable"
  positive_case_required: true
  negative_controls_required: true
triggers:
  - "Before widening any admitted tuple, host adapter, model adapter, locale, or capability-pack claim."
  - "When support-target admissions, support dossiers, or active release disclosure changes."
  - "Before any live support or closure claim cites an admitted tuple."
required_inputs:
  - ".octon/instance/governance/support-targets.yml"
  - ".octon/instance/governance/support-target-admissions/**"
  - ".octon/instance/governance/support-dossiers/**"
  - ".octon/instance/governance/contracts/support-dossier-evidence-depth.yml"
  - ".octon/instance/governance/disclosure/harness-card.yml"
required_bundle_contents:
  - "admission_ref"
  - "support_dossier_ref"
  - "proof_planes"
  - "scenario_evidence.representative_run_refs"
  - "scenario_evidence.negative_control_refs"
  - "scenario_evidence.lab_refs"
  - "execution_mode"
  - "execution_receipt_refs"
  - "scenario_matrix.positive_refs"
  - "scenario_matrix.negative_control_refs"
  - "replay_or_runner_ref"
  - "command_or_evaluator"
  - "evaluator_version"
  - "input_digests"
  - "output_digests"
  - "pass_fail_criteria"
  - "receipt_refs"
  - "result"
  - "disclosure_evidence.run_card_refs"
  - "disclosure_evidence.harness_card_ref"
  - "sufficiency.status"
  - "freshness.reviewed_at"
  - "freshness.review_due_at"
evidence_requirements:
  - "A current proof bundle for every admitted tuple cited by live support or release disclosure."
  - "Executable or replayable proof execution receipts for every admitted-live tuple claim."
  - "Any admitted-live repo-consequential tuple includes current Run Journal conformance and deterministic state-reconstruction proof in its retained receipts or validator outputs before the tuple may remain supported."
  - "Representative retained run disclosure for the tuple's admitted support posture."
  - "Negative-control or denied-scenario evidence showing unsupported or excluded flows remain non-live."
  - "Release disclosure coverage showing the tuple is either admitted-live or explicit non-live posture."
  - "Recovery or replay evidence for each admitted live tuple."
  - "A derived SupportCard or support-proof projection that traces only to retained evidence and durable authority."
blocking_rule: "Reject when an admitted tuple lacks a current proof bundle, executable or replayable proof execution, has degraded dossier sufficiency, is cited by live disclosure without representative retained run evidence and negative controls, or any admitted-live repo-consequential tuple lacks valid Run Journal conformance plus deterministic state-reconstruction proof."
execution_rule: "Metadata-only or summary-only proof is insufficient for admitted-live claims; executable or replayable proof receipts must be present or the tuple remains non-live."
retirement_path: "Retire only if proof-bundle coverage is subsumed by a stricter per-tuple support certification regime with equivalent fail-closed semantics."
