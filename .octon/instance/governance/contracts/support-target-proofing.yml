schema_version: "repo-governance-contract-v1"
contract_id: "support-target-proofing"
owner: "Octon governance"
status: "active"
purpose: "Require each admitted support-target tuple to carry a current proof bundle that links admission, dossier sufficiency, representative retained runs, proof planes, and disclosure coverage."
proof_bundle_schema_ref: ".octon/framework/constitution/contracts/assurance/support-target-proof-bundle-v1.schema.json"
support_target_ref: ".octon/instance/governance/support-targets.yml"
support_dossier_root: ".octon/instance/governance/support-dossiers"
triggers:
  - "Before widening any admitted tuple, host adapter, model adapter, locale, or capability-pack claim."
  - "When support-target admissions, support dossiers, or active release disclosure changes."
  - "Before any live support or closure claim cites an admitted tuple."
required_inputs:
  - ".octon/instance/governance/support-targets.yml"
  - ".octon/instance/governance/support-target-admissions/**"
  - ".octon/instance/governance/support-dossiers/**"
  - ".octon/instance/governance/contracts/support-dossier-evidence-depth.yml"
  - ".octon/instance/governance/disclosure/harness-card.yml"
required_bundle_contents:
  - "admission_ref"
  - "support_dossier_ref"
  - "proof_planes"
  - "scenario_evidence.representative_run_refs"
  - "scenario_evidence.negative_control_refs"
  - "disclosure_evidence.run_card_refs"
  - "sufficiency.status"
evidence_requirements:
  - "A current proof bundle for every admitted tuple cited by live support or release disclosure."
  - "Representative retained run disclosure for the tuple's admitted support posture."
  - "Negative-control or denied-scenario evidence showing unsupported or excluded flows remain non-live."
  - "Release disclosure coverage showing the tuple is either admitted-live or explicit non-live posture."
blocking_rule: "Reject when an admitted tuple lacks a current proof bundle, has degraded dossier sufficiency, or is cited by live disclosure without representative retained run evidence and negative controls."
retirement_path: "Retire only if proof-bundle coverage is subsumed by a stricter per-tuple support certification regime with equivalent fail-closed semantics."
