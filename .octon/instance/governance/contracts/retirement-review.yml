schema_version: "repo-governance-review-v1"
review_id: "retirement-review"
owner: "Octon governance"
status: "active"
purpose: "Keep every compensating mechanism registered, reviewed, and either retired, demoted, or explicitly retained with an ablation-backed path."
cutover_contract_ref: ".octon/framework/engine/runtime/spec/compatibility-retirement-cutover-v2.md"
triggers:
  - "Before any final target-state claim."
  - "When a retirement target reaches its review date or changes status."
  - "When a new compatibility shim, historical shim, or projection-only helper is introduced."
  - "When repo-hygiene emits a high-confidence transitional or historical finding."
cadence: "Quarterly while any registered or historical-retained target remains, and immediately before claim or support widening."
required_inputs:
  - ".octon/instance/governance/contracts/retirement-policy.yml"
  - ".octon/instance/governance/contracts/retirement-registry.yml"
  - ".octon/instance/governance/contracts/ablation-deletion-workflow.yml"
  - ".octon/instance/governance/policies/repo-hygiene.yml"
  - ".octon/state/evidence/validation/publication/build-to-delete/<packet>/repo-hygiene-findings.yml"
required_readiness_gates:
  - "canonical successor exists and is named"
  - "runtime, policy, and support-claim forbidden consumers are explicit"
  - "claim-adjacent projections are recorded in the non-authority register"
  - "direct-read or forbidden-consumer negative controls are retained"
  - "cutover evidence links the compatibility surface to its successor"
evidence_requirements:
  - "Approved retirement-review receipt under .octon/state/evidence/validation/publication/build-to-delete/<date>/retirement-review.yml"
  - "A current ablation-deletion receipt for every target evaluated in the release."
  - "A repo-hygiene findings attachment is present for closure-grade packets."
  - "Forbidden-consumer or direct-read negative-control evidence for claim-adjacent compatibility surfaces."
blocking_rule: "Reject when any registered target lacks owner, support scope, value metric, review date, retirement trigger, required ablation suite, evidence requirements, retirement path, explicit forbidden consumers, canonical successor linkage, or cutover evidence, or when a high-confidence repo-hygiene transitional or historical finding lacks same-change resolution, registration, or policy-backed reclassification."
retirement_path: "Retire only if an automated successor review owns the same registry completeness and ablation checks."
