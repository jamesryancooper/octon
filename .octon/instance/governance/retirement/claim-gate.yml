schema_version: "retirement-claim-gate-v1"
gate_id: "build-to-delete-claim-readiness"
owner: "Octon governance"
registry_ref: ".octon/instance/governance/contracts/retirement-registry.yml"
review_set_ref: ".octon/instance/governance/contracts/closeout-reviews.yml"
policy_ref: ".octon/instance/governance/contracts/retirement-policy.yml"
publication_evidence_root: ".octon/state/evidence/validation/publication/build-to-delete"
governance_evidence_root: ".octon/state/evidence/governance/build-to-delete"
current_governance_review_ref: ".octon/state/evidence/governance/build-to-delete/2026-04-06/retirement-claim-review.yml"
nonblocking_statuses:
  - "permanent-projection"
  - "retained-noncritical"
  - "historical-retained-noncritical"
  - "retired"
blocking_conditions:
  - "A non-retired target is missing owner_ref, review_date, retirement_trigger, required_ablation_suite, evidence_requirements, or retirement_path."
  - "A non-retired target is overdue on its review_date."
  - "The latest build-to-delete packet is missing, rejected, stale, or lacks an ablation evaluation for a non-retired target."
  - "The current governance review reports any open claim_blocking finding."
claim_ready_when:
  - "Every non-retired target has a nonblocking status."
  - "Every non-retired target is evaluated in the latest ablation-deletion receipt."
  - "Drift, support-target, adapter, and retirement reviews are approved in the latest build-to-delete packet."
  - "The latest ablation-deletion receipt is completed."
  - "The current governance review reports claim_ready: true and claim_blocking_count: 0."
