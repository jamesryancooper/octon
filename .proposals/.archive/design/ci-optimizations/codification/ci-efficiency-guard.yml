name: CI Efficiency Guard

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/scripts/ci-efficiency-guard.sh'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-efficiency-guard-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    name: enforce-ci-efficiency-policy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout PR merge commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.ref }}

      - name: Enforce CI efficiency policy
        run: |
          chmod +x .github/scripts/ci-efficiency-guard.sh
          .github/scripts/ci-efficiency-guard.sh
