name: pr
on:
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM:  ${{ secrets.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 10 }

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile || pnpm install

      - run: pnpm turbo run typecheck lint test --cache-dir=.turbo || pnpm turbo run typecheck --cache-dir=.turbo

      - run: pnpm turbo run build --filter=...[origin/main]

      - name: Init CodeQL
        uses: github/codeql-action/init@v3
        with: { languages: javascript }
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      - name: Semgrep Scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/ci
          generateSarif: "1"

      - name: Dependency Review
        uses: actions/dependency-review-action@v4

      - name: TruffleHog
        uses: trufflesecurity/trufflehog@v3
        with:
          scan: git
          extra_args: --since-commit HEAD~50

      - name: SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom/sbom.spdx.json

      - name: OpenAPI breaking-change check (oasdiff)
        uses: oasdiff/oasdiff-action/diff@main
        with:
          base: packages/contracts/openapi-base.yaml
          revision: packages/contracts/openapi.yaml

  skills-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tiktoken for accurate token counting
        run: pip install tiktoken

      - name: Validate skills (manifest, registry, SKILL.md consistency)
        run: .harmony/skills/scripts/validate-skills.sh --strict

      - name: Check documentation examples match implementation
        run: |
          # Verify that SKILL.md name fields match directory names
          for skill_dir in .harmony/skills/*/; do
            skill_name=$(basename "$skill_dir")
            if [[ "$skill_name" == "_template" ]] || [[ "$skill_name" == "scripts" ]]; then
              continue
            fi
            skill_md="$skill_dir/SKILL.md"
            if [[ -f "$skill_md" ]]; then
              name_field=$(grep -E "^name:" "$skill_md" | head -1 | sed 's/name:\s*//' | tr -d '"' | tr -d "'" | xargs)
              if [[ "$name_field" != "$skill_name" ]]; then
                echo "ERROR: SKILL.md name '$name_field' does not match directory '$skill_name'"
                exit 1
              fi
            fi
          done
          echo "Documentation validation passed"

  python:
    if: ${{ hashFiles('apps/ai-gateway/pyproject.toml') != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14.0'
      - uses: astral-sh/setup-uv@v3
      - name: Install deps (uv sync)
        working-directory: apps/ai-gateway
        run: uv sync --all-extras
      - name: Lint (ruff) + Format check (black)
        working-directory: apps/ai-gateway
        run: uv run ruff check . && uv run black --check .
      - name: Typecheck (mypy)
        working-directory: apps/ai-gateway
        run: uv run mypy app
      - name: Tests (pytest)
        working-directory: apps/ai-gateway
        run: uv run pytest -q
      - name: Python license scan
        working-directory: apps/ai-gateway
        run: uv run pip-licenses --format=json --output-file reports/pip-licenses.json || true

  preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile || pnpm install
      - name: Vercel pull env
        run: npx vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build (prebuilt artifacts)
        run: npx vercel build --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy preview
        id: deploy
        run: echo "url=$(npx vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})" >> $GITHUB_OUTPUT
      - name: Comment Preview URL
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Vercel Preview: ${{ steps.deploy.outputs.url }}`
            })
