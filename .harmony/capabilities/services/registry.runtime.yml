format_version: services-registry-v1
services:
  interfaces/filesystem-graph:
    owner: agency/platform
    risk_tier: medium
    approvals:
      invoke: none
      writes: human_if_outside_scope
    depends_on: []
    io:
      state_dir: .harmony/runtime/_ops/state/snapshots
    notes:
      - Snapshot artifacts are deterministic overlays over repository files.
      - Graph nodes resolve to relative filesystem paths.
    observability:
      log_events: true
      trace_inputs: redacted
      trace_outputs: redacted
  interfaces/kv:
    owner: agency/platform
    risk_tier: low
    approvals:
      invoke: none
      writes: human_if_outside_scope
    depends_on: []
    io:
      state_dir: .harmony/runtime/_ops/state/kv
    notes:
      - Values are UTF-8 strings in v1.
      - Keys are case-sensitive.
    observability:
      log_events: true
      trace_inputs: redacted
      trace_outputs: redacted
