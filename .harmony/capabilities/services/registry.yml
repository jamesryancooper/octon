schema_version: "1.0"

services:
  guard:
    version: "0.1.0"
    commands: [check, sanitize]
    parameters:
      - name: content
        type: text
        required: true
        description: "Content to inspect or sanitize."
    dependencies:
      requires: []
      orchestrates: []
      integratesWith: [prompt, flow]
    contracts:
      input: governance/guard/schema/input.schema.json
      output: governance/guard/schema/output.schema.json
      rules: governance/guard/rules/rules.yml
      fixtures: governance/guard/fixtures/
      invariants: governance/guard/contracts/invariants.md
      errors: governance/guard/contracts/errors.yml
      compatibility: governance/guard/compatibility.yml
      generation_manifest: governance/guard/impl/generated.manifest.json
    observability:
      service_name: harmony.service.guard
      required_spans: [service.guard.check, service.guard.sanitize]
    policy:
      enforcement: block
      fail_closed: true
    idempotency:
      required: false
      key_from: [contentHash, checkType]
    impl:
      entrypoint: governance/guard/impl/guard.sh

  prompt:
    version: "0.1.0"
    commands: [compile]
    parameters:
      - name: promptId
        type: text
        required: true
        description: "Prompt identifier to compile."
    dependencies:
      requires: []
      orchestrates: []
      integratesWith: [guard, flow]
    contracts:
      input: modeling/prompt/schema/input.schema.json
      output: modeling/prompt/schema/output.schema.json
      rules: modeling/prompt/rules/rules.yml
      fixtures: modeling/prompt/fixtures/
      invariants: modeling/prompt/contracts/invariants.md
      errors: modeling/prompt/contracts/errors.yml
      compatibility: modeling/prompt/compatibility.yml
      generation_manifest: modeling/prompt/impl/generated.manifest.json
    observability:
      service_name: harmony.service.prompt
      required_spans: [service.prompt.compile]
    policy:
      enforcement: block
      fail_closed: true
    idempotency:
      required: false
      key_from: [promptId, variablesHash, variantId]
    impl:
      entrypoint: modeling/prompt/impl/prompt.sh

  cost:
    version: "0.1.0"
    commands: [estimate, record]
    parameters:
      - name: operation
        type: text
        required: true
        description: "Operation mode: estimate or record."
    dependencies:
      requires: []
      orchestrates: []
      integratesWith: [flow, prompt]
    contracts:
      input: operations/cost/schema/input.schema.json
      output: operations/cost/schema/output.schema.json
      rules: operations/cost/rules/rules.yml
      fixtures: operations/cost/fixtures/
      invariants: operations/cost/contracts/invariants.md
      errors: operations/cost/contracts/errors.yml
      compatibility: operations/cost/compatibility.yml
      generation_manifest: operations/cost/impl/generated.manifest.json
    observability:
      service_name: harmony.service.cost
      required_spans: [service.cost.estimate, service.cost.record]
    policy:
      enforcement: block
      fail_closed: false
    idempotency:
      required: true
      key_from: [model, inputTokens, outputTokens, workflowType]
    impl:
      entrypoint: operations/cost/impl/cost.sh

  flow:
    version: "0.1.0"
    commands: [run]
    parameters:
      - name: config
        type: object
        required: true
        description: "Flow execution config."
    dependencies:
      requires: []
      orchestrates: [prompt, guard, cost]
      integratesWith: []
    contracts:
      input: planning/flow/schema/input.schema.json
      output: planning/flow/schema/output.schema.json
      rules: planning/flow/rules/rules.yml
      fixtures: planning/flow/fixtures/
      invariants: planning/flow/contracts/invariants.md
      errors: planning/flow/contracts/errors.yml
      compatibility: planning/flow/compatibility.yml
      generation_manifest: planning/flow/impl/generated.manifest.json
    observability:
      service_name: harmony.service.flow
      required_spans: [service.flow.run]
    policy:
      enforcement: block
      fail_closed: true
    idempotency:
      required: true
      key_from: [flowName, canonicalPromptPath, workflowManifestPath]
    impl:
      entrypoint: planning/flow/impl/flow-client.sh

  agent-platform:
    version: "0.1.0"
    commands: [context-budget, validate-session-policy, negotiate-capabilities, memory-flush-evidence]
    parameters:
      - name: command
        type: text
        required: true
        description: "Operation mode: context-budget, validate-session-policy, or negotiate-capabilities."
    dependencies:
      requires: []
      orchestrates: []
      integratesWith: [flow, cost]
    contracts:
      input: interfaces/agent-platform/schema/input.schema.json
      output: interfaces/agent-platform/schema/output.schema.json
      rules: interfaces/agent-platform/rules/rules.yml
      fixtures: interfaces/agent-platform/fixtures/
      invariants: interfaces/agent-platform/contracts/invariants.md
      errors: interfaces/agent-platform/contracts/errors.yml
      compatibility: interfaces/agent-platform/compatibility.yml
      generation_manifest: interfaces/agent-platform/impl/generated.manifest.json
    observability:
      service_name: harmony.service.agent-platform
      required_spans: [service.agent-platform.context-budget, service.agent-platform.validate-session-policy, service.agent-platform.negotiate-capabilities, service.agent-platform.memory-flush-evidence]
    policy:
      enforcement: block
      fail_closed: true
    idempotency:
      required: true
      key_from: [sessionId, policyId, budgetSnapshotHash]
    impl:
      entrypoint: interfaces/agent-platform/impl/context-budget.sh

  query:
    version: "0.1.0"
    commands: [ask, retrieve, explain]
    parameters:
      - name: command
        type: text
        required: true
        description: "Operation mode: ask, retrieve, or explain."
      - name: query
        type: text
        required: true
        description: "Natural-language query text."
      - name: index.snapshot
        type: text
        required: true
        description: "External snapshot path or ID containing keyword/graph/chunk artifacts."
    dependencies:
      requires: []
      orchestrates: []
      integratesWith: []
    contracts:
      input: retrieval/query/schema/input.schema.json
      output: retrieval/query/schema/output.schema.json
      rules: retrieval/query/rules/rules.yml
      fixtures: retrieval/query/fixtures/
      invariants: retrieval/query/contracts/invariants.md
      errors: retrieval/query/contracts/errors.yml
      compatibility: retrieval/query/compatibility.yml
      generation_manifest: retrieval/query/impl/generated.manifest.json
    observability:
      service_name: harmony.service.query
      required_spans: [service.query.ask, service.query.retrieve, service.query.explain]
    policy:
      enforcement: block
      fail_closed: true
    idempotency:
      required: false
      key_from: [queryHash, snapshotId, strategyHash]
    impl:
      entrypoint: retrieval/query/impl/query.sh

  filesystem-snapshot:
    version: "0.1.0"
    commands:
      [fs.list, fs.read, fs.stat, fs.search, snapshot.build, snapshot.diff, snapshot.get-current]
    parameters:
      - name: command
        type: text
        required: true
        description: "Filesystem-snapshot operation command."
      - name: snapshot_id
        type: text
        required: false
        description: "Optional snapshot id (defaults to active snapshot pointer)."
      - name: payload
        type: object
        required: true
        description: "Operation payload."
    dependencies:
      requires: []
      orchestrates: []
      integratesWith: [filesystem-discovery, query, agent-platform]
    contracts:
      input: interfaces/filesystem-snapshot/schema/input.schema.json
      output: interfaces/filesystem-snapshot/schema/output.schema.json
      rules: interfaces/filesystem-snapshot/rules/rules.yml
      fixtures: interfaces/filesystem-snapshot/fixtures/
      invariants: interfaces/filesystem-snapshot/contracts/invariants.md
      errors: interfaces/filesystem-snapshot/contracts/errors.yml
      compatibility: interfaces/filesystem-snapshot/compatibility.yml
      generation_manifest: interfaces/filesystem-snapshot/impl/generated.manifest.json
    observability:
      service_name: harmony.service.filesystem-snapshot
      required_spans: [service.filesystem-snapshot.fs, service.filesystem-snapshot.snapshot]
    policy:
      enforcement: block
      fail_closed: true
    idempotency:
      required: true
      key_from: [command, snapshotId, payloadHash]
    impl:
      entrypoint: runtime/run tool interfaces/filesystem-snapshot

  filesystem-discovery:
    version: "0.1.0"
    commands:
      [
        kg.get-node,
        kg.neighbors,
        kg.traverse,
        kg.resolve-to-file,
        discover.start,
        discover.expand,
        discover.explain,
        discover.resolve
      ]
    parameters:
      - name: command
        type: text
        required: true
        description: "Filesystem-discovery operation command."
      - name: snapshot_id
        type: text
        required: false
        description: "Optional snapshot id (defaults to active snapshot pointer)."
      - name: payload
        type: object
        required: true
        description: "Operation payload."
    dependencies:
      requires: [filesystem-snapshot]
      orchestrates: []
      integratesWith: [query, agent-platform]
    contracts:
      input: interfaces/filesystem-discovery/schema/input.schema.json
      output: interfaces/filesystem-discovery/schema/output.schema.json
      rules: interfaces/filesystem-discovery/rules/rules.yml
      fixtures: interfaces/filesystem-discovery/fixtures/
      invariants: interfaces/filesystem-discovery/contracts/invariants.md
      errors: interfaces/filesystem-discovery/contracts/errors.yml
      compatibility: interfaces/filesystem-discovery/compatibility.yml
      generation_manifest: interfaces/filesystem-discovery/impl/generated.manifest.json
    observability:
      service_name: harmony.service.filesystem-discovery
      required_spans: [service.filesystem-discovery.kg, service.filesystem-discovery.discover]
    policy:
      enforcement: block
      fail_closed: true
    idempotency:
      required: true
      key_from: [command, snapshotId, payloadHash]
    impl:
      entrypoint: runtime/run tool interfaces/filesystem-discovery

  filesystem-watch:
    version: "0.1.0"
    commands: [watch.poll]
    parameters:
      - name: command
        type: text
        required: true
        description: "Filesystem-watch operation command."
      - name: payload
        type: object
        required: true
        description: "Operation payload."
    dependencies:
      requires: [filesystem-snapshot]
      orchestrates: []
      integratesWith: [filesystem-discovery]
    contracts:
      input: interfaces/filesystem-watch/schema/input.schema.json
      output: interfaces/filesystem-watch/schema/output.schema.json
      rules: interfaces/filesystem-watch/rules/rules.yml
      fixtures: interfaces/filesystem-watch/fixtures/
      invariants: interfaces/filesystem-watch/contracts/invariants.md
      errors: interfaces/filesystem-watch/contracts/errors.yml
      compatibility: interfaces/filesystem-watch/compatibility.yml
      generation_manifest: interfaces/filesystem-watch/impl/generated.manifest.json
    observability:
      service_name: harmony.service.filesystem-watch
      required_spans: [service.filesystem-watch.poll]
    policy:
      enforcement: block
      fail_closed: true
    idempotency:
      required: true
      key_from: [root, stateKey, payloadHash]
    impl:
      entrypoint: runtime/run tool interfaces/filesystem-watch
