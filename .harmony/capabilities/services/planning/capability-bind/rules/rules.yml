version: "1.0.0"
rules:
  - id: capability-bind.schema.input
    description: Input schema must exist.
    category: structural
    severity: critical
    condition:
      type: file_exists
      path: schema/input.schema.json
    target:
      kind: file
      selector: schema/input.schema.json
    action:
      mode: block
      code: INPUT_SCHEMA_MISSING
      message: Missing capability-bind input schema.

  - id: capability-bind.schema.output
    description: Output schema must exist.
    category: structural
    severity: critical
    condition:
      type: file_exists
      path: schema/output.schema.json
    target:
      kind: file
      selector: schema/output.schema.json
    action:
      mode: block
      code: OUTPUT_SCHEMA_MISSING
      message: Missing capability-bind output schema.

  - id: capability-bind.output.keys
    description: Capability-bind output must include result key families.
    category: semantic
    severity: high
    condition:
      type: output_has_keys
      keys: [status, command, result]
    target:
      kind: output
      selector: $.result
    action:
      mode: block
      code: CAPABILITY_BIND_OUTPUT_INVALID
      message: Capability-bind output missing required fields.
