version: "1.0.0"
rules:
  - id: replan.schema.input
    description: Input schema must exist.
    category: structural
    severity: critical
    condition:
      type: file_exists
      path: schema/input.schema.json
    target:
      kind: file
      selector: schema/input.schema.json
    action:
      mode: block
      code: INPUT_SCHEMA_MISSING
      message: Missing replan input schema.

  - id: replan.schema.output
    description: Output schema must exist.
    category: structural
    severity: critical
    condition:
      type: file_exists
      path: schema/output.schema.json
    target:
      kind: file
      selector: schema/output.schema.json
    action:
      mode: block
      code: OUTPUT_SCHEMA_MISSING
      message: Missing replan output schema.

  - id: replan.output.keys
    description: Replan output must include status, command, and result.
    category: semantic
    severity: high
    condition:
      type: output_has_keys
      keys: [status, command, result]
    target:
      kind: output
      selector: $.result
    action:
      mode: block
      code: REPLAN_OUTPUT_INVALID
      message: Replan output missing required fields.
