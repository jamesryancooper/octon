version: "1.0.0"
errors:
  - code: InputValidationError
    category: structural
    exit_code: 5
    retryable: false
    operator_action: "Fix payload to match schema/input.schema.json."
  - code: UnsupportedCommandError
    category: structural
    exit_code: 5
    retryable: false
    operator_action: "Use 'generate' or 'validate'."
  - code: MissingPlanError
    category: dependency
    exit_code: 5
    retryable: false
    operator_action: "Provide planPath or inline plan."
  - code: ContingencyGenerationError
    category: runtime
    exit_code: 4
    retryable: false
    operator_action: "Review failed steps and dependency graph."
  - code: ContingencyUnavailableError
    category: runtime
    exit_code: 4
    retryable: false
    operator_action: "Cannot generate valid fallback for provided failures."
