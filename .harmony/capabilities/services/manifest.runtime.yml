format_version: services-manifest-v1
services:
  - id: interfaces/kv
    name: kv
    category: interfaces
    summary: Local key/value storage.
    triggers:
      - state
      - memory
      - kv
    runtime:
      type: wasm
      path: interfaces/kv/service.json
  - id: planning/flow
    name: flow
    category: planning
    summary: Native-first flow execution with optional external HTTP adapter.
    triggers:
      - workflow
      - orchestration
      - flow
    runtime:
      type: wasm
      path: planning/flow/service.json
