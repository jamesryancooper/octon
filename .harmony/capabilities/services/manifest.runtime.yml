format_version: services-manifest-v1
services:
  - id: interfaces/filesystem-graph
    name: filesystem-graph
    category: interfaces
    summary: Filesystem operations, deterministic snapshots, and graph discovery.
    triggers:
      - filesystem
      - graph
      - discovery
      - snapshot
    runtime:
      type: wasm
      path: interfaces/filesystem-graph/service.json
  - id: interfaces/kv
    name: kv
    category: interfaces
    summary: Local key/value storage.
    triggers:
      - state
      - memory
      - kv
    runtime:
      type: wasm
      path: interfaces/kv/service.json
