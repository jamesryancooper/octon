# Skills Registry (Extended Metadata + I/O Mappings)
# Full skill definitions for routing validation and execution.
# Agents load manifest.yml first, then this file after matching.
#
# Load Order:
#   1. manifest.yml      - Skill discovery index
#   2. capabilities.yml  - Capability schema (skill sets, valid capabilities, refs)
#   3. registry.yml      - Extended skill metadata + I/O mappings (this file)
#
# Single Source of Truth:
#   - SKILL.md frontmatter: name, description, allowed-tools (AUTHORITATIVE)
#   - capabilities.yml: skill_set_definitions, valid_capabilities, capability_refs
#   - This file: version, commands, parameters, requires, depends_on, io
#
# Fields:
#   version          - Semantic version string
#   commands         - Slash commands that invoke this skill
#   parameters       - Input parameters the skill accepts
#   requires.context - Context conditions for skill activation
#   depends_on       - Other skills this skill requires
#   io.inputs        - Input paths (supports {{placeholders}})
#   io.outputs       - Output paths (supports {{placeholders}})
#
# Parameter Schema:
#   name        - Parameter identifier
#   type        - text | boolean | file | folder
#   required    - true | false
#   default     - Default value (if not required)
#   description - Human-readable description
#
# I/O Schema:
#   path         - File path relative to skills/ dir (supports {{placeholders}})
#   kind         - file | directory (default: file)
#   format       - markdown | json | yaml | text | binary
#   required     - true | false (for inputs, default: true)
#   determinism  - stable (same input = same output) | variable | unique
#   description  - Human-readable description
#
# Directory Structure:
# All operational categories follow the {category}/{skill-id}/ pattern:
#
#   configs/{skill-id}/       - Per-skill configuration overrides
#   resources/{skill-id}/     - Per-skill input resources (notes, docs, data)
#   runs/{skill-id}/{run-id}/ - Execution state (checkpoints, manifests) for recovery
#   logs/{skill-id}/{run-id}.md - Execution logs
#
# Note: The pattern "use skill: {{id}}" is universal and does not need
# per-skill configuration. Agents recognize this pattern automatically.

schema_version: "3.0"

# Global routing rules
routing:
  # If true, only explicit /commands trigger skills (no trigger matching)
  explicit_command_required: false
  # How to handle ambiguous matches: "ask" | "first_match" | "most_specific"
  ambiguity_resolution: "ask"

# Extended skill metadata (keyed by id)
skills:
  synthesize-research:
    version: "1.0.1"
    commands:
      - /synthesize-research
    parameters:
      - name: research_folder
        type: folder
        required: true
        description: "Folder containing research notes (.md files)"
    requires:
      context: []
    depends_on: []
    io:
      inputs:
        - path: "resources/synthesize-research/projects/{{project}}/"
          kind: directory
          required: true
          description: "Project folder containing research notes"
        - path: "resources/synthesize-research/{{topic}}/"
          kind: directory
          required: false
          description: "Additional source materials by topic"
      outputs:
        - name: synthesis_document
          path: "../../output/drafts/{{topic}}-synthesis.md"
          kind: file
          format: markdown
          determinism: stable
          description: "Consolidated findings document with themes and evidence"
        - name: run_log
          path: "logs/synthesize-research/{{run_id}}.md"
          kind: file
          format: markdown
          determinism: unique
          description: "Execution log capturing inputs, outputs, and processing notes"
        - name: log_index
          path: "logs/synthesize-research/index.yml"
          kind: file
          format: yaml
          determinism: variable
          description: "Index of all synthesize-research runs with metadata"
        - name: top_log_index
          path: "logs/index.yml"
          kind: file
          format: yaml
          determinism: variable
          description: "Top-level log index (cross-skill)"

  refine-prompt:
    version: "2.1.1"
    commands:
      - /refine-prompt
    parameters:
      - name: raw_prompt
        type: text
        required: true
        description: "The raw prompt text to refine (inline or file path)"
      - name: execute
        type: boolean
        required: false
        default: false
        description: "Execute the refined prompt after saving"
      - name: context_depth
        type: text
        required: false
        default: "standard"
        description: "How deep to analyze repository context (minimal, standard, deep)"
      - name: skip_confirmation
        type: boolean
        required: false
        default: false
        description: "Skip intent confirmation step"
    requires:
      context: []
    depends_on: []
    io:
      inputs:
        - path: "resources/refine-prompt/prompts/"
          kind: directory
          required: false
          description: "Optional folder containing prompt source files"
      outputs:
        - name: refined_prompt
          path: "../../scaffolding/prompts/{{timestamp}}-refined.md"
          kind: file
          format: markdown
          determinism: stable
          description: "The refined, improved prompt ready for execution"
        - name: run_log
          path: "logs/refine-prompt/{{run_id}}.md"
          kind: file
          format: markdown
          determinism: unique
          description: "Execution log with input, context analyzed, and output summary"
        - name: log_index
          path: "logs/refine-prompt/index.yml"
          kind: file
          format: yaml
          determinism: variable
          description: "Index of all refine-prompt runs with metadata"
        - name: top_log_index
          path: "logs/index.yml"
          kind: file
          format: yaml
          determinism: variable
          description: "Top-level log index (cross-skill)"

  refactor:
    version: "1.0.0"
    commands:
      - /refactor
    parameters:
      - name: scope
        type: text
        required: true
        description: "What to refactor: 'old-pattern → new-pattern'"
      - name: file_types
        type: text
        required: false
        default: "md,yml,yaml,json,ts,js"
        description: "Comma-separated file extensions to search"
      - name: dry_run
        type: boolean
        required: false
        default: false
        description: "Execute phases 1-3 only (audit and plan)"
      - name: exclusions
        type: text
        required: false
        default: "node_modules,.git,dist"
        description: "Comma-separated patterns to skip"
    requires:
      context: []
    depends_on: []
    io:
      inputs: []
      outputs:
        - name: refactor_artifacts
          path: "runs/refactor/{{refactor_id}}/"
          kind: directory
          format: markdown
          determinism: unique
          description: "Refactor execution state (checkpoint, manifests, reports) for recovery"
        - name: run_log
          path: "logs/refactor/{{refactor_id}}.md"
          kind: file
          format: markdown
          determinism: unique
          description: "Execution log for this refactor run"
        - name: log_index
          path: "logs/refactor/index.yml"
          kind: file
          format: yaml
          determinism: variable
          description: "Index of all refactor runs with metadata"
        - name: top_log_index
          path: "logs/index.yml"
          kind: file
          format: yaml
          determinism: variable
          description: "Top-level log index (cross-skill)"

  create-skill:
    version: "1.0.0"
    commands:
      - /create-skill
    parameters:
      - name: skill_name
        type: text
        required: true
        description: "Skill identifier (kebab-case, 1-64 characters)"
      - name: description
        type: text
        required: false
        description: "Initial description for SKILL.md"
      - name: skill_sets
        type: text
        required: false
        default: ""
        description: "Comma-separated skill sets (executor, coordinator, delegator, collaborator, integrator, specialist, guardian)"
      - name: capabilities
        type: text
        required: false
        default: ""
        description: "Comma-separated additional capabilities beyond skill set bundles"
    requires:
      context:
        - type: directory_exists
          path: ".harmony/capabilities/skills/_template/"
          description: "Requires skill template directory"
    depends_on: []
    io:
      inputs: []
      outputs:
        - name: skill_directory
          path: "{{skill_name}}/"
          kind: directory
          description: "The created skill directory (deliverable)"
        - name: scaffold_artifacts
          path: "runs/create-skill/{{run_id}}/"
          kind: directory
          format: yaml
          determinism: unique
          description: "Execution state (checkpoint and summary) for session recovery"
        - name: run_log
          path: "logs/create-skill/{{run_id}}.md"
          kind: file
          format: markdown
          determinism: unique
          description: "Execution log for this skill creation"
        - name: skill_log_index
          path: "logs/create-skill/index.yml"
          kind: file
          format: yaml
          determinism: variable
          description: "Index of all create-skill runs with metadata"
        - name: top_log_index
          path: "logs/index.yml"
          kind: file
          format: yaml
          determinism: variable
          description: "Top-level log index (cross-skill)"

# Pipelines
pipelines:
  - id: research-synthesis
    name: Research Synthesis Pipeline
    description: "Synthesize project findings"
    use_case: "When you have a project ready for consolidation"
    steps:
      - synthesize-research
    inputs:
      - path: "resources/synthesize-research/projects/{{project}}/"
        kind: directory
    outputs:
      - path: "../../output/drafts/{{project}}-synthesis.md"
        kind: file
        format: markdown
    invocation: "/synthesize-research resources/synthesize-research/projects/{{project}}/"
