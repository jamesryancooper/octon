# Skills Manifest (Tier 1 Discovery)
# Compact index for agent routing - load this first.
# Extended metadata lives in registry.yml.
#
# Token Budget: ~50 tokens/entry (see progressive-disclosure.md)
#
# Fields:
#   id           - Unique identifier (matches directory name and SKILL.md name)
#                  Format: lowercase, hyphens only (per agentskills.io spec)
#   display_name - Human-readable display name
#                  Convention: Title Case derived from id (e.g., "refine-prompt" → "Refine Prompt")
#   path         - Relative path to skill directory
#   summary      - One-line description for routing decisions
#                  Should align with first sentence of SKILL.md description
#   status       - Lifecycle state: active | deprecated | experimental
#   tags         - Freeform labels for filtering/grouping
#   triggers     - Natural language phrases for intent matching
#   skill_sets   - Capability bundles: executor, coordinator, delegator, collaborator, integrator, specialist, guardian
#   capabilities - Additional capabilities beyond skill set bundles (see registry.yml for valid values)

schema_version: "2.0"
default: null

skills:
  - id: synthesize-research
    display_name: Synthesize Research
    path: synthesize-research/
    summary: "Synthesize scattered research notes into coherent findings."
    status: active
    tags:
      - research
      - synthesis
      - documentation
    triggers:
      - "synthesize my research"
      - "consolidate findings"
      - "summarize research notes"
    skill_sets:
      - executor
    capabilities:
      - domain-specialized

  - id: refine-prompt
    display_name: Refine Prompt
    path: refine-prompt/
    summary: "Context-aware prompt refinement with persona assignment."
    status: active
    tags:
      - prompt
      - refinement
      - context-aware
    triggers:
      - "refine my prompt"
      - "improve this prompt"
      - "expand this prompt"
      - "spell check my prompt"
      - "clarify my prompt"
      - "analyze and improve my prompt"
    skill_sets:
      - executor
      - collaborator
    capabilities: []

  - id: refactor
    display_name: Refactor
    path: refactor/
    summary: "Execute verified codebase refactor with exhaustive audit."
    status: active
    tags:
      - refactor
      - rename
      - codebase
      - verification
    triggers:
      - "refactor this"
      - "rename across codebase"
      - "move and update references"
      - "systematic rename"
      - "refactor the pattern"
    skill_sets:
      - executor
      - guardian
    capabilities:
      - resumable

  - id: create-skill
    display_name: Create Skill
    path: create-skill/
    summary: "Scaffold a new skill from template with registry entry."
    status: active
    tags:
      - scaffolding
      - skills
      - generator
      - workflow
    triggers:
      - "create a new skill"
      - "scaffold a skill"
      - "generate skill boilerplate"
      - "add a new skill"
    skill_sets:
      - executor
    capabilities:
      - self-validating
