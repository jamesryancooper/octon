# Skills Manifest (Tier 1 Discovery)
# Compact index for agent routing - load this first.
# Extended metadata lives in registry.yml.
#
# Token Budget: ~50 tokens/entry (see progressive-disclosure.md)
#
# Fields:
#   id           - Unique identifier (matches directory name and SKILL.md name)
#                  Format: lowercase, hyphens only (per agentskills.io spec)
#   display_name - Human-readable display name
#                  Convention: Title Case derived from id (e.g., "refine-prompt" → "Refine Prompt")
#   path         - Relative path to skill directory
#   summary      - One-line description for routing decisions
#                  Should align with first sentence of SKILL.md description
#   status       - Lifecycle state: active | deprecated | experimental | draft
#   tags         - Freeform labels for filtering/grouping
#   triggers     - Natural language phrases for intent matching
#   group        - Skill group for directory organization: quality-gate, synthesis, meta, foundations
#                  Resolved via skill_group_definitions in capabilities.yml
#   skill_sets   - Capability bundles: executor, coordinator, delegator, collaborator, integrator, specialist, guardian
#   capabilities - Additional capabilities beyond skill set bundles (see registry.yml for valid values)

schema_version: "2.0"
default: null

