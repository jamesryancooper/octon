# Commands Manifest
# Lightweight index for command discovery.
# Commands are atomic, deterministic operations invoked by name.
#
# Fields:
#   id             - Unique identifier (matches filename without .md)
#   display_name   - Human-readable name
#   path           - Relative path to command file
#   summary        - One-line description (from frontmatter)
#   access         - human | agent
#   argument_hint  - Expected arguments (optional)

schema_version: "1.0"

commands:
  - id: init
    display_name: Initialize Project
    path: init.md
    summary: Generate project-level bootstrap files from .harmony templates.
    access: human
    argument_hint: "[@project-root] [--force] [--no-claude-alias] [--with-boot-files] [--with-agent-platform-adapters] [--agent-platform-adapters <csv>]"

  - id: studio
    display_name: Launch Studio
    path: studio.md
    summary: Launch Harmony Studio for workflow graph design, inspection, and safe staged edits.
    access: human
    argument_hint: "[--root <project-root>]"

  - id: recover
    display_name: Recover from Errors
    path: recover.md
    summary: Recovery procedures for common agent failure modes.
    access: human

  - id: validate-frontmatter
    display_name: Validate Frontmatter
    path: validate-frontmatter.md
    summary: Validate YAML frontmatter in markdown files.
    access: human

  - id: context-budget
    display_name: Context Budget
    path: context-budget.md
    summary: Emit deterministic native context budget state and threshold classification.
    access: human
    argument_hint: "--limit <int> --used <int> [--unit tokens|characters] [--report <path>]"

  - id: validate-session-policy
    display_name: Validate Session Policy
    path: validate-session-policy.md
    summary: Validate a session policy JSON file against native interop semantics.
    access: human
    argument_hint: "--file <path-to-session-policy-json>"

  - id: validate-platform-interop
    display_name: Validate Platform Interop
    path: validate-platform-interop.md
    summary: Run native-first interop checks across core independence, adapter conformance, and degradation behavior.
    access: human
    argument_hint: "[--mode all|services-core|platform-core|adapters|conformance|degradation]"

  - id: query-ask
    display_name: Query Ask
    path: query-ask.md
    summary: Run query service in ask mode and return grounded answer output.
    access: human
    argument_hint: "--file <path-to-query-json>"

  - id: query-retrieve
    display_name: Query Retrieve
    path: query-retrieve.md
    summary: Run query service in retrieve mode and return ranked candidates.
    access: human
    argument_hint: "--file <path-to-query-json>"

  - id: query-explain
    display_name: Query Explain
    path: query-explain.md
    summary: Run query service in explain mode and return ranking rationale.
    access: human
    argument_hint: "--file <path-to-query-json>"

  - id: create-workflow
    display_name: Create Workflow
    path: create-workflow.md
    summary: Scaffold a new workflow with gap-aware structure.
    access: human
    argument_hint: "<workflow-id>"

  - id: evaluate-workflow
    display_name: Evaluate Workflow
    path: evaluate-workflow.md
    summary: Assess a workflow against quality criteria and gap coverage.
    access: human
    argument_hint: "<path>"

  - id: update-workflow
    display_name: Update Workflow
    path: update-workflow.md
    summary: Modify an existing workflow to add features or fix gaps.
    access: human
    argument_hint: "<path>"

  - id: refactor
    display_name: Refactor
    path: refactor.md
    summary: Execute a verified codebase refactor with exhaustive audit and mandatory verification.
    access: human
    argument_hint: "<old-pattern> <new-pattern>"
