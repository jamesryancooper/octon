version: "1.0.0"
errors:
  - code: InputValidationError
    category: structural
    exit_code: 5
    retryable: false
    operator_action: "Fix flow request payload to satisfy schema/input.schema.json."
  - code: UpstreamProviderError
    category: dependency
    exit_code: 6
    retryable: true
    operator_action: "Check Flow runner endpoint and retry when runtime is healthy."
