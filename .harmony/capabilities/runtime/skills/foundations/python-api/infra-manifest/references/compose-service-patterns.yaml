# Docker Compose service block patterns for local development.
#
# Include only the services your project declares. Replace {{PROJECT_SHORT}}
# with a short project identifier (e.g., "myapp") and {{DB_NAME}} with the
# database name.

version: "3.9"

services:

  # --- postgres ---
  postgres:
    image: postgres:16.6-alpine
    container_name: {{PROJECT_SHORT}}-postgres
    environment:
      POSTGRES_DB: {{DB_NAME}}
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d {{DB_NAME}}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- nats (with JetStream + monitoring) ---
  nats:
    image: nats:2.10.27-alpine
    container_name: {{PROJECT_SHORT}}-nats
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data

  # --- redis ---
  redis:
    image: redis:7.4.2-alpine
    container_name: {{PROJECT_SHORT}}-redis
    ports:
      - "6379:6379"

  # --- minio (S3-compatible object store) ---
  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: {{PROJECT_SHORT}}-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # --- minio-init (auto-included with minio) ---
  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    container_name: {{PROJECT_SHORT}}-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      /usr/bin/mc mb --ignore-existing local/{{BUCKET_NAME}};
      /usr/bin/mc anonymous set none local/{{BUCKET_NAME}};
      exit 0;
      "

  # --- temporal (workflow orchestration) ---
  temporal:
    image: temporalio/auto-setup:1.27.2
    container_name: {{PROJECT_SHORT}}-temporal
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PWD: postgres
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    ports:
      - "7233:7233"

  # --- temporal-ui (auto-included with temporal) ---
  temporal-ui:
    image: temporalio/ui:2.33.0
    container_name: {{PROJECT_SHORT}}-temporal-ui
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_UI_PORT: 8080
    ports:
      - "8080:8080"

# Named volumes — include only the ones for your declared services:
volumes:
  pg_data:       # postgres
  nats_data:     # nats
  minio_data:    # minio
