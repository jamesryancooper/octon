# Skills Registry (Extended Metadata + I/O Mappings)
# Full skill definitions for routing validation and execution.
# Agents load manifest.yml first, then this file after matching.
#
# Load Order:
#   1. manifest.yml      - Skill discovery index
#   2. capabilities.yml  - Capability schema (skill sets, valid capabilities, refs)
#   3. registry.yml      - Extended skill metadata + I/O mappings (this file)
#
# Single Source of Truth:
#   - SKILL.md frontmatter: name, description, allowed-tools (AUTHORITATIVE)
#   - capabilities.yml: skill_set_definitions, valid_capabilities, capability_refs
#   - This file: version, commands, parameters, requires, depends_on, io
#
# Fields:
#   version          - Semantic version string
#   commands         - Slash commands that invoke this skill
#   parameters       - Input parameters the skill accepts
#   requires.context - Context conditions for skill activation
#   depends_on       - Other skills this skill requires
#   io.inputs        - Input paths (supports {{placeholders}})
#   io.outputs       - Output paths (supports {{placeholders}})
#
# Parameter Schema:
#   name        - Parameter identifier
#   type        - text | boolean | file | folder
#   required    - true | false
#   default     - Default value (if not required)
#   description - Human-readable description
#
# I/O Schema:
#   path         - File path relative to skills/ dir (supports {{placeholders}})
#   kind         - file | directory (default: file)
#   format       - markdown | json | yaml | text | binary
#   required     - true | false (for inputs, default: true)
#   determinism  - stable (same input = same output) | variable | unique
#   description  - Human-readable description
#
# Directory Structure:
# All operational categories follow the {category}/{skill-id}/ pattern:
#
#   _ops/state/configs/{skill-id}/       - Per-skill configuration overrides
#   _ops/state/resources/{skill-id}/     - Per-skill input resources (notes, docs, data)
#   _ops/state/runs/{skill-id}/{run-id}/ - Execution state (checkpoints, manifests) for recovery
#   _ops/state/logs/{skill-id}/{run-id}.md - Execution logs
#
# Note: The pattern "use skill: {{id}}" is universal and does not need
# per-skill configuration. Agents recognize this pattern automatically.

schema_version: "3.0"

# Global routing rules
routing:
  # If true, only explicit /commands trigger skills (no trigger matching)
  explicit_command_required: false
  # How to handle ambiguous matches: "ask" | "first_match" | "most_specific"
  ambiguity_resolution: "ask"

# Extended skill metadata (keyed by id)
skills:
  synthesize-research:
    version: "1.0.1"
    commands:
      - /synthesize-research
    parameters:
      - name: research_folder
        type: folder
        required: true
        description: "Folder containing research notes (.md files)"
    requires:
      context: []
    depends_on: []
    io:
      inputs:
        - path: "_ops/state/resources/synthesize-research/projects/{{project}}/"
          kind: directory
          required: true
          description: "Project folder containing research notes"
        - path: "_ops/state/resources/synthesize-research/{{topic}}/"
          kind: directory
          required: false
          description: "Additional source materials by topic"
      outputs:
        - name: synthesis_document
          path: "../../../output/drafts/{{topic}}-synthesis.md"
          kind: file
          format: markdown
          determinism: stable
          description: "Consolidated findings document with themes and evidence"
        - name: run_log
          path: "_ops/state/logs/synthesize-research/{{run_id}}.md"
          kind: file
          format: markdown
          determinism: unique
          description: "Execution log capturing inputs, outputs, and processing notes"
        - name: log_index
          path: "_ops/state/logs/synthesize-research/index.yml"
          kind: file
          format: yaml
          determinism: variable
          description: "Index of all synthesize-research runs with metadata"
        - name: top_log_index
          path: "_ops/state/logs/index.yml"
          kind: file
          format: yaml
          determinism: variable
          description: "Top-level log index (cross-skill)"

