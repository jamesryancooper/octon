          path: "_ops/state/logs/postgres-best-practices/{{run_id}}.md"
          kind: file
          format: markdown
          determinism: unique
          description: "Execution log for this review"
        - name: log_index
          path: "_ops/state/logs/postgres-best-practices/index.yml"
          kind: file
          format: yaml
          determinism: variable
          description: "Index of all runs"
        - name: top_log_index
          path: "_ops/state/logs/index.yml"
          kind: file
          format: yaml
          determinism: variable
          description: "Top-level log index (cross-skill)"

  spec-to-implementation:
    version: "1.0.2"
    commands:
      - /spec-to-implementation
    parameters:
      - name: spec
        type: text
        required: true
        description: "Path to spec document or inline specification text"
      - name: scope
        type: text
        required: false
        default: "."
        description: "Directory to scan for existing code"
      - name: format
        type: text
        required: false
        default: "markdown"
        description: "Output format: markdown or yaml"
      - name: change_profile
        type: text
        required: false
        default: "atomic"
        description: "Governance change profile: atomic or transitional"
      - name: release_state
        type: text
        required: false
        default: "auto"
        description: "Release state override: auto, pre-1.0, or stable"
      - name: transitional_exception_note
        type: text
        required: false
        description: "Required in pre-1.0 when change_profile is transitional (rationale, risks, owner, target_removal_date)"
    requires:
      context: []
    depends_on: []
    io:
      inputs: []
      outputs:
        - name: implementation_plan
          path: "../../../output/plans/{{date}}-{{feature}}-implementation-plan.md"
          kind: file
          format: markdown
          determinism: stable
          description: "Staged implementation plan with profile selection receipt, impact map, compliance receipt, and escalation sections"
        - name: run_log
          path: "_ops/state/logs/spec-to-implementation/{{run_id}}.md"
          kind: file
          format: markdown
          determinism: unique
          description: "Execution log for this planning run"
        - name: log_index
          path: "_ops/state/logs/spec-to-implementation/index.yml"
          kind: file
          format: yaml
          determinism: variable
          description: "Index of all spec-to-implementation runs"
        - name: top_log_index
          path: "_ops/state/logs/index.yml"
          kind: file
          format: yaml
          determinism: variable
          description: "Top-level log index (cross-skill)"

  build-mcp-server:
    version: "1.0.1"
    commands:
      - /build-mcp-server
    parameters:
      - name: name
        type: text
        required: true
        description: "Server name (kebab-case, used for directory and package.json)"
      - name: tools
        type: text
        required: false
        description: "Comma-separated list of tool names to scaffold"
      - name: service
        type: text
        required: false
        description: "Description of the service to expose (alternative to tools)"
      - name: language
        type: text
        required: false
        default: "typescript"
        description: "Implementation language: typescript or python"
      - name: output_dir
        type: folder
        required: false
        default: "."
        description: "Directory where the MCP server project will be created"
    requires:
      context: []
    depends_on: []
    io:
      inputs: []
      outputs:
        - name: mcp_server_project
          path: "{{output_dir}}/{{name}}/"
          kind: directory
          format: mixed
          determinism: stable
          description: "The created MCP server project directory"
        - name: run_log
          path: "_ops/state/logs/build-mcp-server/{{run_id}}.md"
          kind: file
          format: markdown
          determinism: unique
          description: "Execution log for this build"
        - name: log_index
          path: "_ops/state/logs/build-mcp-server/index.yml"
          kind: file
          format: yaml
          determinism: variable
          description: "Index of all build-mcp-server runs"
        - name: top_log_index
          path: "_ops/state/logs/index.yml"
          kind: file
          format: yaml
          determinism: variable
          description: "Top-level log index (cross-skill)"

# Pipelines
pipelines:
  - id: research-synthesis
    name: Research Synthesis Pipeline
    description: "Synthesize project findings"
    use_case: "When you have a project ready for consolidation"
    steps:
      - synthesize-research
    inputs:
      - path: "_ops/state/resources/synthesize-research/projects/{{project}}/"
        kind: directory
    outputs:
      - path: "../../../output/drafts/{{project}}-synthesis.md"
        kind: file
        format: markdown
    invocation: "/synthesize-research _ops/state/resources/synthesize-research/projects/{{project}}/"
