# Pipelines
pipelines:
  - id: research-synthesis
    name: Research Synthesis Pipeline
    description: "Synthesize project findings"
    use_case: "When you have a project ready for consolidation"
    steps:
      - synthesize-research
    inputs:
      - path: "_ops/state/resources/synthesize-research/projects/{{project}}/"
        kind: directory
    outputs:
      - path: "../../../output/drafts/{{project}}-synthesis.md"
        kind: file
        format: markdown
    invocation: "/synthesize-research _ops/state/resources/synthesize-research/projects/{{project}}/"
