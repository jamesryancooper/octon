# Agents Registry
# Maps agent roles to definitions and capabilities.
#
# Fields:
#   name         - Agent identifier
#   path         - Relative path to agent directory
#   role         - One-line description of the agent's role
#   capabilities - List of agent capabilities
#   delegates_to - Assistants this agent delegates to

schema_version: "1.0"
default: planner  # Default agent for workspace

agents:
  - name: planner
    path: planner/
    role: "Strategic planning, goal decomposition, and work orchestration"
    capabilities:
      - goal_decomposition
      - task_planning
      - assistant_delegation
      - mission_command
    delegates_to:
      - "@reviewer"
      - "@refactor"
      - "@docs"

  - name: builder
    path: builder/
    role: "Implementation, code generation, and feature development"
    capabilities:
      - code_generation
      - skill_execution
      - test_writing
      - feature_implementation
    delegates_to:
      - "@reviewer"
      - "@docs"

  - name: verifier
    path: verifier/
    role: "Validation, testing, and quality assurance"
    capabilities:
      - test_execution
      - code_review
      - checklist_verification
      - quality_assurance
    delegates_to:
      - "@reviewer"
      - "@refactor"
