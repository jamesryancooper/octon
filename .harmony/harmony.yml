# Harmony Root Manifest
# Single source of truth for portability, autonomy, and resolution rules.
#
# This file replaces the two-root convention with metadata-driven portability.
# See ADR 010 for rationale.

schema_version: "1.0"

# Portable paths — copy these to bootstrap a new repo via `harmony init`.
# Everything else is project-specific state that stays with this repo.
portable:
  - START.md
  - scope.md
  - conventions.md
  - catalog.md
  - README.md
  - agency/manifest.yml
  - agency/governance/
  - agency/actors/agents/
  - agency/actors/assistants/
  - agency/actors/teams/
  - agency/practices/
  - capabilities/runtime/skills/manifest.yml
  - capabilities/runtime/skills/registry.yml
  - capabilities/runtime/skills/capabilities.yml
  - capabilities/runtime/skills/_scaffold/template/
  - capabilities/runtime/skills/_ops/scripts/
  - capabilities/runtime/skills/**/SKILL.md
  - capabilities/runtime/skills/**/references/
  - capabilities/runtime/commands/
  - capabilities/runtime/services/manifest.yml
  - capabilities/runtime/services/registry.yml
  - capabilities/runtime/services/manifest.runtime.yml
  - capabilities/runtime/services/registry.runtime.yml
  - capabilities/runtime/services/interfaces/kv/
  - orchestration/runtime/workflows/
  - orchestration/governance/
  - orchestration/practices/
  - engine/README.md
  - engine/runtime/run
  - engine/runtime/run.cmd
  - engine/runtime/README.md
  - engine/runtime/config/
  - engine/runtime/crates/
  - engine/runtime/wit/
  - engine/runtime/spec/
  - engine/governance/
  - engine/practices/
  - engine/_ops/bin/
  - engine/_meta/architecture/README.md
  - engine/_meta/evidence/README.md
  - assurance/
  - scaffolding/
  - cognition/context/primitives.md
  - cognition/context/tools.md
  - cognition/context/compaction.md

# Agent-excluded zones. Agents MUST NOT access without explicit human direction.
human_led:
  - ideation/**

# Resolution rules for capabilities that span framework and project concerns.
resolution:
  agency: "Framework definitions loaded; project overrides merged on top"
  capabilities: "Single manifest and registry; no extends pattern"
  engine: "Executable runtime authority under engine/runtime with governance and practices surfaces"
  orchestration: "Framework workflows and project workflows coexist"
