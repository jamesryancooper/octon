guardrails:
  naming:
    profile_regex: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
    max_profile_name_length: 64
  sprawl_controls:
    max_active_profiles_per_repo: 6
    duplicate_similarity_threshold_pct: 80
    require_use_case_for_new_profile: true
  deprecation:
    allowed_statuses: [active, deprecated]
    require_replacement_profile: true
    require_sunset_date: true
    min_release_cycles_before_removal: 2

changelog:
  - date: "2026-02-18"
    version: "1.3.0"
    change: "Added explicit Charter contract metadata (priority chain, attribute outcome mapping, and tie-break policy) for charter-driven enforcement."
    rationale: "The Assurance Engine must make Charter intent machine-verifiable so resolver outputs and gates can prevent policy drift."
    adr: ".harmony/cognition/decisions/016-assurance-charter-assurance-engine-integration.md"
    charter_ref: ".harmony/assurance/CHARTER.md"
  - date: "2026-02-18"
    version: "1.2.0"
    change: "Added Autonomy as a canonical weighted/scored quality attribute with bounded-autonomy policy defaults."
    rationale: "Autonomous execution is a primary harness concern and must be explicitly scored while remaining constrained by safety, security, and HITL approval boundaries."
    adr: ".harmony/cognition/decisions/015-autonomy-quality-attribute.md"
  - date: "2026-02-18"
    version: "1.1.0"
    change: "Split policy weights and measurement scores into two files and introduced resolver outputs for effective/results views."
    rationale: "Separate slow-moving architecture policy from frequently updated measurement data to improve governance and reduce noisy ADR churn."
    adr: ".harmony/cognition/decisions/014-two-file-weight-governance-model.md"
  - date: "2026-02-18"
    version: "1.0.0"
    change: "Initial weighted quality model with global + ci/local/regulated profiles."
    rationale: "Established deterministic baseline and override contract."
    adr: ".harmony/cognition/decisions/013-filesystem-interfaces-native-first.md"
