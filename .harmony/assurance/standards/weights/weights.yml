meta:
  version: "1.3.0"
  updated_at: "2026-02-18"
  owner: "harmony-platform"
  status: "active"
  schema_version: "2"
  description: "Policy weights only; measurement scores are in .harmony/assurance/standards/scores/scores.yml"

charter:
  ref: ".harmony/assurance/CHARTER.md"
  version: "1.0.0"
  priority_chain:
    - id: trust
      name: Trust
    - id: speed_of_development
      name: Speed of development
    - id: ease_of_use
      name: Ease of use
    - id: portability
      name: Portability
    - id: interoperability
      name: Interoperability
  tie_break_rule: "When weighted priority ties, prioritize items mapped to higher charter outcomes in chain order."
  tradeoff_rules:
    - "Trust is non-negotiable."
    - "Speed is optimized inside trust constraints."
    - "Ease of use is protected by progressive disclosure."
    - "Portability is preserved by contracts and isolation."
    - "Interoperability is allowed only with versioning + security + tests."
  required_references:
    assurance_engine_readme: ".harmony/assurance/README.md"
    override_policy: ".harmony/assurance/governance/SUBSYSTEM_OVERRIDE_POLICY.md"
  attribute_outcome_map:
    performance: speed_of_development
    scalability: speed_of_development
    reliability: trust
    availability: trust
    robustness: trust
    recoverability: trust
    dependability: trust
    safety: trust
    autonomy: speed_of_development
    security: trust
    simplicity: ease_of_use
    evolvability: speed_of_development
    maintainability: speed_of_development
    portability: portability
    functional_suitability: trust
    completeness: ease_of_use
    operability: ease_of_use
    observability: trust
    testability: speed_of_development
    auditability: trust
    deployability: speed_of_development
    usability: ease_of_use
    accessibility: ease_of_use
    interoperability: interoperability
    compatibility: portability
    configurability: portability
    sustainability: speed_of_development

