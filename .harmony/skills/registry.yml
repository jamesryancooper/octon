# Skills Registry (Extended Metadata)
# Full skill definitions for routing validation and execution.
# Agents load manifest.yml first, then this file after matching.
#
# Single Source of Truth:
#   - SKILL.md frontmatter: name, description, allowed-tools (AUTHORITATIVE)
#   - This file: version, commands, parameters, requires.context, depends_on
#   - .workspace/skills/registry.yml: input/output paths (I/O mappings)
#
# Fields:
#   version          - Semantic version string
#   commands         - Slash commands that invoke this skill
#   parameters       - Input parameters the skill accepts
#   requires.context - Context conditions for skill activation
#   depends_on       - Other skills this skill requires
#
# Parameter Schema:
#   name        - Parameter identifier
#   type        - text | boolean | file | folder
#   required    - true | false
#   default     - Default value (if not required)
#   description - Human-readable description
#
# Note: Input/output paths are defined in .workspace/skills/registry.yml
# to keep workspace-specific configuration separate from portable skill logic.
#
# Note: The pattern "use skill: {{id}}" is universal and does not need
# per-skill configuration. Agents recognize this pattern automatically.

schema_version: "2.0"

# ============================================================================
# SKILL SET DEFINITIONS
# Pre-defined capability bundles for common skill patterns.
# Skills declare skill_sets in manifest.yml; capabilities are resolved here.
# ============================================================================
skill_set_definitions:
  executor:
    description: Does multi-step work itself
    capabilities: [phased, branching, stateful]
    primary_refs: [phases.md, decisions.md, checkpoints.md]

  coordinator:
    description: Manages external tasks/jobs
    capabilities: [task-coordinating, parallel]
    primary_refs: [orchestration.md]

  delegator:
    description: Delegates to autonomous sub-agents
    capabilities: [agent-delegating]
    primary_refs: [agents.md]

  collaborator:
    description: Works with humans at decision points
    capabilities: [human-collaborative, stateful]
    primary_refs: [interaction.md, checkpoints.md]

  integrator:
    description: Pipeline building block
    capabilities: [composable, contract-driven]
    primary_refs: [composition.md, io-contract.md]

  specialist:
    description: Requires domain expertise
    capabilities: [domain-specialized]
    primary_refs: [glossary.md]

  guardian:
    description: Enforces quality and safety
    capabilities: [self-validating, safety-bounded]
    primary_refs: [validation.md, safety.md]

# ============================================================================
# VALID CAPABILITIES
# All recognized capability names for validation.
# ============================================================================
valid_capabilities:
  # Execution
  - phased              # Has distinct execution phases
  - branching           # Has conditional execution paths
  - parallel            # Can execute work concurrently

  # Coordination
  - task-coordinating   # Manages external tasks/jobs
  - agent-delegating    # Delegates to autonomous sub-agents
  - human-collaborative # Requires human decisions

  # State
  - stateful            # Persists state across phases
  - resumable           # Can checkpoint and resume

  # Quality
  - self-validating     # Has formal acceptance criteria
  - error-resilient     # Has recovery procedures

  # Integration
  - composable          # Designed for chaining
  - contract-driven     # Formal I/O specification

  # Scope
  - domain-specialized  # Requires domain knowledge
  - safety-bounded      # Explicit constraints

  # Reliability
  - idempotent          # Safe to retry; same input = same effect
  - cancellable         # Can be stopped mid-execution
  - external-dependent  # Requires external services (APIs, DBs)

# ============================================================================
# CAPABILITY TO REFERENCE MAPPING
# Which reference files are expected for each capability.
# ============================================================================
capability_refs:
  phased: [phases.md]
  branching: [decisions.md]
  parallel: [orchestration.md]
  task-coordinating: [orchestration.md]
  agent-delegating: [agents.md]
  human-collaborative: [interaction.md]
  stateful: [checkpoints.md]
  resumable: [checkpoints.md]
  self-validating: [validation.md]
  error-resilient: [errors.md]
  composable: [composition.md]
  contract-driven: [io-contract.md]
  domain-specialized: [glossary.md]
  safety-bounded: [safety.md]
  idempotent: [idempotency.md]
  cancellable: [cancellation.md]
  external-dependent: [dependencies.md]

# Global routing rules
routing:
  # If true, only explicit /commands trigger skills (no trigger matching)
  explicit_command_required: false
  # How to handle ambiguous matches: "ask" | "first_match" | "most_specific"
  ambiguity_resolution: "ask"

# Extended skill metadata (keyed by id)
skills:
  synthesize-research:
    version: "1.0.1"
    commands:
      - /synthesize-research
    parameters:
      - name: research_folder
        type: folder
        required: true
        description: "Folder containing research notes (.md files)"
    requires:
      context:
        - type: directory_exists
          path: ".workspace/"
          description: "Requires a workspace directory"
    depends_on: []

  refine-prompt:
    version: "2.1.1"
    commands:
      - /refine-prompt
    parameters:
      - name: raw_prompt
        type: text
        required: true
        description: "The raw prompt text to refine (inline or file path)"
      - name: execute
        type: boolean
        required: false
        default: false
        description: "Execute the refined prompt after saving"
      - name: context_depth
        type: text
        required: false
        default: "standard"
        description: "How deep to analyze repository context (minimal, standard, deep)"
      - name: skip_confirmation
        type: boolean
        required: false
        default: false
        description: "Skip intent confirmation step"
    requires:
      context:
        - type: directory_exists
          path: ".workspace/"
          description: "Requires a workspace directory"
    depends_on: []

  refactor:
    version: "1.0.0"
    commands:
      - /refactor
    parameters:
      - name: scope
        type: text
        required: true
        description: "What to refactor: 'old-pattern → new-pattern'"
      - name: file_types
        type: text
        required: false
        default: "md,yml,yaml,json,ts,js"
        description: "Comma-separated file extensions to search"
      - name: dry_run
        type: boolean
        required: false
        default: false
        description: "Execute phases 1-3 only (audit and plan)"
      - name: exclusions
        type: text
        required: false
        default: "node_modules,.git,dist"
        description: "Comma-separated patterns to skip"
    requires:
      context:
        - type: directory_exists
          path: ".workspace/"
          description: "Requires a workspace directory"
    depends_on: []

  create-skill:
    version: "1.0.0"
    commands:
      - /create-skill
    parameters:
      - name: skill_name
        type: text
        required: true
        description: "Skill identifier (kebab-case, 1-64 characters)"
      - name: description
        type: text
        required: false
        description: "Initial description for SKILL.md"
      - name: skill_sets
        type: text
        required: false
        default: ""
        description: "Comma-separated skill sets (executor, coordinator, delegator, collaborator, integrator, specialist, guardian)"
      - name: capabilities
        type: text
        required: false
        default: ""
        description: "Comma-separated additional capabilities beyond skill set bundles"
    requires:
      context:
        - type: directory_exists
          path: ".harmony/skills/_template/"
          description: "Requires skill template directory"
        - type: directory_exists
          path: ".workspace/"
          description: "Requires a workspace directory"
    depends_on: []
