# Skills Registry (Shared Foundation)
# Skill definitions without project-specific paths.
# Project-specific input/output mappings go in .workspace/skills/registry.yml
#
# Progressive disclosure: Agents read this registry for routing, then load
# SKILL.md on demand.

schema_version: "1.1"
default: null

# Global routing rules
routing:
  # If true, only explicit /commands trigger skills (no trigger matching)
  explicit_command_required: false
  # How to handle ambiguous matches: "ask" | "first_match" | "most_specific"
  ambiguity_resolution: "ask"

# Shared skill definitions
# Each entry provides enough info for routing without loading full SKILL.md
skills:
  - id: research-synthesizer
    name: Research Synthesizer
    path: research-synthesizer/
    version: "1.0.0"
    summary: "Synthesize scattered research notes into coherent findings."
    commands:
      - /synthesize-research
    explicit_call_patterns:
      - "use skill: research-synthesizer"
    triggers:
      - "synthesize my research"
      - "consolidate findings"
      - "summarize research notes"
    # Input/output paths are project-specific - defined in .workspace/skills/registry.yml
    requires:
      tools:
        - filesystem.read
        - filesystem.write.outputs
    depends_on: []

  - id: refine-prompt
    name: Refine Prompt
    path: refine-prompt/
    version: "2.1.1"
    summary: "Context-aware prompt refinement with persona assignment, anti-patterns, self-critique, and intent confirmation."
    commands:
      - /refine-prompt
    explicit_call_patterns:
      - "use skill: refine-prompt"
    triggers:
      - "refine my prompt"
      - "improve this prompt"
      - "expand this prompt"
      - "spell check my prompt"
      - "clarify my prompt"
      - "analyze and improve my prompt"
    requires:
      tools:
        - filesystem.read
        - filesystem.write.outputs
        - filesystem.glob
        - filesystem.grep
    depends_on: []
