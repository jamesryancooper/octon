# Cognition Ops Index
# Machine-readable discovery index for cognition operational scripts.

schema_version: "1.0"
files:
  - id: ops-overview
    path: overview.md
    summary: Cognition ops surface orientation and script grouping.
    when: First entrypoint before invoking cognition _ops scripts.

  - id: ops-runtime-index
    path: runtime/index.yml
    summary: Discovery index for runtime artifact generation and validation scripts.
    when: When generating or validating derived runtime cognition artifacts.

  - id: ops-principles-index
    path: principles/index.yml
    summary: Discovery index for governance principles lint and fixture tests.
    when: When validating principles governance constraints.

  - id: ops-knowledge-index
    path: knowledge/index.yml
    summary: Discovery index for runtime knowledge surface validators.
    when: When validating runtime knowledge graph/sources/query integrity.

  - id: ops-evaluations-index
    path: evaluations/index.yml
    summary: Discovery index for runtime evaluations surface validators.
    when: When validating digest/action runtime evaluation contracts.

  - id: ops-projections-index
    path: projections/index.yml
    summary: Discovery index for runtime projections surface validators.
    when: When validating projection definitions and materialized outputs.
