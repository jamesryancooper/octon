# Governance Principles Index
# Machine-readable discovery index for principle contracts.

schema_version: "1.0"
files:
  - id: principles-overview
    path: README.md
    summary: Principles surface orientation, scope, and governance posture.
    when: First entrypoint before opening specific principle contracts.

  - id: principles-charter
    path: principles.md
    summary: Human-override-controlled constitutional charter for engineering principles and standards.
    when: Before interpreting policy and when validating explicit human override charter updates.

  - id: principles-roadmap
    path: roadmap.md
    summary: Roadmap for principle evolution and adoption sequencing.
    when: When planning principles-adjacent governance work.

  - id: principle-progressive-disclosure
    path: progressive-disclosure.md
    summary: Principle for layered context delivery and discovery depth.
    when: When changing documentation and onboarding patterns.

  - id: principle-complexity-calibration
    path: complexity-calibration.md
    summary: Principle enforcing minimal sufficient complexity through explicit justification and fitness checks.
    when: When evaluating architecture or process complexity tradeoffs.

  - id: principle-single-source-of-truth
    path: single-source-of-truth.md
    summary: Principle for authoritative ownership of contracts and records.
    when: When resolving duplicate ownership and drift risks.

  - id: principle-locality
    path: locality.md
    summary: Principle for colocating context, contracts, and ownership.
    when: When deciding artifact placement and boundary design.

  - id: principle-arbitration-and-precedence
    path: arbitration-and-precedence.md
    summary: Principle conflict-resolution hierarchy and precedence rules.
    when: When governance principles or policies appear to conflict.

  - id: principle-deny-by-default
    path: deny-by-default.md
    summary: Principle enforcing fail-closed authorization posture.
    when: When designing permissions, policy gates, or exceptions.

  - id: principle-portability-and-independence
    path: portability-and-independence.md
    summary: Principle for portable, self-contained, environment-agnostic operation.
    when: When introducing platform-specific dependencies or assumptions.

  - id: principle-monolith-first-modulith
    path: monolith-first-modulith.md
    summary: Principle for modular monolith-first architecture decisions.
    when: When evaluating service-splitting or distribution tradeoffs.

  - id: principle-contract-first
    path: contract-first.md
    summary: Principle requiring contracts to lead implementation decisions.
    when: When designing interfaces, schemas, or API changes.

  - id: principle-small-diffs-trunk-based
    path: small-diffs-trunk-based.md
    summary: Principle for small, continuous, trunk-based delivery.
    when: When shaping branch policy and PR sizing constraints.

  - id: principle-flags-by-default
    path: flags-by-default.md
    summary: Principle for feature-flagged rollout and reversible delivery.
    when: When planning release sequencing and rollback strategy.

  - id: principle-determinism
    path: determinism.md
    summary: Principle for reproducible runtime and AI behavior.
    when: When setting model/runtime variability and replay controls.

  - id: principle-observability-as-a-contract
    path: observability-as-a-contract.md
    summary: Principle requiring telemetry evidence as part of correctness.
    when: When defining done criteria and runtime diagnostics.

  - id: principle-security-and-privacy-baseline
    path: security-and-privacy-baseline.md
    summary: Principle for least privilege, redaction, and safe handling defaults.
    when: When handling secrets, personal data, or security boundaries.

  - id: principle-accessibility-baseline
    path: accessibility-baseline.md
    summary: Principle treating accessibility checks as release gates.
    when: When defining UX quality gates and verification criteria.

  - id: principle-documentation-is-code
    path: documentation-is-code.md
    summary: Principle applying engineering rigor to documentation artifacts.
    when: When changing docs contracts, review flows, or generation patterns.

  - id: principle-reversibility
    path: reversibility.md
    summary: Principle requiring tested rollback and recovery paths.
    when: When evaluating deployment risk and one-way-door changes.

  - id: principle-ownership-and-boundaries
    path: ownership-and-boundaries.md
    summary: Principle for explicit ownership and architecture boundary enforcement.
    when: When changing module boundaries, ownership, or access rules.

  - id: principle-learn-continuously
    path: learn-continuously.md
    summary: Principle for structured improvement from outcomes and incidents.
    when: When operating retrospectives, scorecards, and continuous-improvement loops.

  - id: principle-no-silent-apply
    path: no-silent-apply.md
    summary: Principle requiring explicit governance evidence for durable side effects.
    when: When designing or reviewing autonomous agent behaviors.

  - id: principle-determinism-and-provenance
    path: determinism-and-provenance.md
    summary: Principle for durable metadata capture and replayability.
    when: When implementing evidence capture and provenance contracts.

  - id: principle-idempotency
    path: idempotency.md
    summary: Principle for safe retries and duplicate suppression in mutating operations.
    when: When designing APIs, workflows, and mutation handlers.

  - id: principle-guardrails
    path: guardrails.md
    summary: Principle for fail-closed policy, eval, and security gate enforcement.
    when: When implementing gate orchestration and safety boundaries.

  - id: principle-autonomous-control-points
    path: autonomous-control-points.md
    summary: Principle defining ACP staging, promotion, and evidence controls.
    when: When designing promotion governance and high-impact decision flows.
