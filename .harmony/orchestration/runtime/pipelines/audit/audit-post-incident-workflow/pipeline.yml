schema_version: "pipeline-contract-v1"
name: "audit-post-incident-workflow"
description: "Orchestrate a layered bounded post-incident audit across operational readiness, observability coverage, security/compliance posture, data governance controls, API-contract safety, test-quality containment, cross-subsystem coherence, and freshness integrity. Produces deterministic evidence with stable finding IDs, coverage accounting, and explicit done-gate evaluation for incident remediation closure."
version: "1.0.0"
entry_mode: "human"
execution_profile: "core"
inputs:
  - name: incident_id
    type: text
    required: true
    description: "Unique incident identifier used for traceability (for example INC-2026-02-23-001)"
  - name: subsystem
    type: folder
    required: true
    description: "Root directory of the incident-affected subsystem to audit"
  - name: incident_report
    type: file
    required: false
    description: "Incident report or RCA reference used for contextual grounding"
  - name: docs
    type: folder
    required: false
    description: "Companion documentation directory for optional coherence checks"
  - name: severity_threshold
    type: text
    required: false
    default: "all"
    description: "Minimum severity to report: critical, high, medium, low, all"
  - name: run_security
    type: boolean
    required: false
    default: true
    description: "Run security/compliance post-incident stage"
  - name: run_data_governance
    type: boolean
    required: false
    default: true
    description: "Run data-governance post-incident stage"
  - name: run_api_contract
    type: boolean
    required: false
    default: true
    description: "Run API-contract post-incident stage"
  - name: run_test_quality
    type: boolean
    required: false
    default: true
    description: "Run test-quality post-incident stage"
  - name: run_cross_subsystem
    type: boolean
    required: false
    default: true
    description: "Run cross-subsystem coherence post-incident stage"
  - name: run_freshness
    type: boolean
    required: false
    default: true
    description: "Run freshness/supersession post-incident stage"
  - name: max_age_days
    type: text
    required: false
    default: "30"
    description: "Freshness threshold in days when run_freshness is enabled"
  - name: post_remediation
    type: boolean
    required: false
    default: false
    description: "Enable strict done-gate enforcement for remediation verification"
  - name: convergence_k
    type: text
    required: false
    default: "3"
    description: "Number of controlled reruns used to evaluate convergence stability"
  - name: seed_list
    type: text
    required: false
    description: "Comma-separated deterministic seeds used for multi-run consistency checks"
stages:
  - id: "configure"
    asset: "stages/01-configure.md"
    kind: "analysis"
    consumes: []
    produces: ["stage:configure"]
    mutation_scope: []
  - id: "operational-readiness-audit"
    asset: "stages/02-operational-readiness-audit.md"
    kind: "analysis"
    consumes: ["stage:configure"]
    produces: ["stage:operational-readiness-audit"]
    mutation_scope: []
  - id: "observability-audit"
    asset: "stages/03-observability-audit.md"
    kind: "analysis"
    consumes: ["stage:operational-readiness-audit"]
    produces: ["stage:observability-audit"]
    mutation_scope: []
  - id: "security-audit"
    asset: "stages/04-security-audit.md"
    kind: "analysis"
    consumes: ["stage:observability-audit"]
    produces: ["stage:security-audit"]
    mutation_scope: []
  - id: "data-governance-audit"
    asset: "stages/05-data-governance-audit.md"
    kind: "analysis"
    consumes: ["stage:security-audit"]
    produces: ["stage:data-governance-audit"]
    mutation_scope: []
  - id: "api-contract-audit"
    asset: "stages/06-api-contract-audit.md"
    kind: "analysis"
    consumes: ["stage:data-governance-audit"]
    produces: ["stage:api-contract-audit"]
    mutation_scope: []
  - id: "test-quality-audit"
    asset: "stages/07-test-quality-audit.md"
    kind: "analysis"
    consumes: ["stage:api-contract-audit"]
    produces: ["stage:test-quality-audit"]
    mutation_scope: []
  - id: "cross-subsystem-audit"
    asset: "stages/08-cross-subsystem-audit.md"
    kind: "analysis"
    consumes: ["stage:test-quality-audit"]
    produces: ["stage:cross-subsystem-audit"]
    mutation_scope: []
  - id: "freshness-audit"
    asset: "stages/09-freshness-audit.md"
    kind: "analysis"
    consumes: ["stage:cross-subsystem-audit"]
    produces: ["stage:freshness-audit"]
    mutation_scope: []
  - id: "merge"
    asset: "stages/10-merge.md"
    kind: "projection"
    consumes: ["stage:freshness-audit"]
    produces: ["stage:merge"]
    mutation_scope: []
  - id: "report"
    asset: "stages/11-report.md"
    kind: "projection"
    consumes: ["stage:merge"]
    produces: ["stage:report"]
    mutation_scope: []
  - id: "verify"
    asset: "stages/12-verify.md"
    kind: "verification"
    consumes: ["stage:report"]
    produces: ["stage:verify"]
    mutation_scope: []
artifacts:
  - name: post_incident_report
    path: "../../output/reports/{{date}}-audit-post-incident-workflow.md"
    kind: file
    format: markdown
    determinism: unique
    description: "Consolidated post-incident closure report with residual risk recommendation"
  - name: operational_readiness_audit_report
    path: "../../output/reports/{{date}}-operational-readiness-audit-{{run_id}}.md"
    kind: file
    format: markdown
    determinism: unique
    description: "Operational-readiness stage report (mandatory)"
  - name: observability_coverage_audit_report
    path: "../../output/reports/{{date}}-observability-coverage-audit-{{run_id}}.md"
    kind: file
    format: markdown
    determinism: unique
    description: "Observability-coverage stage report (mandatory)"
  - name: security_compliance_audit_report
    path: "../../output/reports/{{date}}-security-compliance-audit-{{run_id}}.md"
    kind: file
    format: markdown
    determinism: unique
    description: "Security-compliance stage report (produced if enabled)"
  - name: data_governance_audit_report
    path: "../../output/reports/{{date}}-data-governance-audit-{{run_id}}.md"
    kind: file
    format: markdown
    determinism: unique
    description: "Data-governance stage report (produced if enabled)"
  - name: api_contract_audit_report
    path: "../../output/reports/{{date}}-api-contract-audit-{{run_id}}.md"
    kind: file
    format: markdown
    determinism: unique
    description: "API-contract stage report (produced if enabled)"
  - name: test_quality_audit_report
    path: "../../output/reports/{{date}}-test-quality-audit-{{run_id}}.md"
    kind: file
    format: markdown
    determinism: unique
    description: "Test-quality stage report (produced if enabled)"
  - name: cross_subsystem_audit_report
    path: "../../output/reports/{{date}}-cross-subsystem-coherence-audit.md"
    kind: file
    format: markdown
    determinism: unique
    description: "Cross-subsystem stage report (produced if enabled)"
  - name: freshness_audit_report
    path: "../../output/reports/{{date}}-freshness-and-supersession-audit.md"
    kind: file
    format: markdown
    determinism: unique
    description: "Freshness stage report (produced if enabled)"
  - name: post_incident_audit_bundle
    path: "../../output/reports/audits/{{date}}-{{slug}}/"
    kind: directory
    format: mixed
    determinism: unique
    description: "Authoritative bounded-audit bundle for post-incident closure recommendation and done-gate evidence"
done_gate:
  checks:
    - "All enabled stages executed or explicitly skipped"
    - "Consolidated post-incident report exists"
    - "Bounded bundle exists at `.harmony/output/reports/audits/YYYY-MM-DD-<slug>/`"
    - "Findings are deduplicated with stable IDs and acceptance criteria"
    - "Coverage and convergence metadata are present"
    - "Done-gate expression is evaluated and recorded"
    - "If `post_remediation=true`, done-gate is true"
projection:
  workflow_id: "audit-post-incident-workflow"
  workflow_path: ".harmony/orchestration/runtime/workflows/audit/audit-post-incident-workflow/"
  generated: true
  projection_format: "directory"
constraints:
  fail_closed: true
  forbid_design_packages: true
  require_relative_local_assets: true
