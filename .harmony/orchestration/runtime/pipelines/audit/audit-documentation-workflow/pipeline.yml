schema_version: "pipeline-contract-v1"
name: "audit-documentation-workflow"
description: "Run bounded documentation standards enforcement by invoking audit-documentation-standards, then emit a deterministic bundle with stable finding identity, coverage accounting, and explicit done-gate evaluation."
version: "3.0.0"
entry_mode: "human"
execution_profile: "core"
inputs:
  - name: docs_root
    type: folder
    required: true
    description: "Root documentation directory to validate"
  - name: template_root
    type: folder
    required: false
    default: ".harmony/scaffolding/runtime/templates/docs/documentation-standards"
    description: "Canonical documentation template root"
  - name: policy_doc
    type: file
    required: false
    default: ".harmony/cognition/governance/principles/documentation-is-code.md"
    description: "Canonical docs-as-code policy document"
  - name: severity_threshold
    type: text
    required: false
    default: "all"
    description: "Minimum severity to report: critical, high, medium, low, all"
  - name: post_remediation
    type: boolean
    required: false
    default: false
    description: "Enable strict done-gate enforcement for remediation verification"
  - name: convergence_k
    type: text
    required: false
    default: "3"
    description: "Number of controlled reruns used to evaluate convergence stability"
  - name: seed_list
    type: text
    required: false
    description: "Comma-separated deterministic seeds used for multi-run consistency checks"
stages:
  - id: "configure"
    asset: "stages/01-configure.md"
    kind: "analysis"
    consumes: []
    produces: ["stage:configure"]
    mutation_scope: []
  - id: "run-standards-audit"
    asset: "stages/02-run-standards-audit.md"
    kind: "analysis"
    consumes: ["stage:configure"]
    produces: ["stage:run-standards-audit"]
    mutation_scope: []
  - id: "report"
    asset: "stages/03-report.md"
    kind: "projection"
    consumes: ["stage:run-standards-audit"]
    produces: ["stage:report"]
    mutation_scope: []
  - id: "verify"
    asset: "stages/04-verify.md"
    kind: "verification"
    consumes: ["stage:report"]
    produces: ["stage:verify"]
    mutation_scope: []
artifacts:
  - name: docs_audit_report
    path: "../../output/reports/{{date}}-audit-documentation-workflow.md"
    kind: file
    format: markdown
    determinism: unique
    description: "Consolidated documentation audit report with release recommendation"
  - name: docs_standards_audit_report
    path: "../../output/reports/{{date}}-documentation-standards-audit.md"
    kind: file
    format: markdown
    determinism: unique
    description: "Input audit report produced by audit-documentation-standards"
  - name: documentation_audit_bundle
    path: "../../output/reports/audits/{{date}}-{{slug}}/"
    kind: directory
    format: mixed
    determinism: unique
    description: "Authoritative bounded-audit bundle for documentation recommendation and done-gate evidence"
done_gate:
  checks:
    - "Documentation standards audit report exists"
    - "Documentation audit recommendation report exists"
    - "Bounded bundle exists at `.harmony/output/reports/audits/YYYY-MM-DD-<slug>/`"
    - "Findings are deduplicated with stable IDs and acceptance criteria"
    - "Coverage and convergence metadata are recorded"
    - "Done-gate rationale is explicit"
projection:
  workflow_id: "audit-documentation-workflow"
  workflow_path: ".harmony/orchestration/runtime/workflows/audit/audit-documentation-workflow/"
  generated: true
  projection_format: "directory"
constraints:
  fail_closed: true
  forbid_design_packages: true
  require_relative_local_assets: true
