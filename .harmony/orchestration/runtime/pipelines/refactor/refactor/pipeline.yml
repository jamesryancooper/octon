schema_version: "pipeline-contract-v1"
name: "refactor"
description: "Execute a verified refactor workflow: define scope, audit impact, plan changes, execute safely, verify outcomes, and document results."
version: "1.1.0"
entry_mode: "human"
execution_profile: "core"
inputs:
  []
stages:
  - id: "define-scope"
    asset: "stages/01-define-scope.md"
    kind: "analysis"
    consumes: []
    produces: ["stage:define-scope"]
    mutation_scope: []
  - id: "audit"
    asset: "stages/02-audit.md"
    kind: "analysis"
    consumes: ["stage:define-scope"]
    produces: ["stage:audit"]
    mutation_scope: []
  - id: "plan"
    asset: "stages/03-plan.md"
    kind: "mutation"
    consumes: ["stage:audit"]
    produces: ["stage:plan"]
    mutation_scope: ["workflow-scope"]
  - id: "execute"
    asset: "stages/04-execute.md"
    kind: "analysis"
    consumes: ["stage:plan"]
    produces: ["stage:execute"]
    mutation_scope: []
  - id: "verify"
    asset: "stages/05-verify.md"
    kind: "verification"
    consumes: ["stage:execute"]
    produces: ["stage:verify"]
    mutation_scope: []
  - id: "document"
    asset: "stages/06-document.md"
    kind: "analysis"
    consumes: ["stage:verify"]
    produces: ["stage:document"]
    mutation_scope: []
artifacts:
  []
done_gate:
  checks:
    - "verification stage passes"
projection:
  workflow_id: "refactor"
  workflow_path: ".harmony/orchestration/runtime/workflows/refactor/refactor/"
  generated: true
  projection_format: "directory"
constraints:
  fail_closed: true
  forbid_design_packages: true
  require_relative_local_assets: true
