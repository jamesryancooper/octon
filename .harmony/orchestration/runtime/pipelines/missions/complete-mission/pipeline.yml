schema_version: "pipeline-contract-v1"
name: "complete-mission"
description: "Close and archive an existing mission with final status and continuity handoff updates."
version: "1.1.0"
entry_mode: "human"
execution_profile: "core"
inputs:
  []
stages:
  - id: "overview"
    asset: "stages/00-overview.md"
