schema_version: "workflow-contract-v1"
name: "update-workflow"
description: "Update a canonical workflow, regenerate the workflow README, and verify the resulting orchestration surface."
version: "1.0.0"
entry_mode: "human"
execution_profile: "core"
side_effect_class: "read_only"
execution_controls:
  cancel_safe: true
coordination_key_strategy:
  kind: "none"
executor_interface_version: "workflow-executor-v1"
inputs: []
stages:
  - id: "audit-current"
    asset: "stages/01-audit-current.md"
    kind: "analysis"
    consumes: []
    produces: ["stage:audit-current"]
    mutation_scope: []
  - id: "identify-gaps"
    asset: "stages/02-identify-gaps.md"
    kind: "analysis"
    consumes: ["stage:audit-current"]
    produces: ["stage:identify-gaps"]
    mutation_scope: []
  - id: "plan-changes"
    asset: "stages/03-plan-changes.md"
    kind: "projection"
    consumes: ["stage:identify-gaps"]
    produces: ["stage:plan-changes"]
    mutation_scope: []
  - id: "execute-changes"
    asset: "stages/04-execute-changes.md"
    kind: "mutation"
    consumes: ["stage:plan-changes"]
    produces: ["stage:execute-changes"]
    mutation_scope: ["workflow-scope"]
  - id: "verify-update"
    asset: "stages/05-verify-update.md"
    kind: "verification"
    consumes: ["stage:execute-changes"]
    produces: ["stage:verify-update"]
    mutation_scope: []
artifacts: []
done_gate:
  checks:
    - "verification stage passes"
constraints:
  fail_closed: true
  forbid_design_packages: true
  require_relative_local_assets: true
