schema_version: "workflow-contract-v1"
name: "create-architecture-proposal"
description: "Scaffold a standard-governed architecture proposal from canonical templates, materialize its manifests, persist workflow bundle evidence, and validate it immediately."
version: "1.0.0"
entry_mode: "human"
execution_profile: "core"
side_effect_class: "mutating"
execution_controls:
  cancel_safe: false
coordination_key_strategy:
  kind: "workflow-target"
  source_fields:
    - "workflow_group"
    - "workflow_id"
  format: "workflow:{workflow_group}/{workflow_id}"
executor_interface_version: "workflow-executor-v1"
inputs:
  - name: proposal_id
    type: text
    required: true
    description: "Kebab-case architecture proposal id and directory name under .proposals/architecture/"
  - name: proposal_title
    type: text
    required: true
    description: "Human-readable proposal title"
  - name: promotion_scope
    type: text
    required: true
    description: "Promotion scope: harmony-internal or repo-local"
  - name: promotion_targets
    type: text
    required: true
    description: "Comma-separated durable target paths that will survive proposal removal"
stages:
  - id: "validate-request"
    asset: "stages/01-validate-request.md"
    kind: "analysis"
    consumes: []
    produces: ["stage:validate-request"]
    mutation_scope: []
  - id: "scaffold-proposal"
    asset: "stages/03-scaffold-package.md"
    kind: "mutation"
    consumes: ["stage:validate-request"]
    produces: ["stage:scaffold-proposal"]
    mutation_scope: ["workflow-scope"]
  - id: "validate-proposal"
    asset: "stages/04-validate-package.md"
    kind: "verification"
    consumes: ["stage:scaffold-proposal"]
    produces: ["stage:validate-proposal"]
    mutation_scope: []
  - id: "report"
    asset: "stages/05-report.md"
    kind: "projection"
    consumes: ["stage:validate-proposal"]
    produces: ["stage:report"]
    mutation_scope: []
artifacts:
  - name: create_architecture_proposal_workflow_summary
    path: "../../../../../.harmony/output/reports/{{date}}-create-architecture-proposal.md"
    kind: file
    format: markdown
    determinism: unique
    description: "Top-level workflow summary with proposal identity, validator outcome, and next steps"
  - name: create_architecture_proposal_workflow_bundle
    path: "../../../../../.harmony/output/reports/workflows/{{date}}-create-architecture-proposal-{{proposal_id}}/"
    kind: directory
    format: mixed
    determinism: unique
    description: "Workflow execution bundle containing stage receipts, validation state, scaffold inventory, and validator evidence"
  - name: create_architecture_proposal_validator_log
    path: "../../../../../.harmony/output/reports/workflows/{{date}}-create-architecture-proposal-{{proposal_id}}/standard-validator.log"
    kind: file
    format: markdown
    determinism: unique
    description: "Captured stdout and stderr from the proposal validator stack"
  - name: architecture_proposal_root
    path: "../../../../../.proposals/architecture/{{proposal_id}}/"
    kind: directory
    format: mixed
    determinism: unique
    description: "Scaffolded standard-governed architecture proposal"
  - name: proposal_manifest
    path: "../../../../../.proposals/architecture/{{proposal_id}}/proposal.yml"
    kind: file
    format: yaml
    determinism: unique
    description: "Root manifest for the scaffolded architecture proposal"
  - name: architecture_proposal_manifest
    path: "../../../../../.proposals/architecture/{{proposal_id}}/architecture-proposal.yml"
    kind: file
    format: yaml
    determinism: unique
    description: "Subtype manifest for the scaffolded architecture proposal"
  - name: proposal_registry
    path: "../../../../../.proposals/registry.yml"
    kind: file
    format: yaml
    determinism: shared
    description: "Manifest-governed proposal registry updated with the new active proposal entry"
done_gate:
  checks:
    - "scaffolded proposal directory exists under .proposals/architecture/"
    - "`proposal.yml` and `architecture-proposal.yml` are present and valid"
    - "registry.yml includes the scaffolded proposal"
    - "workflow bundle exists under `.harmony/output/reports/workflows/`"
    - "`bundle.yml`, `summary.md`, `commands.md`, `validation.md`, and `inventory.md` exist"
    - "`reports/`, `stage-inputs/`, and `stage-logs/` exist"
    - "standard-validator.log exists"
    - "validate-proposal-standard.sh and validate-architecture-proposal.sh pass for the scaffolded proposal"
    - "top-level summary exists"
    - "final verdict is explicit"
constraints:
  fail_closed: true
  forbid_design_packages: false
  require_relative_local_assets: true
