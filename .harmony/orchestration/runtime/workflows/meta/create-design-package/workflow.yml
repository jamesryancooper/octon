schema_version: "workflow-contract-v1"
name: "create-design-package"
description: "Scaffold a standard-governed design package from canonical templates, materialize its manifest, persist first-class workflow bundle evidence, and validate it immediately."
version: "1.0.0"
entry_mode: "human"
execution_profile: "core"
side_effect_class: "mutating"
execution_controls:
  cancel_safe: false
coordination_key_strategy:
  kind: "workflow-target"
  source_fields:
    - "workflow_group"
    - "workflow_id"
  format: "workflow:{workflow_group}/{workflow_id}"
executor_interface_version: "workflow-executor-v1"
inputs:
  - name: package_id
    type: text
    required: true
    description: "Kebab-case design package id and directory name under .design-packages/"
  - name: package_title
    type: text
    required: true
    description: "Human-readable package title"
  - name: package_class
    type: text
    required: false
    default: "domain-runtime"
    description: "Package class: domain-runtime or experience-product"
  - name: implementation_targets
    type: text
    required: true
    description: "Comma-separated durable target paths that will survive package removal"
  - name: include_contracts
    type: boolean
    required: false
    description: "Optional override for contracts module selection; omitted uses the class default"
  - name: include_conformance
    type: boolean
    required: false
    description: "Optional override for conformance module selection; omitted uses the class default"
  - name: include_canonicalization
    type: boolean
    required: false
    description: "Optional override for canonicalization module selection; omitted uses the class default"
stages:
  - id: "validate-request"
    asset: "stages/01-validate-request.md"
    kind: "analysis"
    consumes: []
    produces: ["stage:validate-request"]
    mutation_scope: []
  - id: "select-bundles"
    asset: "stages/02-select-bundles.md"
    kind: "analysis"
    consumes: ["stage:validate-request"]
    produces: ["stage:select-bundles"]
    mutation_scope: []
  - id: "scaffold-package"
    asset: "stages/03-scaffold-package.md"
    kind: "mutation"
    consumes: ["stage:select-bundles"]
    produces: ["stage:scaffold-package"]
    mutation_scope: ["workflow-scope"]
  - id: "validate-package"
    asset: "stages/04-validate-package.md"
    kind: "verification"
    consumes: ["stage:scaffold-package"]
    produces: ["stage:validate-package"]
    mutation_scope: []
  - id: "report"
    asset: "stages/05-report.md"
    kind: "projection"
    consumes: ["stage:validate-package"]
    produces: ["stage:report"]
    mutation_scope: []
artifacts:
  - name: create_design_package_workflow_summary
    path: "../../../../../.harmony/output/reports/{{date}}-create-design-package.md"
    kind: file
    format: markdown
    determinism: unique
    description: "Top-level workflow summary with package identity, selected modules, validator outcome, and next steps"
  - name: create_design_package_workflow_bundle
    path: "../../../../../.harmony/output/reports/workflows/{{date}}-create-design-package-{{package_id}}/"
    kind: directory
    format: mixed
    determinism: unique
    description: "Workflow execution bundle containing stage receipts, validation state, scaffold inventory, and validator evidence"
  - name: create_design_package_validator_log
    path: "../../../../../.harmony/output/reports/workflows/{{date}}-create-design-package-{{package_id}}/standard-validator.log"
    kind: file
    format: markdown
    determinism: unique
    description: "Captured stdout and stderr from validate-design-package-standard.sh"
  - name: design_package_root
    path: "../../../../../.design-packages/{{package_id}}/"
    kind: directory
    format: mixed
    determinism: unique
    description: "Scaffolded standard-governed design package"
  - name: design_package_manifest
    path: "../../../../../.design-packages/{{package_id}}/design-package.yml"
    kind: file
    format: yaml
    determinism: unique
    description: "Root manifest for the standard-governed design package"
  - name: design_package_registry
    path: "../../../../../.design-packages/registry.yml"
    kind: file
    format: yaml
    determinism: shared
    description: "Manifest-governed design-package registry updated with the new active package entry"
done_gate:
  checks:
    - "scaffolded package directory exists under .design-packages/"
    - "design-package.yml is present and valid"
    - "registry.yml includes the scaffolded package"
    - "workflow bundle exists under `.harmony/output/reports/workflows/`"
    - "`bundle.yml`, `summary.md`, `commands.md`, `validation.md`, and `inventory.md` exist"
    - "`reports/`, `stage-inputs/`, and `stage-logs/` exist"
    - "standard-validator.log exists"
    - "validate-design-package-standard.sh passes for the scaffolded package"
    - "top-level summary exists"
    - "final verdict is explicit"
constraints:
  fail_closed: true
  forbid_design_packages: false
  require_relative_local_assets: true
