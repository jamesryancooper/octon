# Workflow Manifest — Tier 1 Canonical Discovery
#
# Ultra-lightweight index for routing and intent matching.
# Token budget: ~50 tokens per workflow entry.
#
# Goal alignment: Enable reliable agent execution that is deterministic enough to trust, observable enough to debug, and flexible enough to evolve.
#
# Load this first for workflow discovery.
# After matching, load registry.yml for extended metadata.
# Then load workflow.yml as the canonical contract.
# Load README.md only when human-readable staged guidance is needed.
#
# Fields:
#   id           - Unique identifier (matches directory name and workflow.yml name)
#   display_name - Human-readable display name
#   group        - Workflow group for directory organization
#                  Resolved via workflow_group_definitions below
#   domain       - Fine-grained domain classification
#   path         - Relative path to workflow directory
#   execution_profile - Runtime dependency profile: core | external-dependent
#   summary      - One-line description for routing decisions
#   status       - Lifecycle state: active | deprecated | experimental
#   triggers     - Natural language phrases for intent matching

workflows:
  # --- meta: Operate on the harness itself ---
  - id: create-harness
    display_name: Create Harness
    group: meta
    domain: harness
    path: meta/create-harness/
    summary: Scaffold a new .harmony/ directory in a target location.
    status: active
    triggers:
      - "create a harness"
      - "scaffold a harmony directory"
      - "initialize harness"
  - id: evaluate-harness
    display_name: Evaluate Harness
    group: meta
    domain: harness
    path: meta/evaluate-harness/
    summary: Evaluate a .harmony directory for token efficiency and effectiveness.
    status: active
    triggers:
      - "evaluate harness"
      - "assess harness quality"
      - "check harness health"
  - id: migrate-harness
    display_name: Migrate Harness
    group: meta
    domain: harness
    path: meta/migrate-harness/
    summary: Upgrade an older harness to current conventions.
    status: active
    triggers:
      - "migrate harness"
      - "upgrade harness"
      - "update harness structure"
  - id: update-harness
    display_name: Update Harness
    group: meta
    domain: harness
    path: meta/update-harness/
    summary: Align an existing .harmony directory with the canonical definition.
    status: active
    triggers:
      - "update harness"
      - "align harness"
      - "fix harness gaps"
  - id: create-skill
    display_name: Create Skill
    group: meta
    domain: skills
    path: meta/create-skill/
    summary: Scaffold a new skill from template with registry entry.
    status: deprecated
    triggers:
      - "create a skill"
      - "scaffold skill"
  - id: create-workflow
    display_name: Create Workflow
    group: meta
    domain: workflows
    path: meta/create-workflow/
    summary: Scaffold a new canonical workflow unit and generate its guide.
    status: active
    triggers:
      - "create a workflow"
      - "create a pipeline"
      - "scaffold workflow README"
  - id: create-design-package
    display_name: Create Design Package
    group: meta
    domain: scaffolding
    path: meta/create-design-package/
    summary: Scaffold a standard-governed design package, materialize its manifest, and validate the resulting package immediately.
    status: active
    triggers:
      - "create a design package"
      - "scaffold a design package"
      - "create implementation blueprint package"
  - id: evaluate-workflow
    display_name: Evaluate Workflow
    group: meta
    domain: workflows
    path: meta/evaluate-workflow/
    summary: Assess a canonical workflow unit and its guide for contract integrity and drift.
    status: active
    triggers:
      - "evaluate workflow"
      - "evaluate pipeline"
      - "audit workflow README"
  - id: update-workflow
    display_name: Update Workflow
    group: meta
    domain: workflows
    path: meta/update-workflow/
    summary: Update a canonical workflow unit and repair any resulting README drift.
    status: active
    triggers:
      - "update workflow"
      - "update pipeline"
      - "fix workflow README drift"
  # --- audit/refactor: Verify integrity and execute structural refactors ---
  - id: refactor
    display_name: Refactor
    group: refactor
    domain: refactor
