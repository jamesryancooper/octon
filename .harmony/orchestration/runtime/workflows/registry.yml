# Workflow Registry — Tier 2 Extended Metadata
#
# Extended metadata for workflow routing: versions, commands, parameters, I/O.
# Token budget: ~50 tokens per workflow entry.
#
# Load AFTER matching a workflow in manifest.yml.
# Then load WORKFLOW.md when the workflow is activated.
#
# Composition note:
# - Workflows are procedural orchestrations.
# - Composite Skills are reusable capability bundles.
# - `depends_on.skill` may reference atomic or composite skills.

routing:
  explicit_command_required: false
  ambiguity_resolution: "ask"

workflows:
  # --- Fully specified (spec-compliant) ---

  orchestrate-audit:
    version: "1.1.0"
    commands: ["/orchestrate-audit"]
    parameters:
      - name: manifest
        type: file
        required: true
        description: "Migration manifest (inline YAML or file path)"
      - name: scope
        type: folder
        required: false
        default: "."
        description: "Root directory to partition and audit"
      - name: docs
        type: folder
        required: false
        description: "Companion documentation directory for optional global coherence checks"
      - name: severity_threshold
        type: text
        required: false
        default: "all"
        description: "Minimum severity to report: critical, high, medium, low, all"
      - name: strategy
        type: text
        required: false
        default: "by-directory"
        description: "Partition strategy: by-directory, by-type, by-concern, auto"
      - name: concern_map
        type: text
        required: false
        description: "Manual concern-to-glob mapping (required for by-concern strategy)"
      - name: partition_count
        type: text
        required: false
        description: "Number of partitions (for auto strategy)"
      - name: run_cross_subsystem
        type: boolean
        required: false
        default: true
        description: "Run cross-subsystem coherence audit stage"
      - name: run_freshness
        type: boolean
        required: false
        default: true
        description: "Run freshness and supersession audit stage"
      - name: max_age_days
        type: text
        required: false
        default: "30"
        description: "Freshness threshold in days for stale artifact detection"
    access: human
    depends_on:
      - skill: audit-migration
        condition: "active in skill manifest"
      - skill: audit-cross-subsystem-coherence
        condition: "active in skill manifest (required when run_cross_subsystem parameter is true)"
      - skill: audit-freshness-and-supersession
        condition: "active in skill manifest (required when run_freshness parameter is true)"
    io:
      inputs:
        - name: migration_manifest
          path: "{{manifest}}"
          kind: file
          format: yaml
          required: true
          description: "Migration manifest with old/new mappings and scope"
      outputs:
        - name: consolidated_report
          path: "../../output/reports/{{date}}-migration-audit-consolidated.md"
          kind: file
          format: markdown
          determinism: unique
          description: "Consolidated report with partitioned migration findings and optional global-stage outcomes"
        - name: partition_reports
          path: "../../output/reports/{{date}}-migration-audit-{{partition}}.md"
          kind: file
          format: markdown
          determinism: unique
          description: "Individual partition audit reports"
        - name: cross_subsystem_audit_report
          path: "../../output/reports/{{date}}-cross-subsystem-coherence-audit.md"
          kind: file
          format: markdown
          determinism: unique
          description: "Individual cross-subsystem coherence audit report (produced if enabled)"
        - name: freshness_audit_report
          path: "../../output/reports/{{date}}-freshness-and-supersession-audit.md"
          kind: file
          format: markdown
          determinism: unique
          description: "Individual freshness and supersession audit report (produced if enabled)"

  pre-release-audit:
    version: "1.2.0"
    commands: ["/pre-release-audit"]
    parameters:
      - name: subsystem
        type: folder
        required: true
        description: "Root directory of the subsystem to audit"
      - name: manifest
        type: file
        required: false
        description: "Migration manifest (inline YAML or file path); omit for health-only audit"
      - name: docs
        type: folder
        required: false
        description: "Companion documentation directory for doc-to-source alignment"
      - name: severity_threshold
        type: text
        required: false
        default: "all"
        description: "Minimum severity to report: critical, high, medium, low, all"
      - name: run_cross_subsystem
        type: boolean
        required: false
        default: true
        description: "Run cross-subsystem coherence audit stage"
      - name: run_freshness
        type: boolean
        required: false
        default: true
        description: "Run freshness and supersession audit stage"
      - name: max_age_days
        type: text
        required: false
        default: "30"
        description: "Freshness threshold in days for stale artifact detection"
    access: human
    depends_on:
      - skill: audit-subsystem-health
        condition: "active in skill manifest"
      - workflow: orchestrate-audit
        condition: "active in workflow manifest (required only when manifest parameter is provided)"
      - skill: audit-cross-subsystem-coherence
        condition: "active in skill manifest (required when run_cross_subsystem parameter is true)"
      - skill: audit-freshness-and-supersession
        condition: "active in skill manifest (required when run_freshness parameter is true)"
    io:
      inputs: []
      outputs:
        - name: pre_release_report
          path: "../../output/reports/{{date}}-pre-release-audit.md"
          kind: file
          format: markdown
          determinism: unique
          description: "Consolidated pre-release audit report with go/no-go recommendation"
        - name: health_audit_report
          path: "../../output/reports/{{date}}-subsystem-health-audit.md"
          kind: file
          format: markdown
          determinism: unique
          description: "Individual health audit report (produced by audit-subsystem-health)"
        - name: migration_audit_report
          path: "../../output/reports/{{date}}-migration-audit-consolidated.md"
          kind: file
          format: markdown
          determinism: unique
          description: "Consolidated migration audit report (produced by orchestrate-audit in migration-only mode, if manifest provided)"
        - name: cross_subsystem_audit_report
          path: "../../output/reports/{{date}}-cross-subsystem-coherence-audit.md"
          kind: file
          format: markdown
          determinism: unique
          description: "Individual cross-subsystem coherence audit report (produced by audit-cross-subsystem-coherence, if enabled)"
        - name: freshness_audit_report
          path: "../../output/reports/{{date}}-freshness-and-supersession-audit.md"
          kind: file
          format: markdown
          determinism: unique
          description: "Individual freshness and supersession audit report (produced by audit-freshness-and-supersession, if enabled)"

  documentation-quality-gate:
    version: "1.0.0"
    commands: ["/documentation-quality-gate"]
    parameters:
      - name: docs_root
        type: folder
        required: true
        description: "Root documentation directory to validate"
      - name: template_root
        type: folder
        required: false
        default: ".harmony/scaffolding/runtime/templates/docs/documentation-standards"
        description: "Canonical documentation template root"
      - name: policy_doc
        type: file
        required: false
        default: ".harmony/cognition/governance/principles/documentation-is-code.md"
        description: "Canonical docs-as-code policy document"
      - name: severity_threshold
        type: text
        required: false
        default: "all"
        description: "Minimum severity to report: critical, high, medium, low, all"
    access: human
    depends_on:
      - skill: audit-documentation-standards
        condition: "active in skill manifest"
    io:
      inputs: []
      outputs:
        - name: docs_quality_gate_report
          path: "../../output/reports/{{date}}-documentation-quality-gate.md"
          kind: file
          format: markdown
          determinism: unique
          description: "Consolidated docs quality gate report with go/no-go recommendation"
        - name: docs_standards_audit_report
          path: "../../output/reports/{{date}}-documentation-standards-audit.md"
          kind: file
          format: markdown
          determinism: unique
          description: "Input audit report produced by audit-documentation-standards"

  # --- Skeleton entries (existing workflows, not yet fully migrated) ---

  create-harness:
    version: "1.2.0"
    commands: ["/create-harness"]
    access: human
    depends_on: []

  evaluate-harness:
    version: "1.1.0"
    commands: ["/evaluate-harness"]
    access: human
    depends_on: []

  migrate-harness:
    version: "1.1.0"
    commands: ["/migrate-harness"]
    access: human
    depends_on: []

  update-harness:
    version: "1.1.0"
    commands: ["/update-harness"]
    access: human
    depends_on:
      - workflow: evaluate-harness
        condition: "optional but recommended to run first"

  create-mission:
    version: "1.1.0"
    commands: ["/create-mission"]
    access: human
    depends_on: []

  complete-mission:
    version: "1.1.0"
    commands: ["/complete-mission"]
    access: human
    depends_on:
      - workflow: create-mission
        condition: "Mission must exist"

  create-skill:
    version: "2.0.0"
    commands: ["/create-skill"]
    access: human
    depends_on: []
    deprecated: true
    deprecated_by: ".harmony/capabilities/runtime/skills/meta/create-skill/"

  create-workflow:
    version: "1.0.0"
    commands: ["/create-workflow"]
    access: human
    depends_on: []

  evaluate-workflow:
    version: "1.0.0"
    commands: ["/evaluate-workflow"]
    access: human
    depends_on: []

  update-workflow:
    version: "1.0.0"
    commands: ["/update-workflow"]
    access: human
    depends_on:
      - workflow: evaluate-workflow
        condition: "optional but recommended to run first"

  refactor:
    version: "1.1.0"
    commands: ["/refactor"]
    access: human
    depends_on: []

  create-project:
    version: "1.0.0"
    commands: ["/create-project"]
    access: human
    depends_on: []

  add-api-endpoint:
    version: "1.0.0"
    commands: ["/add-api-endpoint"]
    access: human
    depends_on: []

  add-ui-feature:
    version: "1.0.0"
    commands: ["/add-ui-feature"]
    access: human
    depends_on: []

  fix-a-bug:
    version: "1.0.0"
    commands: ["/fix-a-bug"]
    access: human
    depends_on: []

  handle-security-issue:
    version: "1.0.0"
    commands: ["/handle-security-issue"]
    access: human
    depends_on: []

  onboard-new-developer:
    version: "1.0.0"
    commands: ["/onboard-new-developer"]
    access: human
    depends_on: []

  run-data-migration:
    version: "1.0.0"
    commands: ["/run-data-migration"]
    access: human
    depends_on: []

  python-api-foundation:
    version: "1.0.0"
    commands: ["/python-api-foundation"]
    parameters:
      - name: project_name
        type: text
        required: true
        description: "Project name (lowercase, hyphens)"
      - name: description
        type: text
        required: true
        description: "One-line project description"
      - name: python_version
        type: text
        required: true
        default: "python3.12"
        description: "Python version (e.g., python3.12)"
      - name: services
        type: text
        required: false
        description: "Infrastructure services: postgres, nats, redis, s3, temporal"
      - name: skip
        type: text
        required: false
        description: "Comma-separated skill IDs to skip"
    access: human
    depends_on:
      - skill: python-scaffold-package
        condition: "active in foundations/python-api/"
      - skill: python-contract-first-api
        condition: "active in foundations/python-api/"
      - skill: python-test-harness
        condition: "active in foundations/python-api/"
      - skill: python-dev-toolchain
        condition: "active in foundations/python-api/"
      - skill: python-infra-manifest
        condition: "active in foundations/python-api/"
      - skill: python-contributor-guide
        condition: "active in foundations/python-api/"
    io:
      inputs:
        - name: project_arguments
          path: "{{arguments}}"
          kind: text
          format: cli
          required: true
          description: "Project name, description, python version, and services"
      outputs:
        - name: project_scaffold
          path: "src/{{package_name}}/"
          kind: directory
          format: python-package
          determinism: unique
          description: "Complete Python package structure"
        - name: contracts
          path: "docs/contracts/"
          kind: directory
          format: mixed
          determinism: unique
          description: "OpenAPI spec, JSON schemas, and versioning policy"
        - name: test_suite
          path: "tests/"
          kind: directory
          format: python-tests
          determinism: unique
          description: "Three-tier test pyramid"
        - name: contributor_docs
          path: "AGENT.md"
          kind: file
          format: markdown
          determinism: unique
          description: "AI agent orientation document"

  swift-macos-app-foundation:
    version: "1.0.0"
    commands: ["/swift-macos-app-foundation"]
    parameters:
      - name: project_name
        type: text
        required: true
        description: "Project name (PascalCase for modules)"
      - name: description
        type: text
        required: true
        description: "One-line project description"
      - name: swift_version
        type: text
        required: true
        default: "5.9"
        description: "Swift version (e.g., 5.9, 6.0)"
      - name: macos_target
        type: text
        required: true
        default: "14"
        description: "macOS deployment target (e.g., 14, 15)"
      - name: dependencies
        type: text
        required: false
        description: "Dependencies: grdb, yams, argument-parser, async-http-client, swift-graph, ulid"
      - name: skip
        type: text
        required: false
        description: "Comma-separated skill IDs to skip"
    access: human
    depends_on:
      - skill: swift-scaffold-package
        condition: "active in foundations/swift-macos-app/"
      - skill: swift-data-layer
        condition: "active in foundations/swift-macos-app/"
      - skill: swift-daemon-service
        condition: "active in foundations/swift-macos-app/"
      - skill: swift-cli-interface
        condition: "active in foundations/swift-macos-app/"
      - skill: swift-test-harness
        condition: "active in foundations/swift-macos-app/"
      - skill: swift-contributor-guide
        condition: "active in foundations/swift-macos-app/"
    io:
      inputs:
        - name: project_arguments
          path: "{{arguments}}"
          kind: text
          format: cli
          required: true
          description: "Project name, description, swift version, macos target, and dependencies"
      outputs:
        - name: package_manifest
          path: "Package.swift"
          kind: file
          format: swift
          determinism: unique
          description: "Swift Package Manager manifest"
        - name: source_tree
          path: "Sources/{{PROJECT_NAME}}/"
          kind: directory
          format: swift-package
          determinism: unique
          description: "Complete Swift source module structure"
        - name: test_suite
          path: "Tests/{{PROJECT_NAME}}Tests/"
          kind: directory
          format: swift-tests
          determinism: unique
          description: "XCTest test suites and fixtures"
        - name: agent_doc
          path: "CLAUDE.md"
          kind: file
          format: markdown
          determinism: unique
          description: "AI agent orientation document"

  promote-from-scratchpad:
    version: "1.0.0"
    commands: ["/promote-from-scratchpad"]
    access: human
    depends_on: []
