# Workflow Registry — Tier 2 Extended Metadata
#
# Extended metadata for workflow routing: versions, commands, parameters, I/O.
# Token budget: ~50 tokens per workflow entry.
#
# Load AFTER matching a workflow in manifest.yml.
# Then load WORKFLOW.md when the workflow is activated.
#
# Composition note:
# - Workflows are procedural orchestrations.
# - Composite Skills are reusable capability bundles.
# - `depends_on.skill` may reference atomic or composite skills.

routing:
  explicit_command_required: false
  ambiguity_resolution: "ask"

governance:
  capability_map_ref: "../../governance/capability-map-v1.yml"
  capability_map_schema_ref: "../../governance/capability-map-v1.schema.json"
  classification_source: "workflow-capability-map"
  autonomy_policy:
    autonomous_requires_classification: "agent-ready"
    fallback_modes: ["agent-augmented", "human-only"]

workflows:
  # --- Fully specified (spec-compliant) ---

  audit-orchestration-workflow:
    version: "2.0.0"
    commands: ["/audit-orchestration-workflow"]
    parameters:
      - name: manifest
        type: file
        required: true
        description: "Migration manifest (inline YAML or file path)"
      - name: scope
        type: folder
        required: false
        default: "."
        description: "Root directory to partition and audit"
      - name: docs
        type: folder
        required: false
        description: "Companion documentation directory for optional global coherence checks"
      - name: severity_threshold
        type: text
        required: false
        default: "all"
        description: "Minimum severity to report: critical, high, medium, low, all"
      - name: strategy
        type: text
        required: false
        default: "by-directory"
        description: "Partition strategy: by-directory, by-type, by-concern, auto"
      - name: concern_map
        type: text
        required: false
        description: "Manual concern-to-glob mapping (required for by-concern strategy)"
      - name: partition_count
        type: text
        required: false
        description: "Number of partitions (for auto strategy)"
      - name: run_cross_subsystem
        type: boolean
        required: false
        default: true
        description: "Run cross-subsystem coherence audit stage"
      - name: run_freshness
        type: boolean
        required: false
        default: true
        description: "Run freshness and supersession audit stage"
      - name: max_age_days
        type: text
        required: false
        default: "30"
        description: "Freshness threshold in days for stale artifact detection"
      - name: post_remediation
        type: boolean
        required: false
        default: false
        description: "Enable strict done-gate verification after remediation"
      - name: convergence_k
        type: text
        required: false
        default: "3"
        description: "Number of controlled reruns used to evaluate convergence stability"
      - name: seed_list
        type: text
        required: false
        description: "Comma-separated deterministic seeds used for multi-pass consistency checks"
    access: human
    depends_on:
      - skill: audit-migration
        condition: "active in skill manifest"
      - skill: audit-cross-subsystem-coherence
        condition: "active in skill manifest (required when run_cross_subsystem parameter is true)"
      - skill: audit-freshness-and-supersession
        condition: "active in skill manifest (required when run_freshness parameter is true)"
    io:
      inputs:
        - name: migration_manifest
          path: "{{manifest}}"
          kind: file
          format: yaml
          required: true
          description: "Migration manifest with old/new mappings and scope"
      outputs:
        - name: consolidated_report
          path: "../../output/reports/{{date}}-migration-audit-consolidated.md"
          kind: file
          format: markdown
          determinism: unique
          description: "Consolidated report with partitioned migration findings and optional global-stage outcomes"
        - name: partition_reports
          path: "../../output/reports/{{date}}-migration-audit-{{partition}}.md"
          kind: file
          format: markdown
          determinism: unique
          description: "Individual partition audit reports"
        - name: cross_subsystem_audit_report
          path: "../../output/reports/{{date}}-cross-subsystem-coherence-audit.md"
          kind: file
          format: markdown
          determinism: unique
          description: "Individual cross-subsystem coherence audit report (produced if enabled)"
        - name: freshness_audit_report
          path: "../../output/reports/{{date}}-freshness-and-supersession-audit.md"
          kind: file
          format: markdown
          determinism: unique
          description: "Individual freshness and supersession audit report (produced if enabled)"
        - name: bounded_audit_bundle
          path: "../../output/reports/audits/{{date}}-{{slug}}/"
          kind: directory
          format: mixed
          determinism: unique
          description: "Authoritative bounded-audit evidence bundle with findings, coverage, and convergence artifacts"

  audit-pre-release-workflow:
    version: "2.2.0"
    commands: ["/audit-pre-release-workflow"]
    parameters:
      - name: subsystem
        type: folder
        required: true
        description: "Root directory of the subsystem to audit"
      - name: manifest
