schema_version: "workflow-contract-v1"
name: "audit-design-proposal"
description: "Run the architecture validation pipeline for a design proposal in rigorous or short mode with explicit remediation stages, persist stage reports into a workflow bundle, and verify that file-writing stages changed the package or emitted explicit zero-change receipts."
version: "1.0.0"
entry_mode: "human"
execution_profile: "core"
side_effect_class: "mutating"
execution_controls:
  cancel_safe: false
coordination_key_strategy:
  kind: "workflow-target"
  source_fields:
    - "workflow_group"
    - "workflow_id"
  format: "workflow:{workflow_group}/{workflow_id}"
executor_interface_version: "workflow-executor-v1"
inputs:
  - name: proposal_path
    type: folder
    required: true
    description: "Root design-proposal directory to validate and harden"
  - name: mode
    type: text
    required: false
    default: "rigorous"
    description: "Pipeline mode: rigorous or short"
  - name: executor
    type: text
    required: false
    default: "auto"
    description: "Executor backend: auto, codex, claude, or mock"
  - name: executor_bin
    type: file
    required: false
    description: "Optional explicit path to the selected executor binary"
  - name: output_slug
    type: text
    required: false
    description: "Optional stable slug for the bounded report bundle"
  - name: model
    type: text
    required: false
    description: "Optional model override forwarded to codex or claude"
  - name: prepare_only
    type: boolean
    required: false
    default: false
    description: "Materialize bundle metadata and prompt packets without invoking the executor"
  - name: summary_root
    type: folder
    required: false
    default: ".harmony/output/reports/analysis"
    description: "Root directory for the top-level summary report"
  - name: bundle_root
    type: folder
    required: false
    default: ".harmony/output/reports/workflows"
    description: "Root directory for the workflow stage-report bundle"
stages:
  - id: "configure"
    asset: "stages/01-configure.md"
    kind: "analysis"
    consumes: []
    produces: ["stage:configure"]
    mutation_scope: []
  - id: "design-audit"
    asset: "stages/02-design-audit.md"
    kind: "analysis"
    consumes: ["stage:configure"]
    produces: ["stage:design-audit"]
    mutation_scope: []
  - id: "design-proposal-remediation"
    asset: "stages/03-design-proposal-remediation.md"
    kind: "mutation"
    consumes: ["stage:design-audit"]
    produces: ["stage:design-proposal-remediation"]
    mutation_scope: ["workflow-scope"]
  - id: "design-red-team"
    asset: "stages/04-design-red-team.md"
    kind: "analysis"
    consumes: ["stage:design-audit"]
    produces: ["stage:design-red-team"]
    mutation_scope: []
  - id: "design-hardening"
    asset: "stages/05-design-hardening.md"
    kind: "mutation"
    consumes: ["stage:design-red-team"]
    produces: ["stage:design-hardening"]
    mutation_scope: ["workflow-scope"]
  - id: "design-integration"
    asset: "stages/06-design-integration.md"
    kind: "mutation"
    consumes: ["stage:design-hardening"]
    produces: ["stage:design-integration"]
    mutation_scope: ["workflow-scope"]
  - id: "implementation-simulation"
    asset: "stages/07-implementation-simulation.md"
    kind: "analysis"
    consumes: ["stage:design-proposal-remediation", "stage:design-integration"]
    produces: ["stage:implementation-simulation"]
    mutation_scope: []
  - id: "specification-closure"
    asset: "stages/08-specification-closure.md"
    kind: "mutation"
    consumes: ["stage:implementation-simulation"]
    produces: ["stage:specification-closure"]
    mutation_scope: ["workflow-scope"]
  - id: "extract-blueprint"
    asset: "stages/09-extract-blueprint.md"
    kind: "projection"
    consumes: ["stage:specification-closure"]
    produces: ["stage:extract-blueprint"]
    mutation_scope: []
  - id: "first-implementation-plan"
    asset: "stages/10-first-implementation-plan.md"
    kind: "projection"
    consumes: ["stage:extract-blueprint"]
    produces: ["stage:first-implementation-plan"]
    mutation_scope: []
  - id: "report"
    asset: "stages/11-report.md"
    kind: "projection"
    consumes: ["stage:first-implementation-plan"]
    produces: ["stage:report"]
    mutation_scope: []
  - id: "verify"
    asset: "stages/12-verify.md"
    kind: "verification"
    consumes: ["stage:report"]
    produces: ["stage:verify"]
    mutation_scope: []
artifacts:
  - name: design_proposal_workflow_summary
    path: "../../output/reports/analysis/{{date}}-audit-design-proposal.md"
    kind: file
    format: markdown
    determinism: unique
    description: "Top-level workflow summary with selected mode, readiness verdict, changed files, and next steps"
  - name: design_proposal_workflow_bundle
    path: "../../output/reports/workflows/{{date}}-audit-design-proposal-{{slug}}/"
    kind: directory
    format: mixed
    determinism: unique
    description: "Workflow bundle containing stage reports, metadata, validation state, and aggregate proposal deltas"
  - name: design_audit_report
    path: "../../output/reports/workflows/{{date}}-audit-design-proposal-{{slug}}/reports/01-design-proposal-audit.md"
    kind: file
    format: markdown
    determinism: unique
    description: "Stage report produced by the design proposal audit prompt"
  - name: design_proposal_remediation_report
    path: "../../output/reports/workflows/{{date}}-audit-design-proposal-{{slug}}/reports/02-design-proposal-remediation.md"
    kind: file
    format: markdown
    determinism: unique
    description: "Short-mode remediation report and package delta receipt"
  - name: design_red_team_report
    path: "../../output/reports/workflows/{{date}}-audit-design-proposal-{{slug}}/reports/03-design-red-team.md"
    kind: file
    format: markdown
    determinism: unique
    description: "Rigorous-mode adversarial report"
  - name: design_hardening_report
    path: "../../output/reports/workflows/{{date}}-audit-design-proposal-{{slug}}/reports/04-design-hardening.md"
    kind: file
    format: markdown
    determinism: unique
    description: "Rigorous-mode hardening report and package delta receipt"
  - name: design_integration_report
    path: "../../output/reports/workflows/{{date}}-audit-design-proposal-{{slug}}/reports/05-design-integration.md"
    kind: file
    format: markdown
    determinism: unique
    description: "Rigorous-mode integration report and package delta receipt"
  - name: implementation_simulation_report
    path: "../../output/reports/workflows/{{date}}-audit-design-proposal-{{slug}}/reports/06-implementation-simulation.md"
    kind: file
    format: markdown
    determinism: unique
    description: "Buildability simulation report"
  - name: specification_closure_report
    path: "../../output/reports/workflows/{{date}}-audit-design-proposal-{{slug}}/reports/07-specification-closure.md"
    kind: file
    format: markdown
    determinism: unique
    description: "Specification-closure report or explicit no-op receipt"
  - name: implementation_architecture_blueprint
    path: "../../output/reports/workflows/{{date}}-audit-design-proposal-{{slug}}/reports/08-minimal-implementation-architecture-blueprint.md"
    kind: file
    format: markdown
    determinism: unique
    description: "Minimal implementer blueprint extracted from the stabilized package"
  - name: first_implementation_plan
    path: "../../output/reports/workflows/{{date}}-audit-design-proposal-{{slug}}/reports/09-first-implementation-plan.md"
    kind: file
    format: markdown
    determinism: unique
    description: "First production implementation plan derived from the blueprint"
done_gate:
  checks:
    - "Selected mode is recorded and stage coverage matches it"
    - "Every selected stage has a persisted report in the workflow bundle"
    - "Every file-writing stage has a change manifest or zero-change receipt"
    - "`summary.md`, `commands.md`, `inventory.md`, `package-delta.md`, `bundle.yml`, and `validation.md` exist"
    - "`stage-inputs/` and `stage-logs/` exist for the workflow bundle"
    - "Top-level summary exists at `.harmony/output/reports/analysis/YYYY-MM-DD-audit-design-proposal.md`"
    - "If the target proposal contains `proposal.yml`, `validate-proposal-standard.sh --package <target>` passes"
    - "If the target proposal contains `design-proposal.yml`, `validate-design-proposal.sh --package <target>` passes"
    - "Final readiness verdict is explicit"
constraints:
  fail_closed: true
  forbid_design_packages: true
  require_relative_local_assets: true
