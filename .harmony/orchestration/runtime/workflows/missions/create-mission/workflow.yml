schema_version: "workflow-contract-v1"
name: "create-mission"
description: "Scaffold a new mission artifact set and register it for execution tracking."
version: "1.1.0"
entry_mode: "human"
execution_profile: "core"
side_effect_class: "mutating"
execution_controls:
  cancel_safe: false
coordination_key_strategy:
  kind: "workflow-target"
  source_fields:
    - "workflow_group"
    - "workflow_id"
  format: "workflow:{workflow_group}/{workflow_id}"
executor_interface_version: "workflow-executor-v1"
inputs: []
stages:
  - id: "overview"
    asset: "stages/00-overview.md"
    kind: "analysis"
    consumes: []
    produces: ["stage:overview"]
    mutation_scope: []
artifacts: []
done_gate:
  checks:
    - "verification stage passes"
constraints:
  fail_closed: true
  forbid_design_packages: true
  require_relative_local_assets: true
