schema_version: "workflow-contract-v1"
name: "[workflow-id]"
description: "[What this workflow does and when to use it.]"
version: "1.0.0"
entry_mode: "human"
execution_profile: "core"
side_effect_class: "read_only"
execution_controls:
  cancel_safe: true
coordination_key_strategy:
  kind: "none"
executor_interface_version: "workflow-executor-v1"
inputs: []
stages:
  - id: "stage"
    asset: "stages/01-stage.md"
    kind: "analysis"
    produces: ["stage:stage"]
    consumes: []
    mutation_scope: []
  - id: "verify"
    asset: "stages/99-verify.md"
    kind: "verification"
    produces: ["stage:verify"]
    consumes: ["stage:stage"]
    mutation_scope: []
artifacts: []
done_gate:
  checks:
    - "verification stage passes"
constraints:
  fail_closed: true
  forbid_design_packages: true
  require_relative_local_assets: true
