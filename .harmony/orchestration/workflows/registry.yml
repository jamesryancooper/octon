# Workflow Registry — Tier 2 Extended Metadata
#
# Extended metadata for workflow routing: versions, commands, parameters, I/O.
# Token budget: ~50 tokens per workflow entry.
#
# Load AFTER matching a workflow in manifest.yml.
# Then load WORKFLOW.md when the workflow is activated.

routing:
  explicit_command_required: false
  ambiguity_resolution: "ask"

workflows:
  # --- Fully specified (spec-compliant) ---

  orchestrate-audit:
    version: "1.0.0"
    commands: ["/orchestrate-audit"]
    parameters:
      - name: manifest
        type: file
        required: true
        description: "Migration manifest (inline YAML or file path)"
      - name: strategy
        type: text
        required: false
        default: "by-directory"
        description: "Partition strategy: by-directory, by-type, by-concern, auto"
      - name: concern_map
        type: text
        required: false
        description: "Manual concern-to-glob mapping (required for by-concern strategy)"
      - name: partition_count
        type: text
        required: false
        description: "Number of partitions (for auto strategy)"
    access: human
    depends_on:
      - skill: audit-migration
        condition: "active in skill manifest"
    io:
      inputs:
        - name: migration_manifest
          path: "{{manifest}}"
          kind: file
          format: yaml
          required: true
          description: "Migration manifest with old/new mappings and scope"
      outputs:
        - name: consolidated_report
          path: "../../output/reports/{{date}}-migration-audit-consolidated.md"
          kind: file
          format: markdown
          determinism: unique
          description: "Consolidated audit report across all partitions"
        - name: partition_reports
          path: "../../output/reports/{{date}}-migration-audit-{{partition}}.md"
          kind: file
          format: markdown
          determinism: unique
          description: "Individual partition audit reports"

  # --- Skeleton entries (existing workflows, not yet fully migrated) ---

  create-harness:
    version: "1.2.0"
    commands: ["/create-harness"]
    access: human
    depends_on: []

  evaluate-harness:
    version: "1.1.0"
    commands: ["/evaluate-harness"]
    access: human
    depends_on: []

  migrate-harness:
    version: "1.1.0"
    commands: ["/migrate-harness"]
    access: human
    depends_on: []

  update-harness:
    version: "1.1.0"
    commands: ["/update-harness"]
    access: human
    depends_on:
      - workflow: evaluate-harness
        condition: "optional but recommended to run first"

  create-mission:
    version: "1.1.0"
    commands: ["/create-mission"]
    access: human
    depends_on: []

  complete-mission:
    version: "1.1.0"
    commands: ["/complete-mission"]
    access: human
    depends_on:
      - workflow: create-mission
        condition: "Mission must exist"

  create-skill:
    version: "2.0.0"
    commands: ["/create-skill"]
    access: human
    depends_on: []
    deprecated: true
    deprecated_by: ".harmony/capabilities/skills/meta/create-skill/"

  create-workflow:
    version: "1.0.0"
    commands: ["/create-workflow"]
    access: human
    depends_on: []

  evaluate-workflow:
    version: "1.0.0"
    commands: ["/evaluate-workflow"]
    access: human
    depends_on: []

  update-workflow:
    version: "1.0.0"
    commands: ["/update-workflow"]
    access: human
    depends_on:
      - workflow: evaluate-workflow
        condition: "optional but recommended to run first"

  refactor:
    version: "1.1.0"
    commands: ["/refactor"]
    access: human
    depends_on: []

  run-flow:
    version: "1.0.0"
    commands: ["/run-flow"]
    access: human
    depends_on: []

  create-project:
    version: "1.0.0"
    commands: ["/create-project"]
    access: human
    depends_on: []

  python-api-foundation:
    version: "1.0.0"
    commands: ["/python-api-foundation"]
    parameters:
      - name: project_name
        type: text
        required: true
        description: "Project name (lowercase, hyphens)"
      - name: description
        type: text
        required: true
        description: "One-line project description"
      - name: python_version
        type: text
        required: true
        default: "python3.12"
        description: "Python version (e.g., python3.12)"
      - name: services
        type: text
        required: false
        description: "Infrastructure services: postgres, nats, redis, s3, temporal"
      - name: skip
        type: text
        required: false
        description: "Comma-separated skill names to skip"
    access: human
    depends_on:
      - skill: scaffold-package
        condition: "active in foundations/python-api/"
      - skill: contract-first-api
        condition: "active in foundations/python-api/"
      - skill: test-harness
        condition: "active in foundations/python-api/"
      - skill: dev-toolchain
        condition: "active in foundations/python-api/"
      - skill: infra-manifest
        condition: "active in foundations/python-api/"
      - skill: contributor-guide
        condition: "active in foundations/python-api/"
    io:
      inputs:
        - name: project_arguments
          path: "{{arguments}}"
          kind: text
          format: cli
          required: true
          description: "Project name, description, python version, and services"
      outputs:
        - name: project_scaffold
          path: "src/{{package_name}}/"
          kind: directory
          format: python-package
          determinism: unique
          description: "Complete Python package structure"
        - name: contracts
          path: "docs/contracts/"
          kind: directory
          format: mixed
          determinism: unique
          description: "OpenAPI spec, JSON schemas, and versioning policy"
        - name: test_suite
          path: "tests/"
          kind: directory
          format: python-tests
          determinism: unique
          description: "Three-tier test pyramid"
        - name: contributor_docs
          path: "AGENT.md"
          kind: file
          format: markdown
          determinism: unique
          description: "AI agent orientation document"

  swift-macos-app-foundation:
    version: "1.0.0"
    commands: ["/swift-macos-app-foundation"]
    parameters:
      - name: project_name
        type: text
        required: true
        description: "Project name (PascalCase for modules)"
      - name: description
        type: text
        required: true
        description: "One-line project description"
      - name: swift_version
        type: text
        required: true
        default: "5.9"
        description: "Swift version (e.g., 5.9, 6.0)"
      - name: macos_target
        type: text
        required: true
        default: "14"
        description: "macOS deployment target (e.g., 14, 15)"
      - name: dependencies
        type: text
        required: false
        description: "Dependencies: grdb, yams, argument-parser, async-http-client, swift-graph, ulid"
      - name: skip
        type: text
        required: false
        description: "Comma-separated skill names to skip"
    access: human
    depends_on:
      - skill: scaffold-package
        condition: "active in foundations/swift-macos-app/"
      - skill: data-layer
        condition: "active in foundations/swift-macos-app/"
      - skill: daemon-service
        condition: "active in foundations/swift-macos-app/"
      - skill: cli-interface
        condition: "active in foundations/swift-macos-app/"
      - skill: test-harness
        condition: "active in foundations/swift-macos-app/"
      - skill: contributor-guide
        condition: "active in foundations/swift-macos-app/"
    io:
      inputs:
        - name: project_arguments
          path: "{{arguments}}"
          kind: text
          format: cli
          required: true
          description: "Project name, description, swift version, macos target, and dependencies"
      outputs:
        - name: package_manifest
          path: "Package.swift"
          kind: file
          format: swift
          determinism: unique
          description: "Swift Package Manager manifest"
        - name: source_tree
          path: "Sources/{{PROJECT_NAME}}/"
          kind: directory
          format: swift-package
          determinism: unique
          description: "Complete Swift source module structure"
        - name: test_suite
          path: "Tests/{{PROJECT_NAME}}Tests/"
          kind: directory
          format: swift-tests
          determinism: unique
          description: "XCTest test suites and fixtures"
        - name: agent_doc
          path: "CLAUDE.md"
          kind: file
          format: markdown
          determinism: unique
          description: "AI agent orientation document"

  promote-from-scratchpad:
    version: "1.0.0"
    commands: ["/promote-from-scratchpad"]
    access: human
    depends_on: []
