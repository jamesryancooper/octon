version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Chicago
    labels:
      - bot:dependabot
      - type:chore
      - area:github
      - risk:low
      - autonomy:no-automerge
    open-pull-requests-limit: 5
