name: PR Quality Standards

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-pr-template:
    name: PR Quality Standards
    runs-on: ubuntu-latest
    steps:
      - name: Validate required sections and checklist
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const headRef = pr?.head?.ref || "";
            const author = pr?.user?.login || "";
            const labels = (pr?.labels || []).map((label) => label.name);

            const isDependabot = author === "dependabot[bot]" || headRef.startsWith("dependabot/");
            const isReleasePlease =
              headRef.startsWith("release-please--") ||
              labels.some((name) => name.startsWith("autorelease:"));

            if (isDependabot || isReleasePlease) {
              core.notice("Skipping PR template validation for bot-managed PR.");
              return;
            }

            const body = (context.payload.pull_request.body || '').trim();
            const templatePath = ".github/PULL_REQUEST_TEMPLATE.md";
            const baseSha = context.payload.pull_request?.base?.sha;
            if (!baseSha) {
              core.setFailed("Unable to determine PR base SHA for template validation.");
              return;
            }

            const templateResponse = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: templatePath,
              ref: baseSha
            });

            if (Array.isArray(templateResponse.data) || !("content" in templateResponse.data)) {
              core.setFailed(`Expected file content at ${templatePath} but found a non-file response.`);
              return;
            }

            const template = Buffer.from(
              templateResponse.data.content,
              templateResponse.data.encoding || "base64"
            ).toString("utf8");

            const headingMatches = [...template.matchAll(/^##\s+(.+)\s*$/gm)];
            const headings = headingMatches.map((m) => `## ${m[1].trim()}`);

            const checklistHeading = "## Checklist";
            const checklistIndex = headings.indexOf(checklistHeading);
            if (checklistIndex === -1) {
              core.setFailed(`Canonical template ${templatePath} is missing "${checklistHeading}".`);
              return;
            }

            // Require all canonical headings up to and including Checklist.
            const requiredHeadings = headings.slice(0, checklistIndex + 1);

            const checklistSection = (template.match(/## Checklist\s*([\s\S]*?)(?=\n##\s+|$)/) || [])[1] || "";
            const requiredChecklist = [...checklistSection.matchAll(/^\s*-\s*\[[ xX]\]\s*(.+?)\s*$/gm)]
              .map((m) => m[1].trim());

            if (!requiredChecklist.length) {
              core.setFailed(`Canonical template ${templatePath} has no checklist items to validate.`);
              return;
            }

            const escapeRegExp = (text) =>
              text.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");

            const hasHeading = (heading) =>
              new RegExp(`^${escapeRegExp(heading)}\\s*$`, "mi").test(body);

            const hasChecklistItem = (item) =>
              new RegExp(`^-\\s*\\[[ xX]\\]\\s*${escapeRegExp(item)}\\s*$`, "mi").test(body);

            if (!body) {
              core.setFailed(
                "PR description is empty. Fill out the PR template sections and checklist."
              );
              return;
            }

            const missingHeadings = requiredHeadings.filter((heading) => !hasHeading(heading));
            const missingChecklist = requiredChecklist.filter((item) => !hasChecklistItem(item));

            if (missingHeadings.length || missingChecklist.length) {
              const details = [];
              if (missingHeadings.length) {
                details.push(`Missing required sections:\n- ${missingHeadings.join("\n- ")}`);
              }
              if (missingChecklist.length) {
                details.push(`Missing checklist items:\n- ${missingChecklist.join("\n- ")}`);
              }
              core.setFailed(
                `PR does not meet repository PR quality standards.\n\n${details.join("\n\n")}`
              );
              return;
            }

            core.info("PR body passes required standards.");
