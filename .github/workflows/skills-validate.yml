name: Skills Validation

on:
  push:
    branches:
      - main
    paths:
      - '.octon/capabilities/runtime/skills/**'
  pull_request:
    paths:
      - '.octon/capabilities/runtime/skills/**'

permissions:
  contents: read

concurrency:
  group: skills-validate-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python (for tiktoken)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          cache-bin: true

      - name: Install tiktoken for accurate token validation
        run: pip install tiktoken

      - name: Validate skills
        run: |
          chmod +x .octon/capabilities/runtime/skills/_ops/scripts/validate-skills.sh
          .octon/capabilities/runtime/skills/_ops/scripts/validate-skills.sh --strict

      - name: Report validation results
        if: failure()
        run: |
          echo "::error::Skills validation failed. Run '.octon/capabilities/runtime/skills/_ops/scripts/validate-skills.sh' locally to see details."
