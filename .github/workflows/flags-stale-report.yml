name: Harness Reference Drift Report

on:
  schedule:
    - cron: '0 9 * * 1' # Mondays at 09:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate reference drift report
        run: |
          set -euo pipefail
          patterns='docs/architecture/harness/|scripts/smoke-check\\.sh|scripts/flags-stale-report\\.js|commitlint\\.config\\.cjs|@packages/workflows|packages/workflows/<flowId>'

          rg -n --hidden -S "${patterns}" \
            .octon .cursor .claude .codex .github AGENTS.md CLAUDE.md CODEOWNERS \
            --glob '!**/ideation/**' \
            --glob '!**/_scaffold/**' \
            --glob '!**/scaffolding/runtime/templates/**' \
            --glob '!**/orchestration/runtime/workflows/meta/**' \
            --glob '!**/capabilities/runtime/skills/meta/**' \
            > reference-drift.txt || true

          total="$(wc -l < reference-drift.txt | tr -d ' ')"
          cat > flags-stale-report.json <<JSON
          {
            "missingCount": ${total},
            "staleCount": 0,
            "warnCount": 0
          }
          JSON

          {
            echo "# Harness Reference Drift Report"
            echo
            echo "- Timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "- Legacy references found: ${total}"
            echo
            if [ "${total}" -gt 0 ]; then
              echo "## Matches"
              echo
              sed -n '1,200p' reference-drift.txt
            else
              echo "No reference drift found."
            fi
          } > flags-stale-summary.md

      - name: Create or update issue when drift exists
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('flags-stale-report.json','utf8'));
            const body = fs.readFileSync('flags-stale-summary.md','utf8');
            if ((report.missingCount + report.staleCount + report.warnCount) === 0) {
              core.info('No reference drift found.');
              return;
            }
            const title = 'Harness Reference Drift Report';
            const { data: issues } = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:issue in:title "${title}" state:open`
            });
            if (issues.total_count > 0) {
              const issue = issues.items[0];
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['maintenance','docs']
              });
            }
