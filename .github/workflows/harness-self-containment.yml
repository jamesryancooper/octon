name: Harness Self-Containment Validation

on:
  push:
    branches:
      - main
    paths:
      - '.octon/inputs/exploratory/proposals/.archive/design/orchestration-domain-design-package/**'
      - '.octon/**'
      - '.github/dependabot.yml'
      - '.github/workflows/ai-review-gate.yml'
      - '.github/workflows/alignment-check.yml'
      - '.github/workflows/change-route-projection.yml'
      - '.github/workflows/dependency-review.yml'
      - '.github/workflows/main-change-route-guard.yml'
      - '.github/workflows/main-push-safety.yml'
      - '.github/workflows/pr-autonomy-policy.yml'
      - '.github/workflows/release-please.yml'
      - '.github/workflows/runtime-binaries.yml'
      - '.github/workflows/harness-self-containment.yml'
  pull_request:
    paths:
      - '.octon/inputs/exploratory/proposals/.archive/design/orchestration-domain-design-package/**'
      - '.octon/**'
      - '.github/dependabot.yml'
      - '.github/workflows/ai-review-gate.yml'
      - '.github/workflows/alignment-check.yml'
      - '.github/workflows/change-route-projection.yml'
      - '.github/workflows/dependency-review.yml'
      - '.github/workflows/main-change-route-guard.yml'
      - '.github/workflows/main-push-safety.yml'
      - '.github/workflows/pr-autonomy-policy.yml'
      - '.github/workflows/release-please.yml'
      - '.github/workflows/runtime-binaries.yml'
      - '.github/workflows/harness-self-containment.yml'

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: harness-self-containment-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 2

      - id: scope
        name: Detect impacted validation scopes
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        with:
          filters: |
            orchestration:
              - '.octon/inputs/exploratory/proposals/.archive/design/orchestration-domain-design-package/**'
              - '.octon/framework/orchestration/**'
              - '.octon/framework/assurance/runtime/_ops/scripts/validate-orchestration-design-proposal.sh'
              - '.octon/framework/assurance/runtime/_ops/tests/test-validate-orchestration-design-proposal.sh'
              - '.octon/framework/engine/practices/local-dev-validation.md'
              - '.github/PULL_REQUEST_TEMPLATE/orchestration-domain-implementation.md'
            workflow_manifest:
              - '.octon/framework/orchestration/runtime/workflows/**'
              - '.octon/framework/orchestration/runtime/workflows/_ops/scripts/validate-workflows.sh'
              - '.github/workflows/harness-self-containment.yml'
              - '.github/workflows/pr-quality.yml'
            services_runtime:
              - '.octon/framework/capabilities/runtime/services/**'
              - '.octon/framework/capabilities/runtime/commands/**'
              - '.octon/instance/cognition/context/index.yml'
              - '.octon/framework/engine/runtime/**'
              - '.github/workflows/filesystem-interfaces-runtime.yml'
              - '.github/workflows/filesystem-interfaces-perf-regression.yml'
              - '.github/workflows/harness-self-containment.yml'
            filesystem_runtime:
              - '.octon/framework/capabilities/runtime/services/interfaces/filesystem-snapshot/**'
              - '.octon/framework/capabilities/runtime/services/interfaces/filesystem-discovery/**'
              - '.octon/framework/capabilities/runtime/services/interfaces/filesystem-watch/**'
              - '.octon/framework/capabilities/runtime/services/_ops/scripts/validate-filesystem-interfaces.sh'
              - '.octon/framework/capabilities/runtime/services/_ops/scripts/test-filesystem-interfaces-*.sh'
              - '.octon/framework/capabilities/runtime/services/_ops/scripts/build-filesystem-interfaces-benchmark-fixture.sh'
              - '.octon/framework/capabilities/runtime/services/manifest.yml'
              - '.octon/framework/capabilities/runtime/services/registry.yml'
              - '.octon/framework/capabilities/runtime/commands/**'
              - '.octon/instance/cognition/context/index.yml'
              - '.octon/framework/engine/runtime/**'
              - '.github/workflows/filesystem-interfaces-runtime.yml'
              - '.github/workflows/filesystem-interfaces-perf-regression.yml'
              - '.github/workflows/harness-self-containment.yml'
            assurance_contract:
              # Keep super-root validator and test harness changes on the same rerun path.
              - '.octon/framework/assurance/runtime/_ops/scripts/validate-harness-structure.sh'
              - '.octon/framework/assurance/runtime/_ops/scripts/validate-repo-instance-boundary.sh'
              - '.octon/framework/assurance/runtime/_ops/scripts/validate-locality-registry.sh'
              - '.octon/framework/assurance/runtime/_ops/scripts/validate-locality-publication-state.sh'
              - '.octon/framework/assurance/runtime/_ops/tests/test-validate-locality-registry.sh'
              - '.octon/framework/assurance/runtime/_ops/tests/test-validate-locality-publication-state.sh'
              - '.octon/framework/orchestration/runtime/_ops/scripts/publish-locality-state.sh'
              - '.octon/framework/assurance/runtime/_ops/scripts/validate-audit-convergence-contract.sh'
              - '.octon/framework/assurance/runtime/_ops/tests/test-validate-audit-convergence-contract.sh'
              - '.github/workflows/harness-self-containment.yml'

      - name: Validate harness structure contract
        run: |
          chmod +x .octon/framework/assurance/runtime/_ops/scripts/validate-harness-structure.sh
          .octon/framework/assurance/runtime/_ops/scripts/validate-harness-structure.sh

      - name: Validate repo-instance boundary contract
        run: |
          chmod +x .octon/framework/assurance/runtime/_ops/scripts/validate-repo-instance-boundary.sh
          .octon/framework/assurance/runtime/_ops/scripts/validate-repo-instance-boundary.sh

      - name: Validate locality registry contract
        run: |
          chmod +x .octon/framework/assurance/runtime/_ops/scripts/validate-locality-registry.sh
          .octon/framework/assurance/runtime/_ops/scripts/validate-locality-registry.sh

      - name: Validate locality publication state
        run: |
          chmod +x .octon/framework/assurance/runtime/_ops/scripts/validate-locality-publication-state.sh
          .octon/framework/assurance/runtime/_ops/scripts/validate-locality-publication-state.sh

      - name: Validate bounded-audit convergence contract
        run: |
          chmod +x .octon/framework/assurance/runtime/_ops/scripts/validate-audit-convergence-contract.sh
          .octon/framework/assurance/runtime/_ops/scripts/validate-audit-convergence-contract.sh

      - name: Validate alignment profile registry
        run: |
          chmod +x .octon/framework/assurance/runtime/_ops/scripts/validate-alignment-profile-registry.sh
          .octon/framework/assurance/runtime/_ops/scripts/validate-alignment-profile-registry.sh

      - name: Validate authoritative-doc triggers
        run: |
          chmod +x .octon/framework/assurance/runtime/_ops/scripts/validate-authoritative-doc-triggers.sh
          .octon/framework/assurance/runtime/_ops/scripts/validate-authoritative-doc-triggers.sh

      - name: Validate GitHub Action pin policy
        run: |
          chmod +x .octon/framework/assurance/runtime/_ops/scripts/validate-github-action-pins.sh
          .octon/framework/assurance/runtime/_ops/scripts/validate-github-action-pins.sh

      - name: Validate runtime target parity
        env:
          OCTON_RUNTIME_STRICT_PACKAGING: "1"
        run: |
          chmod +x .octon/framework/assurance/runtime/_ops/scripts/validate-runtime-target-parity.sh
          .octon/framework/assurance/runtime/_ops/scripts/validate-runtime-target-parity.sh

      - name: Test bounded-audit convergence validator
        run: |
          chmod +x .octon/framework/assurance/runtime/_ops/tests/test-validate-audit-convergence-contract.sh
          .octon/framework/assurance/runtime/_ops/tests/test-validate-audit-convergence-contract.sh

      - name: Validate workflow manifest and dependency profiles
        if: steps.scope.outputs.orchestration == 'true' || steps.scope.outputs.workflow_manifest == 'true'
        run: |
          chmod +x .octon/framework/orchestration/runtime/workflows/_ops/scripts/validate-workflows.sh
          .octon/framework/orchestration/runtime/workflows/_ops/scripts/validate-workflows.sh

      - name: Validate orchestration design proposal
        if: steps.scope.outputs.orchestration == 'true' || steps.scope.outputs.workflow_manifest == 'true'
        run: |
          chmod +x .octon/framework/assurance/runtime/_ops/scripts/validate-orchestration-design-proposal.sh
          .octon/framework/assurance/runtime/_ops/scripts/validate-orchestration-design-proposal.sh

      - name: Validate orchestration runtime surface hooks
        if: steps.scope.outputs.orchestration == 'true' || steps.scope.outputs.workflow_manifest == 'true'
        run: |
          chmod +x .octon/framework/orchestration/runtime/_ops/scripts/validate-orchestration-runtime.sh
          .octon/framework/orchestration/runtime/_ops/scripts/validate-orchestration-runtime.sh

      - name: Validate services independence
        if: steps.scope.outputs.services_runtime == 'true'
        run: |
          chmod +x .octon/framework/capabilities/runtime/services/_ops/scripts/validate-service-independence.sh
          .octon/framework/capabilities/runtime/services/_ops/scripts/validate-service-independence.sh

      - name: Validate filesystem interface runtime wiring
        if: steps.scope.outputs.filesystem_runtime == 'true'
        run: |
          chmod +x .octon/framework/capabilities/runtime/services/_ops/scripts/validate-filesystem-interfaces.sh
          .octon/framework/capabilities/runtime/services/_ops/scripts/validate-filesystem-interfaces.sh

      - name: Skip filesystem interface runtime wiring (no relevant changes)
        if: steps.scope.outputs.filesystem_runtime != 'true'
        run: |
          echo "No filesystem runtime-impacting changes detected; skipping filesystem wiring validation step."

      - name: Report validation failure
        if: failure()
        run: |
          echo "::error::Harness self-containment validation failed. Run the _ops validation scripts locally to inspect errors."
