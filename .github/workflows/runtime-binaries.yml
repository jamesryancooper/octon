name: runtime-binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
      - "runtime-v*"

permissions:
  contents: read

jobs:
  build:
    name: build-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            source_binary: harmony
            target_binary: harmony-linux-x64
            artifact_name: runtime-linux-x64
          - os: windows-latest
            source_binary: harmony.exe
            target_binary: harmony-windows-x64.exe
            artifact_name: runtime-windows-x64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build harmony runtime (release)
        working-directory: .harmony/engine/runtime/crates
        run: cargo build -p harmony_kernel --release

      - name: Package runtime binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp \
            ".harmony/engine/runtime/crates/target/release/${{ matrix.source_binary }}" \
            "dist/${{ matrix.target_binary }}"

      - name: Upload runtime artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.target_binary }}
          if-no-files-found: error

  publish:
    name: publish-release-assets
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: runtime-linux-x64
          path: dist

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: runtime-windows-x64
          path: dist

      - name: Publish runtime binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/harmony-linux-x64
            dist/harmony-windows-x64.exe
          fail_on_unmatched_files: true
