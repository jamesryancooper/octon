name: runtime-binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "octon-v*"
      - "octon-runtime-v*"

permissions:
  contents: read

jobs:
  plan_matrix:
    name: plan-runtime-target-matrix
    runs-on: ubuntu-latest
    outputs:
      build_matrix: ${{ steps.matrix.outputs.build_matrix }}
      publish_files: ${{ steps.matrix.outputs.publish_files }}
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - id: matrix
        name: Derive build and publish state from release target matrix
        shell: bash
        run: |
          set -euo pipefail

          targets_file=".octon/framework/engine/runtime/release-targets.yml"

          build_matrix="$(yq -o=json '
            .targets
            | map(select(.shippable_release == true)
              | {
                  id: .id,
                  runs_on: .runner_label,
                  source_binary: .source_binary,
                  target_binary: .binary_name,
                  artifact_name: .artifact_name
                })
            | { include: . }
          ' "${targets_file}" | jq -c '.')"

          publish_files="$(yq -r '
            .targets[]
            | select(.shippable_release == true)
            | "dist/" + .binary_name
          ' "${targets_file}")"

          {
            echo "build_matrix=${build_matrix}"
            echo "publish_files<<EOF"
            printf '%s\n' "${publish_files}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

  build:
    name: build-${{ matrix.id }}
    needs:
      - plan_matrix
    runs-on: ${{ matrix.runs_on }}
    env:
      OCTON_RUNTIME_STRICT_PACKAGING: "1"
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan_matrix.outputs.build_matrix) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Install yq
        shell: bash
        run: |
          set -euo pipefail
          if command -v yq >/dev/null 2>&1; then
            exit 0
          fi

          mkdir -p "$RUNNER_TEMP/bin"

          case "$(uname -s)" in
            Linux)
              case "$(uname -m)" in
                x86_64) asset="yq_linux_amd64" ;;
                aarch64|arm64) asset="yq_linux_arm64" ;;
                *) echo "unsupported Linux arch: $(uname -m)" >&2; exit 1 ;;
              esac
              curl -sSfL "https://github.com/mikefarah/yq/releases/download/v4.50.1/${asset}" -o "$RUNNER_TEMP/bin/yq"
              chmod +x "$RUNNER_TEMP/bin/yq"
              ;;
            Darwin)
              case "$(uname -m)" in
                x86_64) asset="yq_darwin_amd64" ;;
                arm64) asset="yq_darwin_arm64" ;;
                *) echo "unsupported macOS arch: $(uname -m)" >&2; exit 1 ;;
              esac
              curl -sSfL "https://github.com/mikefarah/yq/releases/download/v4.50.1/${asset}" -o "$RUNNER_TEMP/bin/yq"
              chmod +x "$RUNNER_TEMP/bin/yq"
              ;;
            MINGW*|MSYS*|CYGWIN*)
              case "$(uname -m)" in
                x86_64) asset="yq_windows_amd64.exe" ;;
                aarch64|arm64) asset="yq_windows_arm64.exe" ;;
                *) echo "unsupported Windows arch: $(uname -m)" >&2; exit 1 ;;
              esac
              curl -sSfL "https://github.com/mikefarah/yq/releases/download/v4.50.1/${asset}" -o "$RUNNER_TEMP/bin/yq.exe"
              chmod +x "$RUNNER_TEMP/bin/yq.exe"
              ;;
            *)
              echo "unsupported runner OS: $(uname -s)" >&2
              exit 1
              ;;
          esac

          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Build octon runtime (release)
        shell: bash
        working-directory: .octon/framework/engine/runtime/crates
        run: cargo build -p octon_kernel --release

      - name: Validate runtime target parity (strict mode)
        shell: bash
        run: |
          set -euo pipefail
          chmod +x .octon/framework/assurance/runtime/_ops/scripts/validate-runtime-target-parity.sh
          .octon/framework/assurance/runtime/_ops/scripts/validate-runtime-target-parity.sh

      - name: Validate runtime docs and release target consistency
        shell: bash
        run: |
          set -euo pipefail
          chmod +x .octon/framework/assurance/runtime/_ops/scripts/validate-runtime-docs-consistency.sh
          .octon/framework/assurance/runtime/_ops/scripts/validate-runtime-docs-consistency.sh

      - name: Package runtime binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp \
            ".octon/framework/engine/runtime/crates/target/release/${{ matrix.source_binary }}" \
            "dist/${{ matrix.target_binary }}"

      - name: Upload runtime artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.target_binary }}
          if-no-files-found: error

  publish:
    name: publish-release-assets
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - plan_matrix
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      OCTON_RUNTIME_STRICT_PACKAGING: "1"

    steps:
      - name: Download shippable runtime artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: runtime-*
          path: dist
          merge-multiple: true

      - name: Publish runtime binaries to release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: ${{ needs.plan_matrix.outputs.publish_files }}
          fail_on_unmatched_files: true
