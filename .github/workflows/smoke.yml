name: Preview Smoke Checks

on:
  schedule:
    - cron: '30 9 * * *' # daily at 09:30 UTC
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run smoke checks
        env:
          SMOKE_URLS: ${{ vars.SMOKE_URLS }}
          SMOKE_EXPECT: ${{ vars.SMOKE_EXPECT }}
        run: |
          if [ -z "${SMOKE_URLS:-}" ]; then
            echo "SMOKE_SKIPPED=1" >> $GITHUB_ENV
            echo "SMOKE_URLS not set; skipping smoke checks."
            exit 0
          fi
          bash scripts/smoke-check.sh || echo "SMOKE_FAILED=1" >> $GITHUB_ENV

      - name: Post PR comment with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.existsSync('smoke-summary.txt') ? fs.readFileSync('smoke-summary.txt','utf8') : 'No summary produced';
            const failed = process.env.SMOKE_FAILED === '1';
            const skipped = process.env.SMOKE_SKIPPED === '1';
            const status = skipped ? '⚠️ Skipped (SMOKE_URLS not set)' : (failed ? '❌ Failed' : '✅ Passed');
            const body = `### Preview Smoke Checks\n\n${'```'}\n${summary}\n${'```'}\n\nStatus: ${status}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
            if (failed) core.setFailed('Smoke checks failed');

