name: Principles Charter Overrides Audit

on:
  schedule:
    - cron: '0 9 1 * *' # Monthly at 09:00 UTC (day 1)
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  audit:
    name: Audit charter override ledger
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run override audit
        run: |
          set -euo pipefail
          bash .octon/cognition/_ops/principles/scripts/audit-principles-charter-overrides.sh

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: principles-charter-overrides-audit
          path: .octon/output/reports/analysis/*principles-charter-overrides-audit.md
          if-no-files-found: error
