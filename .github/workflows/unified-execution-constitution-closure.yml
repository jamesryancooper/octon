name: Unified Execution Constitution Closure

on:
  pull_request:
    paths:
      - ".octon/instance/governance/closure/**"
      - ".octon/instance/governance/adoption/**"
      - ".octon/instance/governance/disclosure/**"
      - ".octon/instance/governance/support-targets.yml"
      - ".octon/instance/governance/support-target-admissions/**"
      - ".octon/instance/governance/contracts/**"
      - ".octon/framework/constitution/contracts/registry.yml"
      - ".octon/framework/constitution/claim-truth-conditions.yml"
      - ".octon/framework/engine/runtime/adapters/host/**"
      - ".octon/framework/assurance/governance/**"
      - ".octon/instance/capabilities/runtime/packs/admissions/**"
      - ".octon/state/control/execution/runs/**"
      - ".octon/state/evidence/control/execution/**"
      - ".octon/state/evidence/runs/**"
      - ".octon/state/evidence/external-index/**"
      - ".octon/state/evidence/disclosure/**"
      - ".octon/state/evidence/validation/publication/**"
      - ".github/workflows/pr-autonomy-policy.yml"
      - ".github/workflows/pr-auto-merge.yml"
      - ".github/workflows/unified-execution-constitution-closure.yml"
  push:
    branches:
      - main
    paths:
      - ".octon/instance/governance/closure/**"
      - ".octon/instance/governance/adoption/**"
      - ".octon/instance/governance/disclosure/**"
      - ".octon/instance/governance/support-targets.yml"
      - ".octon/instance/governance/support-target-admissions/**"
      - ".octon/instance/governance/contracts/**"
      - ".octon/framework/constitution/contracts/registry.yml"
      - ".octon/framework/constitution/claim-truth-conditions.yml"
      - ".octon/framework/engine/runtime/adapters/host/**"
      - ".octon/framework/assurance/governance/**"
      - ".octon/instance/capabilities/runtime/packs/admissions/**"
      - ".octon/state/control/execution/runs/**"
      - ".octon/state/evidence/control/execution/**"
      - ".octon/state/evidence/runs/**"
      - ".octon/state/evidence/external-index/**"
      - ".octon/state/evidence/disclosure/**"
      - ".octon/state/evidence/validation/publication/**"
      - ".github/workflows/pr-autonomy-policy.yml"
      - ".github/workflows/pr-auto-merge.yml"
      - ".github/workflows/unified-execution-constitution-closure.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  closure:
    name: closure-certification
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install jq and yq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Run unified-execution completion pass
        run: |
          set -euo pipefail
          chmod +x .octon/framework/assurance/governance/_ops/scripts/run-uec-packet-certification-pass.sh
          chmod +x .octon/framework/assurance/governance/_ops/scripts/assert-unified-execution-closure.sh
          .octon/framework/assurance/governance/_ops/scripts/run-uec-packet-certification-pass.sh \
            --output-dir .octon/generated/.tmp/unified-execution-completion-ci \
            --include-closure-validator

      - name: Upload closure publication bundle
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: unified-execution-constitution-closure-publication
          path: |
            .octon/generated/.tmp/unified-execution-completion-ci/
            .octon/state/evidence/disclosure/releases/2026-04-05-uec-proposal-packet-completion/
          if-no-files-found: error
          retention-days: 7
