name: filesystem-graph-runtime

on:
  push:
    paths:
      - '.harmony/capabilities/services/interfaces/filesystem-graph/**'
      - '.harmony/capabilities/services/manifest.runtime.yml'
      - '.harmony/capabilities/services/registry.runtime.yml'
      - '.harmony/runtime/**'
      - '.harmony/capabilities/services/_ops/scripts/validate-filesystem-graph.sh'
      - '.harmony/capabilities/services/_ops/scripts/test-filesystem-graph-determinism.sh'
      - '.harmony/capabilities/services/_ops/scripts/test-filesystem-graph-integration.sh'
      - '.harmony/capabilities/services/_ops/scripts/build-filesystem-graph-benchmark-fixture.sh'
      - '.harmony/capabilities/services/_ops/scripts/test-filesystem-graph-slo.sh'
      - '.harmony/capabilities/services/_ops/scripts/tune-filesystem-graph-slo-budgets.sh'
      - '.github/workflows/filesystem-graph-runtime.yml'
  pull_request:
    paths:
      - '.harmony/capabilities/services/interfaces/filesystem-graph/**'
      - '.harmony/capabilities/services/manifest.runtime.yml'
      - '.harmony/capabilities/services/registry.runtime.yml'
      - '.harmony/runtime/**'
      - '.harmony/capabilities/services/_ops/scripts/validate-filesystem-graph.sh'
      - '.harmony/capabilities/services/_ops/scripts/test-filesystem-graph-determinism.sh'
      - '.harmony/capabilities/services/_ops/scripts/test-filesystem-graph-integration.sh'
      - '.harmony/capabilities/services/_ops/scripts/build-filesystem-graph-benchmark-fixture.sh'
      - '.harmony/capabilities/services/_ops/scripts/test-filesystem-graph-slo.sh'
      - '.harmony/capabilities/services/_ops/scripts/tune-filesystem-graph-slo-budgets.sh'
      - '.github/workflows/filesystem-graph-runtime.yml'

permissions:
  contents: read

jobs:
  validate:
    name: validate-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-component
        run: |
          cargo install --locked cargo-component

      - name: Build filesystem-graph wasm from source
        run: |
          .harmony/runtime/run service build interfaces/filesystem-graph

      - name: Unit tests (filesystem-graph Rust crate)
        working-directory: .harmony/capabilities/services/interfaces/filesystem-graph/rust
        run: |
          cargo test --quiet

      - name: Validate runtime registry and wasm package
        run: |
          .harmony/runtime/run validate

      - name: Validate filesystem-graph service
        run: |
          chmod +x .harmony/capabilities/services/_ops/scripts/validate-filesystem-graph.sh
          .harmony/capabilities/services/_ops/scripts/validate-filesystem-graph.sh

      - name: Determinism regression
        run: |
          chmod +x .harmony/capabilities/services/_ops/scripts/test-filesystem-graph-determinism.sh
          .harmony/capabilities/services/_ops/scripts/test-filesystem-graph-determinism.sh

      - name: SLO regression gate
        run: |
          mkdir -p "$RUNNER_TEMP/filesystem-graph-slo"
          chmod +x .harmony/capabilities/services/_ops/scripts/build-filesystem-graph-benchmark-fixture.sh
          chmod +x .harmony/capabilities/services/_ops/scripts/test-filesystem-graph-slo.sh
          .harmony/capabilities/services/_ops/scripts/test-filesystem-graph-slo.sh \
            --profile ci \
            --no-report \
            --raw-out "$RUNNER_TEMP/filesystem-graph-slo/filesystem-graph-slo.raw.tsv" \
            --summary-out "$RUNNER_TEMP/filesystem-graph-slo/filesystem-graph-slo.summary.tsv"

      - name: Upload SLO summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: filesystem-graph-slo-summary
          path: ${{ runner.temp }}/filesystem-graph-slo/filesystem-graph-slo.summary.tsv
          retention-days: 30

      - name: Upload SLO raw metrics artifact
        uses: actions/upload-artifact@v4
        with:
          name: filesystem-graph-slo-raw
          path: ${{ runner.temp }}/filesystem-graph-slo/filesystem-graph-slo.raw.tsv
          retention-days: 14

  notify-on-failure:
    name: notify-on-failure
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ always() && needs.validate.result == 'failure' }}
    permissions:
      contents: read
      issues: write
    steps:
      - name: Upsert GitHub issue alert
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = "filesystem-graph runtime regression detected";
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const body = [
              "filesystem-graph runtime workflow failed.",
              "",
              `- workflow: ${context.workflow}`,
              `- run: ${runUrl}`,
              `- event: ${context.eventName}`,
              `- ref: ${context.ref}`,
              `- sha: ${context.sha}`,
              `- actor: ${context.actor}`
            ].join("\n");

            const query = `repo:${owner}/${repo} is:issue is:open in:title \"${title}\"`;
            const search = await github.rest.search.issuesAndPullRequests({ q: query, per_page: 10 });
            const existing = search.data.items.find((item) => item.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: `Another failure detected.\n\n${body}`
              });
            } else {
              await github.rest.issues.create({ owner, repo, title, body });
            }

      - name: Send Slack alert (optional)
        if: ${{ secrets.FILESYSTEM_GRAPH_SLO_ALERT_WEBHOOK != '' }}
        uses: actions/github-script@v7
        env:
          ALERT_WEBHOOK: ${{ secrets.FILESYSTEM_GRAPH_SLO_ALERT_WEBHOOK }}
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const text = [
              ":rotating_light: filesystem-graph runtime workflow failed",
              `workflow: ${context.workflow}`,
              `event: ${context.eventName}`,
              `ref: ${context.ref}`,
              `sha: ${context.sha.substring(0, 12)}`,
              `run: ${runUrl}`
            ].join("\n");

            const response = await fetch(process.env.ALERT_WEBHOOK, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ text })
            });

            if (!response.ok) {
              const body = await response.text();
              throw new Error(`Slack webhook failed: ${response.status} ${body}`);
            }
