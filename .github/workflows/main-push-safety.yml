name: Main Push Safety

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".octon/generated/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: main-push-safety-${{ github.ref }}
  cancel-in-progress: true

jobs:
  classify:
    name: classify-main-push-changes
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.classify.outputs.should_run }}
      classified_paths: ${{ steps.classify.outputs.classified_paths }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - id: classify
        name: Classify changed files
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            {
              echo "authoritative_doc_changed=false"
              echo "operational_guide_changed=false"
              echo "narrative_doc_changed=false"
              echo "non_doc_changed=true"
              echo "should_run=true"
              echo "classified_paths<<EOF"
              echo "manual-dispatch	.github/workflows/main-push-safety.yml"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          before="${{ github.event.before }}"
          if [[ "$before" == "0000000000000000000000000000000000000000" ]]; then
            before="$(git rev-list --max-parents=0 HEAD | tail -n1)"
          elif ! git cat-file -e "${before}^{commit}" 2>/dev/null; then
            git fetch --no-tags --depth=1 origin "${before}"
          fi

          git cat-file -e "${before}^{commit}" >/dev/null 2>&1
          mapfile -t changed_files < <(git diff --name-only "$before" "${{ github.sha }}")

          chmod +x .octon/framework/assurance/runtime/_ops/scripts/classify-authoritative-doc-change.sh
          if [[ "${#changed_files[@]}" -eq 0 ]]; then
            .octon/framework/assurance/runtime/_ops/scripts/classify-authoritative-doc-change.sh \
              --github-output "$GITHUB_OUTPUT"
          else
            .octon/framework/assurance/runtime/_ops/scripts/classify-authoritative-doc-change.sh \
              --github-output "$GITHUB_OUTPUT" \
              "${changed_files[@]}"
          fi

      - name: Report classification
        shell: bash
        run: |
          echo "should_run=${{ steps.classify.outputs.should_run }}"
          printf '%s\n' "${{ steps.classify.outputs.classified_paths }}"

  harness-checks:
    name: Harness Structural Checks
    needs:
      - classify
    if: needs.classify.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Restore Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-bin: true

      - name: Validate alignment profile registry
        run: |
          chmod +x .octon/framework/assurance/runtime/_ops/scripts/validate-alignment-profile-registry.sh
          .octon/framework/assurance/runtime/_ops/scripts/validate-alignment-profile-registry.sh

      - name: Validate authoritative-doc triggers
        run: |
          chmod +x .octon/framework/assurance/runtime/_ops/scripts/validate-authoritative-doc-triggers.sh
          .octon/framework/assurance/runtime/_ops/scripts/validate-authoritative-doc-triggers.sh

      - name: Validate GitHub Action pin policy
        run: |
          chmod +x .octon/framework/assurance/runtime/_ops/scripts/validate-github-action-pins.sh
          .octon/framework/assurance/runtime/_ops/scripts/validate-github-action-pins.sh

      - name: Validate harness structure
        run: |
          chmod +x .octon/framework/assurance/runtime/_ops/scripts/validate-harness-structure.sh
          .octon/framework/assurance/runtime/_ops/scripts/validate-harness-structure.sh

      - name: Validate repo-instance boundary
        run: |
          chmod +x .octon/framework/assurance/runtime/_ops/scripts/validate-repo-instance-boundary.sh
          .octon/framework/assurance/runtime/_ops/scripts/validate-repo-instance-boundary.sh

      - name: Validate locality registry
        run: |
          chmod +x .octon/framework/assurance/runtime/_ops/scripts/validate-locality-registry.sh
          .octon/framework/assurance/runtime/_ops/scripts/validate-locality-registry.sh

      - name: Validate locality publication state
        run: |
          chmod +x .octon/framework/assurance/runtime/_ops/scripts/validate-locality-publication-state.sh
          .octon/framework/assurance/runtime/_ops/scripts/validate-locality-publication-state.sh

      - name: Validate harness version compatibility contract
        run: |
          chmod +x .octon/framework/assurance/runtime/_ops/scripts/validate-harness-version-contract.sh
          .octon/framework/assurance/runtime/_ops/scripts/validate-harness-version-contract.sh

      - name: Validate SSOT precedence drift contract
        run: |
          chmod +x .octon/framework/assurance/runtime/_ops/scripts/validate-ssot-precedence-drift.sh
          .octon/framework/assurance/runtime/_ops/scripts/validate-ssot-precedence-drift.sh

      - name: Validate bounded-audit convergence contract
        run: |
          chmod +x .octon/framework/assurance/runtime/_ops/scripts/validate-audit-convergence-contract.sh
          .octon/framework/assurance/runtime/_ops/scripts/validate-audit-convergence-contract.sh

      - name: Validate workflows
        run: |
          chmod +x .octon/framework/orchestration/runtime/workflows/_ops/scripts/validate-workflows.sh
          .octon/framework/orchestration/runtime/workflows/_ops/scripts/validate-workflows.sh

      - name: Validate skills
        run: |
          chmod +x .octon/framework/capabilities/runtime/skills/_ops/scripts/validate-skills.sh
          .octon/framework/capabilities/runtime/skills/_ops/scripts/validate-skills.sh --strict

      - name: Validate service independence
        run: |
          chmod +x .octon/framework/capabilities/runtime/services/_ops/scripts/validate-service-independence.sh
          .octon/framework/capabilities/runtime/services/_ops/scripts/validate-service-independence.sh

      - name: Validate deny-by-default (strict)
        run: |
          chmod +x .octon/framework/capabilities/_ops/scripts/validate-deny-by-default.sh
          .octon/framework/capabilities/_ops/scripts/validate-deny-by-default.sh --all --profile strict

      - name: Validate engine capabilities boundary
        run: |
          chmod +x .octon/framework/assurance/runtime/_ops/scripts/validate-engine-capability-boundary.sh
          .octon/framework/assurance/runtime/_ops/scripts/validate-engine-capability-boundary.sh

      - name: Validate capability/engine consistency
        run: |
          chmod +x .octon/framework/assurance/runtime/_ops/scripts/validate-capability-engine-consistency.sh
          .octon/framework/assurance/runtime/_ops/scripts/validate-capability-engine-consistency.sh

      - name: Validate runtime target parity
        env:
          OCTON_RUNTIME_STRICT_PACKAGING: "1"
        run: |
          chmod +x .octon/framework/assurance/runtime/_ops/scripts/validate-runtime-target-parity.sh
          .octon/framework/assurance/runtime/_ops/scripts/validate-runtime-target-parity.sh

      - name: Validate execution-role contracts
        run: |
          chmod +x .octon/framework/execution-roles/_ops/scripts/validate/validate-execution-roles.sh
          .octon/framework/execution-roles/_ops/scripts/validate/validate-execution-roles.sh

  docs-only-skip:
    name: Narrative Markdown Skip
    needs:
      - classify
    if: needs.classify.outputs.should_run != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Report skip
        run: |
          echo "Only non-authoritative Markdown changed; heavy main-push safety checks were skipped."
