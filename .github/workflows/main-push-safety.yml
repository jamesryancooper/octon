name: Main Push Safety

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - ".harmony/output/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: main-push-safety-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quick-checks:
    name: Lint, Typecheck, Test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
