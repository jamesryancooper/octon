name: Main Push Safety

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - ".harmony/output/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: main-push-safety-${{ github.ref }}
  cancel-in-progress: true

jobs:
  harness-checks:
    name: Harness Structural Checks
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate harness structure
        run: |
          chmod +x .harmony/quality/_ops/scripts/validate-harness-structure.sh
          .harmony/quality/_ops/scripts/validate-harness-structure.sh

      - name: Validate workflows
        run: |
          chmod +x .harmony/orchestration/workflows/_ops/scripts/validate-workflows.sh
          .harmony/orchestration/workflows/_ops/scripts/validate-workflows.sh

      - name: Validate skills
        run: |
          chmod +x .harmony/capabilities/skills/_ops/scripts/validate-skills.sh
          .harmony/capabilities/skills/_ops/scripts/validate-skills.sh --strict

      - name: Validate service independence
        run: |
          chmod +x .harmony/capabilities/services/_ops/scripts/validate-service-independence.sh
          .harmony/capabilities/services/_ops/scripts/validate-service-independence.sh

      - name: Validate agency contracts
        run: |
          chmod +x .harmony/agency/_ops/scripts/validate-agency.sh
          .harmony/agency/_ops/scripts/validate-agency.sh
