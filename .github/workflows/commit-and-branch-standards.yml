name: Commit and Branch Standards

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read

jobs:
  validate-branch-name:
    name: Validate branch naming
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Validate head branch
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          allowed_types='feat fix refactor perf test docs chore ci revert'
          type_pattern='feat|fix|refactor|perf|test|docs|chore|ci|revert'
          pattern="^(${type_pattern})/([A-Za-z0-9]+-[0-9]+-)?[a-z0-9]+(-[a-z0-9]+)*$"

          if ! [[ "${BRANCH_NAME}" =~ ${pattern} ]]; then
            echo "Invalid branch name: ${BRANCH_NAME}"
            echo "Expected: <type>/<ticket-id>-<short-description>"
            echo "Short description must be lowercase and hyphen-separated"
            echo "Allowed types: ${allowed_types}"
            exit 1
          fi

  validate-commit-messages:
    name: Validate commit messages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lint commit messages in PR
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          type_pattern='feat|fix|refactor|perf|test|docs|chore|ci|revert'
          header_pattern="^(${type_pattern})\\(([a-z0-9][a-z0-9-]*)\\): (.+)$"

          commits="$(git rev-list --no-merges "${BASE_SHA}..${HEAD_SHA}")"
          if [ -z "${commits}" ]; then
            echo "No commits to validate in range ${BASE_SHA}..${HEAD_SHA}."
            exit 0
          fi

          failures=0
          for sha in ${commits}; do
            header="$(git log -n1 --format=%s "${sha}")"
            echo "Validating ${sha}: ${header}"

            if [ "${#header}" -gt 72 ]; then
              echo "::error::${sha} header exceeds 72 characters."
              failures=$((failures + 1))
              continue
            fi

            if ! [[ "${header}" =~ ${header_pattern} ]]; then
              echo "::error::${sha} header must match <type>(<scope>): <summary>."
              failures=$((failures + 1))
              continue
            fi

            summary="${BASH_REMATCH[3]}"
            if [[ "${summary}" =~ [A-Z] ]]; then
              echo "::error::${sha} summary must be lowercase."
              failures=$((failures + 1))
            fi

            if [[ "${summary}" == *"." ]]; then
              echo "::error::${sha} summary must not end with a period."
              failures=$((failures + 1))
            fi
          done

          if [ "${failures}" -ne 0 ]; then
            echo "::error::Commit message validation failed with ${failures} issue(s)."
            exit 1
          fi
