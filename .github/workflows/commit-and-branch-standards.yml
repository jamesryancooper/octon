name: Commit and Branch Standards

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: required-pr-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-branch-name:
    name: Validate branch naming
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate head branch from standards source
        uses: actions/github-script@v7
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        with:
          script: |
            const pr = context.payload.pull_request;
            const headRef = pr?.head?.ref || "";
            const author = pr?.user?.login || "";
            const labels = (pr?.labels || []).map((label) => label.name);

            const isDependabot = author === "dependabot[bot]" || headRef.startsWith("dependabot/");
            const isReleasePlease =
              headRef.startsWith("release-please--") ||
              labels.some((name) => name.startsWith("autorelease:"));

            if (isDependabot || isReleasePlease) {
              core.notice(`Skipping branch-name validation for bot-managed branch '${headRef}'.`);
              return;
            }

            const baseSha = context.payload.pull_request?.base?.sha;
            if (!baseSha) {
              core.setFailed("Unable to determine PR base SHA for branch validation.");
              return;
            }

            const path = ".octon/agency/practices/standards/commit-pr-standards.json";
            const standardsResponse = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path,
              ref: baseSha
            });

            if (Array.isArray(standardsResponse.data) || !("content" in standardsResponse.data)) {
              core.setFailed(`Expected file content at ${path} but found a non-file response.`);
              return;
            }

            const standards = JSON.parse(
              Buffer.from(
                standardsResponse.data.content,
                standardsResponse.data.encoding || "base64"
              ).toString("utf8")
            );

            const branch = standards.branch;
            const branchName = process.env.BRANCH_NAME || "";
            const escapeRegExp = (text) => text.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
            const typePattern = branch.allowed_types.map(escapeRegExp).join("|");
            const fullPattern = new RegExp(
              `^(?<type>${typePattern})/(?:(?<ticket>${branch.ticket_pattern})-)?(?<slug>${branch.slug_pattern})$`
            );

            if (!fullPattern.test(branchName)) {
              core.setFailed(
                [
                  `Invalid branch name: ${branchName}`,
                  `Expected: ${branch.default_format}`,
                  "Short description must be lowercase and hyphen-separated.",
                  `Allowed types: ${branch.allowed_types.join(", ")}`
                ].join("\n")
              );
              return;
            }

            core.info(`Branch name passes standards: ${branchName}`);

  validate-commit-messages:
    name: Validate commit messages (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Lint commit messages in PR from standards source
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const headRef = pr?.head?.ref || "";
            const author = pr?.user?.login || "";
            const labels = (pr?.labels || []).map((label) => label.name);

            const isDependabot = author === "dependabot[bot]" || headRef.startsWith("dependabot/");
            const isReleasePlease =
              headRef.startsWith("release-please--") ||
              labels.some((name) => name.startsWith("autorelease:"));

            if (isDependabot || isReleasePlease) {
              core.notice(`Skipping commit lint for bot-managed branch '${headRef}'.`);
              return;
            }

            const baseSha = context.payload.pull_request?.base?.sha;
            const prNumber = context.payload.pull_request?.number;
            if (!baseSha || !prNumber) {
              core.warning("Unable to determine PR base SHA/number for commit validation. Skipping advisory lint.");
              return;
            }

            const standardsPath = ".octon/agency/practices/standards/commit-pr-standards.json";
            const standardsResponse = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: standardsPath,
              ref: baseSha
            });

            if (Array.isArray(standardsResponse.data) || !("content" in standardsResponse.data)) {
              core.warning(`Expected file content at ${standardsPath} but found a non-file response. Skipping advisory lint.`);
              return;
            }

            const standards = JSON.parse(
              Buffer.from(
                standardsResponse.data.content,
                standardsResponse.data.encoding || "base64"
              ).toString("utf8")
            );

            const commitRules = standards.commit;
            const escapeRegExp = (text) => text.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
            const typePattern = commitRules.allowed_types.map(escapeRegExp).join("|");
            const headerPattern = new RegExp(
              `^(?<type>${typePattern})\\((?<scope>${commitRules.scope_pattern})\\): (?<summary>.+)$`
            );

            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100
            });

            const nonMergeCommits = commits.filter((item) => (item.parents || []).length <= 1);
            if (!nonMergeCommits.length) {
              core.info(`No non-merge commits to validate for PR #${prNumber}.`);
              return;
            }

            const failures = [];
            for (const item of nonMergeCommits) {
              const sha = item.sha;
              const message = (item.commit?.message || "").replace(/\r\n/g, "\n");
              const lines = message.split("\n");
              const header = lines[0] || "";
              core.info(`Validating ${sha}: ${header}`);

              if (header.length > commitRules.header_max_length) {
                failures.push(`${sha} header exceeds ${commitRules.header_max_length} characters.`);
                continue;
              }

              const match = header.match(headerPattern);
              if (!match || !match.groups) {
                failures.push(`${sha} header must match ${commitRules.header_format}.`);
                continue;
              }

              const summary = match.groups.summary || "";
              if (commitRules.summary_must_be_lowercase && summary !== summary.toLowerCase()) {
                failures.push(`${sha} summary must be lowercase.`);
              }

              if (commitRules.summary_must_not_end_with_period && summary.endsWith(".")) {
                failures.push(`${sha} summary must not end with a period.`);
              }

              for (const line of lines.slice(1)) {
                if (!line.trim()) {
                  continue;
                }
                if (line.length > commitRules.body_max_line_length) {
                  failures.push(
                    `${sha} body/footer line exceeds ${commitRules.body_max_line_length} characters.`
                  );
                }
              }
            }

            if (failures.length) {
              core.warning(
                [
                  `Commit message advisory found ${failures.length} issue(s).`,
                  ...failures.map((issue) => `- ${issue}`)
                ].join("\n")
              );
              return;
            }

            core.info("All commit messages pass standards.");
