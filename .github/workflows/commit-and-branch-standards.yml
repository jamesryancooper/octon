name: Commit and Branch Standards

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read

jobs:
  validate-branch-name:
    name: Validate branch naming
    runs-on: ubuntu-latest
    steps:
      - name: Validate head branch
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          set -euo pipefail

          pattern='^(feat|fix|refactor|perf|test|docs|chore|ci|revert)/([A-Za-z0-9]+-[0-9]+-)?[A-Za-z0-9]+(-[A-Za-z0-9]+)*$'
          if [[ ! "$BRANCH_NAME" =~ $pattern ]]; then
            echo "Invalid branch name: $BRANCH_NAME"
            echo "Expected: <type>/<ticket-id>-<short-description>"
            echo "Allowed types: feat, fix, refactor, perf, test, docs, chore, ci, revert"
            exit 1
          fi

  validate-commit-messages:
    name: Validate commit messages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint commit messages in PR
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: pnpm exec commitlint --from "$BASE_SHA" --to "$HEAD_SHA" --verbose
