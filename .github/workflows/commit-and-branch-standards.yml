name: Commit and Branch Standards

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read

jobs:
  validate-branch-name:
    name: Validate branch naming
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Validate head branch
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          node - <<'NODE'
          const branchName = process.env.BRANCH_NAME || "";
          const config = require("./commitlint.config.cjs");
          const typeEnumRule = config?.rules?.["type-enum"];
          const allowedTypes = Array.isArray(typeEnumRule) ? typeEnumRule[2] : null;

          if (!Array.isArray(allowedTypes) || allowedTypes.length === 0) {
            console.error("Unable to read allowed commit types from commitlint.config.cjs");
            process.exit(1);
          }

          const escapeRegex = (s) => s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
          const typePattern = allowedTypes.map(escapeRegex).join("|");
          const pattern = new RegExp(
            `^(?:${typePattern})\\/(?:[A-Za-z0-9]+-[0-9]+-)?[A-Za-z0-9]+(?:-[A-Za-z0-9]+)*$`
          );

          if (!pattern.test(branchName)) {
            console.error(`Invalid branch name: ${branchName}`);
            console.error("Expected: <type>/<ticket-id>-<short-description>");
            console.error(`Allowed types: ${allowedTypes.join(", ")}`);
            process.exit(1);
          }
          NODE

  validate-commit-messages:
    name: Validate commit messages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Lint commit messages in PR
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git show "${BASE_SHA}:commitlint.config.cjs" > /tmp/commitlint.config.cjs
          pnpm dlx --package @commitlint/cli@19.8.1 --package @commitlint/config-conventional@19.8.1 \
            sh -c 'NODE_PATH="$(dirname "$(command -v commitlint)")/.." commitlint \
              --config /tmp/commitlint.config.cjs \
              --from "$BASE_SHA" \
              --to "$HEAD_SHA" \
              --verbose'
