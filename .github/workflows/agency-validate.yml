name: Agency Validation

on:
  push:
    branches:
      - main
    paths:
      - '.octon/framework/agency/**'
      - '.octon/octon.yml'
      - '.octon/instance/bootstrap/START.md'
      - '.octon/README.md'
      - '.octon/instance/bootstrap/scope.md'
      - '.octon/framework/scaffolding/runtime/bootstrap/**'
      - '.octon/framework/scaffolding/runtime/templates/octon/**'
  pull_request:
    paths:
      - '.octon/framework/agency/**'
      - '.octon/octon.yml'
      - '.octon/instance/bootstrap/START.md'
      - '.octon/README.md'
      - '.octon/instance/bootstrap/scope.md'
      - '.octon/framework/scaffolding/runtime/bootstrap/**'
      - '.octon/framework/scaffolding/runtime/templates/octon/**'

permissions:
  contents: read

concurrency:
  group: agency-validate-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate agency contracts
        run: |
          chmod +x .octon/framework/agency/_ops/scripts/validate/validate-agency.sh
          .octon/framework/agency/_ops/scripts/validate/validate-agency.sh

      - name: Validate GitHub label catalog
        run: |
          chmod +x .octon/framework/agency/_ops/scripts/validate/validate-autonomy-labels.sh
          .octon/framework/agency/_ops/scripts/validate/validate-autonomy-labels.sh

      - name: Report validation failure
        if: failure()
        run: |
          echo "::error::Agency validation failed. Run '.octon/framework/agency/_ops/scripts/validate/validate-agency.sh' locally to inspect errors."
