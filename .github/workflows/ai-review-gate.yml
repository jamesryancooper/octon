name: AI Review Gate

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - labeled
      - unlabeled

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ai-review-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  provider-findings:
    name: provider-${{ matrix.provider }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        provider:
          - openai
          - anthropic
    steps:
      - name: Checkout PR merge commit
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge

      - name: Pre-fetch base and head refs
        run: |
          git fetch --no-tags origin \
            ${{ github.event.pull_request.base.ref }} \
            +refs/pull/${{ github.event.pull_request.number }}/head

      - name: Build PR diff artifact
        run: |
          set -euo pipefail
          mkdir -p .harmony/output/.tmp/ai-gate
          git diff --unified=0 \
            ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} \
            > .harmony/output/.tmp/ai-gate/pr.diff || true

      - name: Run provider adapter
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail

          policy=".harmony/agency/practices/standards/ai-gate-policy.json"
          schema=".harmony/agency/practices/standards/ai-gate-findings.schema.json"
          diff=".harmony/output/.tmp/ai-gate/pr.diff"
          output=".harmony/output/.tmp/ai-gate/findings-${{ matrix.provider }}.json"

          case "${{ matrix.provider }}" in
            openai)
              script=".harmony/agency/_ops/scripts/ai-gate/provider-openai.sh"
              ;;
            anthropic)
              script=".harmony/agency/_ops/scripts/ai-gate/provider-anthropic.sh"
              ;;
            *)
              echo "Unknown provider: ${{ matrix.provider }}" >&2
              exit 1
              ;;
          esac

          chmod +x "${script}"
          "${script}" \
            --policy "${policy}" \
            --schema "${schema}" \
            --diff "${diff}" \
            --output "${output}"

      - name: Validate normalized findings structure
        run: |
          set -euo pipefail
          file=".harmony/output/.tmp/ai-gate/findings-${{ matrix.provider }}.json"
          jq -e '
            .provider and .status and .generated_at and .summary and (.findings | type == "array")
          ' "${file}" >/dev/null

      - name: Upload findings artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-gate-findings-${{ matrix.provider }}
          path: .harmony/output/.tmp/ai-gate/findings-${{ matrix.provider }}.json
          if-no-files-found: error

  decision:
    name: AI Review Gate / decision
    runs-on: ubuntu-latest
    needs:
      - provider-findings
    if: always()
    env:
      AI_GATE_ENFORCE: ${{ vars.AI_GATE_ENFORCE || 'false' }}
      PR_LABELS_JSON: ${{ toJson(github.event.pull_request.labels.*.name) }}
      GH_REPO: ${{ github.repository }}
      GH_PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download provider findings artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: ai-gate-findings-*
          path: .harmony/output/.tmp/ai-gate/artifacts
          merge-multiple: true

      - name: Ensure provider findings files exist
        run: |
          set -euo pipefail
          mkdir -p .harmony/output/.tmp/ai-gate/artifacts

          for provider in openai anthropic; do
            file=".harmony/output/.tmp/ai-gate/artifacts/findings-${provider}.json"
            if [[ -f "${file}" ]]; then
              continue
            fi

            jq -n \
              --arg provider "${provider}" \
              --arg generated_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              '{
                provider: $provider,
                status: "unavailable",
                generated_at: $generated_at,
                summary: "Provider artifact missing; marked unavailable.",
                meta: { adapter: "fallback" },
                findings: []
              }' > "${file}"
          done

      - id: aggregate
        name: Aggregate provider decisions
        continue-on-error: true
        run: |
          set -euo pipefail

          policy=".harmony/agency/practices/standards/ai-gate-policy.json"
          schema=".harmony/agency/practices/standards/ai-gate-findings.schema.json"
          findings_dir=".harmony/output/.tmp/ai-gate/artifacts"
          output=".harmony/output/.tmp/ai-gate/decision.json"

          chmod +x .harmony/agency/_ops/scripts/ai-gate/aggregate-decision.sh
          .harmony/agency/_ops/scripts/ai-gate/aggregate-decision.sh \
            --policy "${policy}" \
            --schema "${schema}" \
            --findings-dir "${findings_dir}" \
            --labels-json "${PR_LABELS_JSON}" \
            --enforce "${AI_GATE_ENFORCE}" \
            --output "${output}"

      - name: Sync AI gate labels
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          decision_file=".harmony/output/.tmp/ai-gate/decision.json"
          blockers="$(jq -r '.blockers_total' "${decision_file}")"
          waived="$(jq -r '.waived' "${decision_file}")"

          gh pr edit "${GH_PR_NUMBER}" --repo "${GH_REPO}" --add-label "ai-gate:required" >/dev/null 2>&1 || true

          if [[ "${blockers}" -gt 0 && "${waived}" != "true" ]]; then
            gh pr edit "${GH_PR_NUMBER}" --repo "${GH_REPO}" --add-label "ai-gate:blocker" >/dev/null 2>&1 || true
          else
            gh pr edit "${GH_PR_NUMBER}" --repo "${GH_REPO}" --remove-label "ai-gate:blocker" >/dev/null 2>&1 || true
          fi

      - name: Append AI gate summary
        if: always()
        run: |
          set -euo pipefail
          decision_file=".harmony/output/.tmp/ai-gate/decision.json"
          {
            echo "### AI Review Gate"
            echo
            echo "- enforce: $(jq -r '.enforce' "${decision_file}")"
            echo "- decision: $(jq -r '.decision' "${decision_file}")"
            echo "- reason: $(jq -r '.reason' "${decision_file}")"
            echo "- blockers_total: $(jq -r '.blockers_total' "${decision_file}")"
            echo "- providers_unavailable: $(jq -r '.providers_unavailable' "${decision_file}")"
            echo
            echo "#### Provider Results"
            jq -r '.providers[] | "- \(.provider): status=\(.status), findings=\(.findings), blockers=\(.blockers)"' "${decision_file}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload AI gate decision artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-gate-decision
          path: .harmony/output/.tmp/ai-gate/decision.json
          if-no-files-found: error

      - name: Enforce gate outcome
        if: always()
        run: |
          if [[ "${{ steps.aggregate.outcome }}" != "success" ]]; then
            echo "AI Review Gate decision failed."
            exit 1
          fi
