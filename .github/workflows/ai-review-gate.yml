name: AI Review Gate

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ai-review-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  changes:
    name: classify-changes
    runs-on: ubuntu-latest
    if: github.event.pull_request.state == 'open'
    outputs:
      risk: ${{ steps.filter.outputs.risk }}
      provider_trigger: ${{ steps.provider_trigger.outputs.provider_trigger }}
    steps:
      - name: Checkout PR merge commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge

      - id: filter
        name: Detect risky changed paths
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        with:
          filters: |
            risk:
              - '.github/workflows/**'
              - '.octon/**/*.sh'
              - '.octon/**/*.bash'
              - '.octon/**/*.js'
              - '.octon/**/*.ts'
              - '.octon/**/*.rs'
              - '.octon/**/*.json'
              - '.octon/**/*.toml'
              - '.octon/**/*.yml'
              - '.octon/**/*.yaml'
              - '.octon/framework/engine/runtime/run'
              - '.octon/framework/engine/runtime/run.cmd'
              - 'AGENTS.md'

      - id: provider_trigger
        name: Decide whether provider matrix must run
        run: |
          set -euo pipefail
          pr_author="${{ github.event.pull_request.user.login }}"
          if [[ "${pr_author}" == "app/dependabot" || "${pr_author}" == "dependabot[bot]" ]]; then
            echo "provider_trigger=false" >> "${GITHUB_OUTPUT}"
          elif [[ "${{ steps.filter.outputs.risk }}" == "true" ]]; then
            echo "provider_trigger=true" >> "${GITHUB_OUTPUT}"
          else
            echo "provider_trigger=false" >> "${GITHUB_OUTPUT}"
          fi

  provider-findings:
    needs:
      - changes
    if: github.event.pull_request.state == 'open' && needs.changes.outputs.provider_trigger == 'true'
    name: evaluator-adapter-${{ matrix.provider }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        provider:
          - openai
          - anthropic
    steps:
      - name: Checkout PR merge commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge

      - name: Pre-fetch base and head refs
        run: |
          git fetch --no-tags origin \
            ${{ github.event.pull_request.base.ref }} \
            +refs/pull/${{ github.event.pull_request.number }}/head

      - name: Build PR diff artifact
        run: |
          set -euo pipefail
          mkdir -p .octon/generated/.tmp/ai-gate
          git diff --unified=0 \
            ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} \
            > .octon/generated/.tmp/ai-gate/pr.diff || true

      - name: Run evaluator adapter
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail

          policy=".octon/framework/agency/practices/standards/ai-gate-policy.json"
          schema=".octon/framework/agency/practices/standards/ai-gate-findings.schema.json"
          diff=".octon/generated/.tmp/ai-gate/pr.diff"
          output=".octon/generated/.tmp/ai-gate/findings-${{ matrix.provider }}.json"
          adapter_manifest=".octon/framework/assurance/evaluators/adapters/${{ matrix.provider }}-review.yml"

          chmod +x .octon/framework/assurance/evaluators/runtime/_ops/scripts/run-evaluator-adapter.sh
          .octon/framework/assurance/evaluators/runtime/_ops/scripts/run-evaluator-adapter.sh \
            --adapter-manifest "${adapter_manifest}" \
            --policy "${policy}" \
            --schema "${schema}" \
            --diff "${diff}" \
            --output "${output}"

      - name: Validate normalized findings structure
        run: |
          set -euo pipefail
          file=".octon/generated/.tmp/ai-gate/findings-${{ matrix.provider }}.json"
          jq -e '
            .provider and .status and .generated_at and .summary and (.findings | type == "array")
          ' "${file}" >/dev/null

      - name: Upload findings artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ai-gate-findings-${{ matrix.provider }}
          path: .octon/generated/.tmp/ai-gate/findings-${{ matrix.provider }}.json
          if-no-files-found: error
          retention-days: 3

  decision:
    name: AI Review Gate / decision
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.pull_request.state == 'open' && always()
    needs:
      - changes
      - provider-findings
    env:
      AI_GATE_ENFORCE: ${{ vars.AI_GATE_ENFORCE || 'false' }}
      GH_REPO: ${{ github.repository }}
      GH_PR_NUMBER: ${{ github.event.pull_request.number }}
      PROVIDER_TRIGGER: ${{ needs.changes.outputs.provider_trigger }}
      PROVIDER_FINDINGS_RESULT: ${{ needs.provider-findings.result }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Assert protected execution posture
        run: |
          set -euo pipefail
          chmod +x .octon/framework/assurance/runtime/_ops/scripts/assert-protected-execution-posture.sh
          EFFECTIVE_MODE="$(bash .octon/framework/capabilities/_ops/scripts/policy-rollout-mode.sh get)"
          OCTON_CI_WORKFLOW_ID="ai-review-gate" \
          OCTON_PROTECTED_EXECUTION="true" \
          OCTON_EFFECTIVE_POLICY_MODE="${EFFECTIVE_MODE}" \
          EXPECT_AI_GATE_ENFORCE="true" \
          .octon/framework/assurance/runtime/_ops/scripts/assert-protected-execution-posture.sh

      - name: Download provider findings artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        continue-on-error: true
        with:
          pattern: ai-gate-findings-*
          path: .octon/generated/.tmp/ai-gate/artifacts
          merge-multiple: true

      - name: Ensure provider findings files exist
        run: |
          set -euo pipefail
          mkdir -p .octon/generated/.tmp/ai-gate/artifacts

          for provider in openai anthropic; do
            file=".octon/generated/.tmp/ai-gate/artifacts/findings-${provider}.json"
            if [[ -f "${file}" ]]; then
              continue
            fi

            status="unavailable"
            summary="Provider artifact missing; marked unavailable."
            adapter="fallback"

            if [[ "${PROVIDER_TRIGGER}" != "true" ]]; then
              status="ok"
              summary="Provider execution intentionally skipped for non-risky changes."
              adapter="policy-skip"
            elif [[ "${PROVIDER_FINDINGS_RESULT}" == "skipped" ]]; then
              summary="Provider execution expected but skipped; marked unavailable."
              adapter="expected-provider-skip"
            fi

            jq -n \
              --arg provider "${provider}" \
              --arg generated_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              --arg status "${status}" \
              --arg summary "${summary}" \
              --arg adapter "${adapter}" \
              '{
                provider: $provider,
                status: $status,
                generated_at: $generated_at,
                summary: $summary,
                meta: { adapter: $adapter },
                findings: []
              }' > "${file}"
          done

      - id: aggregate
        name: Aggregate provider decisions
        continue-on-error: true
        run: |
          set -euo pipefail

          policy=".octon/framework/agency/practices/standards/ai-gate-policy.json"
          schema=".octon/framework/agency/practices/standards/ai-gate-findings.schema.json"
          findings_dir=".octon/generated/.tmp/ai-gate/artifacts"
          output=".octon/generated/.tmp/ai-gate/decision.json"

          chmod +x .octon/framework/agency/_ops/scripts/ai-gate/aggregate-decision.sh
          .octon/framework/agency/_ops/scripts/ai-gate/aggregate-decision.sh \
            --policy "${policy}" \
            --schema "${schema}" \
            --findings-dir "${findings_dir}" \
            --enforce "${AI_GATE_ENFORCE}" \
            --output "${output}"

      - name: Materialize canonical AI gate authority artifacts
        if: always()
        run: |
          set -euo pipefail

          decision_file=".octon/generated/.tmp/ai-gate/decision.json"
          control_json=".octon/generated/.tmp/ai-gate/authority.json"
          decision="$(jq -r '.decision' "${decision_file}")"
          gate_pass="$(jq -r '.gate_pass' "${decision_file}")"
          blockers="$(jq -r '.blockers_total' "${decision_file}")"
          status="granted"

          if [[ "${gate_pass}" != "true" ]]; then
            status="denied"
          elif [[ "${blockers}" -gt 0 ]]; then
            status="staged"
          fi

          chmod +x .octon/framework/engine/_ops/scripts/project-github-control-approval.sh
          .octon/framework/engine/_ops/scripts/project-github-control-approval.sh \
            --request-id "github-ai-review-gate-pr-${GH_PR_NUMBER}" \
            --run-id "github-ai-review-gate-pr-${GH_PR_NUMBER}" \
            --target-id "github-pr:${GH_PR_NUMBER}" \
            --action-type "github-ai-review-gate" \
            --issued-by "github://workflow/ai-review-gate" \
            --status "${status}" \
            --support-tier "repo-local-consequential" \
            --workflow-mode "agent-augmented" \
            --required-evidence "ai-review-gate-decision" \
            --required-evidence "provider-findings" \
            --reason-code "AI_GATE_DECISION_$(printf '%s' "${decision}" | tr '[:lower:]-' '[:upper:]_')" \
            --projection-check "github://pull/${GH_PR_NUMBER}#check:AI Review Gate / decision" \
            --output-json "${control_json}"

      - name: Append AI gate summary
        if: always()
        run: |
          set -euo pipefail
          decision_file=".octon/generated/.tmp/ai-gate/decision.json"
          {
            echo "### AI Review Gate"
            echo
            echo "- enforce: $(jq -r '.enforce' "${decision_file}")"
            echo "- decision: $(jq -r '.decision' "${decision_file}")"
            echo "- reason: $(jq -r '.reason' "${decision_file}")"
            echo "- blockers_total: $(jq -r '.blockers_total' "${decision_file}")"
            echo "- providers_unavailable: $(jq -r '.providers_unavailable' "${decision_file}")"
            echo
            echo "#### Provider Results"
            jq -r '.providers[] | "- \(.provider): status=\(.status), findings=\(.findings), blockers=\(.blockers)"' "${decision_file}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload AI gate decision artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ai-gate-decision
          path: .octon/generated/.tmp/ai-gate/decision.json
          if-no-files-found: error
          retention-days: 7

      - name: Upload AI gate control artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ai-gate-control-artifacts
          path: |
            .octon/generated/.tmp/ai-gate/authority.json
            .octon/state/control/execution/approvals/requests/github-ai-review-gate-pr-${{ github.event.pull_request.number }}.yml
            .octon/state/control/execution/approvals/grants/grant-github-ai-review-gate-pr-${{ github.event.pull_request.number }}.yml
            .octon/state/evidence/control/execution
          if-no-files-found: warn
          retention-days: 7

      - name: Upload protected execution receipt
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ai-review-gate-protected-execution-receipt
          path: .octon/state/evidence/runs/ci/ai-review-gate-*
          if-no-files-found: error
          retention-days: 7

      - name: Enforce gate outcome
        if: always()
        run: |
          if [[ "${{ steps.aggregate.outcome }}" != "success" ]]; then
            echo "AI Review Gate decision failed."
            exit 1
          fi
