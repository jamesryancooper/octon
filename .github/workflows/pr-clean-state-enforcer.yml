name: PR Clean State Enforcer

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - converted_to_draft
      - edited
      - labeled
      - unlabeled
      - closed
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: pr-clean-state-enforcer
  cancel-in-progress: true

jobs:
  enforce-clean-state:
    name: enforce-clean-state
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ATTENTION_AFTER_HOURS: ${{ vars.AUTONOMY_ATTENTION_AFTER_HOURS || '4' }}
      CLOSED_HEAD_CLEANUP_LIMIT: ${{ vars.AUTONOMY_CLOSED_HEAD_CLEANUP_LIMIT || '25' }}
    steps:
      - name: Enforce clean-state contracts
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const defaultBranch = context.payload.repository?.default_branch || "main";
            const attentionAfterHours = Number.parseInt(process.env.ATTENTION_AFTER_HOURS || "4", 10);
            const closedHeadCleanupLimit = Math.max(
              0,
              Number.parseInt(process.env.CLOSED_HEAD_CLEANUP_LIMIT || "25", 10)
            );

            const attentionLabel = "autonomy:attention-required";
            const healthLabel = "ops:autonomy-health";
            const attentionIssueTitle = "[autonomy-health] open-pr attention required";

            function isRateLimit(error) {
              const message = String(error?.message || error?.response?.data?.message || "");
              return error?.status === 429 || (error?.status === 403 && /rate limit/i.test(message));
            }

            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name,
                  color,
                  description
                });
              }
            }

            await ensureLabel(attentionLabel, "D93F0B", "PR requires prompt human action to maintain clean-state flow");
            await ensureLabel(healthLabel, "B60205", "Automation and autonomy health signal");

            const openPulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "open",
              per_page: 100
            });

            const openHeadRefs = new Set(
              openPulls
                .filter((pr) => pr.head?.repo?.full_name === `${owner}/${repo}`)
                .map((pr) => pr.head?.ref)
                .filter(Boolean)
            );

            const attentionRows = [];
            let labelsAdded = 0;
            let labelsRemoved = 0;
            let deletedHeadRefs = 0;
            let skippedHeadRefs = 0;
            let cleanupRateLimited = false;
            let healthIssueSyncSkipped = false;

            const blockedMergeStates = new Set(["blocked", "behind", "dirty", "unknown", "unstable"]);

            for (const pr of openPulls) {
              const labels = new Set((pr.labels || []).map((label) => label.name));
              const reasons = [];
              const ageHours = (Date.now() - Date.parse(pr.updated_at)) / (1000 * 60 * 60);

              let mergeState = "unknown";
              try {
                const detail = await github.rest.pulls.get({
                  owner,
                  repo,
                  pull_number: pr.number
                });
                mergeState = String(detail.data.mergeable_state || "unknown").toLowerCase();
              } catch (error) {
                core.warning(`Could not read merge state for PR #${pr.number}: ${error.message}`);
              }

              if (blockedMergeStates.has(mergeState)) {
                reasons.push(`merge state is '${mergeState}'`);
              }

              const needsAttention = reasons.length > 0 && ageHours >= attentionAfterHours;

              if (needsAttention) {
                attentionRows.push({
                  number: pr.number,
                  url: pr.html_url,
                  title: pr.title,
                  ageHours: Math.floor(ageHours),
                  reasons
                });
                if (!labels.has(attentionLabel)) {
                  try {
                    await github.rest.issues.addLabels({
                      owner,
                      repo,
                      issue_number: pr.number,
                      labels: [attentionLabel]
                    });
                    labelsAdded += 1;
                  } catch (error) {
                    core.warning(`Could not add ${attentionLabel} to PR #${pr.number}: ${error.message}`);
                  }
                }
              } else if (labels.has(attentionLabel)) {
                try {
                  await github.rest.issues.removeLabel({
                    owner,
                    repo,
                    issue_number: pr.number,
                    name: attentionLabel
                  });
                  labelsRemoved += 1;
                } catch (error) {
                  core.warning(`Could not remove ${attentionLabel} from PR #${pr.number}: ${error.message}`);
                }
              }
            }

            let closedPulls = [];
            if (closedHeadCleanupLimit > 0) {
              try {
                const closedPullsResponse = await github.rest.pulls.list({
                  owner,
                  repo,
                  state: "closed",
                  sort: "updated",
                  direction: "desc",
                  per_page: Math.min(closedHeadCleanupLimit, 100)
                });
                closedPulls = closedPullsResponse.data;
              } catch (error) {
                if (isRateLimit(error)) {
                  cleanupRateLimited = true;
                  core.warning(`Skipped closed head-ref cleanup after rate limit: ${error.message}`);
                } else {
                  throw error;
                }
              }
            }

            for (const pr of closedPulls) {
              if (deletedHeadRefs + skippedHeadRefs >= closedHeadCleanupLimit) break;
              const sameRepoHead = pr.head?.repo?.full_name === `${owner}/${repo}`;
              const headRef = pr.head?.ref || "";
              if (!sameRepoHead || !headRef) continue;
              if (headRef === defaultBranch || headRef === "main") continue;
              if (openHeadRefs.has(headRef)) continue;

              try {
                await github.rest.git.deleteRef({
                  owner,
                  repo,
                  ref: `heads/${headRef}`
                });
                deletedHeadRefs += 1;
              } catch (error) {
                if (error.status === 422 || error.status === 404) {
                  skippedHeadRefs += 1;
                } else if (isRateLimit(error)) {
                  cleanupRateLimited = true;
                  core.warning(`Stopped closed head-ref cleanup after rate limit: ${error.message}`);
                  break;
                } else {
                  skippedHeadRefs += 1;
                  core.warning(`Could not delete closed head ref '${headRef}': ${error.message}`);
                }
              }
            }

            let openIssues = [];
            try {
              openIssues = await github.paginate(github.rest.issues.listForRepo, {
                owner,
                repo,
                state: "open",
                labels: healthLabel,
                per_page: 100
              });
            } catch (error) {
              if (isRateLimit(error)) {
                healthIssueSyncSkipped = true;
                core.warning(`Skipped health issue sync after rate limit: ${error.message}`);
              } else {
                throw error;
              }
            }
            const attentionIssue = openIssues.find((issue) => !issue.pull_request && issue.title === attentionIssueTitle);

            if (!healthIssueSyncSkipped && attentionRows.length > 0) {
              const lines = [
                "Clean-state enforcer detected open PRs requiring prompt action.",
                "",
                `- Attention threshold: ${attentionAfterHours}h since last update`,
                `- Generated at: ${new Date().toISOString()}`,
                "",
                "| PR | Age (h) | Reasons |",
                "| --- | ---: | --- |",
                ...attentionRows.map((row) => `| [#${row.number}](${row.url}) | ${row.ageHours} | ${row.reasons.join("; ")} |`),
                "",
                "Action expectations:",
                "- Resolve concrete blocking conditions promptly (review threads, checks, merge state, authority, or evidence blockers).",
                "- After merge/close, run local cleanup: `.octon/framework/execution-roles/_ops/scripts/git/git-pr-cleanup.sh`.",
                "- Preferred shipping path: `.octon/framework/execution-roles/_ops/scripts/git/git-pr-ship.sh` (includes cleanup watcher)."
              ];
              const body = lines.join("\n");

              if (attentionIssue) {
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: attentionIssue.number,
                  body
                });
              } else {
                await github.rest.issues.create({
                  owner,
                  repo,
                  title: attentionIssueTitle,
                  body,
                  labels: [healthLabel]
                });
              }
            } else if (!healthIssueSyncSkipped && attentionIssue) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: attentionIssue.number,
                body: "Clean-state enforcer is healthy: no open PRs currently require attention."
              });
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: attentionIssue.number,
                state: "closed"
              });
            }

            await core.summary
              .addHeading("PR Clean State Enforcer")
              .addRaw(`- open PRs scanned: ${openPulls.length}\n`)
              .addRaw(`- attention PRs: ${attentionRows.length}\n`)
              .addRaw(`- attention labels added: ${labelsAdded}\n`)
              .addRaw(`- attention labels removed: ${labelsRemoved}\n`)
              .addRaw(`- closed head refs deleted: ${deletedHeadRefs}\n`)
              .addRaw(`- closed head refs skipped: ${skippedHeadRefs}\n`)
              .addRaw(`- closed head cleanup limit: ${closedHeadCleanupLimit}\n`)
              .addRaw(`- cleanup rate limited: ${cleanupRateLimited}\n`)
              .addRaw(`- health issue sync skipped: ${healthIssueSyncSkipped}\n`)
              .write();
