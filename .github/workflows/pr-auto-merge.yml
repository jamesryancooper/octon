name: PR Auto Merge

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - labeled
      - unlabeled

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: auto-merge
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >-
      ${{
        github.event.pull_request.state == 'open' &&
        github.event.pull_request.base.ref == 'main' &&
        !github.event.pull_request.head.repo.fork
      }}
    env:
      AUTONOMY_AUTO_MERGE_ENABLED: ${{ vars.AUTONOMY_AUTO_MERGE_ENABLED || 'false' }}
      GH_REPO: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Enable auto-merge for eligible low-risk PRs (race-safe)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          enabled="$(echo "${AUTONOMY_AUTO_MERGE_ENABLED}" | tr '[:upper:]' '[:lower:]')"
          if [[ "$enabled" != "true" ]]; then
            echo "Auto-merge kill switch is OFF (AUTONOMY_AUTO_MERGE_ENABLED=${AUTONOMY_AUTO_MERGE_ENABLED})."
            exit 0
          fi

          pr_view() {
            gh pr view "${PR_NUMBER}" --repo "${GH_REPO}" \
              --json state,isDraft,headRefName,baseRefName,headRefOid,labels,autoMergeRequest
          }

          check_runs_json() {
            local head_sha="$1"
            gh api "repos/${GH_REPO}/commits/${head_sha}/check-runs"
          }

          has_label() {
            local payload="$1"
            local name="$2"
            jq -e --arg name "$name" 'any(.labels[]?; .name == $name)' <<<"${payload}" >/dev/null
          }

          required_checks_passed() {
            local payload="$1"
            jq -e '
              def passed($name):
                any(.check_runs[]?;
                  .name == $name and
                  .conclusion == "success");
              passed("PR Quality Standards") and
              passed("Validate branch naming") and
              passed("Validate autonomy policy")
            ' <<<"${payload}" >/dev/null
          }

          required_checks_failed() {
            local payload="$1"
            jq -e '
              def failed($name):
                any(.check_runs[]?;
                  .name == $name and
                  (.conclusion == "failure" or .conclusion == "cancelled" or .conclusion == "timed_out" or .conclusion == "action_required"));
              failed("PR Quality Standards") or
              failed("Validate branch naming") or
              failed("Validate autonomy policy")
            ' <<<"${payload}" >/dev/null
          }

          # Triage and auto-merge start from the same PR event; wait briefly for labels to settle.
          pr_json=""
          for _ in {1..18}; do
            pr_json="$(pr_view)"

            if [[ "$(jq -r '.state' <<<"${pr_json}")" != "OPEN" ]]; then
              echo "Skipping: PR is no longer open."
              exit 0
            fi

            has_risk_low=false
            has_risk_med=false
            has_risk_high=false
            has_auto=false
            has_noauto=false

            has_label "${pr_json}" "risk:low" && has_risk_low=true || true
            has_label "${pr_json}" "risk:med" && has_risk_med=true || true
            has_label "${pr_json}" "risk:high" && has_risk_high=true || true
            has_label "${pr_json}" "autonomy:auto-merge" && has_auto=true || true
            has_label "${pr_json}" "autonomy:no-automerge" && has_noauto=true || true

            if [[ "${has_risk_low}" == "true" || "${has_risk_med}" == "true" || "${has_risk_high}" == "true" ]]; then
              if [[ "${has_auto}" == "true" || "${has_noauto}" == "true" ]]; then
                break
              fi
            fi

            sleep 5
          done

          if [[ "$(jq -r '.isDraft' <<<"${pr_json}")" == "true" ]]; then
            echo "Skipping: PR is draft."
            exit 0
          fi

          head_ref="$(jq -r '.headRefName' <<<"${pr_json}")"
          if [[ "${head_ref}" == exp/* ]]; then
            echo "Skipping: exp/* branches are non-mergeable."
            exit 0
          fi

          if ! has_label "${pr_json}" "autonomy:auto-merge"; then
            echo "Skipping: autonomy:auto-merge label missing."
            exit 0
          fi

          if has_label "${pr_json}" "autonomy:no-automerge"; then
            echo "Skipping: autonomy:no-automerge label present."
            exit 0
          fi

          if ! has_label "${pr_json}" "risk:low"; then
            echo "Skipping: risk:low label missing."
            exit 0
          fi

          if has_label "${pr_json}" "risk:med" || has_label "${pr_json}" "risk:high"; then
            echo "Skipping: non-low risk label present."
            exit 0
          fi

          if has_label "${pr_json}" "accept:human"; then
            echo "Skipping: accept:human label present."
            exit 0
          fi

          # Wait for required checks to become green for this PR.
          check_json='{"check_runs":[]}'
          for _ in {1..60}; do
            pr_json="$(pr_view)"
            head_sha="$(jq -r '.headRefOid' <<<"${pr_json}")"
            check_json="$(check_runs_json "${head_sha}")"

            if required_checks_passed "${check_json}"; then
              break
            fi

            if required_checks_failed "${check_json}"; then
              echo "Required checks failed; auto-merge will not be enabled."
              exit 0
            fi

            sleep 5
          done

          if ! required_checks_passed "${check_json}"; then
            echo "Required checks did not reach success within wait window."
            exit 0
          fi

          # Revalidate autonomy/risk labels on latest state before enabling auto-merge.
          pr_json="$(pr_view)"

          if [[ "$(jq -r '.state' <<<"${pr_json}")" != "OPEN" ]]; then
            echo "Skipping: PR is no longer open."
            exit 0
          fi

          if [[ "$(jq -r '.isDraft' <<<"${pr_json}")" == "true" ]]; then
            echo "Skipping: PR is draft in latest state."
            exit 0
          fi

          head_ref="$(jq -r '.headRefName' <<<"${pr_json}")"
          if [[ "${head_ref}" == exp/* ]]; then
            echo "Skipping: exp/* branches are non-mergeable."
            exit 0
          fi

          if ! has_label "${pr_json}" "autonomy:auto-merge"; then
            echo "Skipping: autonomy:auto-merge label missing on latest state."
            exit 0
          fi

          if has_label "${pr_json}" "autonomy:no-automerge"; then
            echo "Skipping: autonomy:no-automerge label present on latest state."
            exit 0
          fi

          if ! has_label "${pr_json}" "risk:low"; then
            echo "Skipping: risk:low label missing on latest state."
            exit 0
          fi

          if has_label "${pr_json}" "risk:med" || has_label "${pr_json}" "risk:high"; then
            echo "Skipping: non-low risk label present on latest state."
            exit 0
          fi

          if has_label "${pr_json}" "accept:human"; then
            echo "Skipping: accept:human label present on latest state."
            exit 0
          fi

          if [[ "$(jq -r '.autoMergeRequest != null' <<<"${pr_json}")" == "true" ]]; then
            echo "Auto-merge is already enabled for PR #${PR_NUMBER}."
            exit 0
          fi

          merge_output=""
          if merge_output="$(
            gh pr merge "${PR_NUMBER}" --repo "${GH_REPO}" --squash --delete-branch --auto 2>&1
          )"; then
            echo "${merge_output}"
            echo "Enabled auto-merge for PR #${PR_NUMBER}."
            exit 0
          fi

          echo "${merge_output}"

          if grep -qi "Resource not accessible by integration" <<<"${merge_output}"; then
            echo "Auto-merge API unavailable for integration token; attempting direct merge fallback."

            direct_merge_output=""
            if ! direct_merge_output="$(
              gh api \
                --method PUT \
                "repos/${GH_REPO}/pulls/${PR_NUMBER}/merge" \
                -f merge_method='squash' 2>&1
            )"; then
              echo "${direct_merge_output}"
              exit 1
            fi

            echo "${direct_merge_output}"

            head_ref_encoded="$(jq -rn --arg ref "${head_ref}" '$ref | @uri')"
            if ! gh api --method DELETE "repos/${GH_REPO}/git/refs/heads/${head_ref_encoded}" >/dev/null 2>&1; then
              echo "Note: head branch '${head_ref}' could not be deleted automatically."
            fi

            echo "Merged PR #${PR_NUMBER} via REST fallback."
            exit 0
          fi

          exit 1
