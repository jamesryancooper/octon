name: PR Auto Merge

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      pr_number:
        description: Optional single PR number to reconcile.
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-auto-merge-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  discover-prs:
    name: discover-prs
    runs-on: ubuntu-latest
    outputs:
      pr_numbers: ${{ steps.discover.outputs.pr_numbers }}
    env:
      GH_REPO: ${{ github.repository }}
    steps:
      - id: discover
        name: Discover PRs to reconcile
        env:
          GH_TOKEN: ${{ secrets.AUTONOMY_PAT || secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.AUTONOMY_PAT || secrets.GITHUB_TOKEN }}
          DISPATCH_PR_NUMBER: ${{ github.event.inputs.pr_number || '' }}
        run: |
          set -euo pipefail

          pr_numbers='[]'

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request_target" ]]; then
            if [[ "${{ github.event.pull_request.state }}" != "open" ]]; then
              echo "Skipping fast path discovery: PR is not open."
              echo "pr_numbers=[]" >> "${GITHUB_OUTPUT}"
              exit 0
            fi

            if [[ "${{ github.event.pull_request.base.ref }}" != "main" ]]; then
              echo "Skipping fast path discovery: PR base is not main."
              echo "pr_numbers=[]" >> "${GITHUB_OUTPUT}"
              exit 0
            fi

            if [[ "${{ github.event.pull_request.head.repo.fork }}" == "true" ]]; then
              echo "Skipping fast path discovery: fork PRs are ineligible."
              echo "pr_numbers=[]" >> "${GITHUB_OUTPUT}"
              exit 0
            fi

            pr_numbers="[${{ github.event.pull_request.number }}]"
            echo "Discovered fast-path PR #${{ github.event.pull_request.number }}."
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && -n "${DISPATCH_PR_NUMBER}" ]]; then
            if [[ ! "${DISPATCH_PR_NUMBER}" =~ ^[0-9]+$ ]]; then
              echo "Invalid workflow_dispatch input: pr_number must be numeric."
              exit 1
            fi
            pr_numbers="[${DISPATCH_PR_NUMBER}]"
            echo "Discovered manual PR selection #${DISPATCH_PR_NUMBER}."
          else
            pr_numbers="$({
              gh pr list \
                --repo "${GH_REPO}" \
                --state open \
                --base main \
                --limit 200 \
                --json number
            } | jq -c '[.[].number]')"
            echo "Discovered $(jq -r 'length' <<<"${pr_numbers}") open PR(s) on main for reconciliation scan."
          fi

          echo "pr_numbers=${pr_numbers}" >> "${GITHUB_OUTPUT}"

  auto-merge:
    name: auto-merge-pr-${{ matrix.pr_number }}
    needs:
      - discover-prs
    if: ${{ needs.discover-prs.outputs.pr_numbers != '[]' }}
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        pr_number: ${{ fromJson(needs.discover-prs.outputs.pr_numbers) }}
    concurrency:
      group: pr-auto-merge-${{ matrix.pr_number }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      AUTONOMY_AUTO_MERGE_ENABLED: ${{ vars.AUTONOMY_AUTO_MERGE_ENABLED || 'false' }}
      GH_REPO: ${{ github.repository }}
      PR_NUMBER: ${{ matrix.pr_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Enable auto-merge for eligible PRs (race-safe)
        env:
          GH_TOKEN: ${{ secrets.AUTONOMY_PAT || secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.AUTONOMY_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          enabled="$(echo "${AUTONOMY_AUTO_MERGE_ENABLED}" | tr '[:upper:]' '[:lower:]')"
          if [[ "$enabled" != "true" ]]; then
            mkdir -p .octon/generated/.tmp/pr-auto-merge
            chmod +x .octon/framework/engine/_ops/scripts/project-github-control-approval.sh
            .octon/framework/engine/_ops/scripts/project-github-control-approval.sh \
              --request-id "github-pr-automerge-${PR_NUMBER}" \
              --run-id "github-pr-automerge-${PR_NUMBER}" \
              --target-id "github-pr:${PR_NUMBER}" \
              --action-type "github-pr-autonomy-merge" \
              --issued-by "github://workflow/pr-auto-merge" \
              --status "staged" \
              --support-tier "repo-local-consequential" \
              --workflow-mode "human-only" \
              --reason-code "PR_AUTONOMY_DISABLED" \
              --projection-check "github://pull/${PR_NUMBER}#check:Validate autonomy policy" \
              --output-json ".octon/generated/.tmp/pr-auto-merge/authority-${PR_NUMBER}.json" >/dev/null
            echo "Auto-merge kill switch is OFF (AUTONOMY_AUTO_MERGE_ENABLED=${AUTONOMY_AUTO_MERGE_ENABLED})."
            exit 0
          fi

          pr_view() {
            gh api "repos/${GH_REPO}/pulls/${PR_NUMBER}"
          }

          pr_files() {
            gh api --paginate "repos/${GH_REPO}/pulls/${PR_NUMBER}/files?per_page=100"
          }

          parse_semver_core() {
            local raw="$1"
            if [[ "$raw" =~ ^v?([0-9]+)(\.([0-9]+))?(\.([0-9]+))? ]]; then
              printf '%s %s %s\n' "${BASH_REMATCH[1]}" "${BASH_REMATCH[3]:-0}" "${BASH_REMATCH[5]:-0}"
            else
              return 1
            fi
          }

          classify_dependabot_update_type() {
            local title="$1"
            if [[ ! "$title" =~ from[[:space:]]+([^[:space:]]+)[[:space:]]+to[[:space:]]+([^[:space:]]+) ]]; then
              printf 'unknown\n'
              return
            fi
            local from_raw="${BASH_REMATCH[1]}"
            local to_raw="${BASH_REMATCH[2]}"
            local from_major from_minor from_patch to_major to_minor to_patch
            read -r from_major from_minor from_patch < <(parse_semver_core "$from_raw" || printf 'x x x\n')
            read -r to_major to_minor to_patch < <(parse_semver_core "$to_raw" || printf 'x x x\n')
            if [[ "$from_major" == "x" || "$to_major" == "x" ]]; then
              printf 'unknown\n'
              return
            fi
            if [[ "$to_major" != "$from_major" ]]; then
              printf 'major\n'
            elif [[ "$to_minor" != "$from_minor" ]]; then
              printf 'minor\n'
            elif [[ "$to_patch" != "$from_patch" ]]; then
              printf 'patch\n'
            else
              printf 'unknown\n'
            fi
          }

          collect_paths_json() {
            pr_files | jq -sc '[.[][] | .filename]'
          }

          compute_merge_authority() {
            local payload="$1"
            local paths_json="$2"
            local title author head_ref base_ref state is_draft is_cross_repo
            local is_dependabot is_release_please is_dependabot_github_actions update_type
            local high_impact=false
            local medium_impact=false
            local requires_human_review=false
            local reason_code="PR_AUTONOMY_ELIGIBLE"

            title="$(jq -r '.title // ""' <<<"${payload}")"
            author="$(jq -r '.user.login // ""' <<<"${payload}")"
            head_ref="$(jq -r '.head.ref // ""' <<<"${payload}")"
            base_ref="$(jq -r '.base.ref // ""' <<<"${payload}")"
            state="$(jq -r '.state // ""' <<<"${payload}")"
            is_draft="$(jq -r '.draft // false' <<<"${payload}")"
            is_cross_repo="$(jq -r '.head.repo.fork // false' <<<"${payload}")"

            is_dependabot=false
            [[ "${author}" == "dependabot[bot]" ]] && is_dependabot=true
            is_release_please=false
            [[ "${head_ref}" == release-please--* ]] && is_release_please=true
            is_dependabot_github_actions=false
            if [[ "${is_dependabot}" == true && "${head_ref}" == dependabot/github_actions/* ]]; then
              is_dependabot_github_actions=true
            fi

            update_type="n/a"
            if [[ "${is_dependabot}" == true ]]; then
              update_type="$(classify_dependabot_update_type "${title}")"
            fi

            if jq -e '
              any(.[]?;
                startswith(".github/")
                or . == "AGENTS.md"
                or startswith(".octon/framework/agency/governance/")
                or startswith(".octon/framework/cognition/governance/")
                or startswith(".octon/framework/capabilities/governance/")
                or startswith(".octon/framework/engine/governance/")
                or startswith(".octon/framework/engine/runtime/spec/")
                or startswith(".octon/framework/assurance/governance/")
              )' <<<"${paths_json}" >/dev/null; then
              high_impact=true
            fi

            if [[ "${high_impact}" != true ]] && jq -e '
              any(.[]?;
                startswith(".octon/framework/agency/runtime/")
                or startswith(".octon/framework/capabilities/runtime/")
                or startswith(".octon/framework/orchestration/runtime/")
                or startswith(".octon/framework/assurance/runtime/")
                or startswith(".octon/framework/engine/runtime/")
              )' <<<"${paths_json}" >/dev/null; then
              medium_impact=true
            fi

            if [[ "${high_impact}" == true ]]; then
              requires_human_review=true
              reason_code="PR_AUTONOMY_HIGH_IMPACT_REVIEW_REQUIRED"
            fi

            if [[ "${is_dependabot_github_actions}" == true && ("${update_type}" == "major" || "${update_type}" == "unknown") ]]; then
              requires_human_review=true
              reason_code="PR_AUTONOMY_DEPENDABOT_REVIEW_REQUIRED"
            fi

            if [[ "${state}" != "open" ]]; then
              printf 'staged|PR_NOT_OPEN|%s|%s\n' "${head_ref}" "${base_ref}"
              return
            fi
            if [[ "${is_draft}" == "true" ]]; then
              printf 'staged|PR_IS_DRAFT|%s|%s\n' "${head_ref}" "${base_ref}"
              return
            fi
            if [[ "${is_cross_repo}" == "true" ]]; then
              printf 'staged|PR_IS_FORK|%s|%s\n' "${head_ref}" "${base_ref}"
              return
            fi
            if [[ "${base_ref}" != "main" ]]; then
              printf 'staged|PR_BASE_NOT_MAIN|%s|%s\n' "${head_ref}" "${base_ref}"
              return
            fi
            if [[ "${head_ref}" == exp/* ]]; then
              printf 'staged|PR_EXPERIMENTAL_BRANCH|%s|%s\n' "${head_ref}" "${base_ref}"
              return
            fi
            if [[ "${requires_human_review}" == true ]]; then
              printf 'staged|%s|%s|%s\n' "${reason_code}" "${head_ref}" "${base_ref}"
              return
            fi

            printf 'granted|PR_AUTONOMY_ELIGIBLE|%s|%s\n' "${head_ref}" "${base_ref}"
          }

          materialize_merge_authority() {
            local status="$1"
            local reason_code="$2"
            local head_ref="$3"
            local control_json=".octon/generated/.tmp/pr-auto-merge/authority-${PR_NUMBER}.json"
            mkdir -p .octon/generated/.tmp/pr-auto-merge

            chmod +x .octon/framework/engine/_ops/scripts/project-github-control-approval.sh
            .octon/framework/engine/_ops/scripts/project-github-control-approval.sh \
              --request-id "github-pr-automerge-${PR_NUMBER}" \
              --run-id "github-pr-automerge-${PR_NUMBER}" \
              --target-id "github-pr:${PR_NUMBER}" \
              --action-type "github-pr-autonomy-merge" \
              --issued-by "github://workflow/pr-auto-merge" \
              --status "${status}" \
              --support-tier "repo-local-consequential" \
              --workflow-mode "human-only" \
              --required-evidence "pr-autonomy-policy" \
              --required-evidence "required-checks" \
              --reason-code "${reason_code}" \
              --projection-check "github://pull/${PR_NUMBER}#check:Validate autonomy policy" \
              --projection-check "github://pull/${PR_NUMBER}#check:AI Review Gate / decision" \
              --projection-kind "github-head-ref" \
              --projection-ref "github://pull/${PR_NUMBER}#head:${head_ref}" \
              --output-json "${control_json}" >/dev/null
          }

          assert_automerge_eligible() {
            local payload="$1"
            local suffix="${2:-}"
            local paths_json status reason_code head_ref base_ref

            paths_json="$(collect_paths_json)"
            IFS='|' read -r status reason_code head_ref base_ref < <(compute_merge_authority "${payload}" "${paths_json}")
            materialize_merge_authority "${status}" "${reason_code}" "${head_ref}"

            if [[ "$(jq -r '.state' <<<"${payload}")" != "open" ]]; then
              echo "Skipping: PR is no longer open${suffix}."
              exit 0
            fi

            if [[ "$(jq -r '.draft' <<<"${payload}")" == "true" ]]; then
              echo "Skipping: PR is draft${suffix}."
              exit 0
            fi

            if [[ "$(jq -r '.head.repo.fork' <<<"${payload}")" == "true" ]]; then
              echo "Skipping: fork PRs are not eligible${suffix}."
              exit 0
            fi

            if [[ "$(jq -r '.base.ref' <<<"${payload}")" != "main" ]]; then
              echo "Skipping: PR base is not main${suffix}."
              exit 0
            fi

            head_ref="$(jq -r '.head.ref' <<<"${payload}")"
            if [[ "${head_ref}" == exp/* ]]; then
              echo "Skipping: exp/* branches are non-mergeable${suffix}."
              exit 0
            fi

            if [[ "${status}" != "granted" ]]; then
              echo "Skipping: canonical merge authority is ${status}${suffix} (${reason_code})."
              exit 0
            fi
          }

          pr_json=""
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request_target" ]]; then
          # Triage and auto-merge start from the same PR event; wait briefly for state to settle.
            for _ in {1..18}; do
              pr_json="$(pr_view)"

              if [[ "$(jq -r '.state' <<<"${pr_json}")" != "open" ]]; then
                echo "Skipping: PR is no longer open."
                exit 0
              fi

              if jq -e '.labels | type == "array"' <<<"${pr_json}" >/dev/null 2>&1; then
                break
              fi

              sleep 5
            done
          else
            pr_json="$(pr_view)"
          fi

          assert_automerge_eligible "${pr_json}"

          # Revalidate canonical merge authority on latest state before merge polling.
          pr_json="$(pr_view)"
          assert_automerge_eligible "${pr_json}" " on latest state"

          if [[ "$(jq -r '.auto_merge != null' <<<"${pr_json}")" == "true" ]]; then
            echo "Auto-merge is already enabled for PR #${PR_NUMBER}."
            exit 0
          fi

          # Fine-grained PATs cannot reliably inspect check-runs. Instead, poll
          # the merge endpoint and let rulesets/branch protections be the source
          # of truth for required checks and mergeability.
          direct_merge_output=""
          merged=false
          for _ in {1..120}; do
            pr_json="$(pr_view)"
            assert_automerge_eligible "${pr_json}" " during merge polling"

            if direct_merge_output="$(
              gh api \
                --method PUT \
                "repos/${GH_REPO}/pulls/${PR_NUMBER}/merge" \
                -f merge_method='squash' 2>&1
            )"; then
              merged=true
              break
            fi

            if grep -qiE 'HTTP 405|HTTP 409|HTTP 422|Pull Request is not mergeable|required status check|review' <<<"${direct_merge_output}"; then
              sleep 5
              continue
            fi

            echo "${direct_merge_output}"
            exit 1
          done

          if [[ "${merged}" != "true" ]]; then
            echo "PR did not become mergeable within wait window."
            exit 0
          fi

          echo "${direct_merge_output}"

          head_ref="$(jq -r '.head.ref // ""' <<<"${pr_json}")"
          head_ref_encoded="$(jq -rn --arg ref "${head_ref}" '$ref | @uri')"
          if ! gh api --method DELETE "repos/${GH_REPO}/git/refs/heads/${head_ref_encoded}" >/dev/null 2>&1; then
            echo "Note: head branch '${head_ref}' could not be deleted automatically."
          fi

          echo "Merged PR #${PR_NUMBER} autonomously via REST."

      - name: Upload PR auto-merge control artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pr-auto-merge-control-artifacts-${{ matrix.pr_number }}
          path: |
            .octon/generated/.tmp/pr-auto-merge/authority-${{ matrix.pr_number }}.json
            .octon/state/control/execution/approvals/requests/github-pr-automerge-${{ matrix.pr_number }}.yml
            .octon/state/control/execution/approvals/grants/grant-github-pr-automerge-${{ matrix.pr_number }}.yml
            .octon/state/evidence/control/execution
          if-no-files-found: warn
          retention-days: 7
