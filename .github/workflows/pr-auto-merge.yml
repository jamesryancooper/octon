name: PR Auto Merge

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - labeled
      - unlabeled
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      pr_number:
        description: Optional single PR number to reconcile.
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  discover-prs:
    name: discover-prs
    runs-on: ubuntu-latest
    outputs:
      pr_numbers: ${{ steps.discover.outputs.pr_numbers }}
    env:
      GH_REPO: ${{ github.repository }}
    steps:
      - id: discover
        name: Discover PRs to reconcile
        env:
          GH_TOKEN: ${{ secrets.AUTONOMY_PAT || secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.AUTONOMY_PAT || secrets.GITHUB_TOKEN }}
          DISPATCH_PR_NUMBER: ${{ github.event.inputs.pr_number || '' }}
        run: |
          set -euo pipefail

          pr_numbers='[]'

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request_target" ]]; then
            if [[ "${{ github.event.pull_request.state }}" != "open" ]]; then
              echo "Skipping fast path discovery: PR is not open."
              echo "pr_numbers=[]" >> "${GITHUB_OUTPUT}"
              exit 0
            fi

            if [[ "${{ github.event.pull_request.base.ref }}" != "main" ]]; then
              echo "Skipping fast path discovery: PR base is not main."
              echo "pr_numbers=[]" >> "${GITHUB_OUTPUT}"
              exit 0
            fi

            if [[ "${{ github.event.pull_request.head.repo.fork }}" == "true" ]]; then
              echo "Skipping fast path discovery: fork PRs are ineligible."
              echo "pr_numbers=[]" >> "${GITHUB_OUTPUT}"
              exit 0
            fi

            pr_numbers="[${{ github.event.pull_request.number }}]"
            echo "Discovered fast-path PR #${{ github.event.pull_request.number }}."
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && -n "${DISPATCH_PR_NUMBER}" ]]; then
            if [[ ! "${DISPATCH_PR_NUMBER}" =~ ^[0-9]+$ ]]; then
              echo "Invalid workflow_dispatch input: pr_number must be numeric."
              exit 1
            fi
            pr_numbers="[${DISPATCH_PR_NUMBER}]"
            echo "Discovered manual PR selection #${DISPATCH_PR_NUMBER}."
          else
            pr_numbers="$({
              gh pr list \
                --repo "${GH_REPO}" \
                --state open \
                --base main \
                --limit 200 \
                --json number
            } | jq -c '[.[].number]')"
            echo "Discovered $(jq -r 'length' <<<"${pr_numbers}") open PR(s) on main for reconciliation scan."
          fi

          echo "pr_numbers=${pr_numbers}" >> "${GITHUB_OUTPUT}"

  auto-merge:
    name: auto-merge-pr-${{ matrix.pr_number }}
    needs:
      - discover-prs
    if: ${{ needs.discover-prs.outputs.pr_numbers != '[]' }}
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        pr_number: ${{ fromJson(needs.discover-prs.outputs.pr_numbers) }}
    concurrency:
      group: pr-auto-merge-${{ matrix.pr_number }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      AUTONOMY_AUTO_MERGE_ENABLED: ${{ vars.AUTONOMY_AUTO_MERGE_ENABLED || 'false' }}
      GH_REPO: ${{ github.repository }}
      PR_NUMBER: ${{ matrix.pr_number }}
    steps:
      - name: Enable auto-merge for eligible PRs (race-safe)
        env:
          GH_TOKEN: ${{ secrets.AUTONOMY_PAT || secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.AUTONOMY_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          enabled="$(echo "${AUTONOMY_AUTO_MERGE_ENABLED}" | tr '[:upper:]' '[:lower:]')"
          if [[ "$enabled" != "true" ]]; then
            echo "Auto-merge kill switch is OFF (AUTONOMY_AUTO_MERGE_ENABLED=${AUTONOMY_AUTO_MERGE_ENABLED})."
            exit 0
          fi

          pr_view() {
            gh pr view "${PR_NUMBER}" --repo "${GH_REPO}" \
              --json number,state,isDraft,isCrossRepository,headRefName,baseRefName,headRefOid,labels,autoMergeRequest
          }

          has_label() {
            local payload="$1"
            local name="$2"
            jq -e --arg name "$name" 'any(.labels[]?; .name == $name)' <<<"${payload}" >/dev/null
          }

          assert_automerge_eligible() {
            local payload="$1"
            local suffix="${2:-}"

            if [[ "$(jq -r '.state' <<<"${payload}")" != "OPEN" ]]; then
              echo "Skipping: PR is no longer open${suffix}."
              exit 0
            fi

            if [[ "$(jq -r '.isDraft' <<<"${payload}")" == "true" ]]; then
              echo "Skipping: PR is draft${suffix}."
              exit 0
            fi

            if [[ "$(jq -r '.isCrossRepository' <<<"${payload}")" == "true" ]]; then
              echo "Skipping: fork PRs are not eligible${suffix}."
              exit 0
            fi

            if [[ "$(jq -r '.baseRefName' <<<"${payload}")" != "main" ]]; then
              echo "Skipping: PR base is not main${suffix}."
              exit 0
            fi

            head_ref="$(jq -r '.headRefName' <<<"${payload}")"
            if [[ "${head_ref}" == exp/* ]]; then
              echo "Skipping: exp/* branches are non-mergeable${suffix}."
              exit 0
            fi

            if ! has_label "${payload}" "autonomy:auto-merge"; then
              echo "Skipping: autonomy:auto-merge label missing${suffix}."
              exit 0
            fi

            if has_label "${payload}" "autonomy:no-automerge"; then
              echo "Skipping: autonomy:no-automerge label present${suffix}."
              exit 0
            fi

            if has_label "${payload}" "accept:human"; then
              echo "Skipping: accept:human label present${suffix}."
              exit 0
            fi
          }

          pr_json=""
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request_target" ]]; then
            # Triage and auto-merge start from the same PR event; wait briefly for labels to settle.
            for _ in {1..18}; do
              pr_json="$(pr_view)"

              if [[ "$(jq -r '.state' <<<"${pr_json}")" != "OPEN" ]]; then
                echo "Skipping: PR is no longer open."
                exit 0
              fi

              has_risk_low=false
              has_risk_med=false
              has_risk_high=false
              has_auto=false
              has_noauto=false

              has_label "${pr_json}" "risk:low" && has_risk_low=true || true
              has_label "${pr_json}" "risk:med" && has_risk_med=true || true
              has_label "${pr_json}" "risk:high" && has_risk_high=true || true
              has_label "${pr_json}" "autonomy:auto-merge" && has_auto=true || true
              has_label "${pr_json}" "autonomy:no-automerge" && has_noauto=true || true

              if [[ "${has_risk_low}" == "true" || "${has_risk_med}" == "true" || "${has_risk_high}" == "true" ]]; then
                if [[ "${has_auto}" == "true" || "${has_noauto}" == "true" ]]; then
                  break
                fi
              fi

              sleep 5
            done
          else
            pr_json="$(pr_view)"
          fi

          assert_automerge_eligible "${pr_json}"

          # Revalidate lane labels on latest state before merge polling.
          pr_json="$(pr_view)"
          assert_automerge_eligible "${pr_json}" " on latest state"

          if [[ "$(jq -r '.autoMergeRequest != null' <<<"${pr_json}")" == "true" ]]; then
            echo "Auto-merge is already enabled for PR #${PR_NUMBER}."
            exit 0
          fi

          # Fine-grained PATs cannot reliably inspect check-runs. Instead, poll
          # the merge endpoint and let rulesets/branch protections be the source
          # of truth for required checks and mergeability.
          direct_merge_output=""
          merged=false
          for _ in {1..120}; do
            pr_json="$(pr_view)"
            assert_automerge_eligible "${pr_json}" " during merge polling"

            if direct_merge_output="$(
              gh api \
                --method PUT \
                "repos/${GH_REPO}/pulls/${PR_NUMBER}/merge" \
                -f merge_method='squash' 2>&1
            )"; then
              merged=true
              break
            fi

            if grep -qiE 'HTTP 405|HTTP 409|HTTP 422|Pull Request is not mergeable|required status check|review' <<<"${direct_merge_output}"; then
              sleep 5
              continue
            fi

            echo "${direct_merge_output}"
            exit 1
          done

          if [[ "${merged}" != "true" ]]; then
            echo "PR did not become mergeable within wait window."
            exit 0
          fi

          echo "${direct_merge_output}"

          head_ref_encoded="$(jq -rn --arg ref "${head_ref}" '$ref | @uri')"
          if ! gh api --method DELETE "repos/${GH_REPO}/git/refs/heads/${head_ref_encoded}" >/dev/null 2>&1; then
            echo "Note: head branch '${head_ref}' could not be deleted automatically."
          fi

          echo "Merged PR #${PR_NUMBER} autonomously via REST."
