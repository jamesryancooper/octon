name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: release-please-main
  cancel-in-progress: true

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    env:
      RELEASE_BRANCH: release-please--branches--main--components--octon
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Assert protected execution posture
        run: |
          set -euo pipefail
          chmod +x .octon/framework/assurance/runtime/_ops/scripts/assert-protected-execution-posture.sh
          EFFECTIVE_MODE="$(bash .octon/framework/capabilities/_ops/scripts/policy-rollout-mode.sh get)"
          OCTON_CI_WORKFLOW_ID="release-please" \
          OCTON_PROTECTED_EXECUTION="true" \
          OCTON_EFFECTIVE_POLICY_MODE="${EFFECTIVE_MODE}" \
          .octon/framework/assurance/runtime/_ops/scripts/assert-protected-execution-posture.sh

      - name: Create or update release PR / tags (attempt 1)
        id: release_attempt_1
        continue-on-error: true
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        with:
          token: ${{ secrets.AUTONOMY_PAT || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Pause before retry
        if: steps.release_attempt_1.outcome == 'failure'
        run: sleep 8

      - name: Create or update release PR / tags (attempt 2)
        id: release_attempt_2
        if: steps.release_attempt_1.outcome == 'failure'
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        with:
          token: ${{ secrets.AUTONOMY_PAT || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Resolve release output
        id: release
        if: always()
        run: |
          set -euo pipefail

          if [[ "${{ steps.release_attempt_1.outcome }}" == "success" ]]; then
            echo "attempt=1" >> "${GITHUB_OUTPUT}"
            echo "prs_created=${{ steps.release_attempt_1.outputs.prs_created }}" >> "${GITHUB_OUTPUT}"
            echo "releases_created=${{ steps.release_attempt_1.outputs.releases_created }}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ "${{ steps.release_attempt_2.outcome }}" == "success" ]]; then
            echo "attempt=2" >> "${GITHUB_OUTPUT}"
            echo "prs_created=${{ steps.release_attempt_2.outputs.prs_created }}" >> "${GITHUB_OUTPUT}"
            echo "releases_created=${{ steps.release_attempt_2.outputs.releases_created }}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "::error::Release Please failed on both attempts."
          exit 1

      - name: Summarize release output
        run: |
          echo "attempt=${{ steps.release.outputs.attempt }}"
          echo "prs_created=${{ steps.release.outputs.prs_created }}"
          echo "releases_created=${{ steps.release.outputs.releases_created }}"

      - name: Refresh generated effective state on release PR
        env:
          GH_TOKEN: ${{ secrets.AUTONOMY_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          publication_paths=(
            .octon/generated/effective/capabilities
            .octon/generated/effective/extensions
            .octon/generated/effective/runtime
            .octon/state/control/extensions
            .octon/state/evidence/decisions/repo/capabilities/acp-decisions.jsonl
            .octon/state/evidence/validation/compatibility/extensions
            .octon/state/evidence/validation/extensions/prompt-alignment
            .octon/state/evidence/validation/publication/capabilities
            .octon/state/evidence/validation/publication/extensions
            .octon/state/evidence/validation/publication/runtime
          )

          release_pr_count="$(
            gh pr list \
              --state open \
              --head "${RELEASE_BRANCH}" \
              --json number \
              --jq 'length'
          )"
          if [[ "${release_pr_count}" -eq 0 ]]; then
            echo "No open release PR found for ${RELEASE_BRANCH}; skipping runtime-effective refresh."
            exit 0
          fi

          git fetch --depth=1 origin "${RELEASE_BRANCH}"
          git checkout -B "${RELEASE_BRANCH}" FETCH_HEAD

          bash .octon/framework/orchestration/runtime/_ops/scripts/publish-extension-state.sh
          bash .octon/framework/capabilities/_ops/scripts/publish-capability-routing.sh
          bash .octon/framework/assurance/runtime/_ops/scripts/publish-pack-routes.sh
          bash .octon/framework/assurance/runtime/_ops/scripts/publish-runtime-route-bundle.sh
          .octon/framework/engine/runtime/run validate

          if [[ -z "$(git status --porcelain -- "${publication_paths[@]}")" ]]; then
            echo "Generated effective state is already current for ${RELEASE_BRANCH}."
            exit 0
          fi

          git status --short -- "${publication_paths[@]}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${publication_paths[@]}"
          git commit -m "chore(release): refresh generated effective state"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${RELEASE_BRANCH}"

      - name: Upload protected execution receipt
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-please-protected-execution-receipt
          path: .octon/state/evidence/runs/ci/release-please-*
          if-no-files-found: error
          retention-days: 7
