name: Deny-by-Default Gates

on:
  pull_request:
    paths:
      - '.octon/capabilities/_ops/**'
      - '.octon/capabilities/runtime/services/**'
      - '.octon/capabilities/runtime/skills/**'
      - '.octon/capabilities/governance/policy/**'
      - '.octon/assurance/runtime/_ops/scripts/validate-capability-engine-consistency.sh'
      - '.octon/engine/runtime/spec/policy-interface-v1.md'
      - '.octon/engine/runtime/crates/policy_engine/**'
  push:
    branches:
      - main
    paths:
      - '.octon/capabilities/_ops/**'
      - '.octon/capabilities/runtime/services/**'
      - '.octon/capabilities/runtime/skills/**'
      - '.octon/capabilities/governance/policy/**'
      - '.octon/assurance/runtime/_ops/scripts/validate-capability-engine-consistency.sh'
      - '.octon/engine/runtime/spec/policy-interface-v1.md'
      - '.octon/engine/runtime/crates/policy_engine/**'

permissions:
  contents: read

concurrency:
  group: deny-by-default-gates-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          cache-bin: true

      - name: Validate deny-by-default contract and enforcement (strict)
        run: |
          chmod +x .octon/capabilities/_ops/scripts/validate-deny-by-default.sh
          .octon/capabilities/_ops/scripts/validate-deny-by-default.sh --all --profile strict

      - name: Validate engine capabilities boundary
        run: |
          chmod +x .octon/assurance/runtime/_ops/scripts/validate-engine-capability-boundary.sh
          .octon/assurance/runtime/_ops/scripts/validate-engine-capability-boundary.sh

      - name: Validate capability/engine consistency
        run: |
          chmod +x .octon/assurance/runtime/_ops/scripts/validate-capability-engine-consistency.sh
          .octon/assurance/runtime/_ops/scripts/validate-capability-engine-consistency.sh

      - name: Friction SLO report
        run: |
          chmod +x .octon/capabilities/_ops/scripts/policy-rollout-mode.sh
          .octon/capabilities/_ops/scripts/policy-rollout-mode.sh slo-report
