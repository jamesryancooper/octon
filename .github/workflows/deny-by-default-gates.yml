name: Deny-by-Default Gates

on:
  pull_request:
    paths:
      - '.octon/framework/capabilities/_ops/**'
      - '.octon/framework/capabilities/runtime/services/**'
      - '.octon/framework/capabilities/runtime/skills/**'
      - '.octon/framework/capabilities/governance/policy/**'
      - '.octon/framework/assurance/runtime/_ops/scripts/validate-capability-engine-consistency.sh'
      - '.octon/framework/engine/runtime/spec/policy-interface-v1.md'
      - '.octon/framework/engine/runtime/crates/policy_engine/**'
  push:
    branches:
      - main
    paths:
      - '.octon/framework/capabilities/_ops/**'
      - '.octon/framework/capabilities/runtime/services/**'
      - '.octon/framework/capabilities/runtime/skills/**'
      - '.octon/framework/capabilities/governance/policy/**'
      - '.octon/framework/assurance/runtime/_ops/scripts/validate-capability-engine-consistency.sh'
      - '.octon/framework/engine/runtime/spec/policy-interface-v1.md'
      - '.octon/framework/engine/runtime/crates/policy_engine/**'

permissions:
  contents: read

concurrency:
  group: deny-by-default-gates-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assert protected execution posture
        run: |
          set -euo pipefail
          chmod +x .octon/framework/assurance/runtime/_ops/scripts/assert-protected-execution-posture.sh
          EFFECTIVE_MODE="$(bash .octon/framework/capabilities/_ops/scripts/policy-rollout-mode.sh get)"
          OCTON_CI_WORKFLOW_ID="deny-by-default-gates" \
          OCTON_PROTECTED_EXECUTION="true" \
          OCTON_EFFECTIVE_POLICY_MODE="${EFFECTIVE_MODE}" \
          .octon/framework/assurance/runtime/_ops/scripts/assert-protected-execution-posture.sh

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          cache-bin: true

      - name: Validate deny-by-default contract and enforcement (strict)
        run: |
          chmod +x .octon/framework/capabilities/_ops/scripts/validate-deny-by-default.sh
          .octon/framework/capabilities/_ops/scripts/validate-deny-by-default.sh --all --profile strict

      - name: Validate engine capabilities boundary
        run: |
          chmod +x .octon/framework/assurance/runtime/_ops/scripts/validate-engine-capability-boundary.sh
          .octon/framework/assurance/runtime/_ops/scripts/validate-engine-capability-boundary.sh

      - name: Validate capability/engine consistency
        run: |
          chmod +x .octon/framework/assurance/runtime/_ops/scripts/validate-capability-engine-consistency.sh
          .octon/framework/assurance/runtime/_ops/scripts/validate-capability-engine-consistency.sh

      - name: Friction SLO report
        run: |
          chmod +x .octon/framework/capabilities/_ops/scripts/policy-rollout-mode.sh
          .octon/framework/capabilities/_ops/scripts/policy-rollout-mode.sh slo-report

      - name: Upload protected execution receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deny-by-default-gates-protected-execution-receipt
          path: .octon/state/evidence/runs/ci/deny-by-default-gates-*
          if-no-files-found: error
          retention-days: 7
