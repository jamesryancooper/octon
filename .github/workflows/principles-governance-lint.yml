name: Principles Governance Lint

on:
  pull_request:
    paths:
      - '.harmony/cognition/governance/principles/**/*.md'
      - '.harmony/cognition/governance/exceptions/**/*.md'
      - '.harmony/cognition/_ops/principles/scripts/*.sh'
      - '.github/workflows/principles-governance-lint.yml'
  push:
    branches:
      - main
    paths:
      - '.harmony/cognition/governance/principles/**/*.md'
      - '.harmony/cognition/governance/exceptions/**/*.md'
      - '.harmony/cognition/_ops/principles/scripts/*.sh'
      - '.github/workflows/principles-governance-lint.yml'

permissions:
  contents: read

jobs:
  principles-governance-lint:
    name: Lint principles governance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Governance lint
        env:
          LINT_BASE_REF: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: bash .harmony/cognition/_ops/principles/scripts/lint-principles-governance.sh

      - name: Governance lint fixture tests
        env:
          LINT_BASE_REF: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: bash .harmony/cognition/_ops/principles/scripts/test-principles-governance-lint-fixtures.sh

      - name: Docs promotion fail-closed contract test
        run: bash .harmony/cognition/_ops/principles/scripts/test-docs-promotion-fail-closed.sh
