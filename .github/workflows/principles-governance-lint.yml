name: Principles Governance Lint

on:
  pull_request:
    paths:
      - '.octon/framework/cognition/governance/principles/**/*.md'
      - '.octon/framework/cognition/governance/exceptions/**/*.md'
      - '.octon/framework/cognition/_ops/principles/scripts/*.sh'
      - '.github/workflows/principles-governance-lint.yml'
  push:
    branches:
      - main
    paths:
      - '.octon/framework/cognition/governance/principles/**/*.md'
      - '.octon/framework/cognition/governance/exceptions/**/*.md'
      - '.octon/framework/cognition/_ops/principles/scripts/*.sh'
      - '.github/workflows/principles-governance-lint.yml'

permissions:
  contents: read

concurrency:
  group: principles-governance-lint-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  principles-governance-lint:
    name: Lint principles governance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Governance lint
        env:
          LINT_BASE_REF: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: bash .octon/framework/cognition/_ops/principles/scripts/lint-principles-governance.sh

      - name: Governance lint fixture tests
        env:
          LINT_BASE_REF: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: bash .octon/framework/cognition/_ops/principles/scripts/test-principles-governance-lint-fixtures.sh

      - name: Docs promotion fail-closed contract test
        run: bash .octon/framework/cognition/_ops/principles/scripts/test-docs-promotion-fail-closed.sh
