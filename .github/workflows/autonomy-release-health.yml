name: Autonomy Release Health

on:
  schedule:
    - cron: "23 8 * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pull-requests: read
  issues: write

concurrency:
  group: autonomy-release-health
  cancel-in-progress: false

jobs:
  health:
    name: autonomy-release-health
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_REPO: ${{ github.repository }}
      # Use workflow token for Actions API reads. Elevated PAT use is scoped
      # per-call for repository/ruleset admin endpoints below.
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      AUTONOMY_PAT_VALUE: ${{ secrets.AUTONOMY_PAT }}
      AUTONOMY_AUTO_MERGE_ENABLED: ${{ vars.AUTONOMY_AUTO_MERGE_ENABLED || '' }}
      AUTONOMY_POLICY_ENFORCE: ${{ vars.AUTONOMY_POLICY_ENFORCE || '' }}
      RELEASE_BRANCH: release-please--branches--main--components--octon
      CONTROL_PLANE_CONTRACT_PATH: .octon/framework/execution-roles/practices/standards/github-control-plane-contract.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: checks
        name: Validate autonomy and release control-plane health
        run: |
          set -euo pipefail

          failures=0
          pass_file="$(mktemp)"
          fail_file="$(mktemp)"

          pass() {
            local message="$1"
            echo "::notice::${message}"
            printf -- "- PASS: %s\n" "${message}" >> "${pass_file}"
          }

          fail() {
            local message="$1"
            echo "::error::${message}"
            printf -- "- FAIL: %s\n" "${message}" >> "${fail_file}"
            failures=$((failures + 1))
          }

          if [[ -f "${CONTROL_PLANE_CONTRACT_PATH}" ]]; then
            pass "Control-plane contract file exists (${CONTROL_PLANE_CONTRACT_PATH})."
          else
            fail "Control-plane contract file is missing (${CONTROL_PLANE_CONTRACT_PATH})."
          fi

          contract_json="{}"
          if contract_json="$(jq -c . "${CONTROL_PLANE_CONTRACT_PATH}" 2>/dev/null)"; then
            pass "Control-plane contract is valid JSON."
          else
            fail "Control-plane contract is not valid JSON."
          fi

          default_branch="$(jq -r '.default_branch // "main"' <<<"${contract_json}" 2>/dev/null || echo "main")"
          expected_required_checks="$(jq -c '.rulesets.main.required_checks // [] | unique | sort' <<<"${contract_json}" 2>/dev/null || echo '[]')"
          expected_thread_resolution="$(jq -r '.rulesets.main.require_review_thread_resolution // true' <<<"${contract_json}" 2>/dev/null || echo "true")"

          if [[ -n "${AUTONOMY_PAT_VALUE}" ]]; then
            pass "AUTONOMY_PAT is configured."
          else
            fail "AUTONOMY_PAT is missing."
          fi

          auto_merge_enabled="$(echo "${AUTONOMY_AUTO_MERGE_ENABLED}" | tr '[:upper:]' '[:lower:]')"
          if [[ "${auto_merge_enabled}" == "true" ]]; then
            pass "AUTONOMY_AUTO_MERGE_ENABLED=true."
          elif [[ "${auto_merge_enabled}" == "false" ]]; then
            fail "AUTONOMY_AUTO_MERGE_ENABLED=false; autonomous low-risk merge lane is disabled."
          else
            fail "AUTONOMY_AUTO_MERGE_ENABLED is unset."
          fi

          policy_enforce="$(echo "${AUTONOMY_POLICY_ENFORCE}" | tr '[:upper:]' '[:lower:]')"
          if [[ -z "${policy_enforce}" || "${policy_enforce}" == "true" ]]; then
            pass "AUTONOMY_POLICY_ENFORCE effective value is true."
          else
            fail "AUTONOMY_POLICY_ENFORCE=false; autonomy policy is not enforced."
          fi

          repo_payload=""
          rulesets_payload=""
          workflow_permissions_payload=""
          admin_token="${AUTONOMY_PAT_VALUE:-${GH_TOKEN}}"

          if repo_payload="$(GH_TOKEN="${admin_token}" gh api "repos/${GH_REPO}" 2>/dev/null)"; then
            pass "Fetched repository settings via API."
          else
            fail "Unable to fetch repository settings (repos/${GH_REPO})."
          fi

          if rulesets_payload="$(GH_TOKEN="${admin_token}" gh api "repos/${GH_REPO}/rulesets?includes_parents=false" 2>/dev/null)"; then
            pass "Fetched repository rulesets via API."
          else
            fail "Unable to fetch repository rulesets (repos/${GH_REPO}/rulesets)."
          fi

          if workflow_permissions_payload="$(GH_TOKEN="${admin_token}" gh api "repos/${GH_REPO}/actions/permissions/workflow" 2>/dev/null)"; then
            pass "Fetched workflow permissions via API (admin token)."
          elif [[ "${admin_token}" != "${GH_TOKEN}" ]] \
            && workflow_permissions_payload="$(gh api "repos/${GH_REPO}/actions/permissions/workflow" 2>/dev/null)"; then
            pass "Fetched workflow permissions via API (workflow token fallback)."
          else
            fail "Unable to fetch workflow permissions (repos/${GH_REPO}/actions/permissions/workflow)."
          fi

          if [[ -n "${repo_payload}" ]]; then
            for key in allow_auto_merge allow_squash_merge allow_merge_commit allow_rebase_merge delete_branch_on_merge; do
              expected_value="$(jq -r --arg key "$key" '.repository_settings[$key] // "__unset__"' <<<"${contract_json}")"
              [[ "${expected_value}" == "__unset__" ]] && continue

              actual_value="$(jq -r --arg key "$key" '.[$key]' <<<"${repo_payload}")"
              if [[ "${actual_value}" == "${expected_value}" ]]; then
                pass "Repo setting ${key} matches expected value (${expected_value})."
              else
                fail "Repo setting ${key} drift: expected ${expected_value}, got ${actual_value}."
              fi
            done

            squash_only_ok="$(jq -r '(.allow_squash_merge == true) and (.allow_merge_commit == false) and (.allow_rebase_merge == false)' <<<"${repo_payload}")"
            if [[ "${squash_only_ok}" == "true" ]]; then
              pass "Squash-only merge policy is active."
            else
              fail "Squash-only merge policy drift detected."
            fi
          fi

          if [[ -n "${workflow_permissions_payload}" ]]; then
            expected_can_approve="$(jq -r '.actions_permissions.workflow.can_approve_pull_request_reviews // true' <<<"${contract_json}")"
            actual_can_approve="$(jq -r '.can_approve_pull_request_reviews' <<<"${workflow_permissions_payload}")"
            if [[ "${actual_can_approve}" == "${expected_can_approve}" ]]; then
              pass "Actions workflow permission can_approve_pull_request_reviews matches expected (${expected_can_approve})."
            else
              fail "Actions workflow permission drift: expected can_approve_pull_request_reviews=${expected_can_approve}, got ${actual_can_approve}."
            fi
          fi

          if [[ -n "${rulesets_payload}" ]]; then
            main_ruleset=""
            mapfile -t branch_ruleset_ids < <(
              jq -r '.[]? | select(.target == "branch") | .id' <<<"${rulesets_payload}"
            )

            for ruleset_id in "${branch_ruleset_ids[@]}"; do
              [[ -n "${ruleset_id}" ]] || continue
              candidate_ruleset="$(GH_TOKEN="${admin_token}" gh api "repos/${GH_REPO}/rulesets/${ruleset_id}" 2>/dev/null || true)"
              [[ -n "${candidate_ruleset}" ]] || continue

              matches_default_branch="$(jq -r --arg branch "${default_branch}" '
                (
                  ((.conditions.ref_name.include // []) | index("~DEFAULT_BRANCH")) != null
                  or ((.conditions.ref_name.include // []) | index($branch)) != null
                  or ((.conditions.ref_name.include // []) | index("refs/heads/" + $branch)) != null
                )
              ' <<<"${candidate_ruleset}")"

              if [[ "${matches_default_branch}" == "true" ]]; then
                main_ruleset="${candidate_ruleset}"
                break
              fi
            done

            if [[ -z "${main_ruleset}" || "${main_ruleset}" == "null" ]]; then
              fail "Could not resolve an active branch ruleset for ${default_branch}."
            else
              pass "Resolved branch ruleset for ${default_branch}."

              actual_required_checks="$(jq -c '
                [
                  .rules[]?
                  | select(.type == "required_status_checks")
                  | .parameters.required_status_checks[]?.context
                ]
                | unique
                | sort
              ' <<<"${main_ruleset}")"

              expected_required_checks_flat="$(jq -r '.[]' <<<"${expected_required_checks}" | paste -sd ',' -)"
              actual_required_checks_flat="$(jq -r '.[]' <<<"${actual_required_checks}" | paste -sd ',' -)"

              if [[ "${expected_required_checks_flat}" == "${actual_required_checks_flat}" ]]; then
                pass "Main ruleset required checks match contract."
              else
                fail "Main ruleset required checks drift: expected ${expected_required_checks}, got ${actual_required_checks}."
              fi

              actual_thread_resolution="$(jq -r '
                [
                  .rules[]?
                  | select(.type == "pull_request")
                  | .parameters.required_review_thread_resolution // false
                ]
                | any
              ' <<<"${main_ruleset}")"

              if [[ "${actual_thread_resolution}" == "${expected_thread_resolution}" ]]; then
                pass "Pull-request rule review thread resolution requirement matches contract (${expected_thread_resolution})."
              else
                fail "Pull-request rule review thread resolution drift: expected ${expected_thread_resolution}, got ${actual_thread_resolution}."
              fi
            fi
          fi

          if [[ -f "release-please-config.json" && -f ".release-please-manifest.json" ]]; then
            pass "Release Please config and manifest are present on default branch checkout."
          else
            fail "Release Please config files are missing from repository."
          fi

          release_please_runs="$({
            gh run list \
              --workflow "Release Please" \
              --branch main \
              --event push \
              --limit 10 \
              --json conclusion,status,createdAt,url
          } || echo '[]')"
          latest_completed="$({
            jq -c '[.[] | select(.status == "completed")] | .[0]' <<< "${release_please_runs}"
          } || echo 'null')"
          if [[ -z "${latest_completed}" || "${latest_completed}" == "null" ]]; then
            fail "No completed Release Please push runs on main were found."
          else
            latest_conclusion="$(jq -r '.conclusion' <<< "${latest_completed}")"
            latest_url="$(jq -r '.url' <<< "${latest_completed}")"
            if [[ "${latest_conclusion}" == "success" ]]; then
              pass "Latest Release Please run succeeded (${latest_url})."
            else
              fail "Latest completed Release Please run failed (${latest_conclusion}): ${latest_url}"
            fi
          fi

          release_pr_count="$({
            gh pr list \
              --state open \
              --head "${RELEASE_BRANCH}" \
              --json number \
              --jq 'length'
          } || echo 0)"
          branch_exists=false
          if gh api "repos/${GH_REPO}/branches/${RELEASE_BRANCH}" > /dev/null 2>&1; then
            branch_exists=true
          fi
          if [[ "${branch_exists}" == "true" && "${release_pr_count}" -eq 0 ]]; then
            fail "Stale release branch '${RELEASE_BRANCH}' exists without an open release PR."
          else
            pass "Release branch drift check passed."
          fi

          summary_file="$(mktemp)"
          {
            echo "### Autonomy and Release Health"
            echo
            if [[ -s "${fail_file}" ]]; then
              echo "#### Failures"
              cat "${fail_file}"
              echo
            fi
            echo "#### Passing checks"
            cat "${pass_file}"
          } > "${summary_file}"

          {
            echo "summary<<EOF"
            cat "${summary_file}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

          if (( failures > 0 )); then
            echo "status=failure" >> "${GITHUB_OUTPUT}"
            exit 1
          fi

          echo "status=success" >> "${GITHUB_OUTPUT}"

      - name: Append summary
        if: always()
        run: |
          printf '%s\n' "${{ steps.checks.outputs.summary }}" >> "${GITHUB_STEP_SUMMARY}"

      - name: Open or update drift issue on failure
        if: failure()
        uses: actions/github-script@v7
        env:
          HEALTH_SUMMARY: ${{ steps.checks.outputs.summary }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = "[autonomy-health] control-plane drift detected";
            const labelName = "ops:autonomy-health";
            const summary = process.env.HEALTH_SUMMARY || "Health checks failed.";
            const runUrl = process.env.RUN_URL;

            try {
              await github.rest.issues.getLabel({ owner, repo, name: labelName });
            } catch (error) {
              if (error.status === 404) {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: labelName,
                  color: "B60205",
                  description: "Autonomy/release control-plane drift alert"
                });
              } else {
                throw error;
              }
            }

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              labels: labelName,
              per_page: 100
            });

            const body = [
              "Autonomy/release health checks detected control-plane drift.",
              "",
              `- Workflow run: ${runUrl}`,
              "",
              summary
            ].join("\n");

            const existing = openIssues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                body
              });
              core.info(`Updated existing drift issue #${existing.number}.`);
            } else {
              const created = await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: [labelName]
              });
              core.info(`Created drift issue #${created.data.number}.`);
            }

      - name: Auto-close drift issue when healthy
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = "[autonomy-health] control-plane drift detected";
            const labelName = "ops:autonomy-health";

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              labels: labelName,
              per_page: 100
            });

            const existing = openIssues.find((issue) => issue.title === title);
            if (!existing) {
              core.info("No open drift issue to close.");
              return;
            }

            await github.rest.issues.update({
              owner,
              repo,
              issue_number: existing.number,
              state: "closed"
            });
            core.info(`Closed drift issue #${existing.number} after healthy run.`);
