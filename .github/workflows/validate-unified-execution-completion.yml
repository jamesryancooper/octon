name: validate-unified-execution-completion

on:
  pull_request:
    paths:
      - ".octon/framework/constitution/**"
      - ".octon/framework/engine/runtime/**"
      - ".octon/framework/capabilities/**"
      - ".octon/framework/assurance/**"
      - ".octon/framework/lab/**"
      - ".octon/instance/charter/**"
      - ".octon/instance/governance/**"
      - ".octon/instance/governance/support-target-admissions/**"
      - ".octon/instance/capabilities/runtime/packs/admissions/**"
      - ".octon/state/control/execution/**"
      - ".octon/state/evidence/**"
      - ".github/workflows/validate-unified-execution-completion.yml"
      - ".github/workflows/unified-execution-constitution-closure.yml"
  push:
    branches: [main]
    paths:
      - ".octon/framework/constitution/**"
      - ".octon/framework/engine/runtime/**"
      - ".octon/framework/capabilities/**"
      - ".octon/framework/assurance/**"
      - ".octon/framework/lab/**"
      - ".octon/instance/charter/**"
      - ".octon/instance/governance/**"
      - ".octon/instance/governance/support-target-admissions/**"
      - ".octon/instance/capabilities/runtime/packs/admissions/**"
      - ".octon/state/control/execution/**"
      - ".octon/state/evidence/**"
      - ".github/workflows/validate-unified-execution-completion.yml"
      - ".github/workflows/unified-execution-constitution-closure.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  completion:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install jq and yq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Run unified-execution completion validation
        run: |
          set -euo pipefail
          chmod +x .octon/framework/assurance/governance/_ops/scripts/run-uec-packet-certification-pass.sh
          .octon/framework/assurance/governance/_ops/scripts/run-uec-packet-certification-pass.sh \
            --output-dir .octon/generated/.tmp/unified-execution-completion \
            --include-closure-validator

      - name: Upload validation bundle
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: unified-execution-completion
          path: |
            .octon/generated/.tmp/unified-execution-completion/
            .octon/state/evidence/disclosure/releases/2026-04-05-uec-proposal-packet-completion/
          if-no-files-found: error
          retention-days: 7
