name: validate-unified-execution-completion

on:
  pull_request:
    paths:
      - ".octon/framework/constitution/**"
      - ".octon/framework/engine/runtime/**"
      - ".octon/framework/capabilities/**"
      - ".octon/framework/assurance/**"
      - ".octon/framework/lab/**"
      - ".octon/instance/charter/**"
      - ".octon/instance/governance/**"
      - ".octon/instance/governance/support-target-admissions/**"
      - ".octon/instance/governance/capability-packs/**"
      - ".octon/state/control/execution/**"
      - ".octon/state/evidence/**"
      - ".github/workflows/validate-unified-execution-completion.yml"
      - ".github/workflows/unified-execution-constitution-closure.yml"
  push:
    branches: [main]
    paths:
      - ".octon/framework/constitution/**"
      - ".octon/framework/engine/runtime/**"
      - ".octon/framework/capabilities/**"
      - ".octon/framework/assurance/**"
      - ".octon/framework/lab/**"
      - ".octon/instance/charter/**"
      - ".octon/instance/governance/**"
      - ".octon/instance/governance/support-target-admissions/**"
      - ".octon/instance/governance/capability-packs/**"
      - ".octon/state/control/execution/**"
      - ".octon/state/evidence/**"
      - ".github/workflows/validate-unified-execution-completion.yml"
      - ".github/workflows/unified-execution-constitution-closure.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  completion:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install jq and yq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.50.1/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Run bounded unified-execution completion validation
        run: |
          set -euo pipefail
          chmod +x .octon/framework/assurance/runtime/_ops/scripts/verify-*.sh
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-bounded-claim-nomenclature.sh
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-audit-crosswalk.sh
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-review-packet-freshness.sh
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-non-authority-register.sh
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-retirement-register-depth.sh
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-ingress-manifest-parity.sh
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-support-dossier-evidence-depth.sh
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-evaluator-diversity.sh
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-hidden-check-breadth.sh
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-contract-family-version-coherence.sh
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-projection-shell-boundaries.sh
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-support-target-live-claims.sh
          .octon/framework/assurance/runtime/_ops/scripts/verify-support-dossier-parity.sh
          .octon/framework/assurance/runtime/_ops/scripts/verify-lab-reference-integrity.sh
          .octon/framework/assurance/runtime/_ops/scripts/verify-host-authority-purity.sh
          .octon/framework/assurance/runtime/_ops/scripts/verify-runtime-family-depth.sh
          .octon/framework/assurance/runtime/_ops/scripts/verify-continuity-linkage.sh
          .octon/framework/assurance/runtime/_ops/scripts/verify-retirement-rationale.sh
          .octon/framework/assurance/runtime/_ops/scripts/verify-release-known-limits.sh
          bash .octon/framework/assurance/governance/_ops/scripts/assert-unified-execution-closure.sh

      - name: Upload validation bundle
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: unified-execution-completion
          path: |
            .octon/generated/effective/closure/blocker-ledger.yml
            .octon/state/evidence/disclosure/releases/2026-04-09-uec-bounded-hardening-closure/
          if-no-files-found: error
          retention-days: 7
