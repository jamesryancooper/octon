name: filesystem-interfaces-slo-tune

on:
  workflow_dispatch:
    inputs:
      window_runs:
        description: Number of recent successful runtime runs to use.
        required: false
        default: "20"
      min_runs:
        description: Minimum historical samples required per operation.
        required: false
        default: "6"
      headroom_percent:
        description: Headroom percentage over observed p95.
        required: false
        default: "25"
      max_tighten_percent:
        description: Maximum one-pass budget tightening percentage.
        required: false
        default: "70"
  schedule:
    - cron: "23 6 * * 1"

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  tune:
    runs-on: ubuntu-latest
    env:
      WINDOW_RUNS: ${{ github.event.inputs.window_runs || '20' }}
      MIN_RUNS: ${{ github.event.inputs.min_runs || '6' }}
      HEADROOM_PERCENT: ${{ github.event.inputs.headroom_percent || '25' }}
      MAX_TIGHTEN_PERCENT: ${{ github.event.inputs.max_tighten_percent || '70' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-component
        run: |
          cargo install --locked cargo-component

      - name: Download SLO history artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          chmod +x .harmony/capabilities/services/_ops/scripts/download-filesystem-interfaces-slo-history.sh
          HISTORY_DIR="$RUNNER_TEMP/filesystem-interfaces-slo-history"
          mkdir -p "$HISTORY_DIR"
          .harmony/capabilities/services/_ops/scripts/download-filesystem-interfaces-slo-history.sh \
            --repo "$GITHUB_REPOSITORY" \
            --workflow filesystem-interfaces-runtime.yml \
            --artifact-name filesystem-interfaces-slo-summary \
            --limit "$WINDOW_RUNS" \
            --out-dir "$HISTORY_DIR"
          echo "HISTORY_DIR=$HISTORY_DIR" >> "$GITHUB_ENV"

      - name: Tune SLO budgets from history window
        run: |
          chmod +x .harmony/capabilities/services/_ops/scripts/tune-filesystem-interfaces-slo-budgets.sh
          .harmony/capabilities/services/_ops/scripts/tune-filesystem-interfaces-slo-budgets.sh \
            --history-dir "$HISTORY_DIR" \
            --budgets-file .harmony/capabilities/services/interfaces/filesystem-snapshot/contracts/slo-budgets.tsv \
            --min-runs "$MIN_RUNS" \
            --headroom-percent "$HEADROOM_PERCENT" \
            --max-tighten-percent "$MAX_TIGHTEN_PERCENT"

      - name: Validate tuned budgets
        run: |
          .harmony/runtime/run service build interfaces/filesystem-snapshot
          .harmony/runtime/run service build interfaces/filesystem-discovery
          .harmony/runtime/run service build interfaces/filesystem-watch
          FILESYSTEM_INTERFACES_VALIDATE_SLO=1 bash .harmony/capabilities/services/_ops/scripts/validate-filesystem-interfaces.sh

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "perf(filesystem-interfaces): tune slo budgets from ci history"
          title: "perf(filesystem-interfaces): tune slo budgets from ci history"
          body: |
            Automated SLO budget tightening from recent CI history window.

            Inputs:
            - window_runs: `${{ env.WINDOW_RUNS }}`
            - min_runs: `${{ env.MIN_RUNS }}`
            - headroom_percent: `${{ env.HEADROOM_PERCENT }}`
            - max_tighten_percent: `${{ env.MAX_TIGHTEN_PERCENT }}`
          branch: codex/filesystem-interfaces-slo-tune
          delete-branch: true
          add-paths: |
            .harmony/capabilities/services/interfaces/filesystem-snapshot/contracts/slo-budgets.tsv

  notify-on-failure:
    name: notify-on-failure
    runs-on: ubuntu-latest
    needs: tune
    if: ${{ always() && needs.tune.result == 'failure' }}
    permissions:
      contents: read
      issues: write
    steps:
      - name: Upsert GitHub issue alert
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = "filesystem-interfaces SLO tuning workflow failure detected";
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const cooldownMs = 6 * 60 * 60 * 1000;
            const body = [
              "<!-- filesystem-interfaces-slo-tune-alert -->",
              "filesystem-interfaces SLO tuning workflow failed.",
              "",
              `- workflow: ${context.workflow}`,
              `- run: ${runUrl}`,
              `- event: ${context.eventName}`,
              `- ref: ${context.ref}`,
              `- sha: ${context.sha}`,
              `- actor: ${context.actor}`
            ].join("\n");

            const query = `repo:${owner}/${repo} is:issue is:open in:title \"${title}\"`;
            const search = await github.rest.search.issuesAndPullRequests({ q: query, per_page: 10 });
            const existing = search.data.items.find((item) => item.title === title);

            if (existing) {
              const updatedAt = new Date(existing.updated_at).getTime();
              if (Date.now() - updatedAt >= cooldownMs) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: existing.number,
                  body: `Another failure detected.\n\n${body}`
                });
              }
            } else {
              await github.rest.issues.create({ owner, repo, title, body });
            }

      - name: Send Slack alert (optional)
        if: ${{ secrets.FILESYSTEM_INTERFACES_SLO_ALERT_WEBHOOK != '' }}
        uses: actions/github-script@v7
        env:
          ALERT_WEBHOOK: ${{ secrets.FILESYSTEM_INTERFACES_SLO_ALERT_WEBHOOK }}
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const text = [
              ":rotating_light: filesystem-interfaces SLO tuning workflow failed",
              `workflow: ${context.workflow}`,
              `event: ${context.eventName}`,
              `ref: ${context.ref}`,
              `sha: ${context.sha.substring(0, 12)}`,
              `run: ${runUrl}`
            ].join("\n");

            const response = await fetch(process.env.ALERT_WEBHOOK, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ text })
            });

            if (!response.ok) {
              const body = await response.text();
              throw new Error(`Slack webhook failed: ${response.status} ${body}`);
            }

  resolve-alert-on-success:
    name: resolve-alert-on-success
    runs-on: ubuntu-latest
    needs: tune
    if: ${{ always() && needs.tune.result == 'success' }}
    permissions:
      contents: read
      issues: write
    steps:
      - name: Close open GitHub issue alert on recovery
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = "filesystem-interfaces SLO tuning workflow failure detected";
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const query = `repo:${owner}/${repo} is:issue is:open in:title \"${title}\"`;
            const search = await github.rest.search.issuesAndPullRequests({ q: query, per_page: 10 });
            const existing = search.data.items.find((item) => item.title === title);
            if (!existing) return;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: existing.number,
              body: [
                "<!-- filesystem-interfaces-slo-tune-alert -->",
                "Recovery detected: filesystem-interfaces SLO tuning workflow is healthy.",
                "",
                `- workflow: ${context.workflow}`,
                `- run: ${runUrl}`,
                `- sha: ${context.sha}`
              ].join("\n")
            });

            await github.rest.issues.update({
              owner,
              repo,
              issue_number: existing.number,
              state: "closed"
            });

      - name: Send Slack recovery notification (optional)
        if: ${{ secrets.FILESYSTEM_INTERFACES_SLO_ALERT_WEBHOOK != '' }}
        uses: actions/github-script@v7
        env:
          ALERT_WEBHOOK: ${{ secrets.FILESYSTEM_INTERFACES_SLO_ALERT_WEBHOOK }}
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const text = [
              ":white_check_mark: filesystem-interfaces SLO tuning workflow recovered",
              `workflow: ${context.workflow}`,
              `ref: ${context.ref}`,
              `sha: ${context.sha.substring(0, 12)}`,
              `run: ${runUrl}`
            ].join("\n");

            const response = await fetch(process.env.ALERT_WEBHOOK, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ text })
            });

            if (!response.ok) {
              const body = await response.text();
              throw new Error(`Slack webhook failed: ${response.status} ${body}`);
            }
