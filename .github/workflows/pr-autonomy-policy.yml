name: PR Autonomy Policy

on:
  push:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - ready_for_review
      - labeled
      - unlabeled

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: required-pr-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate autonomy policy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      AUTONOMY_POLICY_ENFORCE: ${{ vars.AUTONOMY_POLICY_ENFORCE || 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Assert protected execution posture
        run: |
          set -euo pipefail
          chmod +x .octon/framework/assurance/runtime/_ops/scripts/assert-protected-execution-posture.sh
          EFFECTIVE_MODE="$(bash .octon/framework/capabilities/_ops/scripts/policy-rollout-mode.sh get)"
          OCTON_CI_WORKFLOW_ID="pr-autonomy-policy" \
          OCTON_PROTECTED_EXECUTION="true" \
          OCTON_EFFECTIVE_POLICY_MODE="${EFFECTIVE_MODE}" \
          EXPECT_AUTONOMY_POLICY_ENFORCE="true" \
          .octon/framework/assurance/runtime/_ops/scripts/assert-protected-execution-posture.sh

      - id: collect
        name: Collect PR autonomy inputs
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const fs = require("fs");
            const path = require("path");

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            let pr = context.payload.pull_request || null;
            const branchRef = pr?.head?.ref || context.ref.replace(/^refs\/heads\//, "");

            if (!pr) {
              const { data: pulls } = await github.rest.pulls.list({
                owner,
                repo,
                state: "open",
                head: `${owner}:${branchRef}`,
                per_page: 1
              });
              pr = pulls[0] || null;
            }

            if (!pr) {
              core.notice(`No open PR found for branch '${branchRef}'. Skipping autonomy evaluation on this push.`);
              core.setOutput("skip", "true");
              return;
            }

            const baseSha = pr.base?.sha;

            if (!baseSha) {
              core.setFailed("Unable to determine PR base SHA.");
              return;
            }

            async function readTextFile(filePath) {
              const response = await github.rest.repos.getContent({
                owner,
                repo,
                path: filePath,
                ref: baseSha
              });

              if (Array.isArray(response.data) || !("content" in response.data)) {
                throw new Error(`Expected file content at ${filePath}, received non-file response.`);
              }

              return Buffer.from(
                response.data.content,
                response.data.encoding || "base64"
              ).toString("utf8");
            }

            const changedFiles = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100
            });

            const tempDir = ".octon/generated/.tmp/pr-autonomy-policy";
            fs.mkdirSync(tempDir, { recursive: true });

            let standardsText = "";
            let templateText = "";
            try {
              const standardsCandidates = [
                ".octon/framework/execution-roles/practices/standards/commit-pr-standards.json",
                ".octon/framework/agency/practices/standards/commit-pr-standards.json"
              ];
              let standardsLoaded = false;
              for (const candidate of standardsCandidates) {
                try {
                  standardsText = await readTextFile(candidate);
                  standardsLoaded = true;
                  break;
                } catch (error) {
                  if (!/Not Found/.test(error.message)) throw error;
                }
              }
              if (!standardsLoaded) {
                throw new Error(`Could not load standards from base SHA. Tried: ${standardsCandidates.join(", ")}`);
              }
              templateText = await readTextFile(".github/PULL_REQUEST_TEMPLATE.md");
            } catch (error) {
              core.setFailed(`Could not load standards/template from base SHA: ${error.message}`);
              return;
            }

            fs.writeFileSync(path.join(tempDir, `pr-${pr.number}.json`), JSON.stringify(pr, null, 2));
            fs.writeFileSync(path.join(tempDir, `changed-files-${pr.number}.json`), JSON.stringify(changedFiles.map((file) => file.filename), null, 2));
            fs.writeFileSync(path.join(tempDir, `standards-${pr.number}.json`), standardsText);
            fs.writeFileSync(path.join(tempDir, `pr-template-${pr.number}.md`), templateText);

            core.setOutput("pr_number", String(pr.number));
            core.setOutput("skip", "false");

      - name: Evaluate autonomy policy
        if: steps.collect.outputs.skip != 'true'
        env:
          PR_NUMBER: ${{ steps.collect.outputs.pr_number }}
        run: |
          set -euo pipefail

          tmp_dir=".octon/generated/.tmp/pr-autonomy-policy"
          result_json="${tmp_dir}/result-${PR_NUMBER}.json"

          chmod +x .octon/framework/assurance/governance/_ops/scripts/evaluate-pr-autonomy-policy.sh
          .octon/framework/assurance/governance/_ops/scripts/evaluate-pr-autonomy-policy.sh \
            --pr-json "${tmp_dir}/pr-${PR_NUMBER}.json" \
            --changed-files-json "${tmp_dir}/changed-files-${PR_NUMBER}.json" \
            --standards-json "${tmp_dir}/standards-${PR_NUMBER}.json" \
            --pr-template "${tmp_dir}/pr-template-${PR_NUMBER}.md" \
            --request-id "github-pr-autonomy-policy-${PR_NUMBER}" \
            --run-id "github-pr-autonomy-policy-${PR_NUMBER}" \
            --target-id "github-pr:${PR_NUMBER}" \
            --issued-by "github://workflow/pr-autonomy-policy" \
            --output-json "${result_json}"

          jq -r '.notices[]?' "${result_json}" | while IFS= read -r notice; do
            [[ -n "${notice}" ]] && echo "::notice::${notice}"
          done

          error_count="$(jq -r '.errors | length' "${result_json}")"
          if [[ "${error_count}" -gt 0 ]]; then
            details="$(jq -r '.errors[] | "- " + .' "${result_json}")"
            if [[ "${AUTONOMY_POLICY_ENFORCE,,}" == "true" ]]; then
              printf 'Autonomy policy failed (enforced mode):\n%s\n' "${details}" >&2
              exit 1
            fi

            printf 'Autonomy policy found %s issue(s) in advisory mode:\n%s\n' "${error_count}" "${details}"
            echo "::notice::Advisory override active. Set repo variable AUTONOMY_POLICY_ENFORCE=true to fail on violations."
          else
            status="$(jq -r '.status' "${result_json}")"
            echo "Autonomy policy passed with canonical status: ${status}."
          fi

      - name: Upload protected execution receipt
        if: always() && steps.collect.outputs.skip != 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pr-autonomy-policy-protected-execution-receipt
          path: |
            .octon/state/evidence/runs/ci/pr-autonomy-policy-*
            .octon/generated/.tmp/pr-autonomy-policy/**
            .octon/state/control/execution/approvals/requests/github-pr-autonomy-policy-*.yml
            .octon/state/control/execution/approvals/grants/grant-github-pr-autonomy-policy-*.yml
            .octon/state/evidence/control/execution
          if-no-files-found: error
          retention-days: 7
