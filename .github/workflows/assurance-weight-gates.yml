name: Assurance Engine Gates

on:
  pull_request:
    paths:
      - '.harmony/assurance/governance/CHARTER.md'
      - '.harmony/assurance/governance/weights/**'
      - '.harmony/assurance/governance/**'
      - '.harmony/assurance/governance/scores/**'
      - '.harmony/assurance/runtime/_ops/scripts/compute-assurance-score.sh'
      - '.harmony/assurance/runtime/_ops/scripts/assurance-gate.sh'
      - '.harmony/engine/runtime/crates/assurance_tools/**'
      - '.harmony/engine/runtime/crates/Cargo.toml'
      - '.github/workflows/assurance-weight-gates.yml'
  push:
    branches:
      - main
    paths:
      - '.harmony/assurance/governance/CHARTER.md'
      - '.harmony/assurance/governance/weights/**'
      - '.harmony/assurance/governance/**'
      - '.harmony/assurance/governance/scores/**'
      - '.harmony/assurance/runtime/_ops/scripts/compute-assurance-score.sh'
      - '.harmony/assurance/runtime/_ops/scripts/assurance-gate.sh'
      - '.harmony/engine/runtime/crates/assurance_tools/**'
      - '.harmony/engine/runtime/crates/Cargo.toml'
      - '.github/workflows/assurance-weight-gates.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  score-and-gate:
    name: score-and-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Resolve baseline files
        shell: bash
        run: |
          set -euo pipefail

          BASE_SHA=""
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            BASE_SHA="${{ github.event.before }}"
          fi

          if [[ -z "$BASE_SHA" || "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            echo "No usable baseline SHA; running without baseline comparisons."
            exit 0
          fi

          if git cat-file -e "$BASE_SHA:.harmony/assurance/governance/weights/weights.yml" 2>/dev/null; then
            BASE_WEIGHTS="$RUNNER_TEMP/base-weights.yml"
            git show "$BASE_SHA:.harmony/assurance/governance/weights/weights.yml" > "$BASE_WEIGHTS"
            echo "BASE_WEIGHTS=$BASE_WEIGHTS" >> "$GITHUB_ENV"
          fi

          if git cat-file -e "$BASE_SHA:.harmony/assurance/governance/scores/scores.yml" 2>/dev/null; then
            BASE_SCORES="$RUNNER_TEMP/base-scores.yml"
            git show "$BASE_SHA:.harmony/assurance/governance/scores/scores.yml" > "$BASE_SCORES"
            echo "BASE_SCORES=$BASE_SCORES" >> "$GITHUB_ENV"
          fi

          if git cat-file -e "$BASE_SHA:.harmony/assurance/governance/CHARTER.md" 2>/dev/null; then
            BASE_CHARTER="$RUNNER_TEMP/base-charter.md"
            git show "$BASE_SHA:.harmony/assurance/governance/CHARTER.md" > "$BASE_CHARTER"
            echo "BASE_CHARTER=$BASE_CHARTER" >> "$GITHUB_ENV"
          fi

      - name: Compute assurance engine scorecard
        run: |
          OUT_DIR="$RUNNER_TEMP/assurance-engine-scorecard"
          cargo build --quiet --manifest-path .harmony/engine/runtime/crates/Cargo.toml -p harmony_assurance_tools
          cargo test --quiet --manifest-path .harmony/engine/runtime/crates/Cargo.toml -p harmony_assurance_tools
          .harmony/assurance/runtime/_ops/scripts/compute-assurance-score.sh \
            --weights .harmony/assurance/governance/weights/weights.yml \
            --scores .harmony/assurance/governance/scores/scores.yml \
            --charter .harmony/assurance/governance/CHARTER.md \
            --context .harmony/assurance/governance/weights/inputs/context.yml \
            --profile ci-reliability \
            --run-mode ci \
            --maturity beta \
            --repo harmony \
            --out-dir "$OUT_DIR"
          echo "OUT_DIR=$OUT_DIR" >> "$GITHUB_ENV"

      - name: Run assurance engine gate
        shell: bash
        run: |
          set -euo pipefail
          args=(
            --scorecard "$OUT_DIR/scorecard.yml"
            --weights .harmony/assurance/governance/weights/weights.yml
            --scores .harmony/assurance/governance/scores/scores.yml
            --charter .harmony/assurance/governance/CHARTER.md
            --mode ci
            --summary-out "$OUT_DIR/gate-summary.md"
          )

          if [[ -n "${BASE_WEIGHTS:-}" ]]; then
            args+=(--baseline-weights "$BASE_WEIGHTS")
          fi
          if [[ -n "${BASE_SCORES:-}" ]]; then
            args+=(--baseline-scores "$BASE_SCORES")
          fi
          if [[ -n "${BASE_CHARTER:-}" ]]; then
            args+=(--baseline-charter "$BASE_CHARTER")
          fi
          if [[ -n "${BASE_WEIGHTS:-}" && -n "${BASE_SCORES:-}" && -n "${BASE_CHARTER:-}" ]]; then
            args+=(--strict-warnings)
          fi

          .harmony/assurance/runtime/_ops/scripts/assurance-gate.sh "${args[@]}"

      - name: Upload assurance artifacts
        uses: actions/upload-artifact@v4
        with:
          name: assurance-engine-scorecard
          path: |
            ${{ env.OUT_DIR }}/scorecard.yml
            ${{ env.OUT_DIR }}/scorecard.md
            ${{ env.OUT_DIR }}/effective-weights.yml
            ${{ env.OUT_DIR }}/regressions.md
            ${{ env.OUT_DIR }}/gate-summary.md
          retention-days: 30
