name: filesystem-interfaces-perf-regression

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: filesystem-interfaces-perf-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  perf-regression:
    name: perf-regression
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          cache-bin: true

      - name: Install cargo-component
        run: |
          if ! command -v cargo-component >/dev/null 2>&1; then
            cargo install --locked cargo-component
          fi

      - name: Prefetch filesystem service crates
        run: |
          for crate_dir in \
            .octon/framework/capabilities/runtime/services/interfaces/filesystem-snapshot/rust \
            .octon/framework/capabilities/runtime/services/interfaces/filesystem-discovery/rust \
            .octon/framework/capabilities/runtime/services/interfaces/filesystem-watch/rust
          do
            (cd "$crate_dir" && cargo fetch --locked --target wasm32-wasip1)
          done

      - name: Build split filesystem wasm services from source
        env:
          OCTON_SERVICE_BUILD_OFFLINE_ONLY: "1"
          CARGO_NET_OFFLINE: "true"
        run: |
          .octon/framework/engine/runtime/run service build interfaces/filesystem-snapshot
          .octon/framework/engine/runtime/run service build interfaces/filesystem-discovery
          .octon/framework/engine/runtime/run service build interfaces/filesystem-watch

      - name: Run cold/warm perf regression gate
        run: |
          mkdir -p "$RUNNER_TEMP/filesystem-interfaces-perf"
          chmod +x .octon/framework/capabilities/runtime/services/_ops/scripts/test-filesystem-interfaces-perf-regression.sh
          .octon/framework/capabilities/runtime/services/_ops/scripts/test-filesystem-interfaces-perf-regression.sh \
            --profile ci \
            --no-report \
            --raw-out "$RUNNER_TEMP/filesystem-interfaces-perf/filesystem-interfaces-perf.raw.tsv" \
            --summary-out "$RUNNER_TEMP/filesystem-interfaces-perf/filesystem-interfaces-perf.summary.tsv"

      - name: Upload perf summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: filesystem-interfaces-perf-summary
          path: ${{ runner.temp }}/filesystem-interfaces-perf/filesystem-interfaces-perf.summary.tsv
          retention-days: 7

      - name: Upload perf raw artifact
        uses: actions/upload-artifact@v4
        with:
          name: filesystem-interfaces-perf-raw
          path: ${{ runner.temp }}/filesystem-interfaces-perf/filesystem-interfaces-perf.raw.tsv
          retention-days: 3
