name: Architecture Conformance

on:
  pull_request:
    paths:
      - "version.txt"
      - ".octon/octon.yml"
      - ".octon/framework/constitution/**"
      - ".octon/framework/execution-roles/**"
      - ".octon/framework/engine/**"
      - ".octon/framework/assurance/**"
      - ".octon/framework/capabilities/runtime/**"
      - ".octon/framework/capabilities/packs/**"
      - ".octon/framework/lab/**"
      - ".octon/framework/scaffolding/**"
      - ".octon/framework/assurance/runtime/**"
      - ".octon/framework/cognition/_meta/architecture/**"
      - ".octon/framework/cognition/governance/principles/**"
      - ".octon/framework/cognition/_ops/runtime/scripts/**"
      - ".octon/framework/orchestration/runtime/**"
      - ".octon/instance/orchestration/missions/**"
      - ".octon/instance/governance/policies/**"
      - ".octon/instance/governance/contracts/**"
      - ".octon/instance/governance/ownership/**"
      - ".octon/instance/governance/closure/**"
      - ".octon/instance/governance/disclosure/**"
      - ".octon/instance/governance/non-authority-register.yml"
      - ".octon/instance/governance/retirement-register.yml"
      - ".octon/instance/governance/support-targets.yml"
      - ".octon/instance/governance/support-target-admissions/**"
      - ".octon/instance/governance/support-dossiers/**"
      - ".octon/instance/capabilities/runtime/commands/**"
      - ".octon/instance/capabilities/runtime/packs/**"
      - ".octon/instance/ingress/**"
      - ".octon/state/control/execution/**"
      - ".octon/state/evidence/control/**"
      - ".octon/state/evidence/runs/**"
      - ".octon/state/evidence/lab/**"
      - ".octon/state/evidence/validation/publication/**"
      - ".octon/state/evidence/validation/architecture/**"
      - ".octon/state/continuity/repo/missions/**"
      - ".octon/generated/effective/**"
      - ".octon/generated/cognition/**"
      - ".octon/instance/bootstrap/**"
      - ".github/workflows/ai-review-gate.yml"
      - ".github/workflows/architecture-conformance.yml"
      - ".github/workflows/repo-hygiene.yml"
  push:
    branches:
      - main
    paths:
      - "version.txt"
      - ".octon/octon.yml"
      - ".octon/framework/constitution/**"
      - ".octon/framework/execution-roles/**"
      - ".octon/framework/engine/**"
      - ".octon/framework/assurance/**"
      - ".octon/framework/capabilities/runtime/**"
      - ".octon/framework/capabilities/packs/**"
      - ".octon/framework/lab/**"
      - ".octon/framework/scaffolding/**"
      - ".octon/framework/assurance/runtime/**"
      - ".octon/framework/cognition/_meta/architecture/**"
      - ".octon/framework/cognition/governance/principles/**"
      - ".octon/framework/cognition/_ops/runtime/scripts/**"
      - ".octon/framework/orchestration/runtime/**"
      - ".octon/instance/orchestration/missions/**"
      - ".octon/instance/governance/policies/**"
      - ".octon/instance/governance/contracts/**"
      - ".octon/instance/governance/ownership/**"
      - ".octon/instance/governance/closure/**"
      - ".octon/instance/governance/disclosure/**"
      - ".octon/instance/governance/non-authority-register.yml"
      - ".octon/instance/governance/retirement-register.yml"
      - ".octon/instance/governance/support-targets.yml"
      - ".octon/instance/governance/support-target-admissions/**"
      - ".octon/instance/governance/support-dossiers/**"
      - ".octon/instance/capabilities/runtime/commands/**"
      - ".octon/instance/capabilities/runtime/packs/**"
      - ".octon/instance/ingress/**"
      - ".octon/state/control/execution/**"
      - ".octon/state/evidence/control/**"
      - ".octon/state/evidence/runs/**"
      - ".octon/state/evidence/lab/**"
      - ".octon/state/evidence/validation/publication/**"
      - ".octon/state/evidence/validation/architecture/**"
      - ".octon/state/continuity/repo/missions/**"
      - ".octon/generated/effective/**"
      - ".octon/generated/cognition/**"
      - ".octon/instance/bootstrap/**"
      - ".github/workflows/ai-review-gate.yml"
      - ".github/workflows/architecture-conformance.yml"
      - ".github/workflows/repo-hygiene.yml"

permissions:
  contents: read

jobs:
  architecture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yq
        run: sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.50.1/yq_linux_amd64 && sudo chmod +x /usr/local/bin/yq

      - name: Validate version and architecture
        run: |
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-version-parity.sh
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-architecture-conformance.sh
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-architecture-contract-registry.sh
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-material-side-effect-inventory.sh
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-authorization-boundary-coverage.sh
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-generated-non-authority.sh
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-input-non-authority.sh
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-promotion-receipts.sh
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-runtime-docs-consistency.sh
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-host-tool-governance.sh

      - name: Upload architecture remediation evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: architecture-10of10-remediation-evidence
          path: .octon/state/evidence/validation/architecture/10of10-remediation/**
          if-no-files-found: error
          retention-days: 7

  mission-runtime-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yq
        run: sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.50.1/yq_linux_amd64 && sudo chmod +x /usr/local/bin/yq

      - name: Validate mission runtime contracts
        run: |
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-mission-runtime-contracts.sh
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-mission-intent-invariants.sh
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-mission-source-of-truth.sh
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-operator-read-models.sh

  mission-lifecycle-cutover:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yq
        run: sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.50.1/yq_linux_amd64 && sudo chmod +x /usr/local/bin/yq

      - name: Validate mission lifecycle cutover
        run: |
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-mission-lifecycle-cutover.sh
          bash .octon/framework/assurance/runtime/_ops/scripts/test-mission-lifecycle-activation.sh

  runtime-effective-state:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.50.1/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Validate runtime effective state
        run: |
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-runtime-effective-state.sh
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-route-normalization.sh
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-evidence-completeness.sh

  mission-autonomy-scenarios:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yq
        run: sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.50.1/yq_linux_amd64 && sudo chmod +x /usr/local/bin/yq

      - name: Run mission autonomy scenarios
        run: |
          bash .octon/framework/assurance/runtime/_ops/scripts/test-mission-autonomy-scenarios.sh
          bash .octon/framework/assurance/runtime/_ops/scripts/test-autonomy-burn-reducer.sh

  mission-generated-views-and-evidence:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yq
        run: sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.50.1/yq_linux_amd64 && sudo chmod +x /usr/local/bin/yq

      - name: Validate generated mission views and control evidence
        run: |
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-mission-generated-summaries.sh
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-mission-view-generation.sh
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-mission-control-evidence.sh

  proof-lab-enforcement:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yq
        run: sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.50.1/yq_linux_amd64 && sudo chmod +x /usr/local/bin/yq

      - name: Validate proof-plane and lab enforcement
        run: |
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-phase4-proof-lab-enforcement.sh

  adapter-support-hardening:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yq
        run: sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.50.1/yq_linux_amd64 && sudo chmod +x /usr/local/bin/yq

      - name: Validate Phase 5 adapter and support-target hardening
        run: |
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-phase5-adapter-support-target-hardening.sh
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-support-target-proofing.sh

  simplification-deletion:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yq
        run: sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.50.1/yq_linux_amd64 && sudo chmod +x /usr/local/bin/yq

      - name: Validate Phase 6 simplification and deletion
        run: |
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-phase6-simplification-deletion.sh

  bounded-uec-hardening:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yq
        run: sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.50.1/yq_linux_amd64 && sudo chmod +x /usr/local/bin/yq

      - name: Validate bounded hardening packet surfaces
        run: |
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-bounded-claim-nomenclature.sh
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-audit-crosswalk.sh
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-review-packet-freshness.sh
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-non-authority-register.sh
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-retirement-register-depth.sh
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-ingress-manifest-parity.sh
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-support-dossier-evidence-depth.sh
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-evaluator-diversity.sh
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-hidden-check-breadth.sh
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-distillation-refinements.sh
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-contract-family-version-coherence.sh
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-projection-shell-boundaries.sh

  build-to-delete-governance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yq
        run: sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.50.1/yq_linux_amd64 && sudo chmod +x /usr/local/bin/yq

      - name: Validate Phase 7 build-to-delete governance
        run: |
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-repo-hygiene-governance.sh
          bash .octon/framework/assurance/runtime/_ops/scripts/validate-phase7-build-to-delete-institutionalization.sh
          bash .octon/framework/assurance/governance/_ops/scripts/assert-unified-execution-closure.sh
